><br>• x_0 = c_1 v_1 + c_2 v_2 + ... + c_n v_n (초기 분해)<br>• x_k = c_1 λ_1^k v_1 + c_2 λ_2^k v_2 + ...<br>• λ_1^k로 factor out:<br>  x_k = λ_1^k [c_1 v_1 + c_2 (λ_2/λ_1)^k v_2 + ...]<br>• λ_1 > 다른 λ 이므로, k→∞에서 (λ_i/λ_1)^k → 0 (i > 1)<br>• → <b>x_k가 principal eigenvector로 수렴</b>", "summary": "<p><b>⭐⭐⭐ Power Iteration 수렴 증명 — 시험 가능성</b></p><p><b>📐 증명</b></p><ol><li>초기 x_0을 eigenvector basis로 분해:<br>x_0 = c_1 v_1 + c_2 v_2 + ... + c_n v_n</li><li>M 반복 적용:<br>M^k x_0 = c_1 λ_1^k v_1 + c_2 λ_2^k v_2 + ... + c_n λ_n^k v_n</li><li>λ_1 (최대)로 factor out:<br>= λ_1^k [c_1 v_1 + c_2 (λ_2/λ_1)^k v_2 + ...]</li><li>|λ_2/λ_1| < 1 (λ_1이 최대니까) → (λ_2/λ_1)^k → 0 as k→∞</li><li>마찬가지로 모든 i > 1에 대해 0으로</li><li>∴ x_k ≈ λ_1^k · c_1 v_1 → normalize하면 <b>v_1 (principal eigenvector)</b></li></ol><p><b>🎯 결론</b><br>\"최대 eigenvalue가 지배해서 principal eigenvector로 수렴.\"</p>"}, "24": {"en": "Finding More Eigenpairs\n• Create a new matrix 𝑀∗ = 𝑀 − 𝜆𝑥𝑥 $ .\n   • Eliminate the influence of 𝑥 by setting its associated eigenvalue to 0.\n• Recursively use power iteration on 𝑀∗ , and so on.\n• Example:\n\n        ∗ 1 2        0.53             −0.19 0.09\n      𝑀 =     − 4.25      0.53 0.85 =\n          2 3        0.85             0.09 0.07\n\n\n\n\n                                     Jaemin Yoo                                24", "kr": "<b>More Eigenpair 찾기</b><br>• 새 행렬: M* = M − λ x x^T<br>  • x의 영향 제거 (λ를 0으로)<br>• M*에 power iteration 재귀 적용<br>• 예: M = [[1,2],[2,3]], λ=4.25, x=(0.53, 0.85)<br>  • M* = M − 4.25 x x^T = [[−0.19, 0.09], [0.09, 0.07]]", "summary": "<p><b>⭐ Deflation — 다음 eigenpair 찾기</b></p><p><b>💡 아이디어</b><br>\"첫 eigenpair (λ_1, v_1) 찾았으면, 영향 제거한 M*을 만들어 다음 것 찾기.\"</p><p><b>📐 공식</b><br><code>M* = M − λ_1 · v_1 · v_1^T</code></p><p><b>🎯 효과</b><br>M*의 eigenvalue는 {0, λ_2, λ_3, ..., λ_n}. λ_1이 0으로 replace됨. 그래서 power iteration 다시 돌리면 λ_2에 대응하는 v_2 찾음.</p><p><b>🍎 예</b><br>M = [[1,2],[2,3]], λ_1=4.25, v_1=(0.53, 0.85):<br>M* = M − 4.25·v_1·v_1^T = [[−0.19, 0.09], [0.09, 0.07]]<br>이 M*에 power iteration → 두 번째 eigenpair.</p>"}, "25": {"en": "Outline\n1. Dimensionality Reduction\n2. Eigenvalues and Eigenpairs\n3. Power Iteration\n4. Principal Component Analysis\n\n\n\n\n                           Jaemin Yoo   25", "kr": "<b>목차 (4부)</b><br>1. ✓ 2. ✓ 3. ✓ 4. <b>Principal Component Analysis (PCA)</b> ← 여기부터", "summary": "<p><b>🎯 4부 — PCA (L10 하이라이트)</b></p><p>Eigenvalue 이론을 실제 차원 축소에 적용.</p>"}, "26": {"en": "Principal Component Analysis\n• Principal component analysis (PCA):\n  • Given 𝑛-dimensional data, it finds the new 𝑛 axes such that:\n  • 1st dimension shows the greatest variance.\n  • 2nd dimension shows the next-greatest variance, orthogonal to the 1st.\n\n                                             First principal\n                     Second principal        component\n                     component\n\n\n\n\n                                                                             26", "kr": "<b>PCA 정의</b><br>• n차원 데이터 주어지면 새 n 축 찾기:<br>  • <b>1st axis:</b> 최대 variance<br>  • <b>2nd axis:</b> 다음으로 큰 variance, 1st와 직교<br>• 모든 축은 서로 직교 (orthonormal)", "summary": "<p><b>⭐⭐⭐ PCA — 핵심 정의</b></p><p><b>🎯 목표</b><br>\"n차원 데이터의 <b>n개 새 축</b>을 만들되:</p><ul><li><b>1st axis:</b> 데이터 variance 최대</li><li><b>2nd axis:</b> 1st와 <b>직교</b>하면서 나머지 variance 최대</li><li><b>3rd axis:</b> 1st, 2nd와 직교, 나머지 variance 최대</li><li>...</li></ul><p><b>📐 축 성질</b><br>모든 축은 서로 orthonormal.</p><p><b>💡 왜 variance 최대?</b><br>\"variance가 크다 = 그 방향에 데이터 많이 퍼짐 = 정보 많이 있음.\"</p>"}, "27": {"en": "Output of PCA\n• Given an 𝑚 × 𝑛 data matrix 𝑀 with column-wise zero mean.\n• Create an 𝑛 × 𝑛 transformation matrix 𝑇 to make 𝑀. = 𝑀𝑇.\n  • The 𝑖-th column of 𝑇 creates the 𝑖-th PC.\n  • Dimensionality reduction is done if we use the first 𝑟 columns.\n\n\n                                                                      T\n\n                                                M’   =    M\n\n\n\n\n                                   Jaemin Yoo                             27", "kr": "<b>PCA 출력</b><br>• m×n 데이터 M (column-wise zero mean)<br>• n×n 변환 행렬 T 생성: <b>M' = MT</b><br>  • T의 i-th column이 i-th PC 만듦<br>• 차원 축소 = 첫 r column만 사용 → M은 m×r", "summary": "<p><b>⭐ PCA 출력 형태</b></p><p><b>📐 변환</b><br>m × n 데이터 M (zero mean!) → m × n 변환된 M':<br><code>M' = M · T</code></p><ul><li>T는 n × n 변환 행렬</li><li>T의 i-th column = i-th PC 방향</li><li>M'의 i-th column = i-th PC에 투영된 값</li></ul><p><b>🎯 차원 축소</b><br>T의 <b>첫 r column만 사용</b> → M·T_{1..r} = m × r 행렬. 정보 대부분 보존.</p>"}, "28": {"en": "Why Zero Mean?\n• What will happen if the input 𝑀 is not zero-centered?\n• The first PC is likely to point the mean of data.\n   • Since it introduces a large (artificial) variance.\n• Mean-centering (or feature standardization) is essential.\n\n\n\n\n                                       Jaemin Yoo             28", "kr": "<b>왜 Zero Mean 필수?</b><br>• M이 zero-centered 아니면?<br>• 첫 PC가 데이터 mean을 가리킬 가능성<br>  • 인위적으로 큰 variance 유발<br>• <b>Mean-centering (또는 standardization) 필수</b>", "summary": "<p><b>⚠️ Zero Mean 필수 — 실무 주의</b></p><p><b>🚨 문제</b><br>데이터가 원점에서 떨어져 있으면, 첫 PC가 <b>원점→데이터 평균 방향</b>을 가리킴. 실제 variance 방향 아닌 <b>위치</b>를 반영.</p><p><b>🔧 해결</b></p><ol><li><b>Mean-centering:</b> 각 feature에서 mean 빼기</li><li><b>Standardization (추가):</b> std로 나눔 (scale 통일)</li></ol><p><b>📝 T/F 단골</b><br>\"PCA 전에 zero-centering 필수\" → <b>TRUE</b></p>"}, "29": {"en": "Optimization Problem\n• Q: How can we efficiently find the first column 𝑡# of 𝑇?\n• Let’s define the variance of data for a column 𝑡 as\n      var 𝑡 ≡ ∑\" 𝑀\" 𝑡 − 0 ! = 𝑀𝑡 ! = 𝑀𝑡 $ 𝑀𝑡 = 𝑡 $ 𝑀$ 𝑀𝑡.\n   • 𝑀& is the 𝑖-th row of 𝑀.\n• Then, to maximize variance, 𝑡# = argmax / 0# var 𝑡 .\n\n\n\n\n                                Jaemin Yoo                   29", "kr": "<b>최적화 문제 (t_1 찾기)</b><br>• var(t) ≡ Σ (M_i t − 0)² = ||Mt||² = (Mt)^T(Mt) = t^T M^T M t<br>  • M_i = M의 i-th row<br>• t_1 = argmax_{||t||=1} var(t)", "summary": "<p><b>📐 PCA 최적화 문제</b></p><p><b>🎯 목표</b><br>\"unit 벡터 t 중 variance 최대인 것 찾기.\"</p><p><b>📐 Variance 식 전개</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:11px\">var(t) = Σ_i (M_i · t)² (각 점을 t에 투영 제곱 합)\n       = ||Mt||²\n       = (Mt)^T (Mt)\n       = t^T M^T M t</pre><p><b>📐 공식 목표</b><br>t_1 = argmax_{||t||=1} t^T M^T M t</p><p><b>💡 Key</b><br>\"quadratic form t^T A t의 최대화\" (A = M^T M, symmetric).</p>"}, "30": {"en": "Rayleigh Quotient\n• Observation 1: var 𝑡 = 𝑡 $ 𝑀$ 𝑀𝑡 is between 𝜆123 and 𝜆145 .\n   • 𝜆-./ is the smallest eigenvalue of 𝑀$𝑀.\n   • 𝜆-01 is the largest eigenvalue of 𝑀$𝑀.\n• Proof:\n   • 𝑡 $𝑀$𝑀𝑡 = 𝑡 $ 𝑄ΛQ$ 𝑡 = 𝑡 $𝑄 Λ 𝑄 $𝑡 .\n      • 𝑀\"𝑀 is a symmetric matrix and thus is diagonalizable.\n   • Let 𝑦 ≡ 𝑄 $𝑡; then, 𝑦 is a unit vector.\n      • Why? 𝑦 # = 𝑦 \"𝑦 = 𝑄\"𝑡 \" 𝑄\"𝑡 = 𝑡 \"𝑄𝑄\"𝑡 = 𝑡 \"𝑡 = 1.\n   • Thus, 𝑦 $Λy = ∑& 𝜆& 𝑦&\" is a weighted average of 𝜆& ’s.\n\n\n\n                                        Jaemin Yoo              30", "kr": "<b>Rayleigh Quotient (관찰 1)</b><br>• var(t) = t^T M^T M t는 [λ_min, λ_max] 범위<br>  • λ_min = M^T M의 최소 eigenvalue, λ_max = 최대<br>• <b>증명:</b><br>  • t^T M^T M t = t^T Q Λ Q^T t = t^T Q Λ (Q^T t)<br>  • y ≡ Q^T t (unit vector, 증명: ||y||² = t^T Q Q^T t = t^T t = 1)<br>  • t^T Q Λ Q^T t = y^T Λ y = Σ λ_i y_i² = eigenvalue 가중 평균", "summary": "<p><b>⭐⭐⭐ Rayleigh Quotient — 핵심 수학</b></p><p><b>📐 정리</b><br>var(t) = t^T M^T M t ∈ [λ_min, λ_max] (M^T M의 eigenvalue 범위)</p><p><b>📐 증명</b></p><ol><li>M^T M은 symmetric → Q orthogonal로 eigendecomp: M^T M = Q Λ Q^T</li><li>t^T (Q Λ Q^T) t = (Q^T t)^T Λ (Q^T t)</li><li>y ≡ Q^T t 정의. y도 unit vector:<br>||y||² = y^T y = t^T Q Q^T t = t^T I t = ||t||² = 1</li><li>t^T M^T M t = y^T Λ y = Σ λ_i y_i²</li><li>즉 <b>eigenvalue들의 가중평균</b> (가중치 y_i²의 합 = 1)</li></ol><p><b>🎯 결과</b><br>\"가중평균은 min과 max 사이.\" ∴ var(t) ∈ [λ_min, λ_max].</p>"}, "31": {"en": "Rayleigh Quotient\n• Observation 2: var 𝑡 = 𝑡 $ 𝑀$ 𝑀𝑡 = 𝜆145 when 𝑡 = 𝑣# .\n   • 𝑣! is the principal eigenvector of 𝑀$𝑀.\n• Proof:\n   • var 𝑡 = ∑& 𝜆& 𝑦&\" is a weighted average of eigenvalues 𝜆& ’s.\n   • The maximum is achieved when 𝑦! = 1 and 𝑦&2! = 0.\n   • If 𝑦! = 1, then 𝑦! = 𝑄 $𝑡 ! = 𝑣!$𝑡 = 1.\n   • Since 𝑣! and 𝑡 are both unit vectors, we conclude that 𝑡 = 𝑣!.\n\n\n\n\n                                    Jaemin Yoo                        31", "kr": "<b>Rayleigh Quotient (관찰 2)</b><br>• var(t) = λ_max iff t = v_1 (principal eigenvector of M^T M)<br>• 증명:<br>  • var(t) = Σ λ_i y_i² (y는 Q^T t, unit)<br>  • 최대 = y_1=1, y_{i≠1}=0<br>  • y_1 = 1 ⟹ v_1^T t = 1<br>  • v_1, t 둘 다 unit vector이므로 t = v_1", "summary": "<p><b>⭐⭐⭐ Rayleigh Quotient 관찰 2 — 최대화 조건</b></p><p><b>🎯 주장</b><br>\"var(t) = λ_max ⟺ t = v_1\" (principal eigenvector of M^T M)</p><p><b>📐 증명</b></p><ol><li>var(t) = Σ_i λ_i y_i² (관찰 1의 결과)</li><li>y는 unit vector (Σ y_i² = 1)</li><li>가중평균 최대화 = <b>최대 λ 방향에 모두 쏟기</b>:<br>y_1 = 1, y_{i≠1} = 0</li><li>y_1 = 1 ⟹ Q^T t의 첫 원소가 1 ⟹ v_1^T t = 1</li><li>v_1, t 둘 다 unit이므로 Cauchy-Schwarz: v_1^T t ≤ ||v_1||·||t|| = 1. 등호는 <b>t = v_1</b>일 때.</li></ol><p><b>🎯 결론</b><br>\"첫 PC = M^T M의 principal eigenvector.\"</p>"}, "32": {"en": "Optimization Problem\n• Q: How can we efficiently find the first column 𝑡# of 𝑇?\n• Answer: 𝑡# is the principal eigenvector of 𝑀$ 𝑀 with 𝜆145 .\n   • Based on Observations 1 and 2.\n• We can run power iteration to find 𝑡# , and 𝑡! , and so on.\n   • 𝑡\" is the second principal eigenvector of 𝑀$𝑀.\n   • 𝑀$𝑀 is often called the covariance matrix of (centered) data.\n\n\n\n\n                                    Jaemin Yoo                       32", "kr": "<b>PCA 최적화 정답</b><br>• Q: t_1 찾기?<br>• A: <b>t_1 = M^T M의 principal eigenvector (λ_max에 해당)</b><br>• 관찰 1, 2에 근거<br>• Power iteration으로 t_1, t_2, ... 순차 발견<br>  • t_2 = M^T M의 두 번째 principal eigenvector<br>• <b>M^T M은 (centered 데이터의) covariance matrix</b>", "summary": "<p><b>⭐⭐⭐ PCA 최종 결론</b></p><p><b>📐 정답</b><br>\"t_i = M^T M의 i번째 principal eigenvector (i번째 큰 λ 대응)\"</p><p><b>📋 실제 계산</b></p><ol><li>M^T M 계산 (n × n, symmetric)</li><li>Power iteration으로 principal eigenvector v_1 = t_1 찾기</li><li>Deflation: M^T M − λ_1 v_1 v_1^T → v_2 = t_2</li><li>반복해서 top-r 획득</li></ol><p><b>💡 M^T M의 의미</b><br>M이 zero-centered이면 <b>M^T M은 covariance matrix</b>. 즉 PCA = covariance의 eigenvector 찾기.</p><p><b>📝 시험 단골</b></p><ul><li>\"PCA는 M^T M의 eigendecomp\" → <b>TRUE</b></li><li>\"M^T M은 symmetric\" → <b>TRUE</b></li></ul>"}, "33": {"en": "Dimensionality Reduction by PCA\n• PCA is widely used for dimensionality reduction.\n• By keeping the first 𝑟 columns in 𝑀′, not all 𝑛 columns.\n   • The chosen columns have the greatest variances.\n   • Thus, 𝑀′ can represent the “information” even with 𝑟 < 𝑛.\n\n\n                                                                 T\n\n                                                 M’   =   M\n\n\n\n\n                                    Jaemin Yoo                       33", "kr": "<b>PCA로 차원 축소</b><br>• M'의 첫 r column만 유지 (모든 n 아님)<br>  • 선택된 column = 가장 큰 variance<br>• <b>M'이 r < n에서도 \"정보\" 보존 가능</b>", "summary": "<p><b>🎯 차원 축소 실전</b></p><p><b>📋 단계</b></p><ol><li>전체 T 계산 (n × n)</li><li>첫 r column만 유지: T_r (n × r)</li><li>M_reduced = M · T_r (m × r 차원)</li></ol><p><b>💡 r 선택</b><br>보통 \"variance 95% 유지\"되는 최소 r 선택:<br>Σ_{i=1}^r λ_i / Σ_{i=1}^n λ_i ≥ 0.95</p><p><b>🎯 효과</b></p><ul><li>차원 n → r로 대폭 감소</li><li>대부분 variance(정보) 보존</li><li>downstream 알고리즘 빠름</li></ul>"}, "34": {"en": "Summary\n1. Dimensionality Reduction\n  • Latent factors\n2. Eigenvalues and eigenpairs\n  • Eigendecomposition\n3. Power Iteration\n  • Principal eigenvectors\n4. Principal Component Analysis\n  • Principal components\n  • Transformation matrix\n\n\n                                Jaemin Yoo   34", "kr": "<b>요약</b><br>1. Dimensionality Reduction — latent factor<br>2. Eigenvalues and Eigenpairs — eigendecomposition<br>3. Power Iteration — principal eigenvector<br>4. PCA — principal components, transformation matrix", "summary": "<p><b>🎬 L10 마무리 — 시험 대비</b></p><p><b>✅ 공식 암기</b></p><ul><li>Mẻ = λe (eigenpair)</li><li>Eigendecomp: M = Q Λ Q^(-1)</li><li>Symmetric: S = Q Λ Q^T (Q orthogonal)</li><li>Power iteration: x_{k+1} = Mx_k / ||Mx_k||</li><li>λ = x^T M x (after 수렴)</li><li>Deflation: M* = M − λ x x^T</li></ul><p><b>✅ PCA 핵심</b></p><ul><li>PCA = M^T M의 eigendecomp</li><li>t_1 = principal eigenvector of M^T M</li><li>Zero-mean 전처리 필수</li><li>Rayleigh quotient로 증명</li></ul><p><b>⭐ 기출 예상</b></p><ul><li>T/F: symmetric matrix 성질</li><li>증명: Power iteration 수렴 (v_1로)</li><li>증명: Rayleigh quotient (λ_max 도달 조건)</li><li>계산: 간단한 2×2 eigenvalue</li></ul>"}}, "11": {"1": {"en": "Dimensionality Reduction 2\n       Introduction to Data Mining\n        Seoul National University\n              Spring 2026\n\n\n\n\n                 Jaemin Yoo          1", "kr": "<b>Dimensionality Reduction 2</b><br>서울대 · 2026 봄 · Jaemin Yoo", "summary": "<p><b>🎬 L11 시작 — SVD + CUR</b><br>L10의 PCA를 확장한 <b>SVD</b> (모든 실수 행렬 적용 가능), 그리고 sparse 데이터용 <b>CUR</b>.</p><p><b>⭐ 시험 포인트</b></p><ul><li>SVD 형태 M = UΣV^T (★★★)</li><li>SVD 3대 성질 (★★)</li><li>M^T M으로 V, Σ 계산 (★★★)</li><li>Best low-rank approx + 90% energy rule (★★)</li><li>Query: qV, qVV^T (★★★)</li><li>CUR 샘플링 확률 ||row||² / ||M||² (★★)</li></ul>"}, "2": {"en": "Announcements (Same as Before)\n• Assignments:\n  • HW1 (deadline: April 9)\n  • HW2 (deadline: April 30)\n• Midterm:\n  • When: April 23 at 9:30 – 10:45\n  • Where: 302-208 and 302-209 (students will be separated)\n  • How: Closed-book; no calculators allowed\n\n\n\n\n                                 Jaemin Yoo                   2", "kr": "<b>공지 (동일)</b><br>• HW1 (4/9), HW2 (4/30)<br>• <b>Midterm 4/23, 9:30-10:45, 302-208/209, closed-book</b>", "summary": "<p><b>⭐ 시험 정보 재확인</b></p><ul><li>4월 23일 (목)</li><li>9:30-10:45 (75분)</li><li>302-208/209</li><li>Closed-book, no calc</li></ul>"}, "3": {"en": "Recap                                                            T\n\n                                          M’          =   M\n• Dimensionality Reduction\n• Eigenvalues and Eigenpairs\n• Power Iteration\n• Principal Component Analysis\n                                                              First principal\n                                          Second              component\n                                          principal\n                                          component\n\n\n\n\n                             Jaemin Yoo                                    3", "kr": "<b>복습 (L10)</b><br>• Dim Reduction, Eigenvalue/pair, Power Iteration, PCA<br>• M = QΛQ^(-1), principal eigenvector", "summary": "<p><b>🔙 L10 복습</b></p><ul><li>Eigenvalue/pair: Mẻ = λe</li><li>Power iteration: principal eigenvector</li><li>PCA = M^T M의 eigendecomp</li><li>Symmetric → orthonormal eigenvector</li></ul><p><b>💡 L11 연결</b><br>SVD는 PCA의 <b>일반화</b>. 정사각행렬 아니어도 적용 가능.</p>"}, "4": {"en": "Outline\n1. Singular Value Decomposition\n2. Dimensionality Reduction with SVD\n3. CUR Decomposition\n\n\n\n\n                             Jaemin Yoo   4", "kr": "<b>목차</b><ol><li>Singular Value Decomposition</li><li>SVD로 차원 축소</li><li>CUR Decomposition</li></ol>", "summary": "<p><b>🗺️ L11 3부 구성</b></p><ol><li><b>SVD</b> — 정의, 성질, 계산</li><li><b>SVD Dim Reduction</b> — best low-rank approx, query</li><li><b>CUR</b> — sparse 친화 decomp</li></ol>"}, "5": {"en": "Singular Value Decomposition\n• Singular value decomposition (SVD):\n  • A factorization of 𝑀 ∈ ℝ!×# into the product of three matrices:\n                                  𝑀 ≈ 𝑈Σ𝑉 ! ,\n  • whose sizes are determined by an input 𝑟.\n                        n             r               r   n\n\n                                                          VT   r\n                                                  Σ\n                m       M     =      U\n\n\n\n\n                                     Jaemin Yoo                       5", "kr": "<b>SVD 정의</b><br>• M ∈ ℝ^(m×n)의 3개 행렬 곱 factorization:<br>• <b>M ≈ U Σ V^T</b><br>  • 크기는 입력 r에 따라 결정<br>• U: m×r, Σ: r×r, V^T: r×n", "summary": "<p><b>⭐⭐⭐ SVD — 필수 암기</b></p><p><b>📐 정의</b><br>임의의 실수 행렬 M ∈ ℝ^(m × n)에 대해:<br><code>M ≈ U Σ V^T</code></p><p><b>📐 크기 (r = 선택한 rank)</b></p><ul><li><b>U:</b> m × r (left singular vectors)</li><li><b>Σ:</b> r × r diagonal (singular values)</li><li><b>V^T:</b> r × n (right singular vectors transpose)</li></ul><p><b>💡 직관</b><br>\"M의 숨은 구조를 <b>r개 factor</b>로 분해.\" (r은 조정 가능.)</p>"}, "6": {"en": "Number of Latent Factors\n• 𝑟 determines the number of latent factors to capture.\n• Let’s define the reconstruction error as 𝑀 − 𝑈Σ𝑉 ! \" .\n                    '\n  • 𝐴 $ = sqrt ∑%& 𝑎%& is called the Frobenius norm of a matrix.\n• Then, the error reaches zero when 𝑟 ≥ rank 𝑀 .\n                       n           r               r   n\n\n                                                       VT   r\n                                               Σ\n               m       M     =    U\n\n\n\n\n                                  Jaemin Yoo                       6", "kr": "<b>Latent Factor 수</b><br>• r = 잡을 latent factor 수<br>• Reconstruction error = ||M − UΣV^T||_F²<br>  • Frobenius norm: ||A||_F = √Σ_ij a_ij²<br>• <b>r ≥ rank(M)이면 오차 0</b>", "summary": "<p><b>📐 r (Rank)과 Error</b></p><p><b>📐 Reconstruction Error</b><br><code>||M − UΣV^T||_F² = Σ_ij (M_ij − [UΣV^T]_ij)²</code></p><p>Frobenius norm: 행렬의 원소 제곱 합의 루트.</p><p><b>🎯 핵심 성질</b></p><ul><li><b>r ≥ rank(M):</b> 오차 0 (정확 분해)</li><li><b>r < rank(M):</b> 근사 (오차 > 0). 작은 singular values 제거.</li></ul><p><b>💡 실무</b><br>보통 r ≪ rank(M). 주요 factor만 잡고 나머지는 noise로 간주.</p>"}, "7": {"en": "Properties of Factor Matrices\n• 𝑈 and 𝑉 are column-orthonormal matrices of singular vectors.\n   • 𝑈 (𝑈 = 𝐼 and 𝑉 (𝑉 = 𝐼, where 𝐼 is the identity matrix.\n• Σ = diag 𝜎# , 𝜎$ , ⋯ , 𝜎% is a diagonal matrix of singular values.\n   • Non-negative and sorted in decreasing order: 𝜎) ≥ 𝜎' ≥ ⋯ ≥ 0.\n\n                          n           r               r   n\n\n                                                          VT   r\n                                                  Σ\n                 m       M      =    U\n\n\n\n\n                                     Jaemin Yoo                        7", "kr": "<b>Factor Matrix 성질</b><br>• U, V: column-orthonormal (singular vectors)<br>  • U^T U = I, V^T V = I<br>• Σ = diag(σ_1, σ_2, ..., σ_r): singular values<br>  • <b>Non-negative + decreasing order: σ_1 ≥ σ_2 ≥ ... ≥ 0</b>", "summary": "<p><b>⭐⭐ SVD 구성요소 성질 — 필수 암기</b></p><p><b>📐 U, V</b></p><ul><li><b>Column-orthonormal:</b> U^T U = I_r, V^T V = I_r</li><li>각 column은 unit vector + 서로 직교</li><li>column = <b>singular vector</b></li></ul><p><b>📐 Σ</b></p><ul><li>대각행렬 (off-diagonal = 0)</li><li>대각 원소 σ_1, ..., σ_r = <b>singular values</b></li><li><b>Non-negative:</b> σ_i ≥ 0</li><li><b>Decreasing:</b> σ_1 ≥ σ_2 ≥ ... ≥ σ_r</li></ul><p><b>📝 T/F 단골</b></p><ul><li>\"Singular values are always non-negative\" → <b>TRUE</b></li><li>\"Singular values in Σ are sorted\" → <b>TRUE</b></li></ul>"}, "8": {"en": "Understanding SVD\n• Property 1: It is possible to apply SVD to any real matrix.\n   • Big difference from eigendecomposition.\n• Property 2: 𝑈, Σ and 𝑉 are unique for each matrix.\n• Property 3: 𝜎& denotes the “strength” of the 𝑖-th latent factor.\n   • Some latent factors are more important than others.\n   • Latent factors are normally sorted by their “strength.”\n      • 𝜎! ≥ 𝜎\" ≥ ⋯ ≥ 0.\n\n\n\n\n                                     Jaemin Yoo                      8", "kr": "<b>SVD 이해 (3대 성질)</b><br>• <b>P1:</b> 어떤 실수 행렬에도 적용 가능 (eigendecomp와 큰 차이)<br>• <b>P2:</b> U, Σ, V는 각 행렬마다 유일<br>• <b>P3:</b> σ_i = i번째 latent factor의 \"강도\"<br>  • 일부 factor가 더 중요<br>  • 강도 순 정렬", "summary": "<p><b>⭐⭐ SVD 3대 성질</b></p><p><b>📐 P1: 항상 적용 가능</b><br>\"모든 실수 행렬 M ∈ ℝ^(m×n)에 SVD 존재.\" (eigendecomp는 정사각에만!)</p><p><b>📐 P2: 유일</b><br>SVD는 unique (부호 fix 하에). 같은 M → 같은 U, Σ, V.</p><p><b>📐 P3: σ_i = latent factor 강도</b><br>i번째 latent concept의 \"중요도\". 내림차순 정렬 덕에 <b>top-r만 잘라</b>도 상위 concept만 남음.</p><p><b>📝 T/F 단골</b></p><ul><li>\"SVD는 eigendecomposition과 같다\" → <b>FALSE</b> (eigendecomp은 정사각 한정)</li><li>\"SVD는 모든 행렬에 가능\" → <b>TRUE</b></li></ul>"}, "9": {"en": "Different View of SVD\n• 𝑀 ≈ 𝑈Σ𝑉 ! = ∑%&+# 𝜎& 𝑢& 𝑣&! (𝜎& : scalar, 𝑢& , 𝑣& : singular vectors).\n   • SVD is the sum of the 𝑟 outer products of 𝑢% and 𝑣% vectors.\n   • Each 𝜎% 𝑢% 𝑣%( represents the effect of the 𝑖-th intermediate concept.\n\n\n\n\n                                Source: Stanford CS246 (2022)\n                                                                              9", "kr": "<b>SVD 다른 관점 (rank-1 matrix 합)</b><br>• M ≈ UΣV^T = <b>Σ_{i=1}^r σ_i u_i v_i^T</b><br>  • r개 outer product의 합<br>  • 각 σ_i u_i v_i^T = i번째 latent concept의 효과", "summary": "<p><b>⭐ SVD의 또 다른 표현 — Rank-1 행렬 합</b></p><p><b>📐 공식</b><br><code>M ≈ Σ_{i=1}^r σ_i · u_i · v_i^T</code></p><p>즉 r개의 <b>rank-1 행렬</b>의 가중합:</p><ul><li>u_i · v_i^T (outer product): rank-1 행렬</li><li>σ_i: 가중치</li></ul><p><b>💡 직관</b><br>\"각 latent concept i는 하나의 rank-1 행렬 패턴. σ_i로 가중.\"</p><p><b>🎯 Low-rank approx</b><br>처음 k개만 취함 → rank-k 근사.</p>"}, "10": {"en": "Example: User-Movie Matrix\n• Consider a matrix of ratings from users; what does SVD do?\n\n\n\n                                       Casablanca\n                           Serenity\n\n\n                                                    Amelie\n          Matrix\n                   Alien\n                                                                      n\n           1        1         1           0           0\n     SciFi\n           3        3         3           0           0\n           4        4         4           0           0       S       VT\n           5        5         5           0           0 = m\n           0        2         0           4           4\n    Romnce 0        0         0           5           5\n           0        1         0           2           2     U              “Concepts”\n                                      Source: Stanford CS246 (2014)\n                                                                           AKA Latent dimensions\n                                                                           AKA Latent factors      10", "kr": "<b>예: User-Movie 행렬</b><br>• 사용자×영화 rating 행렬<br>• SVD가 뭘 하나?<br>  • Matrix, Alien, Star Wars (SF) × Casablanca, Amelie (Romance)<br>  • SF user: 고점수 SF, 저점수 Romance<br>  • Romance user: 반대", "summary": "<p><b>🎬 User-Movie 예제 (L11 핵심 예제)</b></p><p><b>📋 설정</b></p><ul><li>영화: Matrix, Alien, Star Wars (SF) + Casablanca, Amelie (Romance)</li><li>User: SF 선호 vs Romance 선호 두 타입</li><li>Rating matrix M (row=user, col=movie)</li></ul><p><b>🎯 SVD가 찾을 것</b><br>\"숨은 <b>concept</b> 자동 발견. 예: concept 1 = SciFi, concept 2 = Romance.\"</p><p>이게 L11의 running example. 이후 슬라이드에서 계속 등장.</p>"}, "11": {"en": "Example: User-Movie Matrix\n\n\n\n                                    Casablanca\n                         Serenity\n\n\n                                                 Amelie\n        Matrix\n                 Alien\n                                                                             “strength” of the SciFi-concept\n         1        1         1          0           0   0.13 0.02 -0.01\n   SciFi\n         3        3         3          0           0   0.41 0.07 -0.03\n         4        4         4          0           0   0.55 0.09 -0.04           12.4 0 0\n         5        5         5          0           0 = 0.68 0.11 -0.05       x   0    9.5 0           x\n         0        2         0          4           4   0.15 -0.59 0.65           0    0 1.3\n  Romnce 0        0         0          5           5   0.07 -0.73 -0.67\n         0        1         0          2           2   0.07 -0.29 0.32\n                                                                            0.56 0.59 0.56 0.09 0.09\n                                                                            0.12 -0.02 0.12 -0.69 -0.69\n                                                                            0.40 -0.80 0.40 0.09 0.09\n                                                               Jaemin Yoo                                      11", "kr": "<b>예제 SVD 분해</b><br>U (7×3) × Σ (3×3 = diag(12.4, 9.5, 1.3)) × V^T (3×5)<br>• σ_1 = 12.4 = SciFi-concept 강도<br>• σ_2 = 9.5 = Romance-concept 강도", "summary": "<p><b>🎯 수치 예제 분해</b></p><p><b>📐 크기</b></p><ul><li>M: 7 user × 5 movie</li><li>U: 7 × 3 (user-to-concept)</li><li>Σ: 3 × 3, diag(<b>12.4</b>, <b>9.5</b>, 1.3)</li><li>V^T: 3 × 5 (concept-to-movie)</li></ul><p><b>🎯 Singular values 해석</b></p><ul><li>σ_1 = 12.4 — SciFi concept 강도 (가장 큰)</li><li>σ_2 = 9.5 — Romance concept 강도</li><li>σ_3 = 1.3 — weak, 종종 noise</li></ul>"}, "12": {"en": "Example                                                                           U is “user-to-concept”\n                                                                                  similarity matrix\n\n\n\n\n                                    Casablanca\n                         Serenity\n\n\n                                                 Amelie\n        Matrix\n                                                          SciFi-concept Romance-concept\n\n                 Alien\n         1        1         1          0           0   0.13 0.02 -0.01\n   SciFi\n         3        3         3          0           0   0.41 0.07 -0.03\n         4        4         4          0           0   0.55 0.09 -0.04                12.4 0 0\n         5        5         5          0           0 = 0.68 0.11 -0.05            x   0    9.5 0      x\n         0        2         0          4           4   0.15 -0.59 0.65                0    0 1.3\n  Romnce 0        0         0          5           5   0.07 -0.73 -0.67\n         0        1         0          2           2   0.07 -0.29 0.32\n                                                                                 0.56 0.59 0.56 0.09 0.09\n                                                                                 0.12 -0.02 0.12 -0.69 -0.69\n                                                                                 0.40 -0.80 0.40 0.09 0.09\n                                                                    Jaemin Yoo                                 12", "kr": "<b>예: U = \"user-to-concept\" 유사도 행렬</b><br>U의 각 column = 사용자가 각 concept와 얼마나 닮았나<br>• SciFi column에서 SciFi 유저들은 큰 값", "summary": "<p><b>🎯 U 해석</b></p><p><b>📐 U의 row/column</b></p><ul><li>Row = user</li><li>Column = concept</li><li>U[i][j] = user i가 concept j와 얼마나 닮았나</li></ul><p><b>🍎 관찰</b><br>SciFi column에서 Matrix/Alien 좋아하는 user → 큰 값. Romance user → 작은 값.</p>"}, "13": {"en": "Example: User-Movie Matrix\n\n\n\n                                    Casablanca\n                                                                                  V is “movie-to-concept”\n\n\n                         Serenity\n\n\n                                                 Amelie\n                                                                                  similarity matrix\n        Matrix\n                                                          SciFi-concept\n\n                 Alien\n         1        1         1          0           0   0.13 0.02 -0.01\n   SciFi\n         3        3         3          0           0   0.41 0.07 -0.03\n         4        4         4          0           0   0.55 0.09 -0.04                 12.4 0 0\n         5        5         5          0           0 = 0.68 0.11 -0.05             x   0    9.5 0      x\n         0        2         0          4           4   0.15 -0.59 0.65                 0    0 1.3\n  Romnce 0        0         0          5           5   0.07 -0.73 -0.67\n         0        1         0          2           2   0.07 -0.29 0.32\n                                                                                  0.56 0.59 0.56 0.09 0.09\n                                                           SciFi-concept          0.12 -0.02 0.12 -0.69 -0.69\n                                                                                  0.40 -0.80 0.40 0.09 0.09\n                                                                     Jaemin Yoo                                 13", "kr": "<b>예: V = \"movie-to-concept\" 유사도 행렬</b><br>V의 각 column = 영화가 각 concept와 얼마나 닮았나<br>• SciFi column에서 Matrix, Alien, Star Wars는 큰 값", "summary": "<p><b>🎯 V 해석</b></p><p><b>📐 V의 row/column</b></p><ul><li>Row = movie</li><li>Column = concept</li><li>V[i][j] = movie i가 concept j와 얼마나 닮았나</li></ul><p><b>🍎 관찰</b><br>SciFi column: Matrix, Alien, Star Wars 큰 값. Casablanca, Amelie 작은 값.</p>"}, "14": {"en": "Example: User-Movie Matrix\n\n\n\n                                    Casablanca\n                         Serenity\n\n\n                                                 Amelie\n        Matrix\n                                                               What concept?\n\n                 Alien\n         1        1         1          0           0   0.13 0.02 -0.01\n   SciFi\n         3        3         3          0           0   0.41 0.07 -0.03\n         4        4         4          0           0   0.55 0.09 -0.04           12.4 0 0\n         5        5         5          0           0 = 0.68 0.11 -0.05       x   0    9.5 0      x\n         0        2         0          4           4   0.15 -0.59 0.65           0    0 1.3\n  Romnce 0        0         0          5           5   0.07 -0.73 -0.67\n         0        1         0          2           2   0.07 -0.29 0.32\n                                                                            0.56 0.59 0.56 0.09 0.09\n                                                                            0.12 -0.02 0.12 -0.69 -0.69\n                                                                            0.40 -0.80 0.40 0.09 0.09\n                                                               Jaemin Yoo                                 14", "kr": "<b>예: 세 번째 concept는 뭘까?</b><br>• σ_3 = 1.3 — 약한 concept<br>• U, V의 세 번째 column 관찰하면 정체 추측 가능<br>  • 보통 noise이거나 subtle 패턴", "summary": "<p><b>🤔 세 번째 concept?</b></p><p><b>💡 σ_3 = 1.3, 약함</b><br>U, V의 3번째 column 값들 분석:</p><ul><li>대체로 0 근처 (noise)</li><li>가끔 \"특정 user의 특이한 취향\" 포착</li></ul><p><b>🎯 실무</b><br>보통 σ 작은 concept은 잘라냄. top-2만 유지해도 대부분 정보.</p>"}, "15": {"en": "Example: User-Movie Matrix\n• Summary: SVD provides interpretable decomposition.\n  • 𝑈: User (row)-to-concept matrix.\n  • 𝑉: Movie (column)-to-concept matrix.\n  • Σ: Its diagonal elements mean the “strength” of each concept.\n\n\n\n\n                                  Jaemin Yoo                        15", "kr": "<b>SVD 요약 해석</b><br>• <b>U:</b> user (row)-to-concept 행렬<br>• <b>V:</b> movie (column)-to-concept 행렬<br>• <b>Σ:</b> 대각 원소 = 각 concept의 \"강도\"", "summary": "<p><b>⭐⭐ SVD 3행렬 역할 요약 — 필수 암기</b></p><table style=\"font-size:12px\"><tr><th>Matrix</th><th>역할</th><th>의미</th></tr><tr><td><b>U</b></td><td>row-to-concept</td><td>user가 각 concept와 얼마나 닮았나</td></tr><tr><td><b>V</b></td><td>column-to-concept</td><td>item(movie)이 각 concept와 얼마나 닮았나</td></tr><tr><td><b>Σ</b></td><td>concept 강도</td><td>각 concept의 중요도</td></tr></table><p><b>📝 시험 T/F</b><br>\"V columns represent movies not concepts\" → <b>FALSE</b>. V의 column = concept.</p>"}, "16": {"en": "Computing SVD: Step 1\n• Q: How can we actually find 𝑈, Σ, and 𝑉?\n• We start by assuming 𝑀 = 𝑈Σ𝑉 ! .\n• 𝑀! = 𝑈Σ𝑉 ! ! = 𝑉 ! ! Σ ! 𝑈 ! = 𝑉Σ ! 𝑈 ! .\n• 𝑀! 𝑀 = 𝑉𝛴 ! 𝑈 ! 𝑈Σ𝑉 ! = 𝑉𝛴 ! Σ𝑉 ! = 𝑉Σ $ 𝑉 ! .\n   • 𝑈 is column-orthonormal; 𝑈 (𝑈 = 𝐼.\n   • Σ is diagonal; Σ ( = Σ.\n• 𝑀! 𝑀𝑉 = 𝑉𝛴 $ 𝑉 ! 𝑉 = 𝑉Σ $ .\n   • 𝑉 is also column-orthonormal.\n\n\n                                     Jaemin Yoo    16", "kr": "<b>SVD 계산 Step 1</b><br>• M = UΣV^T 가정<br>• M^T = (UΣV^T)^T = V Σ^T U^T = VΣU^T (Σ는 대각이라 Σ^T = Σ)<br>• <b>M^T M = VΣU^T UΣV^T = VΣ²V^T</b> (U^T U = I)<br>• M^T M V = VΣ²V^T V = VΣ² (V^T V = I)", "summary": "<p><b>⭐⭐⭐ SVD 계산 유도 Step 1</b></p><p><b>📐 전개</b></p><ol><li>M = UΣV^T (정의)</li><li>M^T = (UΣV^T)^T = V Σ^T U^T = VΣU^T (Σ 대각, Σ^T = Σ)</li><li>M^T M = (VΣU^T)(UΣV^T) = VΣ(U^T U)ΣV^T = VΣ²V^T (U^T U = I)</li><li>양변에 V 곱: M^T M V = VΣ²V^T V = VΣ² (V^T V = I)</li></ol><p><b>🎯 핵심 결과</b><br><code>M^T M = V Σ² V^T</code> (symmetric!)</p><p>이건 M^T M의 <b>eigendecomposition 형태</b>. V는 orthogonal matrix Q, Σ²는 Λ.</p>"}, "17": {"en": "Computing SVD: Step 2\n• From 𝑀! 𝑀𝑉 = 𝑉𝛴 $ , let’s focus on the 𝑖-th column of 𝑉.\n• Then, 𝑣& is an eigenvector of 𝑀! 𝑀, since 𝑀! 𝑀𝑣& = 𝜎 $ 𝑣& .\n   • The corresponding eigenvalue is 𝜎 ' = Σ%%' .\n• Thus, we can find 𝑉 and Σ through the eigenpairs of 𝑀! 𝑀.\n   • Singular values are the square root of the eigenvalues.\n   • Similarly, 𝑀𝑀( gives 𝑈 (and Σ).\n\n\n\n\n                                      Jaemin Yoo                17", "kr": "<b>SVD 계산 Step 2</b><br>• M^T M V = VΣ² 에서 i번째 column:<br>• <b>M^T M v_i = σ² v_i</b> → v_i는 M^T M의 eigenvector<br>  • 대응 eigenvalue = σ² = Σ_ii²<br>• 따라서 M^T M의 eigenpair로 V, Σ 발견<br>  • σ_i = √λ_i<br>• 마찬가지로 <b>M M^T가 U (및 Σ) 제공</b>", "summary": "<p><b>⭐⭐⭐ SVD 계산 Step 2 — 핵심 결론</b></p><p><b>📐 i번째 column</b><br>M^T M V = V Σ² 에서 i번째 열만 뽑으면:<br><code>M^T M · v_i = σ_i² · v_i</code></p><p>즉 v_i는 M^T M의 <b>eigenvector</b>, σ_i²는 그 eigenvalue.</p><p><b>⭐ 계산 알고리즘</b></p><ol><li>M^T M 구성 (n × n, symmetric)</li><li>Eigendecomp (power iteration 등) → eigenvalue λ_i + eigenvector v_i</li><li>V = [v_1, ..., v_r] (column별)</li><li>σ_i = √λ_i</li><li>마찬가지로 M M^T → U 계산</li></ol><p><b>📝 시험</b><br>\"σ_i = √(M^T M의 eigenvalue)\" → <b>TRUE</b>. 기출 단골.</p>"}, "18": {"en": "Connecting SVD and PCA\n• Right singular vectors in 𝑉 = Principal components of PCA.\n   • Note: PCA needs column-centering, while SVD doesn’t care.\n• In reality, the full computation of PCA is slow.\n   • Creating 𝑀(𝑀 is very slow If 𝑀 is large (e.g., billions of rows).\n   • Eigendecomposition of 𝑀(𝑀 is even slower.\n• Thus, SVD is a standard way of computing PCA.\n   • Efficient algorithms exist for computing SVD without creating 𝑀(𝑀.\n\n\n\n\n                                      Jaemin Yoo                          18", "kr": "<b>SVD와 PCA 연결</b><br>• <b>V의 right singular vector = PCA의 principal component</b><br>  • PCA는 column-centering 필요, SVD는 무관<br>• 실무: 전체 PCA 직접 계산 느림<br>  • M^T M 만들기 느림 (M이 billions rows면)<br>  • M^T M eigendecomp 더 느림<br>• <b>따라서 SVD가 PCA 계산 표준</b><br>  • M^T M 없이 SVD 직접 계산 알고리즘 존재", "summary": "<p><b>⭐⭐ SVD ↔ PCA 관계</b></p><p><b>📐 관찰</b><br>\"V의 right singular vector = M^T M의 eigenvector = PCA의 principal component.\"</p><p><b>📋 차이</b></p><ul><li>PCA는 <b>column-centering 필수</b> (mean 빼기)</li><li>SVD는 centering 없이도 동작 (but centered가 더 해석 쉬움)</li></ul><p><b>🎯 실무</b></p><ul><li>M^T M 직접 계산 → O(mn²), 느림</li><li>SVD 직접 알고리즘 → 더 효율 (Lanczos, randomized SVD)</li><li><b>결론: SVD가 PCA 계산의 표준 도구</b></li></ul>"}, "19": {"en": "Outline\n1. Singular Value Decomposition\n2. Dimensionality Reduction with SVD\n3. CUR Decomposition\n\n\n\n\n                           Jaemin Yoo   19", "kr": "<b>목차 (2부)</b><br>1. ✓ 2. <b>Dim Reduction with SVD</b> ← 여기부터 3. CUR", "summary": "<p><b>🎯 2부 — SVD로 차원 축소</b></p><p>이론 끝. 이제 실제 차원 축소 + query(추천) 응용.</p>"}, "20": {"en": "SVD for Dimensionality Reduction\n• Let’s use fewer coordinates to describe point positions.\n   • Consider an example of 𝑁 users for 2 movies of 1 concept.\n   • Point’s position can be described as its location along vector 𝑣).\n\n\n\n\n                                Source: Stanford CS246 (2022)\n                                         Jaemin Yoo                       20", "kr": "<b>SVD 차원 축소 개요</b><br>• N 유저 × 2 영화 × 1 concept 예<br>• 각 점의 위치를 vector v_1 (concept axis)의 위치로 표현<br>• 2차원 → 1차원 축소", "summary": "<p><b>🎯 기하학적 직관</b></p><p><b>🍎 예 (단순화)</b></p><ul><li>N user × 2 movie rating → 2D 점</li><li>실제 구조는 1D (하나의 concept) 위에 있음</li><li>SVD로 v_1 (concept axis) 찾기</li><li>각 점 = v_1에서의 위치 (1D)</li></ul><p><b>💡 일반화</b><br>2D → 1D. 확장하면 nD → rD.</p>"}, "21": {"en": "Example: SVD\n\n\n\n\n                                                        Movie 2 rating\n                                                                                          first right\n                                                                                          singular vector\n• 𝑈 is about users, 𝑉 is about movies.\n• Each column of 𝑉 is a new axis.                                        v1\n\n    1   1   1   0   0   0.13 0.02 -0.01                                       Movie 1 rating\n\n    3   3   3   0   0   0.41 0.07 -0.03\n    4   4   4   0   0   0.55 0.09 -0.04             12.4 0 0\n    5   5   5   0   0 = 0.68 0.11 -0.05    x        0    9.5 0                     x\n    0   2   0   4   4   0.15 -0.59 0.65             0    0 1.3\n    0   0   0   5   5   0.07 -0.73 -0.67\n    0   1   0   2   2   0.07 -0.29 0.32             0.56 0.59 0.56 0.09 0.09\n                                                    0.12 -0.02 0.12 -0.69 -0.69\n                𝑀 = 𝑈Σ𝑉 !                           0.40 -0.80 0.40 0.09 0.09\n                                       Jaemin Yoo                                                           21", "kr": "<b>예: SVD 기하학</b><br>• U는 유저, V는 영화<br>• V의 각 column = 새 축<br>• v_1 = first right singular vector = 최대 분산 방향", "summary": "<p><b>📐 SVD 기하학적 의미</b></p><ul><li>V의 각 column = <b>새 좌표축</b></li><li>v_1 = 첫 right singular vector = <b>최대 variance 방향</b></li><li>v_2 = 두 번째 (v_1과 직교, 다음 variance)</li><li>...</li></ul><p><b>💡 PCA 1st PC와 동일</b><br>\"centered data의 SVD에서 v_1 = PCA의 1st PC.\"</p>"}, "22": {"en": "Example: SVD\n\n\n\n\n                                                          Movie 2 rating\n                                                                                          first right\n                                                                                          singular\n• First column of 𝑉:           variance (‘spread’)                                        vector\n   • The largest variance.        on the v1 axis\n                                                                           v1\n\n    1   1   1   0   0   0.13 0.02 -0.01                                         Movie 1 rating\n\n    3   3   3   0   0   0.41 0.07 -0.03\n    4   4   4   0   0   0.55 0.09 -0.04               12.4 0 0\n    5   5   5   0   0 = 0.68 0.11 -0.05      x        0    9.5 0                     x\n    0   2   0   4   4   0.15 -0.59 0.65               0    0 1.3\n    0   0   0   5   5   0.07 -0.73 -0.67\n    0   1   0   2   2   0.07 -0.29 0.32               0.56 0.59 0.56 0.09 0.09\n                                                      0.12 -0.02 0.12 -0.69 -0.69\n                𝑀 = 𝑈Σ𝑉 !                             0.40 -0.80 0.40 0.09 0.09\n                                         Jaemin Yoo                                                     22", "kr": "<b>예: 최대 분산</b><br>• V의 첫 column: 가장 큰 분산 방향<br>• 영화 rating 공간에서 v_1 axis에 투영", "summary": "<p><b>🎯 v_1 = 최대 variance 방향</b></p><p>영화 rating 공간에서 user 점들이 가장 많이 퍼진 방향이 v_1.</p><p><b>💡 예</b><br>\"SF 좋아하는 user\"의 취향이 가장 강한 경향 → v_1이 그 방향 가리킴.</p><p>각 user를 v_1에 투영하면 \"SF 취향 정도\"가 1 숫자로 요약됨.</p>"}, "23": {"en": "Example: SVD\n\n\n\n\n                                                 Movie 2 rating\n                                                                                 first right\n                                                                                 singular\n• 𝑈Σ gives the points coordinates.                                               vector\n   • In the projection axis.\n                                                                  v1\n\n    1   1   1   0   0    Projection of users                           Movie 1 rating\n\n    3   3   3   0   0    on the “Sci-Fi” axis\n    4   4   4   0   0    (U S) T:                         1.61 0.19 -0.01\n    5   5   5   0   0                                     5.08 0.66 -0.03\n    0   2   0   4   4                                     6.82 0.85 -0.05\n    0   0   0   5   5                                     8.43 1.04 -0.06\n    0   1   0   2   2                                     1.86 -5.60 0.84\n                                                          0.86 -6.93 -0.87\n                𝑀 = 𝑈Σ𝑉 !                                 0.86 -2.75 0.41\n                                    Jaemin Yoo                                                 23", "kr": "<b>예: UΣ = 점 좌표 (projection)</b><br>• UΣ가 투영 축에서의 좌표 제공<br>• SciFi axis에서 user 투영 = (UΣ)^T<br>• 각 user의 concept-space 좌표", "summary": "<p><b>⭐ UΣ = User의 Concept-Space 좌표</b></p><p><b>📐 유도</b><br>M = UΣV^T에서 M V = UΣV^T V = UΣ (V^T V = I)<br>→ MV = UΣ. 즉 <b>UΣ = M을 V 축에 투영한 결과</b>.</p><p><b>🎯 해석</b><br>UΣ의 i-th row = user i의 concept-space 좌표.</p><p><b>🎯 활용</b></p><ul><li>User 간 유사도: UΣ로 계산</li><li>Cluster: UΣ에서 clustering</li><li>추천: UΣ 기반 matching</li></ul>"}, "24": {"en": "SVD for Dimensionality Reduction\n• Q: How exactly is dimensionality reduction done by SVD?\n• A: Set smallest singular values to zero.\n\n     1   1   1   0   0       0.13 0.02 -0.01\n     3   3   3   0   0       0.41 0.07 -0.03\n     4   4   4   0   0       0.55 0.09 -0.04           12.4 0 0\n     5   5   5   0   0   »   0.68 0.11 -0.05     x     0    9.5 0      x\n     0   2   0   4   4       0.15 -0.59 0.65           0    0 1.3\n     0   0   0   5   5       0.07 -0.73 -0.67\n     0   1   0   2   2       0.07 -0.29 0.32           0.56 0.59 0.56 0.09 0.09\n                                                       0.12 -0.02 0.12 -0.69 -0.69\n                                                       0.40 -0.80 0.40 0.09 0.09\n                                          Jaemin Yoo                                 24", "kr": "<b>SVD 차원 축소 방법</b><br>• Q: 실제로 차원 축소 어떻게?<br>• A: <b>가장 작은 singular value를 0으로</b><br>• 상위 r개 σ만 남기고 나머지 제거<br>• 결과: 근사 M' = U_r Σ_r V_r^T (rank r)", "summary": "<p><b>⭐⭐ SVD 차원 축소 방법</b></p><p><b>📋 절차</b></p><ol><li>전체 SVD 계산: M = UΣV^T (rank k)</li><li>Σ의 <b>가장 작은 singular value들을 0으로</b> (k − r개 버림)</li><li>상위 r개 σ만 남김: Σ_r</li><li>대응하는 U_r (m × r), V_r (n × r)</li><li><b>M' = U_r Σ_r V_r^T</b> (rank r 근사)</li></ol><p><b>💡 왜 작은 σ 버리나?</b><br>σ = concept 강도. 작은 concept은 \"변두리 정보\" 또는 noise.</p>"}, "25": {"en": "SVD for Dimensionality Reduction\n• Reconstruction error is quantified by the Frobenius norm:\n  • In this case, we have 𝑀 − 𝐵 '$ = ∑%& 𝑀%& − 𝐵%& '.\n\n\n     1   1   1   0   0        0.92 0.95 0.92 0.01 0.01\n     3   3   3   0   0        2.91 3.01 2.91 -0.01 -0.01\n     4   4   4   0   0        3.90 4.04 3.90 0.01 0.01\n     5   5   5   0   0   »    4.82 5.00 4.82 0.03 0.03\n                                                           Reconstructed\n                                                           data matrix 𝐵.\n     0   2   0   4   4        0.70 0.53 0.70 4.11 4.11\n     0   0   0   5   5       -0.69 1.34 -0.69 4.78 4.78\n     0   1   0   2   2        0.32 0.23 0.32 2.01 2.01\n\n                                     Jaemin Yoo                             25", "kr": "<b>Reconstruction 오차</b><br>• Frobenius norm으로 정량화:<br>  ||M − B||_F² = Σ_ij (M_ij − B_ij)²<br>• B = 재구성된 데이터<br>  • 원본과 거의 비슷 (최하위 σ만 제거하면)", "summary": "<p><b>📐 재구성 오차 공식</b></p><p><b>📐 Frobenius 오차</b><br><code>||M − B||_F² = Σ_i Σ_j (M_ij − B_ij)²</code></p><p>B = SVD 근사 U_r Σ_r V_r^T.</p><p><b>🎯 정량화</b><br>오차 = 버린 singular values의 제곱 합:<br><code>||M − M_r||_F² = σ_{r+1}² + σ_{r+2}² + ... + σ_k²</code></p><p><b>💡 작은 σ만 버리면 오차 미미.</b></p>"}, "26": {"en": "Best Low-Rank Approximation\n• Given 𝑟 < rank 𝑀 , SVD gives the best axes to project on.\n   • In other words, it gives the best rank-𝒓 approximation of the matrix.\n   • That minimizes the reconstruction error 𝑀 − 𝐵 $ .\n• Intuitive reason:\n   • 𝜎% represents how much “energy” the matrix has along 𝑣% .\n   • Truncation keeps the top 𝑟 orthogonal “energy directions.”\n   • As a result, SVD can minimize the loss of energy.\n\n\n\n\n                                    Jaemin Yoo                               26", "kr": "<b>Best Low-Rank Approximation</b><br>• r < rank(M) 주어지면 SVD가 <b>최적 투영 축</b> 제공<br>  • <b>rank-r 근사 중 ||M − B||_F 최소화</b><br>• 직관:<br>  • σ_i = v_i 방향의 \"에너지\"<br>  • Truncation = 상위 r개 orthogonal 에너지 방향 유지<br>  • → 에너지 손실 최소", "summary": "<p><b>⭐⭐⭐ Eckart-Young 정리 — SVD의 핵심</b></p><p><b>📐 정리</b><br>\"rank-r 근사 B 중에서 <b>SVD truncation</b>이 ||M − B||_F를 최소화한다.\"</p><p>즉 가능한 모든 rank-r 행렬 중 SVD가 <b>최적</b>.</p><p><b>💡 직관</b></p><ul><li>σ_i² = v_i 방향의 \"에너지 양\"</li><li>Truncation = 상위 r개 에너지 유지</li><li>작은 에너지만 버리니 손실 최소</li></ul><p><b>📝 T/F 단골</b><br>\"SVD gives best low-rank approximation in Frobenius norm\" → <b>TRUE</b></p>"}, "27": {"en": "Determining the Low Rank\n• Q: What is a good value for 𝑟?\n• A: Pick 𝑟 to have at least 90% of the total energy.\n   • We define energy to be the sum of squared singular values.\n• Back to our example:\n   • Singular values are 12.4, 9.5, and 1.3 (total energy = 245.7).\n   • If we drop 1.3, whose square is 1.7, the remaining is energy 244.0.\n   • The remaining energy is over 99% of the total energy.\n\n\n\n\n                                     Jaemin Yoo                            27", "kr": "<b>적정 r 선택</b><br>• Q: 좋은 r 값은?<br>• A: <b>total energy의 최소 90% 유지하는 r</b><br>  • energy = Σ σ_i²<br>• 예: σ = (12.4, 9.5, 1.3), total = 245.7<br>  • 1.3 제거 (제곱 1.7) → 남은 244.0 = 99%+<br>  • 매우 높은 에너지 유지, 차원 줄어듦", "summary": "<p><b>⭐⭐ 90% Energy Rule — r 선택</b></p><p><b>📐 규칙</b><br>\"<b>total energy ≥ 90%</b> 유지하는 최소 r 선택.\"</p><p><b>📐 Energy 정의</b><br><code>energy = Σ σ_i²</code></p><p><b>🍎 예</b><br>σ = (12.4, 9.5, 1.3)</p><ul><li>Total energy = 12.4² + 9.5² + 1.3² = 153.76 + 90.25 + 1.69 = 245.70</li><li>σ_3 제거 (1.69 손실) → 남은 244.01 = 99.3%</li><li>충분!</li></ul><p><b>🎯 실무</b><br>Energy 90-95% 기준이 보통. domain 따라 다름.</p>"}, "28": {"en": "Querying Using Concepts\n• Q: Given the result of SVD, what movies would a new user like?\n\n                                  Casablanca\n                       Serenity\n\n\n                                               Amelie\n      Matrix\n               Alien\n\n\n\n\n       1        1         1          0           0   0.13 0.02 -0.01              12.4 0 0\n       3        3         3          0           0   0.41 0.07 -0.03\n SciFi                                                                            0    9.5 0    x\n       4        4         4          0           0   0.55 0.09 -0.04              0    0 1.3\n       5        5         5          0           0 = 0.68 0.11 -0.05          x\n       0        2         0          4           4   0.15 -0.59 0.65                 0.56 0.59 0.56 0.09 0.09\nRomnce 0        0         0          5           5   0.07 -0.73 -0.67                0.12 -0.02 0.12 -0.69 -0.69\n       0        1         0          2           2   0.07 -0.29 0.32                 0.40 -0.80 0.40 0.09 0.09\n                                                                 Jaemin Yoo                                    28", "kr": "<b>Concept로 Query</b><br>• Q: SVD 결과로 new user가 좋아할 영화는?<br>• (User-movie matrix 예제 재사용)", "summary": "<p><b>🎯 SVD로 추천 (Query)</b></p><p><b>❓ 질문</b><br>\"SVD 결과로 새 유저의 취향을 어떻게 예측?\"</p><p>다음 2 슬라이드에서 공식적 답. 2021 Final 기출 단골!</p>"}, "29": {"en": "Querying Using Concepts\n• Assume that the new user is represented as 𝑞 = 5 0 0 0 0 .\n   • Rated Matrix with the score 5.\n• Step 1: Multiply by 𝑉 to map 𝑞 into the concept space as 𝑞𝑉:\n                                      Casablanca\n                                                                                    SciFi-concept\n                           Serenity\n\n\n                                                   Amelie       0.56 0.12\n          Matrix\n                   Alien\n\n\n\n\n                                                                0.59 -0.02\n      q= 5 0 0 0 0                                          x   0.56 0.12           = 2.8       0.6\n                                                                0.09 -0.69\n                                                                0.09 -0.69\n                                                                movie-to-concept\n                                                                 similarities (V)\n                                                                     Jaemin Yoo                       29", "kr": "<b>Query Step 1: q → concept space</b><br>• new user q = (5, 0, 0, 0, 0) — Matrix만 5점<br>• <b>qV</b>로 concept space로 projection:<br>• q × V = (2.8, 0.6, ...)<br>  • SciFi-concept 높음<br>  • Romance-concept 낮음", "summary": "<p><b>⭐⭐⭐ Query Step 1 — qV (★★★ 기출)</b></p><p><b>📋 상황</b><br>New user q = (5, 0, 0, 0, 0). Matrix만 5점 줬고 나머지 미평가.</p><p><b>📐 Step 1: Concept space로 projection</b><br><code>concept_space_rep = q × V</code></p><p><b>🍎 계산</b><br>V의 첫 row가 Matrix인데 SciFi concept에 높은 값 가졌다면:<br>q × V = (2.8, 0.6, ...) 예</p><ul><li>SciFi concept: 2.8 (높음)</li><li>Romance concept: 0.6 (낮음)</li></ul><p><b>💡 의미</b><br>\"Matrix만 봐도 이 user는 SF 좋아함.\" Concept 공간으로 이동.</p>"}, "30": {"en": "Querying Using Concepts\n• Step 2: Multiply by 𝑉 ! back to the movie space to get:\n\n\n\n\n                                                                                        Casablanca\n                                                                             Serenity\n\n\n                                                                                                     Amelie\n       𝑞𝑉𝑉 ! = 1.64 1.64 1.64 -0.162 -0.162\n\n\n\n\n                                                            Matrix\n                                                                     Alien\n                                                            1         1         1          0              0\n• He/she would probably like Alien and Serenity.            3         3         3          0              0\n                                                      SciFi\n   • Sci-Fi movies.                                         4         4         4          0              0\n                                                            5         5         5          0              0\n                                                            0         2         0          4              4\n                                                     Romnce 0         0         0          5              5\n                                                            0         1         0          2              2\n\n                                Jaemin Yoo                                                           30", "kr": "<b>Query Step 2: concept → movie space</b><br>• qVV^T로 다시 movie space로:<br>• qVV^T = (1.64, 1.64, 1.64, -0.16, -0.16)<br>• SciFi 영화(Matrix, Alien, Star Wars) 값 크고, Romance는 작음<br>• <b>→ 이 유저는 Alien, Serenity 같은 SF 좋아할 듯</b>", "summary": "<p><b>⭐⭐⭐ Query Step 2 — qVV^T (★★★)</b></p><p><b>📐 Step 2: Movie space로 복귀</b><br><code>prediction = q × V × V^T = qVV^T</code></p><p><b>🍎 계산</b><br>qVV^T = (1.64, 1.64, 1.64, −0.16, −0.16)</p><ul><li>Matrix, Alien, Star Wars (SF): <b>1.64</b> (높음)</li><li>Casablanca, Amelie (Romance): <b>−0.16</b> (낮음)</li></ul><p><b>🎯 추천</b><br>이 user는 <b>Alien, Star Wars</b>도 좋아할 가능성 높음. (Matrix만 평가했는데도!)</p><p><b>💡 핵심</b><br>\"concept space 왕복으로 <b>missing rating 예측</b>.\" 이게 L12의 CF + L13의 matrix factorization의 기초.</p>"}, "31": {"en": "Querying Using Concepts\n• Alternate query: Find users who are similar to the target user 𝑞.\n   • User 𝑑 is similar to user 𝑞 even without any ratings in common.\n\n\n\n\n                                               Casablanca\n                                    Serenity\n\n\n                                                            Amelie\n                   Matrix\n                                                                                  SciFi-concept\n                            Alien\n\n           d =      0 4              5          0            0                       5.2     0.4\n\n          q =      5 0              0          0            0                        2.8      0.6\n                 Zero ratings in common                                              Similarity ≠ 0\n\n                                                                     Jaemin Yoo                       31", "kr": "<b>Query — 유사 유저 찾기</b><br>• 대안 query: q와 유사한 user 찾기<br>• user d = (0, 4, 5, 0, 0) (qV space로 projection)<br>  • q, d는 공통 rating 0 (Zero ratings in common)<br>  • 하지만 concept space에선 similarity ≠ 0<br>  • 둘 다 SF 영화 선호 (cosine sim 큰 값)", "summary": "<p><b>⭐ 유사 User 찾기 — SVD의 마법</b></p><p><b>📋 상황</b></p><ul><li>q = (5, 0, 0, 0, 0): Matrix만 평가</li><li>d = (0, 4, 5, 0, 0): Alien, Star Wars 평가</li><li><b>원 공간에선 공통 rating 0</b> (어느 영화도 둘 다 평가 안 함)</li></ul><p><b>🚨 문제</b><br>원 공간 cosine similarity: q · d / (||q||·||d||) → 0. \"비슷한 user\"로 못 잡음.</p><p><b>✅ SVD 해법</b><br>qV, dV로 변환 후 비교:</p><ul><li>qV ≈ (SF 높, Romance 낮)</li><li>dV ≈ (SF 높, Romance 낮)</li><li>cosine(qV, dV) → <b>높음</b>!</li></ul><p><b>🎯 결론</b><br>\"Concept space에선 <b>공통 rating 없어도</b> 유사도 계산 가능.\" ← CF의 핵심.</p>"}, "32": {"en": "Outline\n1. Singular Value Decomposition\n2. Dimensionality Reduction with SVD\n3. CUR Decomposition\n\n\n\n\n                             Jaemin Yoo   32", "kr": "<b>목차 (3부)</b><br>1. ✓ 2. ✓ 3. <b>CUR Decomposition</b> ← 여기부터", "summary": "<p><b>🎯 3부 — CUR</b></p><p>SVD의 약점 (U, V가 dense)을 해결하는 <b>sparse 친화</b> 분해법.</p>"}, "33": {"en": "Sparsity of a Data Matrix\n• It is common for the data matrix 𝑀 to be highly sparse.\n   • E.g., a matrix of customers and products.\n• However, 𝑈 and 𝑉 from SVD will not be sparse.\n   • Σ is sparse, but much smaller than 𝑈 and 𝑉, so it does not help.\n\n\n\n                               =\n\n\n\n\n                                    Jaemin Yoo                          33", "kr": "<b>Data Matrix의 Sparsity</b><br>• 데이터 행렬 M은 매우 sparse한 경우 많음<br>  • 예: 고객 × 상품 행렬<br>• 하지만 <b>SVD의 U, V는 sparse 아님</b><br>  • Σ는 sparse지만 U, V보다 작아서 도움 안 됨", "summary": "<p><b>🚨 SVD의 약점 — Sparsity 손실</b></p><p><b>📋 문제</b></p><ul><li>실제 데이터 M: 매우 sparse (대부분 0)<br>예: user × product 중 1% 미만 구매</li><li>SVD 분해 U, V: <b>dense</b> (대부분 non-zero)</li><li>→ 메모리 <b>폭증</b>. 해석도 어려움</li></ul><p><b>🎯 해결</b><br>CUR: M의 <b>실제 row/column</b> 사용 → sparse 보존.</p>"}, "34": {"en": "CUR Decomposition\n• Goal: Express 𝑀 ≈ 𝐶𝑈𝑅 while minimizing 𝑀 − 𝐶𝑈𝑅 \" .\n• CUR decomposition leverages the sparsity of 𝑀 by:\n  • Using (sparse) rows and columns of 𝑀 for creating 𝐶 and 𝑅.\n  • Only the matrix 𝑈 (analogous to Σ) is dense, but it is small.\n• CUR is always an approximation unlike SVD.\n  • No matter how large 𝑟 (= number of concepts) is.\n  • Still, there is a theory that CUR converges to 𝑀 as 𝑟 gets larger.\n\n\n\n\n                                     Jaemin Yoo                          34", "kr": "<b>CUR Decomposition</b><br>• 목표: <b>M ≈ CUR</b>, ||M − CUR||_F 최소화<br>• CUR은 M의 sparsity 활용:<br>  • <b>C, R은 M의 (sparse) 행/열 사용</b><br>  • U (Σ와 유사)만 dense, 그러나 작음<br>• <b>CUR은 항상 근사</b> (SVD와 달리)<br>  • r이 아무리 커도<br>  • 하지만 r 커지면 M에 수렴 (이론적 보장)", "summary": "<p><b>⭐⭐ CUR — sparse 친화</b></p><p><b>📐 목표</b><br><code>M ≈ C U R</code>, ||M − CUR||_F 최소화</p><p><b>📋 구성</b></p><ul><li><b>C:</b> M의 <b>실제 column 몇 개</b> 샘플 (sparse 유지)</li><li><b>R:</b> M의 <b>실제 row 몇 개</b> 샘플 (sparse 유지)</li><li><b>U:</b> C, R에서 계산 (small, dense but 작음)</li></ul><p><b>⚠️ 핵심 차이 vs SVD</b></p><ul><li>SVD: r ≥ rank(M)이면 <b>정확</b> 분해</li><li>CUR: r 아무리 커도 <b>항상 근사</b> (random sampling 기반)</li><li>하지만 r 커지면 M에 수렴 (이론적 보장)</li></ul>"}, "35": {"en": "Definition of CUR\n• A CUR decomposition of an 𝑚 × 𝑛 matrix 𝑀 is:\n  • 𝑚 × 𝑟 matrix 𝐶, a randomly chosen set of 𝑟 columns of 𝑀.\n  • 𝑟 × 𝑛 matrix 𝑅, a randomly chosen set of 𝑟 rows of 𝑀.\n  • 𝑟 × 𝑟 matrix 𝑈 constructed from 𝐶 and 𝑅 to minimize the error.\n                               C                U                  R\n        Joe\n        Jim\n       John\n       Jack\n         Jill\n      Jenny\n       Jane\n                                                    Sampled rows and columns are scaled.\n\n                                   Jaemin Yoo                                          35", "kr": "<b>CUR 정의</b><br>• m×n 행렬 M의 CUR decomp:<br>  • <b>C:</b> m×r, M의 랜덤 r개 column<br>  • <b>R:</b> r×n, M의 랜덤 r개 row<br>  • <b>U:</b> r×r, C와 R에서 구성 (오차 최소화)<br>• 샘플된 row/column은 scale 조정", "summary": "<p><b>📐 CUR 정식 정의</b></p><p><b>📋 크기</b></p><ul><li>C: m × r (r개 column 샘플)</li><li>R: r × n (r개 row 샘플)</li><li>U: r × r (계산)</li></ul><p><b>🎯 알고리즘</b></p><ol><li>C, R은 <b>random sample</b> (확률 기반)</li><li>U는 C, R에서 <b>deterministically</b> 계산</li><li>샘플된 row/col은 scale 조정 (다음 슬라이드)</li></ol>"}, "36": {"en": "Weighted Sampling of Rows/Columns\n• Uniform sampling of rows or columns is not optimal.\n  • Some are more important for reducing the reconstruction error.\n• We measure the importance by the Frobenius norm.\n  • Let 𝑓 = 𝑀 '$ be the square of 𝑀’s Frobenius norm.\n                                                  '\n  • Row 𝑖 is selected with a probability 𝑝% = ∑& 𝑚%& / 𝑓.\n                                                       '\n  • Column 𝑘 is selected with a probability 𝑞& = ∑% 𝑚%&   / 𝑓.\n\n\n\n\n                                    Jaemin Yoo                       36", "kr": "<b>Weighted Sampling of Rows/Columns</b><br>• Uniform sampling은 최적 아님<br>  • 일부 row/col이 reconstruction error 감소에 더 중요<br>• <b>Frobenius norm</b>으로 중요도 측정<br>  • f = ||M||_F² (M의 제곱 Frobenius)<br>  • <b>row i 확률: p_i = Σ_j m_ij² / f</b><br>  • <b>column k 확률: q_k = Σ_i m_ik² / f</b>", "summary": "<p><b>⭐⭐⭐ Weighted Sampling — 필수 공식</b></p><p><b>🚨 Uniform sampling은 약함</b><br>\"norm 큰 row/col이 더 중요.\" 그걸 우선 뽑자.</p><p><b>📐 공식</b><br>f = ||M||_F² = Σ_ij m_ij² (총 제곱합)</p><ul><li><b>Row i 확률:</b> p_i = Σ_j m_ij² / f (row i의 제곱합 / 전체)</li><li><b>Column k 확률:</b> q_k = Σ_i m_ik² / f (column k 제곱합 / 전체)</li></ul><p><b>🎯 해석</b><br>\"row/column의 <b>energy 비율</b>에 비례해 샘플링.\"</p><p><b>📝 시험 단골</b><br>이 확률 공식 계산 문제 기출.</p>"}, "37": {"en": "Scaling of Rows/Columns\n• After selecting each column 𝑘, divide each element by 𝑟𝑞# .\n  •   𝑟 to unify the scale across different choices of 𝑟.\n  •   𝑞& to unify the scale between differently important columns.\n• Do the analogous for each selected row.\n• Same rows or columns can be selected more than once.\n  • Not a big problem though.\n\n\n\n\n                                   Jaemin Yoo                        37", "kr": "<b>Rows/Columns 스케일링</b><br>• column k 선택 후: 각 원소를 <b>√(r q_k)</b>로 나눔<br>  • √r: r 선택에 무관하게 scale 통일<br>  • √q_k: column 중요도별 scale 통일<br>• row도 analogous<br>• 같은 row/column 여러 번 선택 가능 (큰 문제 아님)", "summary": "<p><b>⭐ Scaling — 샘플 후 조정</b></p><p><b>📐 공식</b><br>column k 샘플 후: 각 원소를 <code>√(r × q_k)</code>로 <b>나눔</b></p><ul><li>√r: 샘플 크기 r에 무관하게 scale 통일</li><li>√q_k: column 중요도(확률)로 scale 통일 (중요 column은 덜 나눔)</li></ul><p><b>💡 의미</b><br>\"확률 p에 반비례로 scale\" → <b>unbiased estimator</b>.</p><p><b>⚠️ 중복 허용</b><br>같은 row/column 여러 번 뽑혀도 OK (with replacement). 결과에 큰 영향 X.</p>"}, "38": {"en": "Example: Choosing a Row\n• The (squared) Frobenius norm of 𝑀 is 243.\n\n\n\n\n                                                                               Casablanca\n                                                                   Star Wars\n\n                                                                                   Titanic\n                                                          Matrix\n• The probability to choose Jack is 75/243 = 0.309.\n\n\n\n\n                                                                       Alien\n  • Jack has the Frobenius norm of 75.\n                                                  Joe\n• The selected row is divided by 𝑟𝑝 = 2 × 0.309. Jim\n                                                 John\n   • If 𝑟 = 2.                                   Jack\n• We have 6.36 6.36 6.36 0 0 as a row of 𝑅.        Jill\n                                                Jenny\n                                                 Jane\n\n\n\n\n                                 Jaemin Yoo                                            38", "kr": "<b>예: Row 선택</b><br>• M의 squared Frobenius = 243<br>• Jack의 Frobenius norm² = 75<br>• <b>P(Jack 선택) = 75/243 = 0.309</b><br>• 선택된 row를 √(r p) = √(2 × 0.309)로 나눔 (r=2)<br>  • 결과: R의 한 row = (6.36, 6.36, 6.36, 0, 0)", "summary": "<p><b>🎯 구체 수치 예</b></p><p><b>📋 설정</b></p><ul><li>||M||_F² = 243</li><li>Jack row의 제곱합 = 75</li><li>r = 2 (샘플 크기)</li></ul><p><b>📐 계산</b></p><ul><li>P(Jack) = 75/243 = <b>0.309</b></li><li>√(r × p) = √(2 × 0.309) = √0.618 ≈ 0.786</li><li>Jack row 각 원소를 0.786으로 나눔</li><li>원래 (5, 5, 5, 0, 0) → (6.36, 6.36, 6.36, 0, 0)</li></ul><p><b>💡 sparse 유지</b><br>0이었던 원소는 여전히 0. Sparsity 보존!</p>"}, "39": {"en": "Constructing the Middle Matrix\n• Let 𝑊 be the 𝑟 × 𝑟 matrix that is the “intersection” of 𝐶 and 𝑅.\n• Compute the SVD of 𝑊, say, 𝑊 = 𝑋Σ𝑌 ! .\n• Compute Σ $ , the Moore-Penrose pseudoinverse of Σ.\n   • If the 𝑖-th diagonal element of Σ is 𝜎 ≠ 0, replace it by 1/𝜎.\n   • Otherwise, leave it as 0.\n   • Identical to the inverse if the matrix is invertible.\n• Return 𝑈 = 𝑌 Σ $ % 𝑋 ! .\n   • Carefully constructed so that the CUR decomposition approximates 𝑀.\n\n\n\n                                      Jaemin Yoo                           39", "kr": "<b>중간 행렬 U 구성</b><br>• W = C와 R의 \"intersection\" (r×r)<br>• W의 SVD: <b>W = XΣY^T</b><br>• <b>Σ^+</b> = Σ의 Moore-Penrose pseudoinverse<br>  • σ≠0이면 1/σ로 교체, 0이면 그대로<br>  • Σ가 invertible이면 regular inverse와 동일<br>• <b>U = Y (Σ^+)² X^T</b><br>  • CUR이 M 근사하도록 조심스레 구성", "summary": "<p><b>⭐⭐ U 계산 — 3단계</b></p><p><b>📋 단계</b></p><ol><li><b>Intersection W:</b> C와 R이 만나는 r × r 부분행렬 (선택된 row × 선택된 column)</li><li><b>W의 SVD:</b> W = X Σ Y^T</li><li><b>Pseudoinverse Σ^+:</b><br>σ ≠ 0이면 1/σ로, σ = 0이면 그대로 0</li><li><b>U = Y (Σ^+)² X^T</b></li></ol><p><b>💡 왜 이 공식?</b><br>\"CUR이 M을 잘 근사하도록 수학적으로 유도.\" 세부는 교재 참조.</p>"}, "40": {"en": "Example: Middle Matrix\n• Construct the intersection matrix 𝑊 as follows:\n   • Columns: Alien & Casablanca.\n   • Rows: Jenny & Jack.\n\n\n\n\n                                                                                Casablanca\n                                                                    Star Wars\n• The order affects the intersection.\n\n\n\n\n                                                                                    Titanic\n                                                           Matrix\n                                                                        Alien\n   • Jenny & Jack ≠ Jack & Jenny.\n                                                   Joe                                             0   5\n                                                   Jim                                        W=\n                                                                                                   5   0\n                                                  John\n                                                  Jack\n                                                    Jill\n                                                 Jenny\n                                                  Jane\n\n                                    Jaemin Yoo                                                             40", "kr": "<b>예: 중간 행렬 계산</b><br>• Intersection: Alien & Casablanca column, Jenny & Jack row<br>• W = [[0, 5], [5, 0]]<br>  • Jenny & Jack ≠ Jack & Jenny (순서 중요)", "summary": "<p><b>🎯 Intersection W 수치 예</b></p><p><b>📋 샘플</b></p><ul><li>선택 column: Alien, Casablanca</li><li>선택 row: Jenny, Jack</li></ul><p><b>📐 W 구성</b><br>W[i][j] = 선택된 row i의 선택된 column j 값</p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">W = [[M[Jenny][Alien], M[Jenny][Casa]],\n     [M[Jack][Alien],  M[Jack][Casa]]]\n  = [[0, 5],\n     [5, 0]]</pre><p><b>⚠️ 주의</b><br>row/col 순서 중요. Jenny & Jack ≠ Jack & Jenny.</p>"}, "41": {"en": "Example: Middle Matrix\n• Construct 𝑈 from 𝑊 as follows:\n                           0 1 5 0 1 0   0 5\n  • SVD for 𝑊 is 𝑋Σ𝑌 ( =               =     .\n                           1 0 0 5 0 1   5 0\n           1/5  0\n  • Σ* =           .\n            0  1/5\n                          '\n         * ' ( 1 0 1/5  0   0 1     0  1/25\n  • 𝑈=𝑌 Σ 𝑋 =                   =           .\n               0 1 0   1/5 1 0    1/25   0\n\n\n\n\n                                Jaemin Yoo       41", "kr": "<b>예: U 구성</b><br>• W = [[0,5],[5,0]]의 SVD: X = [[0,1],[1,0]], Σ = diag(5,5), Y = [[0,1],[1,0]]<br>• Σ^+ = diag(1/5, 1/5)<br>• <b>U = Y (Σ^+)² X^T = [[0, 1/25], [1/25, 0]]</b>", "summary": "<p><b>🎯 U 수치 계산</b></p><p><b>📋 W = [[0,5],[5,0]]의 SVD</b></p><ul><li>X = [[0, 1], [1, 0]]</li><li>Σ = diag(5, 5)</li><li>Y = [[0, 1], [1, 0]]</li></ul><p><b>📐 Pseudoinverse</b><br>Σ^+ = diag(1/5, 1/5)</p><p><b>📐 U</b><br>U = Y (Σ^+)² X^T<br>= Y · diag(1/25, 1/25) · X^T<br>= [[0, 1/25], [1/25, 0]]</p>"}, "42": {"en": "Complete CUR Decomposition                                 Joe\n                                                           Jim\n                                                          John\n                                                          Jack\n• We now have a method to select 𝐶, 𝑈, and 𝑅:               Jill\n  • Note that CUR randomly creates 𝐶 and 𝑅.              Jenny\n  • Then, 𝑈 is created deterministically from 𝐶 and 𝑅.    Jane\n\n\n\n\n                                   Jaemin Yoo                      42", "kr": "<b>완전한 CUR Decomposition</b><br>• C, U, R 선택 방법 완성:<br>  • CUR은 random하게 C, R 생성<br>  • U는 C, R에서 deterministically 생성<br>• 결과: M ≈ CUR", "summary": "<p><b>🏁 CUR 알고리즘 완성</b></p><p><b>📋 전체 절차</b></p><ol><li>p_i, q_k 계산 (row/col 확률)</li><li>Random sampling으로 C (r column), R (r row) 생성 + scaling</li><li>Intersection W 구성</li><li>W의 SVD → pseudoinverse → U 계산</li><li>M ≈ C U R</li></ol><p><b>💡 특징</b></p><ul><li>C, R는 random (sample 따라 결과 다름)</li><li>U는 deterministic (C, R 주어지면 유일)</li><li>r 크게 하면 M에 수렴</li></ul>"}, "43": {"en": "CUR vs. SVD\n• CUR is like selecting representative points (like clustroids).\n• SVD is like creating new representative directions (like centroids).\n• They work differently if two point clouds exist at different angles.\n\n\n\n\n                                 Jaemin Yoo                              43", "kr": "<b>CUR vs SVD</b><br>• <b>CUR ≈ representative 점 선택</b> (clustroid 같음)<br>• <b>SVD ≈ 새 representative 방향 생성</b> (centroid 같음)<br>• 두 point cloud가 다른 각도에 있으면 다른 결과", "summary": "<p><b>⭐ CUR vs SVD 철학 비교</b></p><table style=\"font-size:12px\"><tr><th></th><th>CUR</th><th>SVD</th></tr><tr><td>대표</td><td>실제 row/col</td><td>새 방향 (abstract)</td></tr><tr><td>비유 (L8)</td><td>Clustroid</td><td>Centroid</td></tr><tr><td>Sparsity 보존</td><td>✅</td><td>❌</td></tr><tr><td>해석성</td><td>높음 (실제 data)</td><td>낮음 (추상)</td></tr><tr><td>정확도</td><td>항상 근사</td><td>exact 가능</td></tr><tr><td>메모리</td><td>sparse면 작음</td><td>dense</td></tr></table><p><b>💡 실무 선택</b></p><ul><li>dense → SVD</li><li>매우 sparse + 해석 중요 → CUR</li></ul>"}, "44": {"en": "Outline\n1. Singular Vector Decomposition\n  • Singular values and vectors\n  • Relationship to PCA\n2. Dimensionality Reduction with SVD\n  • Best low-rank approximation\n3. CUR Decomposition\n  • Advantage in a sparse data matrix\n\n\n\n\n                                  Jaemin Yoo   44", "kr": "<b>요약</b><br>1. SVD — singular values, PCA와 관계<br>2. SVD 차원 축소 — best low-rank approximation<br>3. CUR — sparse 데이터에서 장점", "summary": "<p><b>🎬 L11 마무리 — 시험 대비</b></p><p><b>✅ SVD</b></p><ul><li>M = UΣV^T (모든 실수 행렬)</li><li>U, V orthonormal, Σ 대각+내림차순</li><li>σ_i² = M^T M의 eigenvalue</li><li>V = M^T M의 eigenvectors</li><li>σ 내림차순: σ_1 ≥ σ_2 ≥ ...</li></ul><p><b>✅ Low-rank Approx</b></p><ul><li>Eckart-Young: SVD가 Frobenius 최적</li><li>90% energy rule로 r 선택</li><li>오차 = 버린 σ_i² 합</li></ul><p><b>✅ Query (기출 핵심!)</b></p><ul><li><b>qV</b>: user → concept space</li><li><b>qVV^T</b>: concept → movie prediction</li></ul><p><b>✅ CUR</b></p><ul><li>M ≈ CUR (근사만)</li><li>C/R: 실제 row/col random sample</li><li>확률: p_i = ||row_i||² / ||M||²</li><li>U = Y (Σ^+)² X^T (W의 SVD)</li></ul><p><b>⭐ 기출 예상</b></p><ul><li>qV, qVV^T 계산</li><li>90% energy로 r 찾기</li><li>CUR 샘플링 확률 계산</li><li>T/F: SVD = eigendecomp (FALSE)</li></ul>"}}, "12": {"1": {"en": "Recommender Systems 1\n     Introduction to Data Mining\n      Seoul National University\n            Spring 2026\n\n\n\n\n               Jaemin Yoo          1", "kr": "<b>Recommender Systems 1</b><br>서울대 · 2026 봄 · Jaemin Yoo", "summary": "<p><b>🎬 L12 시작 — 추천 시스템 1</b><br>Netflix, Amazon, YouTube 등의 핵심 기술. Content-based + Collaborative Filtering.</p><p><b>⭐ 시험 포인트</b></p><ul><li>Long tail 현상 (★★)</li><li>Utility matrix sparse 성질 (★★)</li><li>Pearson correlation 공식 (★★★)</li><li>User-user vs Item-item CF prediction (★★★)</li><li>Content-based vs CF 장단점 (★★)</li><li>RMSE 공식 (★)</li></ul>"}, "2": {"en": "Announcements (Same as Before)\n• Assignments:\n  • HW1 (deadline: April 9)\n  • HW2 (deadline: April 30)\n• Midterm:\n  • When: April 23 at 9:30 – 10:45\n  • Where: 302-208 and 302-209 (students will be separated)\n  • How: Closed-book; no calculators allowed\n\n\n\n\n                                 Jaemin Yoo                   2", "kr": "<b>공지 (동일)</b><br>• HW1 (4/9), HW2 (4/30)<br>• <b>Midterm 4/23</b>", "summary": "<p><b>📢 시험: 4/23 9:30-10:45, closed-book</b></p>"}, "3": {"en": "Recap\n• Singular Value Decomposition\n• Dimensionality Reduction with SVD\n• CUR Decomposition\n\n\n      n        r       r   n\n\n                           VT     r\n                   Σ\n m    M    =   U\n\n\n\n\n                                Jaemin Yoo   3", "kr": "<b>복습</b><br>• SVD, PCA와의 관계<br>• SVD로 차원 축소<br>• CUR decomposition", "summary": "<p><b>🔙 L11 복습</b></p><ul><li>SVD: M = UΣV^T</li><li>qV, qVV^T로 query</li><li>CUR: sparse 친화</li></ul><p><b>💡 L12 연결</b><br>SVD의 query (qV, qVV^T)가 <b>행렬 분해 기반 추천</b>의 핵심. L12는 이를 구체화.</p>"}, "4": {"en": "Outline\n1. Recommender Systems\n2. Content-based Recommendation\n3. Collaborative Filtering\n4. The Netflix Challenge\n\n\n\n\n                          Jaemin Yoo   4", "kr": "<b>목차</b><ol><li>Recommender Systems</li><li>Content-based Recommendation</li><li>Collaborative Filtering</li><li>The Netflix Challenge</li></ol>", "summary": "<p><b>🗺️ L12 4부 구성</b></p><ol><li><b>Recommender Systems</b> — 개요, long tail</li><li><b>Content-based</b> — item profile + user profile</li><li><b>Collaborative Filtering</b> — User-user, Item-item CF</li><li><b>Netflix Challenge</b> — 실제 사례 + 교훈</li></ol>"}, "5": {"en": "Recommender Systems\n• Class of applications that predict user responses to options.\n• Non-personalized recommendations:\n   • Editorial and hand-curated: List of favorites, essential items, …\n   • Simple aggregates: Top 10, most popular, recent uploads, …\n• Personalized recommendations:\n   • Tailored to individual users: Amazon, Netflix, YouTube, …\n\n\n\n\n                                     Jaemin Yoo                          5", "kr": "<b>Recommender Systems 정의</b><br>• 사용자의 옵션에 대한 반응을 예측하는 응용 집합<br>• <b>비개인화 추천:</b><br>  • Editorial + hand-curated: favorites, essentials<br>  • Simple aggregate: Top 10, most popular, recent<br>• <b>개인화 추천:</b><br>  • 개별 사용자 맞춤: Amazon, Netflix, YouTube", "summary": "<p><b>📐 추천 시스템 분류</b></p><p><b>🚶 비개인화 (non-personalized)</b></p><ul><li>Editorial: 에디터가 큐레이션 (favorites, essentials)</li><li>Aggregate: Top 10, most popular, recent</li></ul><p><b>🎯 개인화 (personalized)</b></p><ul><li>각 user 맞춤 (Amazon, Netflix, YouTube)</li><li>이 강의의 초점</li></ul>"}, "6": {"en": "From Scarcity to Abundance\n• Physical delivery systems have scarcity of resources.\n   • Stores have limited shelf space to show to users.\n• Online stores can make anything available to users.\n   • Amazon offers millions of books.\n   • Every user can have their own interface, i.e., a list of items.\n\n\n\n\n                                       Jaemin Yoo                      6", "kr": "<b>Scarcity → Abundance</b><br>• 물리 배송: 자원 부족 (선반 한정)<br>• 온라인: 모든 아이템 제공 가능<br>  • Amazon: 수백만 책<br>  • 각 사용자마다 고유 interface (item 리스트)", "summary": "<p><b>🏪 Scarcity → Abundance</b></p><p><b>📋 오프라인 vs 온라인</b></p><ul><li><b>물리 매장:</b> 선반 제한 → 인기 상품만 진열</li><li><b>온라인:</b> 무한 \"선반\" → 수백만 아이템 동시 제공</li></ul><p><b>💡 온라인의 기회</b><br>\"각 user마다 <b>맞춤 interface</b> 가능.\" 특정 취향에 맞는 niche 아이템 추천.</p>"}, "7": {"en": "The Long Tail\n• Online institutions provide the entire range of items.\n   • The tail as well as the head (popular) items\n• Ideal recommendation is about finding proper tails.\n\n                                                   Recommend\n\n\n              Popularity\n                               “Touching the void”             “Into Thin Air”\n\n\n\n\n                                      Items\n                                      Jaemin Yoo                                 7", "kr": "<b>Long Tail 현상 ★</b><br>• 온라인: 전체 범위 제공 (head + tail)<br>• 이상적 추천 = <b>적절한 tail 찾기</b><br>  • 인기 적지만 특정 사용자에겐 좋은 아이템<br>  • 예: \"Touching the Void\", \"Into Thin Air\"", "summary": "<p><b>⭐⭐ Long Tail — 기출 T/F 단골</b></p><p><b>📐 개념</b><br>\"인기 순으로 아이템 정렬하면 head(인기) + <b>길고 얇은 tail</b>(niche).\"</p><p><b>🎯 추천의 가치</b><br>\"이상적 추천 = <b>적절한 tail</b> 아이템 매칭.\"</p><p><b>🍎 유명 사례</b><br>\"Touching the Void\" (암벽 등반 책): 오래된 책인데, \"Into Thin Air\" 읽은 user에게 추천돼 <b>베스트셀러로 부활</b>. Long tail의 파워.</p><p><b>📝 T/F 단골</b><br>\"Online stores cannot benefit from long tail\" → <b>FALSE</b>. 온라인이 tail 활용 가능.</p>"}, "8": {"en": "Utility Matrix\n• We consider two classes of entities: users and items.\n• Utility matrix shows the preference of users for items.\n   • The values come from an ordered set, e.g., 1-5 stars.\n   • Assumed to be sparse, i.e., most entries are unknown.\n\n                  HP1   HP2    HP3      TW        SW1   SW2   SW3\n\n              A    4                      5        1\n              B    5     5      4\n              C                           2        4     5\n              D          3                                     3\n\n\n                                     Jaemin Yoo                     8", "kr": "<b>Utility Matrix</b><br>• 두 entity: users, items<br>• <b>각 원소 = 유저의 아이템 선호도</b><br>  • 값: 순서 있는 set (예: 1-5 stars)<br>  • <b>매우 sparse</b> — 대부분 미평가<br>• 예: 행=users(A,B,C,D), 열=HP1,HP2,HP3,TW,SW1,SW2,SW3 영화", "summary": "<p><b>⭐ Utility Matrix — 추천 시스템의 기본 데이터</b></p><p><b>📐 정의</b></p><ul><li>Row = user, Column = item</li><li>M[u][i] = user u의 item i 선호도</li><li>값: 1-5 stars, 또는 like/dislike</li></ul><p><b>🚨 핵심 성질: 매우 Sparse</b><br>\"대부분 원소가 <b>미평가(blank)</b>.\" 각 user는 수백만 item 중 수십~수백만 rating.</p><p><b>🎯 추천 문제 = Matrix Completion</b><br>\"missing 값을 채우는 문제.\"</p><p><b>📝 T/F</b><br>\"utility matrix is usually dense\" → <b>FALSE</b></p>"}, "9": {"en": "Gathering Ratings\n• Explicit feedback: Ask users to rate items.\n   • E.g., YouTube asks for likes/dislikes of watched videos.\n   • Users are generally unwilling to provide responses.\n   • Biased as it comes from people willing to provide ratings.\n• Implicit feedback: Learn ratings from user actions.\n   • If a user watches a movie, the user is said to “like” it.\n   • Hard to model low ratings: 0 (no rating) or 1 (like).\n\n\n\n\n                                       Jaemin Yoo                 9", "kr": "<b>Rating 수집</b><br>• <b>Explicit feedback:</b> rating 직접 요청<br>  • 예: YouTube like/dislike<br>  • 단점: 주는 사람 적음, bias 있음<br>• <b>Implicit feedback:</b> 행동에서 추정<br>  • 영화 시청 → \"좋아함\"<br>  • 단점: 저평점 모델링 어려움 (0 = no rating)", "summary": "<p><b>📊 Explicit vs Implicit Feedback</b></p><table style=\"font-size:12px\"><tr><th></th><th>Explicit</th><th>Implicit</th></tr><tr><td>정의</td><td>직접 rating</td><td>행동에서 추정</td></tr><tr><td>예</td><td>YouTube like, Netflix stars</td><td>영화 시청, click</td></tr><tr><td>장점</td><td>명확</td><td>많이 수집</td></tr><tr><td>단점</td><td>주는 사람 적음, bias</td><td>저평점 모델링 어려움</td></tr></table><p><b>💡 현대 실무</b><br>Implicit 위주 + explicit 보조.</p>"}, "10": {"en": "Personalized Recommender Systems\n• Two groups of recommender systems:\n  • Content-based: Focus on the profiles (or features) of users/items.\n  • Collaborative filtering: Focus on the interactions between users/items.\n\n\n           like\n                                               like       like\n\n                     similar\n\n         recommend\n                                                like     recommend\n\n\n\n                                  Jaemin Yoo                                  10", "kr": "<b>개인화 추천 2대 계열</b><br>• <b>Content-based:</b> user/item의 profile (feature) 중심<br>• <b>Collaborative Filtering:</b> user/item 간 상호작용 중심", "summary": "<p><b>⭐ 2대 추천 접근</b></p><table style=\"font-size:12px\"><tr><th></th><th>Content-based</th><th>Collaborative Filtering</th></tr><tr><td>기반</td><td>feature (profile)</td><td>상호작용 (utility matrix)</td></tr><tr><td>핵심 질문</td><td>item 자체가 뭐야?</td><td>누가 뭘 좋아했어?</td></tr><tr><td>예</td><td>영화 장르, 감독</td><td>\"비슷한 사람이 본 것\"</td></tr></table>"}, "11": {"en": "Outline\n1. Recommender Systems\n2. Content-based Recommendation\n3. Collaborative Filtering\n4. The Netflix Challenge\n\n\n\n\n                         Jaemin Yoo   11", "kr": "<b>목차 (2부)</b><br>1. ✓ 2. <b>Content-based</b> ← 여기부터 3. CF 4. Netflix", "summary": "<p><b>🎯 2부 — Content-based</b></p><p>Feature/profile 기반 추천. item/user 특성 비교.</p>"}, "12": {"en": "Content-based Recommendation\n• Main idea: Use the profiles of items.\n   • E.g., for a movie, { genre, director, actors, plot, release year }.\n   • Recommend items similar to previous highly-rated items.\n• Examples:\n   • Recommend movies with same actor(s), director, genre, …\n   • Recommend websites or blogs with “similar” content.\n\n\n\n\n                                       Jaemin Yoo                          12", "kr": "<b>Content-based Recommendation</b><br>• 핵심: <b>item의 profile</b> 사용<br>  • 예: 영화 = {장르, 감독, 배우, 줄거리, 출시년도}<br>  • 이전에 좋게 평가한 아이템과 유사한 것 추천<br>• 예:<br>  • 같은 배우/감독/장르 영화<br>  • \"유사한\" 내용의 웹사이트/블로그", "summary": "<p><b>🎯 Content-based — 핵심 아이디어</b></p><p><b>💡 논리</b><br>\"User가 X를 좋아했다 → X와 <b>feature가 비슷한</b> Y도 좋아할 것.\"</p><p><b>🍎 예</b></p><ul><li>영화 feature: {장르, 감독, 배우, 줄거리, 연도}</li><li>Matrix를 좋아함 → SF 영화 추천</li><li>Nolan 감독 영화 좋아함 → 다른 Nolan 영화 추천</li></ul><p><b>📋 다른 응용</b></p><ul><li>비슷한 내용 블로그</li><li>비슷한 음악 (장르·아티스트)</li></ul>"}, "13": {"en": "Plan of Action\n\n\n\n\n                 Source: Stanford CS246 (2022)\n\n                          Jaemin Yoo             13", "kr": "<b>Plan of Action</b><br>(다이어그램) user likes items → aggregate into user profile → item profile 생성 → cosine similarity로 match → 추천", "summary": "<p><b>📊 Content-based 파이프라인</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:11px\">User가 좋아한 items\n   ↓\nItem profile 생성 (feature vector)\n   ↓\nUser profile 생성 (item profiles 합산)\n   ↓\n새 item의 profile과 user profile 비교\n   ↓\nCosine similarity 높은 순으로 추천</pre>"}, "14": {"en": "Item Profiles\n• For each item, create an item profile as a set of features.\n• Finding features is not straightforward for some classes of items.\n   • E.g., find a set of “important” words from a document.\n   • Eliminate stop words.\n   • Compute TF-IDF scores of words.             Common stop words        The, and because\n   • Use the top 𝑘 words as its features.\n                                                    Less frequent terms   car, drive\n                                                    with small TF-IDF\n                                                    More frequent terms   auto repair\n                                                    with higher TF-IDF\n                                                                          auto repair\n\n\n                                       Jaemin Yoo                                            14", "kr": "<b>Item Profiles</b><br>• 각 아이템 = feature 집합 profile<br>• 일부 item은 feature 찾기 어려움<br>  • 예: 문서에서 \"중요 단어\" 찾기<br>    • stop word 제거<br>    • TF-IDF score 계산<br>    • top k 단어를 feature로", "summary": "<p><b>🎯 Item Profile 만들기</b></p><p><b>📐 기본</b><br>Item → feature vector</p><p><b>🤔 Feature가 뭔지 명확 안 한 경우</b><br>예: 문서. 정답:</p><ol><li>Stop word 제거 (\"the\", \"is\" 등)</li><li>남은 단어의 TF-IDF score 계산 (L1 복습!)</li><li>Top k 단어를 feature로</li></ol><p><b>💡 TF-IDF</b><br>TF × IDF. 자주 나오면서(TF) 다른 문서엔 안 나오는(IDF) 단어 = 중요.</p>"}, "15": {"en": "Item Profiles as Vectors\n• If a feature is a discrete value, use a one-hot vector.\n   • Length 𝐿 is the number of possible d

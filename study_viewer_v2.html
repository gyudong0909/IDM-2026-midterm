완료분은 살아있음 — DFS(replicated)에 결과 저장했으니까</li></ul><p><b>📝 시험 설명 요구</b><br>\"왜 Map은 전부 재실행, Reduce는 진행 중만?\" → <b>출력 저장 위치 차이</b> (로컬 디스크 vs DFS) 답변.</p>"}, "30": {"en": "Number of Reduce Tasks\n• Pipelining can be optimized by using one Reduce task per key.\n• However, this plan is not usually the best.\n   • Overhead associated with each task is created.\n   • Often there are far more keys than there are compute nodes.\n   • Significant variation in the # of values for different keys.\n      • Reduce tasks will exhibit skew in processing time.\n• Rule of thumb: # of nodes < # of Reduce tasks < # of keys.\n\n\n\n\n                                         Jaemin Yoo                 30", "kr": "<b>Reduce Task 수</b><br>• key당 1개 Reduce task가 이론상 최대 병렬<br>• 하지만 실무는 그게 best 아님:<br>  • task당 overhead 발생<br>  • key 수 >> 노드 수인 경우 많음<br>  • key별 value 수 편차 큼<br>    • Reduce task 실행 시간 skew<br>• <b>경험칙:</b> # 노드 &lt; # Reduce task &lt; # key", "summary": "<p><b>🎯 Reduce Task 수 최적화</b></p><p><b>🤔 이론적 최대: key당 1개</b><br>모든 key가 독립 처리되니 병렬성 최대. 하지만 실무에선 best 아님.</p><p><b>🚨 너무 많은 Reduce task의 문제</b></p><ol><li><b>Task 오버헤드:</b> task 시작/종료마다 비용 발생</li><li><b>Key 수 >> 노드 수:</b> task 너무 많으면 queue 대기만 길어짐</li><li><b>Skew 문제:</b> 어떤 key는 value 1개, 어떤 key는 100만 개 → reducer별 실행 시간 천차만별</li></ol><p><b>✅ 경험칙 (★ 시험 등장 가능)</b><br><b># 노드 &lt; # Reduce task &lt; # key</b></p><ul><li>노드 수보단 많게 (병렬성)</li><li>key 수보단 적게 (오버헤드 방지)</li></ul>"}, "31": {"en": "Algorithms using MapReduce\n• MapReduce is not a solution to every problem.\n  • DFS makes sense only when files are large and rarely updated in place.\n  • MapReduce is not suitable for frequent database changes.\n     • E.g., managing online retails sales (say by Amazon).\n• Original purpose of Google:\n  • To execute large matrix-vector multiplications (for PageRank).\n  • Matrix-vector calculations fit nicely into MapReduce.\n  • Relational algebra (i.e., SQL) can also use MapReduce effectively.\n\n\n\n\n                                        Jaemin Yoo                           31", "kr": "<b>MapReduce 적용 가능 알고리즘</b><br>• MapReduce는 만능 아님<br>  • DFS는 큰 파일, 거의 update 없는 경우에만 의미<br>  • DB의 잦은 update엔 부적합 (예: Amazon 온라인 소매)<br>• Google의 원래 목적:<br>  • 거대한 matrix-vector 곱 실행 (PageRank용)<br>  • matrix-vector 계산은 MapReduce에 잘 맞음<br>  • 관계대수(SQL)도 MapReduce 효과적", "summary": "<p><b>❌ MapReduce가 부적합한 경우</b></p><ul><li><b>잦은 업데이트가 필요한 시스템</b><br>예: Amazon 온라인 주문 처리 — 매초 수만 건 update. MapReduce 부적합, 일반 DB 필요.</li><li><b>작은 데이터</b><br>한 서버 메모리에 들어가는 데이터는 그냥 직접 처리가 빠름. MapReduce 오버헤드 낭비.</li><li><b>실시간 응답 필요</b><br>MapReduce는 batch. 밀리초 응답은 못 함.</li></ul><p><b>✅ MapReduce가 잘 맞는 경우</b></p><ul><li><b>Matrix-Vector 곱</b> (Google 원래 목적, PageRank용)</li><li><b>관계대수 (SQL)</b> — join, select, group by 등</li><li><b>대규모 batch 처리</b> (로그 분석, 통계 집계)</li><li><b>Read-heavy + append-only</b> 워크로드</li></ul>"}, "32": {"en": "Matrix-Vector Multiplication\n• Suppose we have an 𝑛 × 𝑛 matrix 𝑀 and a vector 𝐯 of length 𝑛.\n• Matrix-vector product is vector 𝐱 of length 𝑛 whose 𝑖-th element is:\n\n\n\n• If 𝑛 = 100, we do not need DFS or MapReduce.\n• But in large search engines, e.g., Google, 𝑛 can be tens of billions.\n\n\n\n                                 Jaemin Yoo                           32", "kr": "<b>Matrix-Vector Multiplication (행렬-벡터 곱)</b><br>• n×n 행렬 M, 길이 n 벡터 v<br>• 결과 x의 i번째: x_i = Σ_j m_ij · v_j<br>• n=100 작으면 DFS/MapReduce 불필요<br>• <b>큰 검색 엔진에선</b> n = 수십억 → MapReduce 필수", "summary": "<p><b>🧮 Matrix-Vector 곱 — MapReduce의 대표 예제</b></p><p><b>📐 문제 정의</b><br>n×n 행렬 M, 길이 n 벡터 v 주어지면<br><code>x = Mv</code>의 i번째 원소: <b>x_i = Σ_j m_ij · v_j</b></p><p><b>🎯 실무 예시</b></p><ul><li><b>PageRank:</b> M = 링크 구조, v = 현재 page rank. Mv 반복하면 rank 수렴.</li><li><b>Google 원래 용도:</b> MapReduce 만든 이유 중 하나가 이거.</li></ul><p><b>📊 규모 감</b></p><ul><li>n = 100: 그냥 파이썬으로 1초. MapReduce 필요 X</li><li>n = 수십억 (웹): 단일 서버 불가능. MapReduce 필수.</li></ul><p><b>⏭️ 다음 2 슬라이드에서 실제 Map/Reduce 함수 보여줌.</b></p>"}, "33": {"en": "Matrix-Vector Multiplication\n• Assume that 𝑣 fits in main memory:\n                       Map function                         Reduce function\n                        Input: ( 𝑖, 𝑗 , 𝑚𝑖𝑗)                 Input: (𝑖, [𝑚𝑖1𝑣1, 𝑚𝑖2𝑣2, … 𝑚𝑖𝑛𝑣𝑛])\n                        Output: (𝑖, 𝑚𝑖𝑗𝑣𝑗)                   Output: (𝑖, ∑𝑗 𝑚𝑖𝑗𝑣𝑗)\n\n           M       v\n                                       (1, 1*1 = 1)\n       1       2   1                   (1, 2*2 = 4)           (1, [1, 4])           (1, 5)\n                                       (2, 1*1 = 1)           (2, [1, 6])           (2, 7)\n       1       3   2                   (2, 3*2 = 6)\n\n\n\n\n                                               Jaemin Yoo                                          33", "kr": "<b>Matrix-Vector (v가 메모리에 fit)</b><br>• Map: input ((i,j), m_ij) → emit(i, m_ij × v_j)<br>• Reduce: input (i, [m_i1·v_1, m_i2·v_2, ...]) → emit(i, Σ_j m_ij · v_j)<br><br><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:11px\">예: M=[[1,2],[1,3]], v=[1,2]\nMap: (1,1*1), (1,2*2), (2,1*1), (2,3*2)\nReduce: (1,[1,4]) → (1,5)\n        (2,[1,6]) → (2,7)</pre>", "summary": "<p><b>⭐⭐⭐ Matrix-Vector 곱 (v가 메모리에 들어가는 경우)</b></p><p><b>📐 정석 코드 (암기 필수 — 2024 Midterm Q2(a) 출제)</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">Map((i,j), m_ij):              # 행렬 원소 하나\n  emit(i, m_ij * v[j])          # v는 broadcast됨\n\nReduce(i, values):\n  emit(i, sum(values))           # 같은 row의 값들 합</pre><p><b>🍎 손으로 돌려보기</b><br>M = [[1,2],[1,3]], v = [1,2]<br>Map 출력:</p><ul><li>(1, 1·1) = (1, 1)</li><li>(1, 2·2) = (1, 4)</li><li>(2, 1·1) = (1, 1) ... 오타, (2, 1·1) = (2, 1)</li><li>(2, 3·2) = (2, 6)</li></ul><p>Group by Key: (1, [1,4]), (2, [1,6])<br>Reduce: (1, <b>5</b>), (2, <b>7</b>) → Mv = [5, 7] ✓</p><p><b>🔑 핵심 아이디어:</b> v를 모든 Map worker에 <b>broadcast</b>해서 메모리에 올려둠. 그래야 v[j] 접근 가능.</p><p><b>📝 Combiner 사용 가능?</b> YES — sum은 comm+assoc → Map에서 partial sum 가능.</p>"}, "34": {"en": "Matrix-Vector Multiplication\n                                                                           𝑀    𝐯\n• What if the vector 𝐯 cannot fit in main memory?\n   • Divide 𝑀 into vertical stripes and divide 𝐯 into horizontal stripes.\n      • The width of vertical strips = the height of horizontal stripes.\n      • Use enough stripes so that one stripe of 𝐯 fits in main memory.\n   • Each Map task is assigned a chunk from corresponding stripes.\n   • The Map and Reduce tasks then run exactly the same as before.\n\n\n\n\n                                          Jaemin Yoo                           34", "kr": "<b>Matrix-Vector (v가 메모리에 못 들어감)</b><br>• M을 세로 stripe로 분할, v를 가로 stripe로 분할<br>  • 세로 stripe 너비 = 가로 stripe 높이<br>  • v의 한 stripe가 메모리에 들어가도록 stripe 개수 조정<br>• 각 Map task가 대응되는 stripe들 처리<br>• Map, Reduce는 이전과 동일", "summary": "<p><b>🧱 Matrix-Vector (v가 너무 클 때)</b></p><p><b>🚨 문제</b><br>v가 수십억 원소라 메모리에 broadcast 못 함. 어떡하지?</p><p><b>💡 해결: Stripe 분할</b></p><ol><li>M을 <b>세로 stripe</b>로 나눔 (예: 10개 세로 띠)</li><li>v를 <b>가로 stripe</b>로 나눔 (같은 개수 10개)</li><li><b>중요:</b> M stripe 너비 = v stripe 높이 (행/열 정렬)</li><li>각 stripe는 memory에 들어갈 정도 작게</li></ol><p><b>🎯 왜 이렇게?</b><br>각 Map task가 M의 한 stripe와 그에 대응하는 v stripe만 처리 → 메모리 절약.</p><p><b>⚙️ 알고리즘 자체는 동일</b><br>Map/Reduce 함수는 이전 슬라이드와 같음. 데이터 분배 방식만 다름.</p>"}, "35": {"en": "Summary\n1. Distributed Computing for Data Mining\n  • Distributed File System\n2. MapReduce: Basics\n  • Map, group by key, reduce, and combiners\n  • Example: Word counting\n3. MapReduce: Details\n  • Coping with node failure\n  • Algorithms using MapReduce\n\n\n\n                                 Jaemin Yoo    35", "kr": "<b>요약 (Summary)</b><br>1. 분산 컴퓨팅 for Data Mining<br>  • Distributed File System<br>2. MapReduce: Basics<br>  • Map, group by key, reduce, combiner<br>  • Word counting 예제<br>3. MapReduce: Details<br>  • 노드 실패 처리<br>  • MapReduce 적용 알고리즘", "summary": "<p><b>🎬 L2 마무리 — 시험 대비 체크리스트</b></p><p><b>✅ 외워 써야 할 것들</b></p><ol><li><b>Word Count 정석 코드</b> (Map + Reduce)</li><li><b>Matrix-Vector Map/Reduce</b> (memory에 fit 버전)</li><li><b>Combiner 조건:</b> commutative AND associative</li><li><b>실패 처리 비대칭:</b><br> • Map 실패 → 전부 재실행 (로컬 디스크)<br> • Reduce 실패 → 진행 중만 (DFS)</li></ol><p><b>✅ 개념 이해</b></p><ul><li>\"Bring computation to data\" 철학</li><li>DFS 2계층 구조 (chunk + master)</li><li>Group by Key = 시스템이 자동 (hash-based shuffle)</li><li>Reduce 수 경험칙: 노드 수 &lt; Reduce 수 &lt; key 수</li></ul><p><b>⭐ L2 핵심 기출 출제 가능성</b></p><ul><li>MapReduce pseudocode 작성 (90%)</li><li>실패 처리 T/F (90%)</li><li>Combiner 조건 T/F (70%)</li></ul>"}}, "3": {"1": {"en": "Spark\nIntroduction to Data Mining\n Seoul National University\n       Spring 2026\n\n\n\n\n          Jaemin Yoo          1", "kr": "<b>Spark</b><br>서울대 · 2026 봄 · Jaemin Yoo", "summary": "<p><b>🎬 L3 시작 — Spark</b><br>MapReduce의 개선된 후계자. 2025년 기준 <b>실무에서 더 많이 쓰이는</b> 분산 프레임워크.</p><p><b>⭐ 시험 포인트</b><br>• RDD 개념<br>• Transformation vs Action<br>• Wide vs Narrow dependency (★★★ 필수)<br>• Lazy evaluation + Lineage</p>"}, "2": {"en": "Announcements\n• Communications:\n  • We will use eTL for all course communications (no other apps).\n• Assignments:\n  • Please check the announcement for the computing environment.\n  • HW0 will be posted today. No submissions required.\n\n\n\n\n                                   Jaemin Yoo                        2", "kr": "<b>공지</b><br>• 커뮤니케이션: eTL만 사용<br>• 과제: 컴퓨팅 환경 공지 확인 필수. HW0 오늘 게시 (제출 불요)", "summary": "<p><b>📢 운영 공지</b><br>eTL로만 커뮤니케이션. HW0는 제출 불요지만 Spark 튜토리얼이라 꼭 해볼 것.</p>"}, "3": {"en": "Recap: MapReduce\n• MapReduce is suitable for large files rarely updated in place.\n   • User implements two functions: Map and Reduce.\n      • Map: 𝑘, 𝑣 → 𝑘! , 𝑣! !\n      • Reduce: 𝑘, 𝑣\" , ⋯ , 𝑣# → 𝑘, 𝑣\n   • System runs the group-by-keys operation.\n   • System automatically handles node failures.\n\n\n\n\n                                        Jaemin Yoo                 3", "kr": "<b>복습: MapReduce</b><br>• 큰 파일, 제자리 update 드문 경우에 적합<br>• 사용자: Map, Reduce 두 함수 구현<br>• 시스템: group-by-keys, 노드 실패 자동 처리", "summary": "<p><b>🔙 L2 요약</b></p><ul><li><b>MapReduce</b> = 분산 계산 프로그래밍 스타일</li><li>사용자는 Map, Reduce 함수만 작성 (k,v)→(k',v')</li><li>시스템이 group by key + 노드 실패 처리</li></ul><p><b>💡 L3 질문:</b> \"MapReduce 좋은데 한계가 뭐였지?\" → 다음 슬라이드부터 Spark가 어떻게 개선했는지.</p>"}, "4": {"en": "Outline\n1. Spark: Overview\n2. Spark: Operations\n3. Spark: Implementation\n\n\n\n\n                           Jaemin Yoo   4", "kr": "<b>목차</b><ol><li>Spark: Overview</li><li>Spark: Operations</li><li>Spark: Implementation</li></ol>", "summary": "<p><b>🗺️ L3 3부 구성</b></p><ol><li><b>Overview</b> — MapReduce 한계 + Spark 등장</li><li><b>Operations ★★★</b> — map/flatMap/filter/join 등 (시험 계산 문제 직결)</li><li><b>Implementation</b> — Lazy evaluation + Lineage</li></ol>"}, "5": {"en": "Hadoop\n• Hadoop is an open-source framework for distributed processing.\n  • MapReduce is tightly coupled with Hadoop.\n• Consists of three key components:\n  • HDFS: Stores large datasets across clusters with replication.\n  • YARN: Manages resources and job scheduling across nodes.\n  • Processing engines: Run computations (e.g., MapReduce and Spark).\n• In modern Hadoop, the master controller mostly means YARN.\n\n\n\n\n                                 Jaemin Yoo                             5", "kr": "<b>Hadoop 스택</b><br>• Hadoop = 분산 처리 오픈소스 프레임워크<br>• 3개 핵심 컴포넌트:<br>  • <b>HDFS</b>: replication 포함 대용량 저장<br>  • <b>YARN</b>: 자원 관리 + job 스케줄링<br>  • <b>Processing engines</b>: MapReduce, Spark", "summary": "<p><b>🏗️ Hadoop 전체 스택</b></p><p>Hadoop = 분산 처리를 위한 3-계층 오픈소스 프레임워크:</p><ol><li><b>HDFS (하단):</b> 분산 파일시스템 (L2에서 본 DFS)</li><li><b>YARN (중간):</b> 자원 관리자 — \"Worker에 task 할당\", \"CPU 몇 코어 줄지\"</li><li><b>Processing Engines (상단):</b> MapReduce, Spark, Flink 등</li></ol><p><b>💡 현대 용어</b><br>옛날엔 \"master controller\"가 MapReduce 내부였지만, 요즘은 YARN이 그 역할. Spark도 YARN 위에서 돌아감.</p>"}, "6": {"en": "Data Analytics Software Stack\n\n\n\n\n                  Source: Maleki et al. (2019)\n\n\n\n                          Jaemin Yoo             6", "kr": "<b>데이터 분석 소프트웨어 스택</b><br>(다이어그램 — Maleki et al. 2019)<br>Hadoop 스택의 전체 구조를 계층화해 보여줌.", "summary": "<p><b>📊 전체 스택 시각화</b></p><p>Maleki et al. 2019 논문의 그림. Hadoop 생태계 전체를 계층으로 보여줌.</p><ul><li>최하단: HDFS</li><li>그 위: YARN (자원 관리)</li><li>그 위: MapReduce / Spark / Flink (processing)</li><li>최상단: SparkSQL, MLlib, GraphX (특화 라이브러리)</li></ul><p><b>🎯 의미:</b> Spark는 독립 시스템이 아니라 이 스택의 <b>한 계층</b>으로 작동.</p>"}, "7": {"en": "Limitations of MapReduce (1/2)\n• MapReduce stores intermediate files on disk.\n  • The output of each Map task is stored on the\n    local file system of the worker.\n     • The files are not accessible if the worker fails.\n  • Pros: Can be run with little main memory.\n  • Cons: Disk overhead after each Map task.\n\n\n\n\n                                           Jaemin Yoo      7", "kr": "<b>MapReduce의 한계 (1/2)</b><br>• MapReduce는 중간 결과를 <b>디스크에 저장</b><br>• 장: 메모리 적게 써도 동작<br>• 단: 각 Map task 후 디스크 오버헤드", "summary": "<p><b>🚨 MapReduce의 치명적 한계 1 — 디스크 I/O</b></p><p><b>💡 문제</b><br>MapReduce는 <b>매 Map task 후 중간 결과를 디스크에 저장</b>. 이게 왜 문제인가?</p><p><b>🐌 iterative 알고리즘에서</b><br>ML·graph 알고리즘은 같은 연산을 반복:</p><ul><li>iteration 1: 디스크 읽기 → Map → 디스크 쓰기 → Reduce → 디스크 쓰기</li><li>iteration 2: 디스크 읽기 → ... (또 디스크!)</li><li>... 100번 반복 → <b>디스크 I/O 100배</b></li></ul><p><b>⚖️ Trade-off</b></p><ul><li>✅ 장점: 메모리 적어도 동작. Worker 실패 시 디스크에 저장된 결과 활용.</li><li>❌ 단점: 디스크 I/O 비용 큼. 반복 연산에 치명적.</li></ul>"}, "8": {"en": "Limitations of MapReduce (2/2)\n• MapReduce incurs substantial overheads for a complex job.\n  • Due to data replication and disk I/O.\n• Many algorithms are not easily described as MapReduce.\n\n\n\n\n                               Source: Stanford CS246 (2022)\n\n                                        Jaemin Yoo             8", "kr": "<b>MapReduce의 한계 (2/2)</b><br>• 복잡한 job일수록 오버헤드 커짐 (replication + disk I/O)<br>• 많은 알고리즘이 MapReduce로 표현 어려움 (ex: iterative ML)", "summary": "<p><b>🚨 MapReduce의 한계 2 — 표현력 부족</b></p><p><b>📉 복잡한 job일수록 비용 커짐</b></p><ul><li>Replication (DFS 복제) 비용</li><li>Disk I/O 비용</li><li>→ 결과: iterative ML은 Spark 대비 <b>수십~100배 느림</b></li></ul><p><b>😰 알고리즘 표현 어려움</b></p><ul><li>k-means: 여러 번 Map-Reduce 반복 필요 → 연쇄 체인 복잡</li><li>PageRank: 동일. 반복마다 디스크 hit</li><li>Graph 알고리즘: 기본적으로 MapReduce에 안 맞음</li></ul><p><b>💡 해결 아이디어:</b> <b>DAG</b> (방향성 비순환 그래프)로 일반화. 다음 슬라이드.</p>"}, "9": {"en": "Workflow System\n• MapReduce creates a chain of tasks (Map–Reduce–Map–).\n• Let’s extend it into a directed acyclic graph (DAG) of tasks.\n   • Allow functions that can take more than one input.\n• Master controller is responsible for dividing work among tasks.\n\n\n\n      Map    Reduce   Map   Reduce\n\n\n\n\n                                                                    9", "kr": "<b>Workflow System</b><br>• MapReduce = task 체인 (Map-Reduce-Map-...)<br>• 이걸 <b>DAG (directed acyclic graph)</b>로 확장하자<br>• 함수가 하나 이상의 input을 받을 수 있게", "summary": "<p><b>🔀 Workflow System 일반화</b></p><p><b>MapReduce의 제약</b><br>선형 체인만 가능: Map → Reduce → Map → Reduce → ...</p><p><b>Spark의 일반화</b><br>DAG (Directed Acyclic Graph) 허용:</p><ul><li>한 연산이 <b>여러 입력</b>을 받을 수 있음 (예: join)</li><li>한 결과를 <b>여러 곳에 공유</b> 가능</li><li>복잡한 파이프라인 자연스럽게 표현</li></ul><p><b>🎯 DAG의 장점</b><br>Master controller가 <b>전체 파이프라인</b>을 보고 최적화 가능. 각 단계 독립이 아니라 통합 관점.</p>"}, "10": {"en": "Blocking Property\n• Blocking property allows a fault-resilient model.\n   • Operation can run only after all its predecessors are completed.\n   • If a task fails, we know that any of its successors didn’t start.\n• Master controller can restart failed tasks at another node.\n   • If 𝑔 fails, then we re-run 𝑓 and then 𝑔 following the graph.\n\n\n\n\n                                                                         10", "kr": "<b>Blocking Property (블로킹 성질)</b><br>• Fault-resilient 모델의 기반<br>• 연산은 모든 선행이 끝나야 실행<br>• task 실패 시, 후속이 시작 안 됐음이 확실", "summary": "<p><b>🛡️ Blocking Property = Fault Tolerance 기반</b></p><p><b>💡 블로킹 성질이란?</b><br>\"<b>연산이 모든 선행 task가 끝난 후에만</b> 실행된다.\"</p><p><b>🎯 왜 중요한가 (failure 관점)</b><br>task f가 실패했다면:</p><ul><li>f의 후속 task g는 <b>아직 시작 안 함</b> (확실)</li><li>Master는 \"f를 다른 노드에서 재시작\" 정확히 알 수 있음</li><li>g는 f 완료 기다리면 됨</li></ul><p><b>🍎 비유</b><br>릴레이 달리기: 다음 주자가 <b>바톤 받기 전엔 달리지 않음</b>. 이전 주자 넘어지면 그 부분만 재시작.</p>"}, "11": {"en": "Spark: Most Popular Workflow System\n• Spark is a flexible workflow system not limited to MapReduce.\n  • Developed by UCB and Databricks, now maintained by Apache.\n• Additions to MapReduce:\n  • Fast data sharing\n     • Avoid saving intermediate results to disk.\n     • Cache data for repetitive queries (e.g. for ML).\n  • General execution graphs (DAGs)\n  • Richer functions than Map and Reduce\n• Compatible with Hadoop (e.g., HDFS).\n\n                                                          Source: DataBricks\n\n                                          Jaemin Yoo                           11", "kr": "<b>Spark: 가장 인기 있는 Workflow System</b><br>• UCB + Databricks 개발, 현재 Apache 유지<br>• MapReduce에 추가된 것:<br>  • Fast data sharing (메모리 캐싱)<br>  • General DAGs<br>  • Richer functions<br>• Hadoop 호환 (HDFS)", "summary": "<p><b>⚡ Spark — MapReduce의 후계자</b></p><p><b>📖 역사</b></p><ul><li>UC Berkeley + Databricks 개발</li><li>현재 Apache 재단 프로젝트 (오픈소스)</li></ul><p><b>🎯 MapReduce에 추가된 3가지</b></p><ol><li><b>Fast data sharing (메모리 캐싱):</b><br>중간 결과를 디스크 대신 메모리에 유지. 반복 쿼리 100배↑ 빠름. ML에 매우 유리.</li><li><b>General DAGs:</b><br>복잡한 파이프라인 자연스럽게 표현.</li><li><b>Richer functions:</b><br>Map/Reduce 외 filter, join, union, distinct, groupByKey, reduceByKey 등.</li></ul><p><b>🔗 호환성</b><br>Hadoop HDFS와 호환. 기존 데이터 그대로 사용.</p>"}, "12": {"en": "Resilient Distributed Dataset (RDD)\n• RDD: Key idea / central data abstraction of Spark.\n   • Partitioned collection of records of one type.\n      • Generalizes key-value pairs in MapReduce.\n   • Spread across the cluster (i.e., chunks) and read-only.\n   • Can be cached in main memory.\n   • Created from DFS or by transforming other RDDs.\n   • Best if the same operation is applied to all elements.\n\n\n\n\n                                                               Source: Stanford CS246 (2022)\n\n\n                                        Jaemin Yoo                                    12", "kr": "<b>RDD (Resilient Distributed Dataset)</b><br>• Spark의 핵심 데이터 추상화<br>• <b>한 타입</b>의 records로 구성된 파티션 컬렉션<br>• 클러스터 전체에 분산 (chunks), <b>read-only</b><br>• <b>메모리 캐싱 가능</b><br>• DFS에서 생성하거나 다른 RDD를 변환해서 생성", "summary": "<p><b>⭐⭐⭐ RDD = Spark의 심장 (필수 암기)</b></p><p><b>📖 RDD 뜻</b><br>Resilient (복원력 있는) Distributed (분산된) Dataset</p><p><b>🏗️ RDD의 특징 5가지</b></p><ol><li><b>Partitioned:</b> 여러 chunk로 나뉨, 노드에 분산 저장</li><li><b>Typed:</b> 한 RDD 안의 모든 record는 <b>같은 타입</b> (MapReduce의 key-value 일반화)</li><li><b>Read-only (immutable):</b> 한 번 만들면 수정 불가. 새 RDD 만들어 교체</li><li><b>In-memory caching:</b> <b>메모리에 유지</b> 가능 — iterative 알고리즘 초고속</li><li><b>Creation:</b> DFS 파일 읽기 또는 다른 RDD transform</li></ol><p><b>💡 비유</b><br>RDD = 엄청 큰 \"Python list\"인데 여러 서버에 분산. 수정은 못 하지만 변환(transform)으로 새 RDD 생성.</p><p><b>📝 시험 T/F 단골</b>: \"RDDs can be updated in place\" → <b>FALSE</b>. Immutable.</p>"}, "13": {"en": "Spark Program\n• Transformations build RDDs from other RDDs.\n   • Through deterministic, parallelizable operations.\n   • Include map, filter, join, union, distinct, etc.\n   • Lazy evaluation: Nothing is computed until an action.\n• Actions are used to return value or export data.\n   • Include count, collect, reduce, save, etc.\n   • Applied to RDDs, force calculations and return values.\n\n\n\n                                                              Source: Stanford CS246 (2022)\n\n\n                                    Jaemin Yoo                                       13", "kr": "<b>Spark Program</b><br>• <b>Transformations</b>: RDD → RDD (lazy)<br>  • map, filter, join, union, distinct 등<br>• <b>Actions</b>: 값 반환 또는 데이터 export<br>  • count, collect, reduce, save 등", "summary": "<p><b>⭐⭐⭐ Transformation vs Action (시험 필수)</b></p><p><b>🔄 Transformation</b><br>RDD → 새 RDD 생성.</p><ul><li>예: map, flatMap, filter, join, union, distinct, groupByKey, reduceByKey</li><li><b>Lazy!</b> action 호출 전엔 실제 계산 안 함 (계획만 세움)</li><li>결정적·병렬화 가능</li></ul><p><b>⚡ Action</b><br>RDD → 실제 값 또는 export.</p><ul><li>예: count, collect, reduce, save, take, first</li><li><b>Forces computation</b> — 이때 실제 계산 트리거됨</li></ul><p><b>🎯 한줄 요약</b><br>\"Transformation은 <b>계획</b>, Action이 <b>실행 버튼</b>.\"</p><p><b>💡 왜 lazy?</b><br>시스템이 전체 DAG를 보고 <b>최적화</b> (예: filter를 더 앞으로 옮겨 데이터 양 줄이기) 가능.</p>"}, "14": {"en": "Outline\n1. Spark: Overview\n2. Spark: Operations\n3. Spark: Implementation\n\n\n\n\n                           Jaemin Yoo   14", "kr": "<b>목차 (2부)</b><br>1. Overview ✓<br>2. <b>Operations</b> ← 여기부터<br>3. Implementation", "summary": "<p><b>🎯 2부 시작 — Operations</b><br>Spark의 실제 API 설명. 다음 슬라이드들에서 구체 예제 (알파벳별 평균 단어 길이)로 각 연산 보여줌.</p>"}, "15": {"en": "Example: Average Word Length by Letter\n• Problem:\n  • Given a large text file (stored in the DFS),\n  • For each letter 𝜋 ∈ 𝑎, ⋯ , 𝑧 ,\n  • What is the average length of words that start with 𝜋?\n• How to do it with MapReduce:\n  • Map: line index, line → (𝑤 0 , len 𝑤 ) 𝑤 ∈ line\n  • Reduce: word, lengths → (word, mean lengths )\n\n\n\n\n                                    Jaemin Yoo               15", "kr": "<b>예제: 알파벳별 평균 단어 길이</b><br>• 문제: DFS의 큰 텍스트 파일에서, 각 알파벳 π로 시작하는 단어들의 평균 길이<br>• MapReduce로: Map → Reduce", "summary": "<p><b>🎯 오늘 예제: 알파벳별 평균 단어 길이</b></p><p><b>📝 문제</b><br>큰 텍스트 파일 주어짐. <b>각 알파벳(a~z) 별로, 그 글자로 시작하는 단어들의 평균 길이</b>.</p><p>예: \"apple, age, ball, banana\" → a: (5+3)/2 = 4.0, b: (4+6)/2 = 5.0</p><p><b>🤔 MapReduce 방식</b></p><ul><li>Map: (line_id, line) → for each word w: emit(w[0], len(w))</li><li>Reduce: (letter, lengths) → (letter, mean(lengths))</li></ul><p><b>💡 다음 7슬라이드에서 같은 문제를 Spark로 구현</b>. API 친숙해지기.</p>"}, "16": {"en": "Example: Average Word Length by Letter\n> avglens = sc.textFile(file)\n\n\n\n\n                   RDD\n        DFS:\n        mydat\n        a\n\n\n\n                                Jaemin Yoo   16", "kr": "<b>Spark 구현 단계 1 (textFile)</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">avglens = sc.textFile(file)</pre>• DFS에서 RDD 생성 (각 element = 한 줄)", "summary": "<p><b>1️⃣ textFile — 파일 읽기</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">avglens = sc.textFile(file)</pre><p><b>🔍 하는 일</b></p><ul><li>DFS에서 파일을 RDD로 변환</li><li>각 element = <b>파일의 한 줄</b> (문자열)</li><li><b>Lazy:</b> 실제로는 아직 파일을 읽지 않음!</li></ul><p><b>💡 sc</b><br>\"SparkContext\" — Spark와 드라이버 간 연결 객체. 모든 Spark 작업의 시작점.</p>"}, "17": {"en": "Example: Average Word Length by Letter\n> avglens = sc.textFile(file) \\\n   .flatMap(lambda line: line.split())\n\n\n\n\n                   RDD       RDD\n        DFS:\n        mydat\n        a\n\n\n\n                                   Jaemin Yoo   17", "kr": "<b>단계 2 (flatMap)</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">avglens = sc.textFile(file) \\\n  .flatMap(lambda line: line.split())</pre>• 각 줄 → 여러 단어 (flatten)", "summary": "<p><b>2️⃣ flatMap — 한 줄을 여러 단어로</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">.flatMap(lambda line: line.split())</pre><p><b>🔍 하는 일</b></p><ul><li>각 줄을 split해서 단어 리스트 생성</li><li>리스트를 <b>flatten</b> (펼침)</li><li>결과 RDD의 element = 단어 하나</li></ul><p><b>🍎 예시</b><br>Input: [\"Hello world\", \"Spark is cool\"]<br>After flatMap: [\"Hello\", \"world\", \"Spark\", \"is\", \"cool\"]</p><p><b>⚡ Narrow dependency</b> — 각 input 줄이 자기 파티션만 생성. 셔플 없음.</p>"}, "18": {"en": "Example: Average Word Length by Letter\n> avglens = sc.textFile(file) \\\n   .flatMap(lambda line: line.split()) \\\n   .map(lambda word: (word[0], len(word)))\n\n\n\n\n                   RDD       RDD                RDD\n        DFS:\n        mydat\n        a\n\n\n\n                                   Jaemin Yoo         18", "kr": "<b>단계 3 (map)</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">.map(lambda word: (word[0], len(word)))</pre>• 각 단어 → (첫 글자, 길이)", "summary": "<p><b>3️⃣ map — 단어를 (글자, 길이) 쌍으로</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">.map(lambda word: (word[0], len(word)))</pre><p><b>🔍 하는 일</b></p><ul><li>각 단어 w에서 (w[0], len(w)) pair 생성</li><li>1:1 매핑 — 입력 1개 → 출력 1개</li></ul><p><b>🍎 예시</b><br>\"Hello\" → (\"H\", 5)<br>\"world\" → (\"w\", 5)<br>\"Spark\" → (\"S\", 5)</p><p><b>⚡ Narrow dependency</b></p><p><b>💡 map vs flatMap</b></p><ul><li>map: 1:1 (정확히 1개 출력)</li><li>flatMap: 1:N (0개 이상)</li></ul>"}, "19": {"en": "Example: Average Word Length by Letter\n> avglens = sc.textFile(file) \\\n   .flatMap(lambda line: line.split()) \\\n   .map(lambda word: (word[0], len(word))) \\\n   .groupByKey()\n\n\n\n\n                   RDD       RDD                RDD\n                                                      RDD\n        DFS:\n        mydat\n        a\n\n\n\n                                   Jaemin Yoo               19", "kr": "<b>단계 4 (groupByKey)</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">.groupByKey()</pre>• 같은 첫 글자끼리 길이들 모음 (shuffle 발생!)", "summary": "<p><b>4️⃣ groupByKey — 같은 글자끼리 모으기 ⭐</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">.groupByKey()</pre><p><b>🔍 하는 일</b></p><ul><li>같은 key (첫 글자)끼리 values(길이들) 리스트로 그룹핑</li><li>(key, [v1, v2, v3, ...]) 형태</li></ul><p><b>🍎 예시</b><br>(\"a\", 5), (\"a\", 3), (\"b\", 4), (\"b\", 6)<br>→ (\"a\", [5, 3]), (\"b\", [4, 6])</p><p><b>🚨 Wide dependency! (느림)</b><br>같은 key가 여러 파티션에 분산됨 → <b>shuffle</b> (네트워크 이동) 필요. <b>비용 큼.</b></p><p><b>📝 시험 T/F 단골</b>: \"groupByKey는 wide\" → <b>TRUE</b>.</p>"}, "20": {"en": "Example: Average Word Length by Letter\n> avglens = sc.textFile(file) \\\n   .flatMap(lambda line: line.split()) \\\n   .map(lambda word: (word[0], len(word))) \\\n   .groupByKey() \\\n   .map(lambda (k, values): \\\n     (k, sum(values) / len(values)))\n\n\n                   RDD       RDD                RDD\n                                                      RDD   RDD\n        DFS:\n        mydat\n        a\n\n\n\n                                   Jaemin Yoo                     20", "kr": "<b>단계 5 (평균 계산)</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">.map(lambda (k, values): \\\n    (k, sum(values) / len(values)))</pre>• 각 (글자, lengths) → (글자, 평균)", "summary": "<p><b>5️⃣ 평균 계산 — 최종 단계</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">.map(lambda (k, values):\n    (k, sum(values) / len(values)))</pre><p><b>🔍 하는 일</b></p><ul><li>각 (key, values) → (key, 평균) 변환</li><li>1:1 map (narrow)</li></ul><p><b>🍎 결과</b><br>(\"a\", [5, 3]) → (\"a\", 4.0)<br>(\"b\", [4, 6]) → (\"b\", 5.0)</p><p><b>⚡ 전체 파이프라인 완성!</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:11px\">avglens = sc.textFile(file) \\\n  .flatMap(lambda line: line.split()) \\\n  .map(lambda w: (w[0], len(w))) \\\n  .groupByKey() \\\n  .map(lambda (k, vs): (k, sum(vs)/len(vs)))</pre><p>아직 action 없음 → <b>아직 실행 안 됨</b>. <code>.collect()</code>나 <code>.save()</code> 호출해야 시작.</p>"}, "21": {"en": "Example: Average Word Length by Letter\n• Wide dependency (slow; shuffling)\n  • When each partition is depended on by multiple child partitions.\n• Narrow dependency (fast; pipelining)\n  • When each partition is used by at                     Wide      Narrow\n    most one partition of the child RDD.               dependency dependency\n\n\n                   RDD        RDD                RDD\n                                                                RDD       RDD\n       DFS:\n       mydat\n       a\n\n\n\n                                    Jaemin Yoo                                  21", "kr": "<b>Wide vs Narrow Dependency</b><br>• <b>Wide (느림, shuffling):</b> 한 파티션이 여러 child 파티션에 의해 의존됨<br>• <b>Narrow (빠름, pipelining):</b> 각 파티션이 child RDD의 최대 1개 파티션에만 사용됨", "summary": "<p><b>⭐⭐⭐ Wide vs Narrow — 시험 최고 단골</b></p><p><b>🎯 정의</b></p><ul><li><b>Narrow:</b> 각 input 파티션이 <b>단 1개</b>의 output 파티션에만 사용됨<br>→ 파티션 독립, 셔플 X, 빠름, pipelining 가능</li><li><b>Wide:</b> 한 input 파티션이 <b>여러</b> output 파티션에 영향<br>→ 셔플 발생, 느림</li></ul><p><b>📋 분류</b></p><table style=\"font-size:12px\"><tr><th>Narrow (빠름)</th><th>Wide (느림)</th></tr><tr><td>map, flatMap, filter, union</td><td>groupByKey, reduceByKey, join, distinct, sortByKey</td></tr></table><p><b>💡 핵심 직관</b><br>\"결과를 만들려고 <b>다른 파티션 데이터 봐야 함</b>? → Wide. 아니면 Narrow.\"</p><p><b>📝 T/F 함정</b></p><ul><li>\"flatMap은 wide\" → <b>FALSE</b> (narrow!)</li><li>\"sort는 wide\" → <b>TRUE</b></li><li>\"groupByKey는 narrow\" → <b>FALSE</b> (wide!)</li></ul>"}, "22": {"en": "FlatMap\n• Transformation that applies a function to every element.\n• Same as MapReduce’s Map, but has no restriction on the type.\n   • Maps any object into a list of 0 or more objects.\n• All the lists are flattened into a single RDD of output objects.\n                    > avglens = sc.textFile(file) \\\n                       .flatMap(lambda line: line.split()) \\\n                       .map(lambda word: (word[0], len(word))) \\\n                       .groupByKey() \\\n                       .map(lambda (k, values): \\\n                         (k, sum(values) / len(values)))\n\n\n\n\n                                       Jaemin Yoo                    22", "kr": "<b>FlatMap</b><br>• 모든 element에 함수 적용하는 transformation<br>• MapReduce의 Map과 같지만 <b>타입 제약 없음</b><br>• 모든 객체를 0+ 객체 리스트로 매핑", "summary": "<p><b>🔧 FlatMap 자세히</b></p><p><b>💡 정의</b><br>각 element에 함수 적용 → <b>리스트</b> 반환 → 모든 리스트를 <b>flatten</b> (1차원화).</p><p><b>🎯 MapReduce의 Map과 관계</b></p><ul><li>MapReduce Map = Spark flatMap (이름 다름!)</li><li>MapReduce Map도 1개 입력에 여러 출력 가능했으니까</li></ul><p><b>🍎 예시</b><br>Input: [[1,2,3], [4,5]]<br>After flatMap(identity): [1,2,3,4,5]</p><p><b>⚡ Narrow dependency</b> — 출력 개수가 많아도 각 출력은 단일 입력 파티션에서 옴.</p>"}, "23": {"en": "Map\n• Stricter version of the FlatMap transformation.\n• Forces to create exactly one object from each input element.\n  • No flattening operation is applied.\n  • System has better control for the resource management.\n\n                  > avglens = sc.textFile(file) \\\n                     .flatMap(lambda line: line.split()) \\\n                     .map(lambda word: (word[0], len(word))) \\\n                     .groupByKey() \\\n                     .map(lambda (k, values): \\\n                       (k, sum(values) / len(values)))\n\n\n\n\n                                     Jaemin Yoo                  23", "kr": "<b>Map</b><br>• FlatMap의 더 엄격한 버전<br>• 각 input에서 <b>정확히 하나</b>의 object 생성<br>• flatten 불필요<br>• 시스템의 자원 관리 개선", "summary": "<p><b>🔧 Map 자세히</b></p><p><b>💡 정의</b><br>각 element → <b>정확히 1개</b> element로 변환. flatten X.</p><p><b>🎯 flatMap과 차이</b></p><ul><li>map: 1:1 (입력 1개 → 출력 정확히 1개)</li><li>flatMap: 1:N (입력 1개 → 출력 0개 이상)</li></ul><p><b>💡 왜 map을 flatMap 대신?</b><br>\"출력이 정확히 1개\"를 <b>시스템이 알면</b> 메모리 배분·스케줄링 더 효율. 출력 수 미리 알 수 있으니까.</p><p><b>🍎 예시</b><br>Input: [1,2,3]<br>After map(x → x²): [1,4,9]</p><p><b>⚡ Narrow dependency</b></p>"}, "24": {"en": "Filter\n• Takes a predicate that applies to the RDD object type.\n• Returns elements that satisfy the predicate.\n• Better be applied as early as possible to reduce the RDD’s size.\n\n                > avglens = sc.textFile(file) \\\n                   .flatMap(lambda line: line.split()) \\\n                   .filter(lambda word: word not in stoplist) \\\n                   .map(lambda word: (word[0], len(word))) \\\n                   .groupByKey() \\\n                   .map(lambda (k, values): \\\n                     (k, sum(values) / len(values)))\n\n\n\n                                     Jaemin Yoo                      24", "kr": "<b>Filter</b><br>• predicate를 RDD object 타입에 적용<br>• predicate 만족하는 element 반환<br>• <b>가능한 일찍 적용</b>해서 RDD 크기 줄이는 게 좋음", "summary": "<p><b>🔧 Filter</b></p><p><b>💡 정의</b><br>predicate (조건 함수) 주어지면, 조건 만족하는 element만 유지.</p><p><b>🍎 예시</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">rdd = [1, 2, 3, 4, 5]\nrdd.filter(lambda x: x > 2) → [3, 4, 5]</pre></p><p><b>⚡ Narrow dependency</b></p><p><b>💡 최적화 팁</b><br><b>Filter를 가능한 일찍 적용</b>:</p><ul><li>이후 연산 데이터 양 감소</li><li>메모리·CPU 절약</li><li>Spark가 lazy evaluation으로 <b>자동으로 순서 최적화</b>하기도 함</li></ul>"}, "25": {"en": "Reduce\n• Action (not transformation) that returns a value instead of an RDD.\n• Takes parameter that is a function of type 𝑉, 𝑉 ⇒ 𝑉.\n   • The function is repeatedly applied on pairs of elements in any order.\n   • Each pair reduces to one element, and we are left with only one.\n   • The function should be associative and commutative (e.g., addition).\n\n                   > avglens = sc.textFile(file) \\\n                      .flatMap(lambda line: line.split()) \\\n                      .map(lambda word: len(word)) \\\n                      .reduce(lambda a, b: a + b)\n\n\n\n\n                                      Jaemin Yoo                             25", "kr": "<b>Reduce (Action)</b><br>• Transformation이 아닌 <b>Action</b>: RDD 대신 값 반환<br>• 함수 타입: (V, V) ⇒ V<br>• <b>associative + commutative</b>이어야", "summary": "<p><b>⚡ Reduce — Action (Transformation 아님!)</b></p><p><b>💡 정의</b><br>RDD의 모든 element를 <b>하나의 값으로 집계</b>. Action이라 실제 계산 트리거.</p><p><b>📐 함수 타입:</b> <code>(V, V) ⇒ V</code></p><p><b>🍎 예시</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">rdd = [1, 2, 3, 4]\nrdd.reduce(lambda a, b: a + b) → 10</pre></p><p><b>🔑 조건 (MapReduce의 Combiner와 동일)</b><br>함수가 <b>commutative + associative</b>여야:</p><ul><li>Spark가 임의 순서·병렬로 결합해도 결과 같아야</li><li>예: sum, max, min — OK</li><li>예: subtraction — NO (associative 아님)</li></ul><p><b>⚠️ 주의: Spark Reduce ≠ MapReduce Reduce</b></p><ul><li>MapReduce Reduce = (k, [v1,...]) → (k, v) (Spark의 reduceByKey에 해당)</li><li>Spark Reduce = 전체 RDD → 단일 값 (Action!)</li></ul>"}, "26": {"en": "Join\n• Transformation that merges two RDDs of key-value pairs.\n  • They should have the same key types.\n  • For each pair 𝑘, 𝑥 and 𝑘, 𝑦 , it creates (𝑘, 𝑥, 𝑦 ).\n• Creates a wide dependency.\n\n                   > x = sc.parallelize([(\"a\", 1), (\"b\", 4)])\n                   > y = sc.parallelize([(\"a\", 2), (\"a\", 3)])\n                   > x.join(y).collect()\n                   [('a', (1, 2)), ('a', (1, 3))]\n\n\n\n\n                                      Jaemin Yoo                26", "kr": "<b>Join (Transformation)</b><br>• 두 key-value RDD를 merge<br>• (k, x)와 (k, y) pair → (k, (x, y))<br>• <b>Wide dependency</b> 생성", "summary": "<p><b>🔗 Join — Wide Transformation</b></p><p><b>💡 정의</b><br>두 key-value RDD를 같은 key로 합침. SQL inner join과 동일.</p><p><b>📐 공식</b><br>(k, x) ∈ RDD1, (k, y) ∈ RDD2 → (k, (x, y))</p><p><b>🍎 예시 (2021 Final Q2 기출 유형)</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">x = sc.parallelize([(\"a\",1), (\"b\",4)])\ny = sc.parallelize([(\"a\",2), (\"a\",3)])\nx.join(y).collect()\n# [(\"a\",(1,2)), (\"a\",(1,3))]</pre></p><p><b>🚨 Wide dependency</b><br>같은 key가 두 RDD의 다른 파티션에 흩어져 있으므로 shuffle 필수. 느림.</p>"}, "27": {"en": "GroupByKey\n• Transformation that is the same as MapReduce’s group-by-keys.\n  • Takes an RDD of key-value pairs.\n  • Produces an RDD of key-“value list” pairs.\n• Creates a wide dependency.\n                  > avglens = sc.textFile(file) \\\n                     .flatMap(lambda line: line.split()) \\\n                     .map(lambda word: (word[0], len(word))) \\\n                     .groupByKey() \\\n                     .map(lambda (k, values): \\\n                       (k, sum(values) / len(values)))\n\n\n\n\n                                     Jaemin Yoo                   27", "kr": "<b>GroupByKey</b><br>• MapReduce의 group-by-keys와 동일<br>• 입력: key-value RDD / 출력: key-value_list RDD<br>• <b>Wide dependency</b> 생성", "summary": "<p><b>🔗 GroupByKey</b></p><p><b>💡 정의</b><br>MapReduce의 Group by Key 단계와 동일. Spark에서도 제공.</p><p><b>📐 동작</b><br>[(k1, v1), (k1, v2), (k2, v3)] → [(k1, [v1, v2]), (k2, [v3])]</p><p><b>🚨 Wide dependency (shuffle 큼)</b></p><p><b>⚡ 더 나은 대안: reduceByKey</b><br>\"groupByKey 후 reduce\" 패턴이면 <b>항상 reduceByKey 쓰기</b>. Spark가 local에서 partial reduce 먼저 해서 shuffle 양 감소 (MapReduce의 combiner처럼).</p><p><b>📝 기출 유형 (2021 Final Q2)</b><br>word count를 <code>reduceByKey</code>로 쓰기 빈칸 채우기 문제.</p>"}, "28": {"en": "Wide vs. Narrow Dependencies\n• Q1: Can FlatMap create multiple partitions from one?\n  • A: Yes, it is a one-to-many function.\n• Q2: Then, does it have a wide dependency?\n  • A: No, each partition in R1 still comes from only one partition.\n\n                                      R0           R1\n\n                       DFS:\n                       mydata\n\n\n\n\n                                    Jaemin Yoo                         28", "kr": "<b>Wide vs Narrow Dependencies 질문</b><br>• Q1: FlatMap이 한 파티션에서 여러 파티션 생성 가능?<br>  • A: Yes<br>• Q2: 그럼 wide dependency인가?<br>  • <b>A: No</b>, R1의 각 파티션은 R0의 단 1개 파티션에서만 옴", "summary": "<p><b>🎓 Wide vs Narrow — 흔한 오해 정리</b></p><p><b>Q1: flatMap은 여러 파티션 생성 가능?</b><br>A: 그렇다 (1:N 매핑이니까)</p><p><b>Q2: 그럼 flatMap은 wide?</b><br><b>A: 아니! 여전히 narrow.</b></p><p><b>💡 왜?</b><br>\"Wide/Narrow\"는 <b>출력 파티션 수</b>가 아니라 <b>입력 파티션 의존성</b> 문제:</p><ul><li>R1의 각 파티션이 <b>R0의 단 1개 파티션에서만</b> 만들어지면 → Narrow</li><li>R1의 각 파티션이 <b>R0의 여러 파티션</b>을 봐야 만들어지면 → Wide</li></ul><p>flatMap: 한 입력 파티션이 여러 출력 파티션 생성해도, 각 출력 파티션은 여전히 <b>한 입력 파티션만</b> 참조. 그래서 <b>Narrow</b>.</p><p><b>📝 시험 T/F 핵심 함정:</b><br>\"flatMap creates wide dependency\" → <b>FALSE</b></p>"}, "29": {"en": "Pop Quiz\n• There are many other transformations and actions on Spark.\n• E.g., reduceByKey(func) is like groupByKey(), but also applies a\n  reduce function func of the form 𝑉, 𝑉 ⇒ 𝑉 on the values.\n   • Better than groupByKey() + reduce().\n• Problem: Implement word count using reduceByKey().\n\n\n\n\n                                Jaemin Yoo                           29", "kr": "<b>수업 퀴즈: reduceByKey로 Word Count</b><br>• reduceByKey(func) = groupByKey() + reduce(func) 같은 효과<br>• <b>groupByKey + reduce보다 유리</b> (시스템 최적화 여지↑)<br>• 문제: reduceByKey로 word count 구현", "summary": "<p><b>🧠 수업 퀴즈 — reduceByKey로 Word Count</b></p><p><b>📝 문제</b><br>MapReduce 스타일의 word count를 Spark의 reduceByKey로 구현.</p><p><b>✅ 정답</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">counts = sc.textFile(file) \\\n  .flatMap(lambda line: line.split()) \\\n  .map(lambda w: (w, 1)) \\\n  .reduceByKey(lambda a, b: a + b)</pre></p><p><b>🎯 왜 reduceByKey > groupByKey + reduce?</b></p><ul><li>groupByKey: 모든 (w, 1) 쌍을 shuffle. 데이터 많이 이동</li><li>reduceByKey: 각 파티션 내에서 <b>partial sum 먼저</b> 후 shuffle. Combiner 효과 자동</li></ul><p><b>📝 기출 단골 (2021 Final Q2)</b><br>이 패턴의 빈칸 채우기 문제.</p>"}, "30": {"en": "Outline\n1. Spark: Overview\n2. Spark: Operations\n3. Spark: Implementation\n\n\n\n\n                           Jaemin Yoo   30", "kr": "<b>목차 (3부)</b><br>1. Overview ✓<br>2. Operations ✓<br>3. <b>Implementation</b> ← 여기부터", "summary": "<p><b>🎯 3부 시작 — Implementation</b><br>Spark 내부 동작 2가지: <b>Lazy evaluation</b> + <b>Lineage</b>.</p><p>이 둘이 Spark fault-tolerance + 효율의 핵심.</p>"}, "31": {"en": "Spark Implementation\n• Similarities with MapReduce:\n  • RDD is divided into chunks, which are given to different nodes.\n  • Transformation on RDDs can be performed in parallel on chunks.\n• Two key improvements over MapReduce:\n  • Lazy evaluation of RDDs (for efficiency)\n  • Lineage for RDDs (for fault-resilience)\n\n\n\n\n                                    Jaemin Yoo                        31", "kr": "<b>Spark 구현</b><br>• <b>MapReduce와 유사점:</b><br>  • RDD를 chunk로 분할, 다른 노드에 할당<br>  • 각 chunk에 transformation 병렬 적용<br>• <b>MapReduce 대비 두 가지 개선:</b><br>  • <b>Lazy evaluation</b><br>  • <b>Lineage</b>", "summary": "<p><b>⭐ Spark의 2대 혁신</b></p><p><b>🤝 MapReduce와 유사</b></p><ul><li>RDD를 chunk로 분할</li><li>여러 노드에 분산</li><li>transformation 병렬 적용</li></ul><p><b>⚡ MapReduce 대비 개선 2가지 (★★★)</b></p><ol><li><b>Lazy evaluation</b> — 효율 (전체 DAG 최적화)</li><li><b>Lineage</b> — fault resilience (메모리 기반이라 디스크 대신 lineage로 복원)</li></ol><p>다음 슬라이드들에서 각각 자세히.</p>"}, "32": {"en": "Lazy Evaluation\n• Spark does not apply transformations until it is required to do so.\n   • E.g., storing an RDD to file system or returning a result to application.\n• Thanks to lazy evaluation, Spark can optimize execution plans.\n   • Can combine transformations, minimizing the number of passes.\n   • Can pass the result of a transformation in memory without using disk.\n\n                          R0           R1           R2\n\n          DFS:                                                   DFS:\n          mydata                                                 output\n\n\n\n\n                                      Jaemin Yoo                                 32", "kr": "<b>Lazy Evaluation</b><br>• Spark는 <b>필요할 때까지 transformation 적용 안 함</b><br>• 장점:<br>  • 실행 계획 최적화 가능<br>  • transformation 결합 → pass 수 최소화<br>  • transformation 결과를 메모리로 전달 (디스크 거치지 않음)", "summary": "<p><b>😴 Lazy Evaluation — 게으른 실행</b></p><p><b>💡 핵심 아이디어</b><br>\"transformation을 <b>바로 실행하지 않고 계획만 쌓음</b>. action 호출되어야 실제 계산.\"</p><p><b>🎯 왜 lazy가 좋은가</b></p><ol><li><b>전체 DAG 보고 최적화:</b><br>map 3개 연속 → 1번의 pass로 결합 가능. 중간 데이터 저장 불필요.</li><li><b>메모리 파이프라이닝:</b><br>중간 RDD를 디스크 거치지 않고 다음 연산의 메모리로 직접 전달. 디스크 I/O 줄임.</li><li><b>Filter를 먼저 적용:</b><br>후속 연산 데이터 양 감소.</li></ol><p><b>🍎 비유</b><br>요리사가 재료 손질을 <b>주문 들어올 때</b>만 하는 것. 미리 다 손질하면 재료 낭비.</p>"}, "33": {"en": "Lazy Evaluation Example\n• Count words that are not stop words in a document.\n  • Apply Flatmap to input RDD R0 to create (𝑤, 1) pairs in R1.\n  • Apply Filter to each chunk in R1 to produce R2.\n  • Only if R2 is stored in DFS (by Reduce action) then R1 and R2 are actually\n    produced and subsequently dropped after being used.\n\n                        R0           R1           R2\n\n         DFS:                                                  DFS:\n         mydata                                                output\n\n\n\n\n                                    Jaemin Yoo                                   33", "kr": "<b>Lazy Evaluation 예시</b><br>• 문서에서 stop word 아닌 단어 카운트<br>• R0 → FlatMap → R1 → Filter → R2<br>• R2가 DFS에 저장될 때만 실제 계산 발생", "summary": "<p><b>🎞️ Lazy Evaluation 구체 예시</b></p><p><b>📝 문제:</b> 문서에서 stop word 아닌 단어 카운트.</p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:11px\">R0 = sc.textFile(doc)           # 파일 RDD\nR1 = R0.flatMap(split)          # (w,1) 쌍\nR2 = R1.filter(not_stopword)    # stop word 제거\nR2.saveAsTextFile(output)        # 👈 이게 action!</pre><p><b>🎯 핵심 인사이트</b></p><ul><li><b>saveAsTextFile (action) 호출 직전까지:</b> R0, R1, R2는 \"계산 계획\"만 저장됨. 실제 데이터 X.</li><li><b>Action 호출 시:</b> Spark가 전체 DAG 보고 최적화. R1, R2는 <b>메모리에서 바로 흘러감</b>. 중간에 디스크 저장 X.</li><li><b>실행 끝나면:</b> R1, R2 바로 drop (더 안 쓰니까). 메모리 해제.</li></ul>"}, "34": {"en": "Resilience of RDDs\n• Spark records the lineage of every RDD for fault-resilience.\n   • Use it to re-create the RDD in case of the node failure.\n   • If R2 is lost, reconstruct from R1.\n   • If R1 is lost, reconstruct from R0.\n   • If R0 is lost, reconstruct from the file system.\n\n                         R0           R1           R2\n\n          DFS:                                                  DFS:\n          mydata                                                output\n\n\n\n\n                                     Jaemin Yoo                          34", "kr": "<b>RDD의 Resilience (Lineage)</b><br>• Spark는 각 RDD의 <b>lineage 기록</b><br>• 노드 실패 시 RDD 재생성 용도<br>• R2 유실 → R1에서 재구성<br>• R1 유실 → R0에서 재구성<br>• R0 유실 → 파일시스템에서 재구성", "summary": "<p><b>⭐⭐⭐ Lineage — Spark의 Fault Tolerance</b></p><p><b>💡 문제 의식</b><br>\"Spark는 메모리 기반이니까 노드 죽으면 메모리 날아감. 어떻게 복구?\"</p><p><b>🎯 해결: Lineage (계보)</b><br>\"각 RDD가 <b>어디서 왔는지(parent RDD)</b>를 기록. 날아가면 <b>lineage 따라 재계산</b>.\"</p><p><b>🔄 실제 복구 과정</b></p><ul><li>R2가 있던 노드 고장 → R2 chunk 일부 유실</li><li>Spark: \"R2는 R1.filter()로 만들어졌음\" (lineage 참조)</li><li>R1 chunk 있으면: R1에서 재계산</li><li>R1도 없으면: R0에서 다시 계산</li><li>R0도 없으면: DFS에서 읽기</li></ul><p><b>🎯 MapReduce와 차이</b><br>MR = 결과를 디스크에 저장해서 복구 가능.<br>Spark = 디스크 안 쓰고 <b>lineage 재계산</b>으로 복구.</p><p><b>💡 chunk 단위 복구</b><br>전체 RDD 아니라 <b>유실된 chunk만</b> 재계산. 효율적.</p>"}, "35": {"en": "Spark Programming Guide and Paper\n• To learn more about writing Spark applications, please read:\n   • https://spark.apache.org/docs/latest/rdd-programming-guide.html\n• (Optional) More technical details of Spark are in this paper:\n   • https://www.usenix.org/system/files/conference/nsdi12/nsdi12-\n     final138.pdf\n\n\n\n\n                                  Jaemin Yoo                           35", "kr": "<b>Spark 추가 학습 자료</b>", "summary": "<p><b>📚 추가 학습 리소스</b></p><ul><li>공식 RDD 가이드: spark.apache.org/docs/latest/rdd-programming-guide.html</li><li>Spark 논문 (NSDI 2012): usenix.org/system/files/conference/nsdi12/nsdi12-final138.pdf</li></ul><p>시험엔 안 나오지만, 과제 하다 막히면 공식 문서 첫 참조.</p>"}, "36": {"en": "MapReduce vs. Spark\n                MapReduce                           Spark\n\nSpeed           Faster than traditional systems     Much faster (100x) than MapReduce\n\nWritten in      Java                                Scala\n\n                                                    Batch / real-time / iterative /\nData Processing Batch processing\n                                                    interactive / graph\n\nEase of Use     Complex and lengthy                 Compact and easier than MapReduce\n\n                                                    Caches data in memory, enhancing\nCaching         No caching\n                                                    system performance\n\n\n\n                                       Jaemin Yoo                                       36", "kr": "<b>MapReduce vs Spark 비교표</b>", "summary": "<p><b>⭐ MapReduce vs Spark 비교 (암기 권장)</b></p><table style=\"font-size:11px\"><tr><th></th><th>MapReduce</th><th>Spark</th></tr><tr><td>속도</td><td>전통 대비 빠름</td><td><b>MR보다 100배</b></td></tr><tr><td>언어</td><td>Java</td><td>Scala (Python 지원)</td></tr><tr><td>처리</td><td>Batch only</td><td>Batch + iterative + 실시간 + graph</td></tr><tr><td>캐싱</td><td>없음</td><td><b>인메모리 캐싱</b></td></tr><tr><td>사용성</td><td>복잡·장황</td><td>간결·쉬움</td></tr></table><p><b>🎯 T/F 단골</b><br>\"Spark always beats MapReduce\" → <b>FALSE</b>. 메모리 초과 시 Spark 느릴 수 있음.</p>"}, "37": {"en": "When to Use What\n• MapReduce:\n  • Linear processing of large datasets.\n  • Simple tasks easily written as Map and Reduce.\n  • Offline, large-scale batch jobs\n• Spark:\n  • Fast and interactive data processing.\n  • Iterative and real-time jobs like machine learning.\n  • Especially when each node has sufficient memory.\n\n\n\n\n                                   Jaemin Yoo             37", "kr": "<b>언제 무엇을 쓸까</b><br>• <b>MapReduce:</b> 선형 처리, 단순 task, 오프라인 batch<br>• <b>Spark:</b> interactive, iterative (ML), 메모리 충분한 경우", "summary": "<p><b>🎯 언제 뭘 쓸까 (실무 가이드)</b></p><p><b>✅ MapReduce 사용</b></p><ul><li>대규모 데이터의 <b>선형 처리</b> (한 번 pass)</li><li>Map/Reduce로 자연스럽게 표현되는 <b>단순 task</b></li><li>오프라인 <b>대규모 batch job</b> (밤새 돌려도 OK)</li></ul><p><b>⚡ Spark 사용</b></p><ul><li><b>Interactive</b> 처리 (Jupyter/REPL)</li><li><b>Iterative</b> ML 알고리즘 (경사하강, k-means)</li><li><b>실시간</b> streaming</li><li>각 노드에 <b>메모리 충분</b>할 때 (그래야 캐싱 이점)</li></ul><p><b>⚠️ Spark 부적합</b><br>중간 데이터가 메모리 초과 → 메모리↔디스크 swap 발생 → MR보다 느려질 수 있음.</p>"}, "38": {"en": "Summary\n1. Spark: Overview\n  • Resilient distributed datasets (RDD)\n2. Spark: Operations\n  • Map, FlatMap, Filter, Reduce, Join, etc.\n3. Spark: Implementation\n  • Lazy evaluation\n  • Lineage of RDDs\n\n\n\n\n                                    Jaemin Yoo   38", "kr": "<b>요약</b><br>1. Spark Overview: RDD<br>2. Spark Operations: Map, FlatMap, Filter, Reduce, Join 등<br>3. Spark Implementation: Lazy evaluation, Lineage of RDDs", "summary": "<p><b>🎬 L3 마무리 — 시험 대비 체크</b></p><p><b>✅ 개념</b></p><ul><li><b>RDD</b> = 파티션, immutable, typed, 캐싱 가능</li><li><b>Transformation vs Action</b> — lazy vs 강제 실행</li><li><b>Wide vs Narrow</b> — shuffle 여부</li><li><b>Lazy evaluation</b> — 최적화 기회</li><li><b>Lineage</b> — fault recovery</li></ul><p><b>✅ 연산 분류</b></p><ul><li>Narrow: map, flatMap, filter, union</li><li>Wide: groupByKey, reduceByKey, join, sort, distinct</li><li>Action: count, collect, reduce, save</li></ul><p><b>⭐ 기출 출제 가능성</b></p><ul><li>T/F: Wide/Narrow 분류 (매년)</li><li>T/F: RDD immutable, lazy (자주)</li><li>코드 빈칸: reduceByKey / flatMapValues / join (2021 Final)</li></ul>"}}, "4": {"1": {"en": "Frequent Itemsets 1\n   Introduction to Data Mining\n    Seoul National University\n          Spring 2026\n\n\n\n\n             Jaemin Yoo          1", "kr": "<b>Frequent Itemsets 1</b><br>서울대 · 2026 봄 · Jaemin Yoo", "summary": "<p><b>🎬 L4 시작 — Frequent Itemsets</b><br>\"쇼핑 장바구니에서 <b>함께 자주 등장하는 아이템 집합</b> 찾기.\" 이게 데이터마이닝의 고전 문제.</p><p><b>⭐ 시험 포인트</b></p><ul><li>Support / Confidence / Interest 공식 (★★★)</li><li>Maximal vs Closed (★★)</li><li>Triangular matrix vs Triples (p<1/3) (★★)</li><li>A-Priori monotonicity + 2-pass (★★★)</li><li>Ck ↔ Lk 파이프라인 (★★★)</li></ul>"}, "2": {"en": "Recap: Spark\n• Spark generalizes MapReduce with a DAG of operations.\n  • Data abstraction: Resilient distributed datasets (RDDs).\n  • Operations: Transformations (e.g., map) and actions (e.g., reduce).\n  • Two improvements: Lazy evaluation and the lineage of RDDs.\n\n                       R0           R1          R2\n\n         DFS:                                               DFS:\n         mydata                                             output\n\n\n\n\n                                   Jaemin Yoo                             2", "kr": "<b>복습: Spark</b><br>• DAG 기반 MapReduce 일반화<br>• 데이터 추상화: RDD<br>• 연산: Transformation / Action<br>• 개선: Lazy evaluation + Lineage", "summary": "<p><b>🔙 L3 한 장 요약</b></p><ul><li>Spark = DAG로 일반화된 MapReduce</li><li>핵심 추상: RDD (immutable, 파티션, 캐싱)</li><li>Transformation(lazy) vs Action(실행 트리거)</li><li>Lineage로 fault recovery</li></ul><p><b>💡 이어서:</b> L4는 \"알고리즘\"이 아니라 \"<b>문제 정의 + 기초 알고리즘</b>\". Spark 위에서 돌릴 수 있는 구체 사례.</p>"}, "3": {"en": "Outline\n1. Frequent Itemsets\n2. Association Rules\n3. Finding Frequent Pairs\n4. A-Priori Algorithm\n\n\n\n\n                            Jaemin Yoo   3", "kr": "<b>목차</b><ol><li>Frequent Itemsets</li><li>Association Rules</li><li>Finding Frequent Pairs</li><li>A-Priori Algorithm</li></ol>", "summary": "<p><b>🗺️ L4의 4부 구성</b></p><ol><li><b>Frequent Itemsets</b> — \"자주 함께 등장\"이 뭔지 정의</li><li><b>Association Rules</b> — \"I를 사면 J도 살 가능성\" rule 추출</li><li><b>Finding Frequent Pairs</b> — 핵심은 pair (메모리 병목)</li><li><b>A-Priori</b> — monotonicity로 메모리 절약하는 2-pass 알고리즘</li></ol>"}, "4": {"en": "Managing a Supermarket\n• In a supermarket, the manager wants to find patterns of items.\n• If the dataset is huge, it will take forever to do it manually.\n\n\n\n\n           Source: Wikimedia Commons                Source: Needpix.com\n\n\n\n                                       Jaemin Yoo                         4", "kr": "<b>슈퍼마켓 관리 예시</b><br>• 매니저가 아이템 패턴 찾고 싶음<br>• 데이터 거대 → 수동으론 영원히 안 끝남", "summary": "<p><b>🛒 동기부여 — 왜 이 문제를 푸는가?</b></p><p><b>📝 시나리오</b><br>당신이 슈퍼마켓 매니저. \"어떤 상품들이 자주 함께 팔릴까?\"를 알면:</p><ul><li>나란히 진열 → 매출 증가</li><li>묶음 할인 기획</li><li>재고 관리 최적화</li></ul><p><b>🚨 문제</b><br>Walmart 같은 곳: <b>하루 수천만 영수증</b>. 사람이 눈으로 못 봄. → 알고리즘 필요.</p>"}, "5": {"en": "Association Rule Discovery\n• Goal: Identify items that are bought together by many customers.\n• Approach: Process sales data to find dependencies among items.\n• A classic rule:\n  • If someone buys diaper and milk, then he/she is likely to buy beer.\n  • Don’t be surprised if you find six-packs next to diapers!\n• Association rules: People who bought 𝑥, 𝑦 tend to buy 𝑧, 𝑣 .\n\n\n\n\n                                    Jaemin Yoo                            5", "kr": "<b>Association Rule Discovery</b><br>• 목표: 많은 고객이 함께 사는 아이템 식별<br>• 방법: 판매 데이터에서 의존성 찾기<br>• 전설적 rule: 기저귀 + 우유를 사면 → 맥주도 살 가능성 높음<br>• <b>Association rule:</b> {x, y} 산 사람이 {z, v}도 살 경향", "summary": "<p><b>🍺 전설의 \"기저귀 + 맥주\" 사례</b></p><p><b>📖 이야기</b><br>Walmart 데이터 분석 중 발견: \"금요일 저녁 <b>기저귀 사는 남성이 맥주도 같이 살 확률이 높다</b>.\" 해석: 아내가 기저귀 심부름 시키자 남편이 기분풀이로 맥주 추가.</p><p><b>💡 Association Rule 정의</b><br>\"{x, y}를 산 사람은 {z, v}도 살 가능성이 높다\" — 즉, 특정 itemset이 있으면 다른 itemset도 같이 등장.</p><p><b>⚠️ 주의</b><br>상관 ≠ 인과. \"기저귀가 맥주를 유발\"하는 건 아님. 단지 <b>통계적으로 같이 등장</b>할 뿐.</p>"}, "6": {"en": "The Market-Basket Model\n• Market-basket model is a many-to-many mapping between:\n  • A large set of items (e.g., things sold in a supermarket)\n  • A large set of baskets (e.g., things a customer buys at one time)\n     • Each basket is a small subset of items.\n\n\n\n\n                                  Source: Stanford CS246 (2022)\n\n\n\n                                           Jaemin Yoo                   6", "kr": "<b>Market-Basket Model</b><br>• items 대 baskets의 many-to-many 매핑<br>  • items: 가게에서 파는 것들<br>  • baskets: 한 번에 고객이 사는 것들<br>  • 각 basket은 items의 작은 subset", "summary": "<p><b>⭐⭐⭐ Market-Basket Model — 이 분야 핵심 추상화</b></p><p><b>💡 정의</b></p><ul><li><b>Items</b> = 가게에서 파는 상품들 (전체 집합 I)</li><li><b>Baskets</b> = 한 번에 산 items의 <b>subset</b> (영수증 하나)</li><li>\"items 대 baskets의 many-to-many 매핑\"</li></ul><p><b>🍎 예시</b><br>Items = {우유, 빵, 계란, 치즈, ...} (1000개)<br>Basket1 = {우유, 빵} (작은 subset)<br>Basket2 = {우유, 치즈, 계란}</p><p><b>🎯 핵심 가정</b><br>\"basket은 작지만 basket <b>개수</b>와 item <b>개수</b>가 많다.\" (하루 수백만 영수증 × 수만 상품)</p>"}, "7": {"en": "Frequent Itemsets\n• Goal: Find sets of items that appear together frequently.\n• Support for itemset 𝐼: # of baskets containing all elements in 𝐼.\n   • Given a support threshold 𝑠,\n   • Itemset 𝐼 is a frequent itemset if it appears at least in 𝑠 baskets.\n\n\n\n\n                                                              Support of {Beer, Bread} is 2\n\n\n\n                 Source: Stanford CS246 (2022)\n\n                                                 Jaemin Yoo                                   7", "kr": "<b>Frequent Itemsets 정의</b><br>• 목표: 함께 자주 등장하는 items 집합 찾기<br>• <b>Support(I)</b> = I의 모든 원소를 포함하는 basket 수<br>• support threshold s 주어지면<br>• itemset I는 support ≥ s면 <b>frequent</b>", "summary": "<p><b>⭐ Support + Frequent — 기본 용어</b></p><p><b>📐 Support 정의</b><br><code>Support(I) = I의 모든 원소를 포함하는 basket의 개수</code></p><p><b>🍎 예시</b><br>I = {우유, 빵}<br>10,000개 basket 중 3,000개가 둘 다 포함<br>→ Support({우유, 빵}) = <b>3,000</b></p><p><b>🎯 Frequent Itemset</b><br>threshold s가 주어지면:</p><ul><li>Support(I) ≥ s → I는 <b>frequent</b></li><li>Support(I) < s → infrequent (버림)</li></ul><p><b>📝 주의</b><br>Support는 <b>count (개수)</b>이지 <b>확률이나 비율 아님</b>. (논문·책마다 다르게 정의하기도 함 주의.)</p>"}, "8": {"en": "Example\n• Items = {milk, coke, pepsi, beer, juice}\n• Support threshold = 3 baskets\n      B1 = {m, c, b}     B2 = {m, p, j}\n      B3 = {m, b}        B4 = {c, j}\n      B5 = {m, p, b}     B6 = {m, c, b, j}\n      B7 = {c, b, j}     B8 = {b, c}\n\n\n\n\n                                 Jaemin Yoo   8", "kr": "<b>예제 설정</b><br>Items = {milk(m), coke(c), pepsi(p), beer(b), juice(j)}, s = 3<br>B1={m,c,b}, B2={m,p,j}, B3={m,b}, B4={c,j}, B5={m,p,b}, B6={m,c,b,j}, B7={c,b,j}, B8={b,c}", "summary": "<p><b>🎯 수업 전체에서 쓸 8-basket 예제</b></p><p>Items: m=milk, c=coke, p=pepsi, b=beer, j=juice</p><p><b>📋 8개 basket</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">B1 = {m,c,b}      B5 = {m,p,b}\nB2 = {m,p,j}      B6 = {m,c,b,j}\nB3 = {m,b}        B7 = {c,b,j}\nB4 = {c,j}        B8 = {b,c}</pre><p>Threshold <b>s = 3</b>.</p><p><b>💡 실습 권장</b><br>이 예제를 종이에 쓰고 다음 슬라이드 보기 전에 직접 support 세보기. 감각 잡는 데 최고.</p>"}, "9": {"en": "Example\n• Items = {milk, coke, pepsi, beer, juice}\n• Support threshold = 3 baskets\n      B1 = {m, c, b}        B2 = {m, p, j}\n      B3 = {m, b}           B4 = {c, j}\n      B5 = {m, p, b}        B6 = {m, c, b, j}\n      B7 = {c, b, j}        B8 = {b, c}\n• Frequent itemsets:\n      {m}, {c}, {b}, {j}, {m, b}, {b, c}, {c, j}\n\n\n                                      Jaemin Yoo   9", "kr": "<b>Frequent Itemsets 계산</b><br>• Support: m=5, c=5, p=2, b=6, j=4<br>• Frequent (≥3): <b>{m}, {c}, {b}, {j}, {m,b}, {b,c}, {c,j}</b><br>• Pepsi는 infrequent (support 2)", "summary": "<p><b>✅ 예제 답</b></p><p><b>1️⃣ Singleton support</b></p><ul><li>m(milk): 5 ✓</li><li>c(coke): 5 ✓</li><li>p(pepsi): 2 ✗ (제거)</li><li>b(beer): 6 ✓</li><li>j(juice): 4 ✓</li></ul><p><b>2️⃣ Frequent pair (≥3)</b></p><ul><li>{m,b}: B1,B3,B5,B6 → 4 ✓</li><li>{b,c}: B1,B6,B7,B8 → 4 ✓</li><li>{c,j}: B4,B6,B7 → 3 ✓</li></ul><p><b>3️⃣ Frequent triple?</b><br>{m,b,c}: B1, B6 → 2 ✗. 더 이상 없음.</p><p><b>🎯 최종 Frequent</b>: <b>{m}, {c}, {b}, {j}, {m,b}, {b,c}, {c,j}</b></p><p><b>💡 관찰</b><br>Pepsi 포함 어떤 itemset도 frequent 아님. (monotonicity 미리보기!)</p>"}, "10": {"en": "Market-Basket Model as Abstract\n• Market-basket model is an abstract of various data.\n   • Topic discovery: items = words; baskets = documents\n• Items do not have to be “in” baskets!\n   • As long as a dataset is a many-to-many mapping.\n   • Plagiarism: items = documents; baskets = sentences\n   • Biomarkers: items = drugs; baskets = patients         Source: Study.com\n\n\n\n\n                                  Jaemin Yoo                               10", "kr": "<b>Market-Basket 모델의 추상화 응용</b><br>• Topic discovery: items = 단어, baskets = 문서<br>• <b>많은 many-to-many 매핑에 적용 가능:</b><br>  • Plagiarism: items = 문서, baskets = 문장<br>  • Biomarkers: items = 약물, baskets = 환자", "summary": "<p><b>🌐 Market-Basket은 retail만이 아니다</b></p><p><b>💡 핵심 통찰</b><br>\"items ↔ baskets의 many-to-many 매핑\"이 있으면 <b>어디든</b> 적용 가능.</p><p><b>🎯 응용 사례</b></p><table style=\"font-size:12px\"><tr><th>영역</th><th>items</th><th>baskets</th></tr><tr><td>Topic discovery</td><td>단어</td><td>문서</td></tr><tr><td>Plagiarism (표절)</td><td>문서</td><td>문장</td></tr><tr><td>Biomarkers (의학)</td><td>약/증상</td><td>환자</td></tr><tr><td>웹 분석</td><td>웹페이지</td><td>사용자 세션</td></tr></table><p><b>📝 T/F 함정 단골</b><br>\"Market-basket model only applies to supermarkets\" → <b>FALSE</b>. 일반 추상 모델.</p>"}, "11": {"en": "Outline\n1. Frequent Itemsets\n2. Association Rules\n3. Finding Frequent Pairs\n4. A-Priori Algorithm\n\n\n\n\n                            Jaemin Yoo   11", "kr": "<b>목차 (2부)</b><br>1. Frequent Itemsets ✓<br>2. <b>Association Rules</b> ← 여기부터<br>3. Finding Frequent Pairs<br>4. A-Priori Algorithm", "summary": "<p><b>🎯 2부 시작 — Association Rules</b></p><p>Frequent itemset은 \"자주 같이 등장하는 아이템\"만 알려줌. 더 유용한 건 <b>방향성 있는 rule</b>:<br>\"{기저귀, 우유}를 산 사람은 → 맥주를 살 가능성이 얼마?\"</p><p><b>도구: Support, Confidence, Interest</b></p>"}, "12": {"en": "Association Rules\n• Given Itemsets 𝐼 and 𝐽,\n• Find an association rule 𝐼 → 𝐽 such that if a basket contains all of\n  the items in 𝐼, then it is likely to contain 𝐽 as well.\n   • 𝐼 ∩ 𝐽 = ∅ is assumed by default.\n     B1 = {m, c, b}       B2 = {m, p, j}\n     B3 = {m, b}          B4 = {c, j}\n     B5 = {m, p, b}       B6 = {m, c, b, j}\n     B7 = {c, b, j}       B8 = {b, c}\n\n     Association rule: {m, b} → c\n\n                                     Jaemin Yoo                      12", "kr": "<b>Association Rule 정의</b><br>• Itemset I, J에 대해<br>• Rule <b>I → J</b>: basket이 I의 모든 item을 포함하면, J도 포함할 가능성<br>  • 기본 가정: I ∩ J = ∅<br>• 예: {m, b} → c", "summary": "<p><b>⭐ Association Rule — 정의</b></p><p><b>📐 표기: I → J</b><br>\"basket이 I의 모든 item을 포함하면, J도 포함할 <b>가능성</b>이 있다.\"</p><p><b>🔑 제약</b><br>I ∩ J = ∅ (겹치는 item 없음)</p><p><b>🍎 예</b><br>{milk, beer} → coke<br>의미: \"우유랑 맥주 산 사람이 콜라도 살 가능성?\"</p><p><b>⚠️ 중요한 주의</b><br>이건 <b>통계적 패턴</b>이지 <b>인과(causation)</b>가 아님. \"우유 + 맥주 때문에 콜라 산다\"가 아님.</p>"}, "13": {"en": "Support\n• Q: How can we decide if an association rule is significant?\n• Support of 𝐼 → 𝐽 is defined to be the support of 𝐼 ∪ 𝐽.\n   • support 𝐼 → 𝐽 = support 𝐼 ∪ 𝐽 .\n   • Higher support is better, as in frequent itemsets.\n     B1 = {m, c, b}        B2 = {m, p, j}          Support({m, b, c}): 2\n     B3 = {m, b}           B4 = {c, j}\n     B5 = {m, p, b}        B6 = {m, c, b, j}\n     B7 = {c, b, j}        B8 = {b, c}\n\n     Association rule: {m, b} → c\n\n                                      Jaemin Yoo                           13", "kr": "<b>Support (for rule)</b><br>• I → J의 support = support(I ∪ J)<br>• 높을수록 좋음 (frequent itemset과 동일)<br>• 예: {m,b}→c의 support = support({m,b,c}) = 2", "summary": "<p><b>⭐ Rule의 Support</b></p><p><b>📐 공식</b><br><code>Support(I → J) = Support(I ∪ J)</code></p><p>즉, rule 양변을 합친 전체 itemset의 support.</p><p><b>🍎 예 (8-basket 예제)</b><br>{m, b} → c의 support = support({m, b, c})<br>= {m,b,c}를 포함하는 basket 수 = <b>2</b> (B1, B6)</p><p><b>💡 직관</b><br>\"rule이 얼마나 자주 적용 가능한가?\" — 양변 모두 등장하는 basket이 많아야 rule이 의미 있음.</p>"}, "14": {"en": "Confidence\n• Q: How can we decide if an association rule is significant?\n• Confidence of 𝐼 → 𝐽 = the probability of 𝐽 given 𝐼 in a basket.\n   • conf 𝐼 → 𝐽 = 𝑃 𝐽 𝐼 = P(𝐼 ∪ 𝐽) / P(𝐼)\n   • conf 𝐼 → 𝐽 = support(𝐼 ∪ 𝐽) / support(𝐼)\n     B1 = {m, c, b}       B2 = {m, p, j}          Support({m, b, c}): 2\n     B3 = {m, b}          B4 = {c, j}             Support({m, b}): 4\n     B5 = {m, p, b}       B6 = {m, c, b, j}       Confidence: 2/4 = 0.5\n     B7 = {c, b, j}       B8 = {b, c}\n\n     Association rule: {m, b} → c\n\n                                     Jaemin Yoo                           14", "kr": "<b>Confidence</b><br>• conf(I → J) = P(J | I) = P(I∪J) / P(I) = support(I∪J) / support(I)<br>• 예: {m,b}→c → 2/4 = <b>0.5</b>", "summary": "<p><b>⭐⭐⭐ Confidence — 필수 암기</b></p><p><b>📐 공식</b><br><code>conf(I → J) = support(I ∪ J) / support(I)</code></p><p>조건부 확률 P(J | I) 추정치.</p><p><b>🍎 예 (8-basket)</b><br>{m, b} → c의 confidence:</p><ul><li>support({m, b, c}) = 2</li><li>support({m, b}) = 4 (B1, B3, B5, B6)</li><li>conf = 2/4 = <b>0.5</b></li></ul><p><b>💡 해석</b><br>\"m,b를 산 사람 중 50%가 c도 샀다.\"</p><p><b>🎯 Rule \"정확도\"의 의미</b><br>confidence 높을수록 rule 신뢰도↑. 하지만 한계 있음 (다음 슬라이드 interest).</p>"}, "15": {"en": "Interest\n• Not all high-confidence rules are interesting.\n   • The rule 𝑋 → milk will have high confidence if milk is purchased a lot.\n• Interest of 𝐼 → 𝐽 = conf 𝐼 → 𝐽 − 𝑃 𝐽 = 𝑃 𝐽 𝐼 − 𝑃 𝐽 .\n   • 𝑃 𝐽 : Fraction of baskets containing 𝐽 in the dataset.\n     B1 = {m, c, b}        B2 = {m, p, j}          Support({m, b, c}): 2\n     B3 = {m, b}           B4 = {c, j}             Support({m, b}): 4\n     B5 = {m, p, b}        B6 = {m, c, b, j}       Confidence: 2/4 = 0.5\n     B7 = {c, b, j}        B8 = {b, c}             Interest : 0.5 - 5/8 = -1/8\n                                                   (negative value?)\n     Association rule: {m, b} → c\n\n                                      Jaemin Yoo                                 15", "kr": "<b>Interest (관심도)</b><br>• 모든 높은 confidence rule이 의미 있는 건 아님<br>  • 예: X → milk는 milk가 원래 많이 팔리면 항상 높음<br>• <b>Interest(I→J) = conf(I→J) − P(J) = P(J|I) − P(J)</b><br>• 예: {m,b}→c → 0.5 − 5/8 = <b>−1/8</b> (음수!)", "summary": "<p><b>⭐⭐⭐ Interest — 필수 암기</b></p><p><b>🚨 왜 Confidence만으론 부족?</b><br>\"X → milk\"에서, milk가 80% basket에 있다면 <b>X와 무관하게</b> conf가 80%. 하지만 rule은 쓸모없음. → \"milk는 그냥 많이 팔림\"을 알려줄 뿐.</p><p><b>📐 Interest 공식</b><br><code>Interest(I → J) = conf(I → J) − P(J)</code><br>= P(J | I) − P(J)</p><p>\"J를 산 확률이 I 때문에 <b>얼마나 증가했나</b>?\"</p><p><b>🍎 예 (8-basket)</b><br>{m, b} → c:</p><ul><li>conf = 0.5</li><li>P(c) = support(c) / 총 basket = 5/8</li><li>Interest = 0.5 − 5/8 = <b>−0.125</b></li></ul><p><b>💡 음수 해석</b><br>m,b를 사면 c를 살 확률이 <b>평균보다 오히려 낮아짐</b> → 음의 상관. 의미 있는 발견!</p><p><b>📝 핵심</b><br>Interest는 절댓값 중요: |I| 크면 (+든 -든) 의미. 0 근처면 rule 무의미.</p>"}, "16": {"en": "Mining Association Rules\n• Goal: Find all rules with support ≥ 𝑠 and confidence ≥ 𝑐.\n   • Interest is a relative measure, not very suitable as a threshold.\n• Difficult part: Finding the frequent itemsets.\n   • Identifying association rules is easy if we have frequent itemsets.\n   • We will study the easy part first.\n\n\n\n\n                                      Jaemin Yoo                           16", "kr": "<b>Association Rule Mining</b><br>• 목표: support ≥ s AND confidence ≥ c인 모든 rule 찾기<br>  • Interest는 상대 measure, threshold로 부적합<br>• 어려운 부분: <b>frequent itemset 찾기</b><br>• frequent itemset만 있으면 rule 생성은 쉬움", "summary": "<p><b>⭐ Mining 목표 정의</b></p><p><b>📐 조건</b><br>\"support ≥ s <b>AND</b> confidence ≥ c\"인 모든 rule 찾기.</p><p><b>🤔 Interest는 왜 threshold 안 씀?</b><br>Interest는 <b>상대적 measure</b> (음수 가능). threshold 정하기 애매. 그래서 일반적으로 <b>후처리(post-filter)</b>로 활용.</p><p><b>⭐⭐⭐ 핵심 통찰</b><br>\"<b>어려운 부분은 frequent itemset 찾기</b>. Rule 생성은 쉽다.\"</p><p><b>💡 왜?</b></p><ul><li>frequent itemset들만 있으면 각각을 I/J로 쪼개 rule 만들고 conf 계산 → 끝</li><li>반면 frequent itemset 찾기: 수억 개 candidate 중 탐색 → 메모리·pass 폭발</li></ul><p><b>🎯 그래서 L4 나머지와 L5 전체는 \"itemset 찾기\" 알고리즘 집중.</b></p>"}, "17": {"en": "Mining Association Rules\n• Step 1: Find all frequent itemsets 𝐼 (will explain this later).\n• Step 2: For every subset 𝐴 ⊂ 𝐼, generate a rule 𝐴 → 𝐼 ∖ 𝐴.\n   • Version 1: Compute the confidence of every possible rule.\n      • conf 𝑎, 𝑏 → 𝑐, 𝑑    = support 𝑎, 𝑏, 𝑐, 𝑑     / support 𝑎, 𝑏 .\n   • Version 2: Eliminate stronger rules by starting from weaker ones.\n      • If 𝑎, 𝑏, 𝑐 → 𝑑 is below confidence, then so is 𝑎, 𝑏 → 𝑐, 𝑑 .\n   • Output the rules above the confidence threshold.\n\n\n\n\n                                        Jaemin Yoo                       17", "kr": "<b>Mining 절차</b><br>• <b>Step 1:</b> 모든 frequent itemset I 찾기 (나중에 설명)<br>• <b>Step 2:</b> 각 subset A ⊂ I 에 대해 rule A → I\\A 생성<br>  • V1: 모든 가능 rule의 confidence 계산<br>  • V2: 약한 rule부터 시작, 강한 rule 제거 (pruning)<br>  • conf threshold 이상인 rule 출력", "summary": "<p><b>📋 2-Step 알고리즘</b></p><p><b>Step 1: Frequent Itemset 찾기</b><br>support ≥ s인 모든 itemset I 수집. (← L4 나머지 + L5 주제)</p><p><b>Step 2: Rule 생성</b></p><ul><li>각 frequent I에 대해, subset A ⊂ I 선택</li><li>Rule A → I\\A 생성</li><li>conf 계산 → threshold 통과하면 출력</li></ul><p><b>🎯 Step 2의 두 가지 방식</b></p><ol><li><b>V1 (무식한 방법):</b> 모든 가능 rule conf 계산</li><li><b>V2 (pruning):</b> A가 작은 것부터 시작. A → I\\A의 conf가 낮으면, A⊂A'인 더 작은 A'으로의 rule도 낮다 (이건 틀림. A가 커지면 conf 증가 경향) — 실제론 \"conf가 A 커질수록 증가\" 성질로 pruning.</li></ol><p><b>💡 핵심</b><br>Step 1이 전부. Step 2는 subset 열거에 불과.</p>"}, "18": {"en": "Mining Association Rules\n• Example\n  • Support threshold 𝑠 = 3\n  • Confidence threshold 𝑐 = 3/4\n\n     B1 = {m, c, b}      B2 = {m, p, j}         1. Frequent itemsets:\n     B3 = {m, c, b, n}   B4 = {c, j}            {b,m}, {b,c}, {c,m}, {c,j}, {m,c,b}\n     B5 = {m, p, b}      B6 = {m, c, b, j}\n     B7 = {c, b, j}      B8 = {b, c}\n\n\n\n\n                                   Jaemin Yoo                                   18", "kr": "<b>예제 (s=3, c=3/4)</b><br>baskets 주어짐.<br>1. Frequent itemsets: <b>{b,m}, {b,c}, {c,m}, {c,j}, {m,c,b}</b>", "summary": "<p><b>🎯 예제 실행 1단계</b></p><p><b>📝 설정</b><br>s = 3, confidence threshold c = 3/4</p><p><b>✅ Step 1 결과: Frequent Itemsets</b></p><ul><li>singleton: {m}, {c}, {b}, {j}</li><li>pair: {b,m}, {b,c}, {c,m}, {c,j}</li><li>triple: {m,c,b}</li></ul><p><b>💡 주의</b><br>{m,c}는 frequent인가? m=5, c=5, 둘 다 등장: B1, B6 → 2. <b>frequent 아님</b>. (자료 슬라이드 기준)</p><p><b>🎯 다음 단계</b><br>각 frequent itemset에서 rule 생성 → confidence 계산 → threshold 통과한 rule만 출력.</p>"}, "19": {"en": "Mining Association Rules\n• Example\n  • Support threshold 𝑠 = 3                     1. Frequent itemsets:\n  • Confidence threshold 𝑐 = 3/4                {b,m}, {b,c}, {c,m}, {c,j}, {m,c,b}\n\n     B1 = {m, c, b}      B2 = {m, p, j}         2. Generated rules:\n     B3 = {m, c, b, n}   B4 = {c, j}            {b, c} → m: conf = 3/5\n     B5 = {m, p, b}      B6 = {m, c, b, j}      {b, m} → c: conf = 3/4\n     B7 = {c, b, j}      B8 = {b, c}            {m, c} → b: conf = 3/3\n                                                b → {c, m}: conf = 3/6\n                                                               …\n\n\n                                   Jaemin Yoo                                   19", "kr": "<b>예제 rule 생성</b><br>2. 생성된 rule들:<br>• {b,c} → m: conf = 3/5<br>• {b,m} → c: conf = <b>3/4</b> ✓ threshold!<br>• {m,c} → b: conf = 3/3 = 1 ✓<br>• b → {c,m}: conf = 3/6<br>• ...", "summary": "<p><b>🎯 예제 실행 2단계 — Rule 생성</b></p><p><b>📋 {m,c,b}에서 나오는 rule들</b></p><table style=\"font-size:11px\"><tr><th>Rule</th><th>Confidence</th><th>pass?</th></tr><tr><td>{b,c} → m</td><td>3/5 = 0.6</td><td>✗</td></tr><tr><td>{b,m} → c</td><td>3/4 = 0.75</td><td>✓</td></tr><tr><td>{m,c} → b</td><td>3/3 = 1.0</td><td>✓</td></tr><tr><td>b → {c,m}</td><td>3/6 = 0.5</td><td>✗</td></tr><tr><td>c → {b,m}</td><td>3/5 = 0.6</td><td>✗</td></tr><tr><td>m → {b,c}</td><td>3/5 = 0.6</td><td>✗</td></tr></table><p><b>💡 관찰</b><br>\"A가 클수록\" conf↑ 경향 (조건이 더 강해지니까). → pruning 단서.</p>"}, "20": {"en": "Mining Association Rules\n• Example\n  • Support threshold 𝑠 = 3                     1. Frequent itemsets:\n  • Confidence threshold 𝑐 = 3/4                {b,m}, {b,c}, {c,m}, {c,j}, {m,c,b}\n\n     B1 = {m, c, b}      B2 = {m, p, j}         2. Generated rules:\n     B3 = {m, c, b, n}   B4 = {c, j}            {b, c} → m: conf = 3/5\n     B5 = {m, p, b}      B6 = {m, c, b, j}      {b, m} → c: conf = 3/4\n     B7 = {c, b, j}      B8 = {b, c}            {m, c} → b: conf = 3/3\n                                                b → {c, m}: conf = 3/6\n                                                               …\n\n\n                                   Jaemin Yoo                                   20", "kr": "<b>예제 rule (계속)</b><br>3. 최종 (conf ≥ 3/4) 만족하는 rule만 유지.<br>{b,m}→c, {m,c}→b 가 통과", "summary": "<p><b>✅ 예제 최종 결과</b></p><p><b>🎯 c ≥ 3/4 통과한 rule</b></p><ol><li>{b, m} → c (conf 0.75)</li><li>{m, c} → b (conf 1.0)</li></ol><p><b>💡 의미</b></p><ul><li>\"맥주+우유 산 사람 75%는 콜라도 샀다\"</li><li>\"우유+콜라 산 사람 100%가 맥주도 샀다\"</li></ul><p>실무적으론 이 두 rule을 상품 진열·번들 판촉에 활용.</p>"}, "21": {"en": "Compacting the Output\n• Finding a million rules is not meaningful in practice.\n• Q: What can we do it other than adjusting the thresholds?\n• A: Post-process frequent itemsets before finding rules.\n   • Suppose that support 𝐴, 𝐵, 𝐶 = support 𝐴, 𝐵 .\n   • Then, we can safely remove 𝐴, 𝐵 from our candidates.\n   • conf 𝐴 → 𝐵, 𝐶 = conf 𝐴 → 𝐵\n   • conf 𝐵 → 𝐴, 𝐶 = conf 𝐵 → 𝐴\n\n\n\n\n                                  Jaemin Yoo                  21", "kr": "<b>출력 압축 (Compacting)</b><br>• 수백만 rule 찾아도 실용성 낮음<br>• <b>해법:</b> rule 찾기 전에 frequent itemset 후처리<br>• 예: support(A,B,C) = support(A,B)이면 {A,B} 제거 안전<br>  • conf(A → B,C) = conf(A → B)<br>  • conf(B → A,C) = conf(B → A)", "summary": "<p><b>📦 Output Compacting — 왜 필요?</b></p><p><b>🚨 문제</b><br>대용량 데이터에서 frequent itemset 수백만 개 → rule 수천만 개. 사람이 해석 못 함.</p><p><b>💡 해법</b><br>\"rule 만들기 전에 frequent itemset 중 <b>중복 정보</b>를 제거하자.\"</p><p><b>🍎 예시</b><br>support({A,B,C}) = support({A,B})이면:</p><ul><li>즉, {A,B} 포함 basket은 <b>모두</b> C도 포함</li><li>conf(A → B, C) = conf(A → B) — 정보 중복</li><li>→ {A,B}는 <b>안전하게 제거</b> 가능</li></ul><p><b>🎯 다음 슬라이드에서 Closed/Maximal 개념으로 형식화.</b></p>"}, "22": {"en": "Compacting the Output\n• We can retain only the closed / maximal frequent itemsets.\n• Closed itemsets:\n  • No immediate superset has the same support (> 0).\n  • Pros: Safe way to compact the output.\n  • Cons: Still numerous and complex to compute.\n• Maximal frequent itemsets:\n  • No immediate superset is frequent.\n  • Pros: Gives more pruning while being fast.\n  • Cons: Support details are missing.\n\n\n                                   Jaemin Yoo                  22", "kr": "<b>Closed vs Maximal Frequent Itemsets</b><br>• <b>Closed:</b> 즉시 superset 중 같은 support 없음<br>  • 장: 안전한 압축, support 정보 유지<br>  • 단: 여전히 많음<br>• <b>Maximal:</b> 즉시 superset 중 frequent 없음<br>  • 장: 더 공격적 pruning<br>  • 단: subset의 support 정보 손실", "summary": "<p><b>⭐⭐⭐ Closed vs Maximal — 시험 단골</b></p><p><b>📐 Closed Itemset</b><br>\"즉시 superset(바로 한 item 더한 것) 중 <b>같은 support</b>인 것이 없다.\"</p><ul><li>장점: <b>안전</b>. subset의 support 정보 유지</li><li>단점: 여전히 많음</li></ul><p><b>📐 Maximal Frequent Itemset</b><br>\"즉시 superset 중 <b>frequent인 것이 없다</b>.\" (즉, 더 확장하면 infrequent)</p><ul><li>장점: <b>더 공격적 pruning</b> — 수 훨씬 적음</li><li>단점: subset의 <b>세밀한 support 값 손실</b></li></ul><p><b>⭐ 핵심 관계</b><br>\"모든 Maximal ⇒ Closed. 역은 성립 X.\"</p><p><b>💡 T/F 함정 단골</b></p><ul><li>\"All maximal are closed\" → <b>TRUE</b></li><li>\"All closed are maximal\" → <b>FALSE</b></li></ul>"}, "23": {"en": "Example: Maximal / Closed Itemsets\n• Q: Why are maximal frequent itemsets not always better?\n• A: If you store only the maximal set {A,B,C}, you lose that:\n   • {A} is extremely common.\n   • {A,B} is moderately common.\n   • {A,B,C} is barely frequent.\n\n\n\n\n                                   Jaemin Yoo                    23", "kr": "<b>왜 Maximal이 항상 좋지 않나?</b><br>• {A,B,C}만 저장하면 다음 정보 손실:<br>  • {A}가 매우 흔함<br>  • {A,B}는 중간<br>  • {A,B,C}는 겨우 frequent<br>• subset들의 support 차이를 못 구별", "summary": "<p><b>🤔 Maximal의 함정</b></p><p><b>📝 시나리오</b><br>{A,B,C}가 maximal frequent (support 3).<br>이걸 저장하면 {A}, {A,B} 등도 \"frequent임\"은 알지만 <b>얼마나 frequent인지 모름</b>.</p><p><b>🎯 정보 손실 예</b></p><ul><li>support({A}) = 100 (매우 흔함)</li><li>support({A,B}) = 20 (중간)</li><li>support({A,B,C}) = 3 (겨우 threshold 통과)</li></ul><p>Maximal만 저장하면 이 <b>3-layer 정보 모두 사라짐</b>. 모두 \"3 이상\"이라는 것만 남음.</p><p><b>✅ Closed라면 보존</b><br>{A}, {A,B}의 support가 {A,B,C}와 다르다면 각각 closed로 남음 → 정보 유지.</p><p><b>💡 결론</b><br>Closed = 압축 + 무손실. Maximal = 최대 압축 + 손실. 트레이드오프!</p>"}, "24": {"en": "Example: Maximal / Closed Itemsets\n• Example (𝑠=3)\n\n           Support   Maximal            Closed\n  A        4         No                 No\n  B        5         No                 Yes      BC is freq.\n  C        3         No                 No       support(BC) = 3\n  AB       4         Yes                Yes      ABC is not freq.\n  AC       2         No                 No\n  BC       3         Yes                Yes      support(ABC) < 3\n  ABC      2         No                 Yes\n\n                               Jaemin Yoo                           24", "kr": "<b>Maximal/Closed 예제 (s=3)</b><table style=\"font-size:12px\"><tr><th>itemset</th><th>Support</th><th>Maximal</th><th>Closed</th></tr><tr><td>A</td><td>4</td><td>No</td><td>No</td></tr><tr><td>B</td><td>5</td><td>No</td><td>Yes</td></tr><tr><td>C</td><td>3</td><td>No</td><td>No</td></tr><tr><td>AB</td><td>4</td><td>Yes</td><td>Yes</td></tr><tr><td>AC</td><td>2</td><td>No</td><td>No</td></tr><tr><td>BC</td><td>3</td><td>Yes</td><td>Yes</td></tr><tr><td>ABC</td><td>2</td><td>No</td><td>Yes</td></tr></table>", "summary": "<p><b>🎯 Maximal/Closed 판정 실전</b></p><p><b>📐 판정 규칙</b></p><ul><li><b>Closed:</b> 즉시 superset과 support가 <b>다르면</b> Yes</li><li><b>Maximal:</b> 즉시 superset이 모두 <b>infrequent(s 미만)</b>면 Yes (즉 itemset 자체가 frequent여야 함)</li></ul><p><b>🔍 판정 예</b></p><ul><li><b>A (sup=4):</b> superset AB(4), AC(2), ABC(2). AB가 sup=4로 같음 → Closed=<b>No</b>. Maximal: AB,AC 모두 확인 — AB sup 4≥3 frequent이므로 <b>No</b></li><li><b>B (sup=5):</b> superset AB(4), BC(3) — 둘 다 sup ≠ 5 → Closed=<b>Yes</b>. Maximal: AB,BC frequent(≥3) → <b>No</b></li><li><b>AB (sup=4):</b> superset ABC(2) — sup 다름 → Closed=<b>Yes</b>. superset ABC infrequent(2<3) → Maximal=<b>Yes</b></li><li><b>ABC (sup=2):</b> infrequent이므로 maximal=<b>No</b>. Closed는 \"support 같은 superset 없음\"만 보므로, 자신의 superset 없거나 모두 다른 support → <b>Yes</b> (ABC는 최상위)</li></ul>"}, "25": {"en": "Pop Quiz\n• We have the following baskets with support threshold 𝑠 = 2:\n   B1 = {apple, butter, milk}\n   B2 = {apple, butter, banana, walnuts, milk}\n   B3 = {butter, milk, banana}\n   B4 = {apple, milk}\n• Q1. Compute the support for itemset {apple, butter}.\n• Q2. Compute the confidence for the rule {apple} -> {butter}.\n• Q3. Compute the interest of {apple} -> {butter}.\n• Q4. Is {apple, butter} maximal and/or closed?\n\n                                    Jaemin Yoo                   25", "kr": "<b>수업 퀴즈</b><br>s = 2. baskets: B1{a,b,m}, B2{a,b,bn,w,m}, B3{b,m,bn}, B4{a,m}<br>(a=apple, b=butter, m=milk, bn=banana, w=walnuts)<br>Q1: support({apple, butter})?<br>Q2: conf({apple}→{butter})?<br>Q3: interest({apple}→{butter})?<br>Q4: {apple, butter}는 maximal/closed?", "summary": "<p><b>🧠 수업 퀴즈 — 직접 풀기</b></p><p><b>📋 4-basket 상황</b><br>B1{a,b,m}, B2{a,b,bn,w,m}, B3{b,m,bn}, B4{a,m} (s=2)</p><p><b>✅ 풀이</b></p><ol><li><b>Q1: support({a,b})?</b><br>a,b 모두 포함: B1, B2 → <b>2</b></li><li><b>Q2: conf({a}→{b})?</b><br>= sup({a,b}) / sup({a}) = 2/3 ≈ <b>0.667</b><br>(sup(a) = B1,B2,B4 = 3)</li><li><b>Q3: interest({a}→{b})?</b><br>= conf − P(b) = 2/3 − 3/4 = <b>−1/12</b> (음수, 약한 음의 상관)<br>(sup(b) = B1,B2,B3 = 3, 총 basket 4)</li><li><b>Q4: {a,b} maximal/closed?</b><br>superset {a,b,m}: sup = B1,B2 = 2. 같음 → Closed=<b>No</b>. {a,b,bn}: sup = B2 = 1 < s. Maximal 판정엔 모든 즉시 superset이 infrequent여야. {a,b,m}이 frequent(2) → Maximal=<b>No</b></li></ol>"}, "26": {"en": "Outline\n1. Frequent Itemsets\n2. Association Rules\n3. Finding Frequent Pairs\n4. A-Priori Algorithm\n\n\n\n\n                            Jaemin Yoo   26", "kr": "<b>목차 (3부)</b><br>1. ✓ 2. ✓ 3. <b>Finding Frequent Pairs</b> ← 여기부터 4. A-Priori", "summary": "<p><b>🎯 3부 시작 — Finding Frequent Pairs</b></p><p>지금까지 \"정의\"였다면, 이제 <b>알고리즘</b>. 핵심 질문:</p><p><b>\"대용량 데이터에서 frequent pair를 어떻게 효율적으로 찾나?\"</b></p><p>→ 이게 L4 후반 + L5 전체의 주제.</p>"}, "27": {"en": "Representation of Market-Basket Data\n• Let’s go back to finding frequent itemsets.\n• Market-basket data is stored on disk basket-by-basket.\n   • Either in a DFS (baskets are objects in files) or as a file.\n• The data can be too large to fit in main memory.\n   • Baskets are small but we have many baskets and items.\n\n\n\n\n                                                                    Source: Stanford CS246 (2022)\n\n                                       Jaemin Yoo                                     27", "kr": "<b>Market-Basket Data 표현</b><br>• Frequent itemset 찾기로 돌아가자<br>• 데이터는 디스크에 basket-by-basket 저장 (DFS 또는 파일)<br>• 메모리에 다 안 들어갈 정도로 클 수 있음<br>• basket 자체는 작지만, basket과 item 수가 많음", "summary": "<p><b>🗄️ 기본 가정: Disk-based 처리</b></p><p><b>💡 데이터 저장 구조</b></p><ul><li>DFS 또는 대용량 파일에 <b>basket 하나씩 저장</b></li><li>메모리에 다 못 올림 (영수증 수억 개)</li></ul><p><b>📏 규모 감각</b></p><ul><li>basket 자체는 작음 (10~50 items 평균)</li><li>전체 basket 수: 수천만~수억</li><li>distinct item: 수만~수백만</li></ul><p><b>🎯 알고리즘 설계 제약</b><br>\"메모리에 다 못 올림 + 디스크 읽기 비쌈\" → pass 수 최소화가 목표.</p>"}, "28": {"en": "Computational Cost\n• The true cost of mining large data is usually # of disk I/Os.\n• In practice, association-rule algorithms read the data in passes.\n• We measure the cost by # of passes that an algorithm makes.\n\n\n\n\n                                Jaemin Yoo                            28", "kr": "<b>계산 비용</b><br>• 실제 비용 = <b>디스크 I/O 횟수</b><br>• Association rule 알고리즘은 데이터를 pass 단위로 읽음<br>• <b>비용 측정: # of passes</b>", "summary": "<p><b>⭐⭐⭐ 비용 측정 = Pass 수 (시험 단골)</b></p><p><b>💡 핵심 통찰</b><br>\"대용량 데이터에서 진짜 비용은 <b>알고리즘 복잡도(시간)가 아니라 디스크 I/O</b>.\"</p><p><b>🎯 왜?</b></p><ul><li>메모리 연산: 수 ns</li><li>디스크 읽기: 수 ms (수백만 배 느림)</li><li>전체 데이터 한 번 훑기 = 1 pass = 수십 분~수 시간</li></ul><p><b>📐 비용 = # of passes</b></p><p>알고리즘 평가 기준:</p><ul><li>A-Priori: <b>2 pass</b>로 frequent pair 찾음 (Pass1: singleton, Pass2: pair)</li><li>3-tuple까지: 3 pass</li><li>전체 k-tuple까지: k pass</li></ul><p><b>📝 T/F 단골</b><br>\"Frequent itemset mining cost is measured in time complexity\" → <b>FALSE</b>. pass 수!</p>"}, "29": {"en": "Main-Memory Bottleneck\n• Main memory is the issue for frequent-itemset algorithms.\n  • As we read baskets, we need to count something, e.g., item occurrences.\n  • The number of different things we can count is limited by main memory.\n  • Swapping counts in/out is a disaster.\n• Minor technique: We represent items simply by numbers.\n  • By consecutive integers from 1 to 𝑛 where 𝑛 is # of distinct items.\n  • We can construct a hash table that translates items to integers.\n\n\n\n\n                                    Jaemin Yoo                            29", "kr": "<b>메인 메모리 병목</b><br>• frequent-itemset 알고리즘의 핵심 이슈<br>  • basket 읽으며 item 발생 횟수 등을 카운트<br>  • 카운트 가능한 distinct 개수 = 메인 메모리 크기 한계<br>  • swap은 재앙<br>• <b>Minor 기법:</b> item을 숫자로 표현<br>  • 1..n (n = distinct item 수)<br>  • hash table로 i

ple below, sim 𝑆, 𝑇 = 3/8.\n\n\n\n                   S                             T\n\n\n\n\n                                Jaemin Yoo                             14", "kr": "<b>Jaccard Similarity</b><br>• 집합 유사도 = 교집합 / 합집합의 상대적 크기<br>• J(S, T) = |S ∩ T| / |S ∪ T|<br>• 예: J(S, T) = 3/8", "summary": "<p><b>⭐⭐⭐ Jaccard Similarity — 필수 공식</b></p><p><b>📐 정의</b><br><code>J(S, T) = |S ∩ T| / |S ∪ T|</code></p><p>집합의 겹침 비율. 값 범위: [0, 1].</p><p><b>🍎 예</b><br>S = {a, b, c, d, e}, T = {c, d, e, f, g, h}<br>S ∩ T = {c, d, e} (3개)<br>S ∪ T = {a, b, c, d, e, f, g, h} (8개)<br>J(S, T) = 3/8 = <b>0.375</b></p><p><b>💡 극단</b></p><ul><li>J = 0: 완전 disjoint</li><li>J = 1: 완전 동일</li></ul><p><b>🎯 이후 모든 논의의 기준</b><br>\"유사도 = Jaccard\" 전제. MinHash도 Jaccard 근사.</p>"}, "15": {"en": "Shingles as Tokens\n• Idea: Hash shingles to (say) 4-byte integers (called tokens).\n   • Document is now a set of bucket indices of the shingles.\n• Hashing 9-shingles to 4 bytes is better than using 4-shingles.\n   • Most sequences of 4 characters are not found in typical documents.\n      • # of distinct shingles ≪ 2!\"\n   • If we hash down 9-shingles to 4 bytes, almost all 4 bytes are used.\n\n\n\n\n                                       Jaemin Yoo                          15", "kr": "<b>Shingles as Tokens</b><br>• 아이디어: shingle을 <b>4바이트 integer (token)</b>로 해시<br>  • 문서 = shingle의 bucket index 집합<br>• <b>9-shingle을 4바이트로 해시</b>가 4-shingle 쓰기보다 나음<br>  • 대부분 4-char sequence는 일반 문서에 없음<br>    • distinct shingle 수 << 2^32<br>  • 9-shingle을 4바이트 해시 → 거의 모든 4바이트 활용", "summary": "<p><b>💡 실무 팁 — Shingle to Token</b></p><p><b>🎯 아이디어</b><br>긴 shingle 문자열 그대로 다루면 메모리 낭비. <b>해시해서 4바이트 integer</b>로 바꾸자.</p><p><b>📐 왜 9-shingle + 4바이트 해시가 4-shingle보다 나은가?</b></p><ul><li>4-shingle: 가능 조합 적음 (영문자 4자 ≈ 26⁴ = 45만), 실제 distinct는 더 적음 → 4바이트(2³²=40억) 공간의 <b>일부만</b> 사용</li><li>9-shingle: 가능 조합 방대 (26⁹ ≈ 5×10¹²), 실제 문서의 distinct 9-shingle도 많음 → 4바이트 공간 <b>골고루 활용</b></li></ul><p><b>💡 결론</b><br>\"큰 k + 작은 hash\"가 정보 손실 덜함.</p>"}, "16": {"en": "Matrix Representation of Sets\n• Characteristic matrix: Rows are elements, columns are sets.\n  • 1 is in row 𝑒 and column 𝑆 if and only if 𝑒 ∈ 𝑆.\n  • Jaccard similarity can be computed by the column similarity.\n  • Warning: Not the actual way how data is stored (due to sparsity).\n                Row\n                         Element          S1       S2   S3\n              (Token)\n                0       “The plane”        1       0    0\n\n                1       “The cow j”        0       0    1\n                                                             sim 𝑆# , 𝑆! = ?\n\n                2       “Alice and”        0       1    0\n\n                3       “Roses are”        1       0    1\n\n                                      Jaemin Yoo                               16", "kr": "<b>Characteristic Matrix</b><br>• row = element (token), column = set<br>• M[e][S] = 1 iff e ∈ S<br>• column 유사도로 Jaccard 계산<br>• <b>주의:</b> 실제 저장 안 함 (매우 sparse)<br><br>예:<table style=\"font-size:12px\"><tr><th>Row</th><th>Token</th><th>S1</th><th>S2</th><th>S3</th></tr><tr><td>0</td><td>\"The plane\"</td><td>1</td><td>0</td><td>0</td></tr><tr><td>1</td><td>\"The cow j\"</td><td>0</td><td>0</td><td>1</td></tr><tr><td>2</td><td>\"Alice and\"</td><td>0</td><td>1</td><td>0</td></tr><tr><td>3</td><td>\"Roses are\"</td><td>1</td><td>0</td><td>1</td></tr></table>", "summary": "<p><b>📊 Characteristic Matrix — 개념 표현</b></p><p><b>📐 정의</b></p><ul><li>Row = 가능한 모든 shingle/token</li><li>Column = 각 문서(set)</li><li>M[r][c] = 1 if shingle r ∈ document c</li></ul><p><b>🎯 column 유사도 = Jaccard</b><br>두 column이 \"같이 1\"인 비율 계산하면 Jaccard.</p><p><b>⚠️ 실제 저장 X</b><br>매우 sparse (대부분 0). 수십억 row × 수백만 col → 저장 불가. <b>개념적 도구</b>로만 사용.</p><p><b>💡 다음 단계: MinHash</b><br>이 거대 matrix를 <b>압축된 signature</b>로 대체.</p>"}, "17": {"en": "Outline\n1. Finding Similar Items\n2. Shingling\n3. Minhashing\n4. More on Minhashing\n\n\n\n\n                           Jaemin Yoo   17", "kr": "<b>목차 (3부)</b><br>1. ✓ 2. ✓ 3. <b>Minhashing</b> ← 여기부터 4. More", "summary": "<p><b>🎯 3부 시작 — MinHashing (오늘의 핵심)</b></p><p>MinHash는 <b>Jaccard를 근사하는 signature</b> 생성 기법. L6의 가장 중요한 부분이며 기출 단골.</p>"}, "18": {"en": "Similarity-Preserving Summaries of Sets\n• For millions of documents, the characteristic matrix is too large.\n• Goal: Replace each set by a signature (smaller representation).\n   • Compare signatures of two sets to estimate the Jaccard similarity.\n   • The larger the signatures, the more accurate the estimate.\n\n\n                                                                       Magnitude 6.8\n\n         Magnitude 6.8    [110, 70, 93]                [110, 70, 93]   earthquake ...\n\n         earthquake ...\n\n\n\n\n                                          Jaemin Yoo                                    18", "kr": "<b>유사도 보존 요약 (Signatures)</b><br>• 수백만 문서면 characteristic matrix 너무 큼<br>• 목표: 각 집합을 <b>signature (작은 표현)</b>로 대체<br>  • signature로 Jaccard 근사<br>  • signature 길수록 정확도↑", "summary": "<p><b>💡 Signature 동기</b></p><p><b>🚨 문제</b><br>Characteristic matrix는 너무 큼. 직접 비교 불가.</p><p><b>🎯 목표</b><br>\"각 문서를 <b>짧은 벡터(signature)</b>로 표현. signature 유사도가 원래 Jaccard를 근사하도록.\"</p><p><b>📐 특성</b></p><ul><li>signature 길이 n (예: 100-1000)</li><li>signature 길수록 정확도↑ (표본 수↑)</li></ul>"}, "19": {"en": "Minhashing\n• Minhashing creates signatures from the characteristic matrix.\n   • Applies several random permutations of the rows.\n   • For each permutation, the minhash value of each set (or column) is\n     defined as the index of the first row that has 1.\n• The result is a signature matrix.\n   • Columns are sets, and rows are minhash values.\n   • Normally much smaller than the characteristic matrix.\n\n\n\n\n                                   Jaemin Yoo                             19", "kr": "<b>MinHash 정의</b><br>• characteristic matrix에서 signature 생성<br>  • <b>여러 random permutation</b>을 row에 적용<br>  • 각 permutation에 대해, 각 set(column)의 <b>minhash 값</b>:<br>    • permuted 순서에서 <b>1이 나타나는 첫 row의 index</b><br>• 결과: <b>signature matrix</b> (col=set, row=minhash 값)<br>• 원본보다 훨씬 작음", "summary": "<p><b>⭐⭐⭐ MinHash — 핵심 정의</b></p><p><b>📐 정의</b><br>Random permutation π가 주어졌을 때, 집합 S의 <b>MinHash 값</b>:<br><code>h_π(S) = min{π(i) : i ∈ S}</code></p><p>즉, \"permutation 순서에서 S에 속한 element 중 <b>가장 먼저 나오는</b> 것의 index.\"</p><p><b>📋 Signature 만들기</b></p><ol><li>random permutation n개 선택: π₁, ..., π_n</li><li>각 π에 대해 각 column(문서)의 MinHash 값 계산</li><li>결과: n × d signature matrix (d = 문서 수)</li></ol><p><b>🍎 예</b><br>characteristic matrix의 어떤 문서 S의 column에서 \"1\"인 row가 [3, 7, 10]. permutation 적용 후 row 순서가 [7, 3, 10, ...]이면 첫 1은 row 7 → MinHash = 7 (또는 1번째 index).</p>"}, "20": {"en": "Example: Minhashing\n\n\n\n\n                Source: Stanford CS246 (2022)\n\n\n                         Jaemin Yoo             20", "kr": "<b>MinHash 예제 1</b><br>(Stanford CS246 슬라이드) characteristic matrix가 주어지고, 하나의 permutation을 적용한 후 signature 계산.", "summary": "<p><b>🎯 MinHash 예제 1단계</b></p><p><b>📋 과정</b></p><ol><li>characteristic matrix 주어짐 (row=shingle, col=doc)</li><li>random permutation π₁을 row에 적용 (row 순서 바뀜)</li><li>각 column별로 첫 1인 row 찾기 → signature 1st row</li></ol><p><b>💡 실습 권장</b><br>Stanford CS246 슬라이드의 matrix 하나 직접 종이에 그리고 손으로 계산. 시험 계산 문제에 직결.</p>"}, "21": {"en": "Example: Minhashing\n\n\n\n\n                Source: Stanford CS246 (2022)\n\n\n                         Jaemin Yoo             21", "kr": "<b>MinHash 예제 2</b><br>두 번째 permutation 적용. signature matrix에 두 번째 row 추가.", "summary": "<p><b>🎯 MinHash 예제 2단계</b></p><p><b>📋 과정</b></p><ol><li>두 번째 permutation π₂ 준비 (π₁과 독립)</li><li>같은 방식으로 각 column의 MinHash 값 계산</li><li>signature matrix에 <b>2번째 row</b> 추가</li></ol><p><b>💡 관찰</b><br>permutation마다 다른 결과 → signature의 각 row는 독립 시행.</p>"}, "22": {"en": "Example: Minhashing\n\n\n\n\n                Source: Stanford CS246 (2022)\n\n\n                         Jaemin Yoo             22", "kr": "<b>MinHash 예제 3</b><br>세 번째 permutation 적용. 최종 signature matrix 완성 (크기 = hash 함수 개수 × 문서 수).", "summary": "<p><b>🎯 MinHash 예제 3단계 (완성)</b></p><p><b>📋 결과</b></p><ul><li>Signature matrix 크기: n × d</li><li>n = permutation 수 (보통 100+)</li><li>d = 문서 수</li><li>각 column = 한 문서의 signature 벡터</li></ul><p><b>🎯 두 문서 signature 비교</b><br>같은 row의 값이 같은 비율 → Jaccard 추정치.</p><p><b>📐 다음 슬라이드의 증명</b>이 MinHash의 <b>왜 이게 작동하는지</b>를 설명.</p>"}, "23": {"en": "Subtle Point\n• People ask whether the minhash value should be:\n   • The original number of the row, or\n   • The number in the permuted order (as we did in our example).\n• Answer: It doesn’t matter.\n   • You only need to be consistent.\n   • Assure that two columns get the same value if and only if\n      • Their first 1’s in the permuted order are in the same row.\n\n\n\n\n                                           Jaemin Yoo                23", "kr": "<b>Subtle Point</b><br>• Q: minhash 값은 원본 row 번호? permuted 순서 번호?<br>• <b>A: 상관 없음. 일관성만 유지하면 됨</b><br>  • 두 column이 같은 값 ⇔ permuted 순서에서 첫 1이 같은 row", "summary": "<p><b>🤔 구현 디테일 — 미묘한 포인트</b></p><p><b>❓ 질문</b><br>\"MinHash 값은 <b>원본 row 번호</b>를 쓸까, 아니면 <b>permuted 순서의 번호</b>를 쓸까?\"</p><p><b>✅ 답: 상관 없다. 일관성만 유지.</b></p><p><b>💡 이유</b><br>핵심은 \"두 column의 MinHash가 같은가\"만 중요. 어느 번호 체계든 두 column이 같으면 같고, 다르면 다름. 원본이든 permuted이든 <b>두 column 비교 결과는 동일</b>.</p><p><b>🎯 보통 구현에선 원본 row 번호 사용</b><br>각 column이 \"첫 1\"인 원본 row 번호 저장. 비교 시 같은 번호면 일치.</p>"}, "24": {"en": "Minhashing and Jaccard Similarity\n• Surprising property:\n   • Probability that minhash values are same = Jaccard similarity of sets.\n• Proof:\n   • Given columns 𝑆! and 𝑆\", three classes of rows exist:\n      • Type X: 1 in both columns.\n      • Type Y: 1, 0 (or 0, 1) in columns.\n      • Type Z: 0 in both columns.\n   • If there are 𝑥 rows of Type X and 𝑦 rows of Type Y,\n      • sim 𝑆# , 𝑆\" = 𝑥/ 𝑥 + 𝑦 .\n      • Pr(ℎ 𝑆# = ℎ 𝑆\" ) = Pr meeting type X before type Y = 𝑥/ 𝑥 + 𝑦 .\n\n\n\n                                             Jaemin Yoo                       24", "kr": "<b>★ 핵심 항등식 증명</b><br>• <b>P(minhash 값 같음) = Jaccard 유사도</b><br>• 증명: 두 column S1, S2에서 3가지 row 타입 존재<br>  • Type X: 둘 다 1<br>  • Type Y: 1/0 (한쪽만)<br>  • Type Z: 둘 다 0<br>• x = X의 row 수, y = Y의 row 수<br>  • sim(S1, S2) = x/(x+y)<br>  • P(h(S1)=h(S2)) = P(Type X를 Type Y보다 먼저 만남) = x/(x+y)", "summary": "<p><b>⭐⭐⭐ 필수 증명 — 시험 단골!</b></p><p><b>🎯 주장</b><br><code>P(h_π(S1) = h_π(S2)) = J(S1, S2)</code></p><p>\"random permutation에서 두 집합의 MinHash가 같을 확률 = Jaccard.\"</p><p><b>📐 증명</b></p><p><b>Step 1:</b> 두 column의 row를 3 타입으로 분류:</p><ul><li><b>Type X:</b> 둘 다 1 (both in S1 ∩ S2)</li><li><b>Type Y:</b> 한쪽만 1 (in S1 △ S2 = 대칭차)</li><li><b>Type Z:</b> 둘 다 0 (in neither)</li></ul><p><b>Step 2:</b> Type Z row는 MinHash에 영향 없음 (첫 1 찾기에서 skip).</p><p><b>Step 3:</b> Random permutation 후 Type X, Y 중 <b>어느 것이 먼저</b> 오는가가 결정적.</p><ul><li>먼저 오는 게 <b>Type X</b> → 두 signature 모두 그 row 값 → 같음</li><li>먼저 오는 게 <b>Type Y</b> → 한쪽만 1 → 두 signature 값 다름</li></ul><p><b>Step 4:</b> X, Y row가 permutation의 맨 앞에 올 확률은 동등 uniform:<br>P(먼저 = X) = x / (x+y)</p><p><b>Step 5:</b> Jaccard 공식:<br>J(S1, S2) = |S1 ∩ S2| / |S1 ∪ S2| = x / (x + y)</p><p><b>✅ 결론</b><br>P(h = h) = x/(x+y) = J(S1, S2). QED.</p><p><b>📝 시험 대비</b><br>이 증명 단계별 암기 필수.</p>"}, "25": {"en": "Similarity of Signatures\n• The similarity of signatures is the fraction of the same rows.\n   • The expected similarity of two signatures equals\n   • The Jaccard similarity of the sets that the signatures represent.\n• The longer the signatures, the smaller will be the expected error.\n\n\n\n\n                                     Jaemin Yoo                          25", "kr": "<b>Signature 유사도</b><br>• signature의 유사도 = 같은 row의 비율<br>• signature 기대 유사도 = 원본 집합의 Jaccard<br>• <b>signature 길수록 예상 오차↓</b>", "summary": "<p><b>⭐ Signature 유사도 = Jaccard의 Unbiased Estimator</b></p><p><b>📐 Signature 유사도 정의</b><br>두 signature의 \"같은 row의 비율\":<br><code>sim(sig1, sig2) = (match row 수) / n</code></p><p><b>🎯 기댓값 = Jaccard</b><br>각 row가 match할 확률 = J(S1, S2) (증명 완료).<br>→ 평균적으로 signature 유사도 ≈ Jaccard.</p><p><b>📈 신뢰도 (Chebyshev/CLT)</b></p><ul><li>row n개: 분산 ∝ 1/n</li><li>표준오차 ∝ 1/√n</li><li>n=100이면 ±10% 정도, n=10,000이면 ±1%</li></ul><p><b>💡 실무</b><br>n = 100~1000 사이에서 타협. 메모리·정확도 trade-off.</p>"}, "26": {"en": "Example: Similarity\n\n\n\n\n                  Source: Stanford CS246 (2022)\n\n                           Jaemin Yoo             26", "kr": "<b>유사도 예제</b><br>(Stanford) 실제 signature matrix로 Jaccard 추정 계산. 큰 n에서 오차 작아짐.", "summary": "<p><b>🎯 Signature 유사도 수치 예제</b></p><p><b>📋 예시 흐름</b></p><ol><li>Signature matrix 주어짐 (n=3 row, 4 doc column)</li><li>각 pair (S1, S2), (S1, S3), ... 비교</li><li>\"같은 row 수\" / n = signature 유사도</li><li>실제 Jaccard와 비교해서 근사 정확도 확인</li></ol><p><b>💡 관찰</b><br>n 작으면 오차 큼. n 커질수록 Jaccard에 가까워짐.</p>"}, "27": {"en": "Outline\n1. Finding Similar Items\n2. Shingling\n3. Minhashing\n4. More on Minhashing\n\n\n\n\n                           Jaemin Yoo   27", "kr": "<b>목차 (4부)</b><br>1. ✓ 2. ✓ 3. ✓ 4. <b>More on Minhashing</b> ← 여기부터", "summary": "<p><b>🎯 4부 — MinHash 심화</b></p><p>이론은 끝. 여기서는 <b>실무 구현 + 변형</b>:</p><ul><li>어떻게 실제 구현? (permutation 직접 만들기 불가)</li><li>다른 signature 방식 (TF-IDF) 비교</li></ul>"}, "28": {"en": "Implementation of Minhashing\n• Explicit permutation is infeasible in a large characteristic matrix.\n   • Suppose 1 billion rows.\n• Idea to approximate permutation:\n   • Apply a random hash function ℎ to row indices 𝑟 = 1, … , 𝑛.\n   • Sort the rows in order of their hash values ℎ 𝑟 .\n   • The result is considered as random permutation.\n• Idea to implement:\n   • Create a “slot” matrix, and initialize all elements to ∞.\n   • Update each element as we encounter smaller values.\n\n\n                                     Jaemin Yoo                          28", "kr": "<b>MinHash 구현 (핵심)</b><br>• 명시적 permutation은 거대 matrix에서 불가능 (10억 row)<br>• <b>Permutation 근사 아이디어:</b><br>  • row index r = 1..n에 random hash 함수 h 적용<br>  • h(r) 값 순으로 row 정렬 → 이게 random permutation과 유사<br>• <b>구현:</b><br>  • \"slot\" matrix 만들고 모든 원소 ∞로 초기화<br>  • 더 작은 값 만나면 update", "summary": "<p><b>⭐ MinHash 구현 — Hash로 Permutation 시뮬레이션</b></p><p><b>🚨 문제</b><br>Row 10억 개의 permutation을 직접 만들기 = 10억 × 100 permutation 저장 불가.</p><p><b>💡 해결 아이디어</b><br>\"permutation 대신 <b>random hash function</b>. h(r) 값으로 row 순서 결정.\"</p><p><b>📋 구현 핵심</b></p><ol><li>n개 random hash function h_1, ..., h_n 선택</li><li>Slot matrix M[n][d] 전체 ∞로 초기화</li><li>각 row r, 각 column c: if matrix[r][c] = 1:<br>  각 hash h_i에 대해: if h_i(r) < M[i][c]: M[i][c] = h_i(r)</li></ol><p><b>🎯 효과</b></p><ul><li>permutation 저장 불필요 (hash는 on-the-fly)</li><li>Streaming 친화 (row 한 번만 스캔)</li><li>메모리 O(n × d), 시간 O(row × n)</li></ul>"}, "29": {"en": "Example: Implementation\n\n\n\n\n                Source: Stanford CS246 (2022)\n\n                         Jaemin Yoo             29", "kr": "<b>구현 예제</b><br>(Stanford 슬라이드) 실제 hash 값으로 signature 업데이트 과정 시각화.", "summary": "<p><b>🎯 구현 예제 추적</b></p><p><b>📋 시뮬레이션</b><br>Stanford CS246 슬라이드의 작은 예제 (row 5개, doc 3개, hash 2개) 따라가기:</p><ol><li>row 0: doc 1에 1 있음. h_1(0) = 1, h_2(0) = 3. M[1][1] = 1, M[2][1] = 3 (∞에서 update)</li><li>row 1: doc 2에 1 있음. h_1(1) = 4, h_2(1) = 2. M[1][2] = 4, M[2][2] = 2</li><li>... 계속</li></ol><p><b>💡 핵심 작업</b><br>\"if 1 있고 hash 값 작으면 min update.\" 매우 단순.</p>"}, "30": {"en": "Algorithm\n1. let 𝑇 be a characteristic matrix\n2. initialize a slot matrix 𝑀\n3. for each hash function ℎ$ and column 𝑐\n4.      𝑀 𝑖, 𝑐 ← ∞\n5. for each row 𝑟 and column 𝑐\n6.      if 𝑇 𝑟, 𝑐 = 1 then\n7.               for each hash function ℎ$\n8.                      if ℎ$ 𝑟 < 𝑀 𝑖, 𝑐 then\n9.                              𝑀 𝑖, 𝑐 ← ℎ$ 𝑟\n\n                                      Jaemin Yoo   30", "kr": "<b>MinHash 알고리즘 (의사코드)</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">1. T = characteristic matrix\n2. 초기화 slot matrix M\n3. for each hash h_i, col c:\n4.   M[i][c] ← ∞\n5. for each row r, col c:\n6.   if T[r][c] = 1 then\n7.     for each hash h_i:\n8.       if h_i(r) < M[i][c] then\n9.         M[i][c] ← h_i(r)</pre>", "summary": "<p><b>⭐⭐⭐ MinHash 알고리즘 — 암기 필수</b></p><p><b>📋 의사코드</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:11px\">Input: characteristic matrix T\nOutput: signature matrix M (n hashes × d docs)\n\n# Init\nfor each hash h_i, col c:\n    M[i][c] = ∞\n\n# Main loop\nfor each row r, col c:\n    if T[r][c] == 1:\n        for each hash h_i:\n            if h_i(r) < M[i][c]:\n                M[i][c] = h_i(r)</pre><p><b>💡 구조 분석</b></p><ul><li>3-중 loop: row × col × hash</li><li>각 반복: min update (if-check)</li><li>Streaming 가능: row 한 번만 보면 됨</li></ul><p><b>🎯 복잡도</b><br>O(|1 entries| × n). sparse이면 매우 효율.</p>"}, "31": {"en": "Pop Quiz\n• Quiz: Let’s compute the signature matrix in this case.\n                      Row       S1        S2        S3   g1: x + 1 mod 4   g2: 3x + 1 mod 4\n\n                       0        1         0         0          1                  1\n\n                       1        0         0         1          2                  0\n     Characteristic\n     matrix            2        0         1         0          3                  3\n\n                       3        1         0         1          0                  2\n\n\n                      Hash fn        S1        S2        S3\n     Signature\n     matrix             g1           ∞         ∞         ∞\n\n                        g2           ∞         ∞         ∞\n                                                                                              31", "kr": "<b>수업 퀴즈 (MinHash 계산)</b><br>characteristic matrix 주어짐 (4 row, 3 col S1/S2/S3), g1=x+1 mod 4, g2=3x+1 mod 4. signature matrix 계산하라.", "summary": "<p><b>🧠 수업 퀴즈 — MinHash 계산</b></p><p><b>📋 설정</b></p><ul><li>Matrix: 4 row, 3 col (S1, S2, S3)</li><li>Hash 1: g_1(x) = x + 1 mod 4</li><li>Hash 2: g_2(x) = 3x + 1 mod 4</li></ul><p><b>✅ 풀이 전략</b></p><ol><li>각 row r의 g_1, g_2 값 미리 계산</li><li>각 doc column 별로 \"1인 row들의 g 값 중 최솟값\" 찾기</li><li>signature의 i번째 row = i번째 hash 함수의 min</li></ol><p><b>💡 실전</b><br>의사코드대로 천천히 따라가기. 기출 계산 문제 스타일.</p>"}, "32": {"en": "Other Ways to Vectorize Documents\n• TF-IDF is a popular way to create (a different type of) signatures.\n   • Let 𝑀 be the number of unique words in the corpus.\n   • TF-IDF creates a length-𝑀 real-valued signature for each document.\n• The 𝑖-th element of signature for document 𝑘 is TF@A × IDF@ :\n   • TF$% = 𝑓$% / max 𝑓&% where 𝑓&% is the frequency of term 𝑡 in document 𝑘.\n                  &\n   • IDF$ = log(𝑁/𝑛$ ) where term 𝑖 appears in 𝑛$ of 𝑁 documents.\n\n\n\n\n                                     Jaemin Yoo                                 32", "kr": "<b>다른 vectorize 방법: TF-IDF</b><br>• TF-IDF도 signature 생성 (다른 타입)<br>• corpus의 unique word 수 M<br>• 각 문서 = 길이 M real-valued signature<br>• i번째 원소 = TF_ik × IDF_i<br>  • TF_ik = f_ik / max_t f_tk<br>  • IDF_i = log(N / n_i)", "summary": "<p><b>📊 TF-IDF — 또 다른 signature 방식</b></p><p><b>📐 정의</b></p><ul><li>Corpus에 distinct word M개</li><li>각 문서 = 길이 M real-valued 벡터</li><li>i번째 원소 = TF_ik × IDF_i</li></ul><p><b>📐 공식</b></p><ul><li>TF_ik = f_ik / max_t f_tk (word i의 문서 k 내 상대 빈도)</li><li>IDF_i = log(N / n_i) (rare word 강조)<br>- N: 전체 문서 수<br>- n_i: word i가 등장한 문서 수</li></ul><p><b>🍎 예</b><br>\"the\"는 모든 문서에 → IDF 낮음. \"quantum\"은 드묾 → IDF 높음. 문서에서 \"quantum\"이 많이 나오면 TF-IDF 큼.</p><p><b>💡 쓰임</b><br>고전 IR(정보검색), 검색 엔진, 문서 분류.</p>"}, "33": {"en": "Different Properties of Signatures\n• The minhashed signatures are integer vectors.\n  • We measure the similarity by # of the same integer elements.\n• The TF-IDF signatures are real-valued vectors.\n  • Two document signatures will not share any same elements.\n  • We measure the real-valued distance between signatures.\n  • Then, we need a different locality-sensitive hash function!\n\n\n\n\n                                  Jaemin Yoo                       33", "kr": "<b>Signature 타입별 차이</b><br>• <b>MinHash signature:</b> integer 벡터<br>  • 유사도 = 같은 integer 원소 비율<br>• <b>TF-IDF signature:</b> real-valued 벡터<br>  • 두 문서 signature가 같은 원소 공유 거의 없음<br>  • real-valued 거리로 측정<br>  • <b>다른 LSH 함수 필요!</b> (cosine 등)", "summary": "<p><b>⭐ MinHash vs TF-IDF — 비교</b></p><table style=\"font-size:11px\"><tr><th></th><th>MinHash</th><th>TF-IDF</th></tr><tr><td>값 타입</td><td>integer</td><td>real (실수)</td></tr><tr><td>유사도 측정</td><td>match 비율</td><td>cosine / Euclidean</td></tr><tr><td>기반</td><td>집합 (Jaccard)</td><td>빈도 가중</td></tr><tr><td>LSH 함수</td><td>signature match</td><td><b>random hyperplane</b></td></tr></table><p><b>💡 결론</b><br>\"Signature 타입에 따라 <b>LSH 함수도 달라야</b>.\" L7에서 각 경우 다룸.</p>"}, "34": {"en": "What are Good Signatures?\n• Recently, machine learning (ML) is used to create signatures.\n  • This topic is called representation learning.\n  • These signatures are more commonly called embeddings.\n  • All language models like ChatGPT work on embeddings.\n• ML is powerful, but LLMs are even more powerful.\n  • You may study natural language processing (NLP) more for this topic.\n\n\n\n\n                                   Jaemin Yoo                              34", "kr": "<b>무엇이 좋은 Signature인가?</b><br>• 최근: ML로 signature 생성<br>  • 이를 representation learning이라 부름<br>  • 더 흔히 <b>embedding</b>이라 함<br>  • ChatGPT 등 LLM이 embedding 기반<br>• ML 강력, LLM은 더 강력<br>• NLP 공부하면 더 깊이 가능", "summary": "<p><b>🚀 현대 트렌드 — Embedding</b></p><p><b>💡 흐름</b><br>MinHash, TF-IDF는 <b>고전 수동 설계</b> signature. 현대는 ML로 학습.</p><p><b>📐 용어</b></p><ul><li><b>Representation learning:</b> signature를 학습</li><li><b>Embedding:</b> 학습된 벡터 표현</li><li><b>Word2Vec, BERT, GPT:</b> word/sentence embedding</li></ul><p><b>🎯 LLM 기반</b><br>ChatGPT 등은 embedding 위에 구축. \"의미\"까지 포착 가능.</p><p><b>💡 이 강의 범위</b><br>Embedding은 다른 과목. 여기선 MinHash가 중심.</p>"}, "35": {"en": "Summary\n1. Finding Similar Items\n2. Shingling\n  • Jaccard similarity\n  • Characteristic matrix\n3. Minhashing\n  • Signature matrix\n  • Property of Minhashing\n4. More on Minhashing\n  • Simulating permutation\n\n\n                             Jaemin Yoo   35", "kr": "<b>요약</b><br>1. Finding Similar Items<br>2. Shingling — Jaccard similarity, characteristic matrix<br>3. Minhashing — signature matrix, 핵심 항등식<br>4. More on Minhashing — permutation 시뮬레이션", "summary": "<p><b>🎬 L6 마무리 — 시험 대비</b></p><p><b>✅ 공식 암기</b></p><ul><li>Jaccard: J(S,T) = |S∩T| / |S∪T|</li><li>MinHash: h_π(S) = min{π(i) : i ∈ S}</li><li>핵심 정리: P(h(S1) = h(S2)) = J(S1, S2)</li></ul><p><b>✅ 개념</b></p><ul><li>Shingling: 문서 → k-gram 집합</li><li>Characteristic matrix: sparse, 저장 안 함</li><li>Signature: 압축된 벡터. 길수록 정확</li><li>LSH 파이프라인: Shingling → MinHash → LSH</li></ul><p><b>✅ 구현</b></p><ul><li>Permutation 대신 random hash function</li><li>Slot matrix ∞ 초기화 후 min update</li><li>3-중 loop, streaming 가능</li></ul><p><b>⭐ 기출 예상</b></p><ul><li>증명: P = Jaccard (단계별 기술)</li><li>계산: characteristic matrix + hash 주어지고 signature 구하기</li><li>T/F: MinHash는 set similarity, TF-IDF는 frequency 기반 등</li></ul>"}}, "7": {"1": {"en": "Finding Similar Items 2\n     Introduction to Data Mining\n      Seoul National University\n            Spring 2026\n\n\n\n\n               Jaemin Yoo          1", "kr": "<b>Finding Similar Items 2</b><br>서울대 · 2026 봄 · Jaemin Yoo", "summary": "<p><b>🎬 L7 시작 — LSH 본격</b><br>L6에서 MinHash signature까지 만들었다. 이제 <b>pair 수</b>를 줄여 실제 비교 비용을 낮추는 LSH.</p><p><b>⭐ 시험 포인트</b></p><ul><li>S-curve 공식 유도 (★★★)</li><li>Threshold ≈ (1/b)^(1/r) (★★★)</li><li>거리 공리 4개 (★★)</li><li>AND/OR 공식 (★★)</li><li>Random Hyperplane for cosine (★★)</li></ul>"}, "2": {"en": "Announcements\n• Assignments:\n  • HW1 is posted (deadline: April 9).\n\n\n\n\n                                    Jaemin Yoo   2", "kr": "<b>공지</b><br>• HW1 게시됨 (마감: 4월 9일)", "summary": "<p><b>📢 HW1 마감 4월 9일</b></p>"}, "3": {"en": "Recap: Shingling and Minhashing\n• 𝑘-shingles (document as a set)\n• Jaccard similarity:\n  • sim 𝑆, 𝑇 = 𝑆 ∩ 𝑇 /|𝑆 ∪ 𝑇|\n• Minhashing:\n  • Pick a random permutation of rows.\n  • The minhash value is the first row that has 1.\n  • E.g., ℎ(𝑆!) = 0, ℎ(𝑆\") = 2, and ℎ(𝑆#) = 1.\n  • Pr(minhash is same) = Jaccard similarity.\n• How to compute minhash signatures.\n\n                                    Jaemin Yoo       3", "kr": "<b>복습: Shingling + MinHashing</b><br>• k-shingle: 문서 = 집합<br>• Jaccard = |S∩T|/|S∪T|<br>• MinHash: row permutation, 첫 1 row<br>  • 예: h(S1)=0, h(S2)=2, h(S3)=1<br>  • <b>P(minhash 같음) = Jaccard</b><br>• signature 계산 알고리즘", "summary": "<p><b>🔙 L6 복습</b></p><ul><li>k-shingle: 문서 → 집합</li><li>Jaccard: |S∩T| / |S∪T|</li><li>MinHash: permutation 후 첫 1인 row</li><li>⭐ <b>P(h(S1) = h(S2)) = J(S1, S2)</b></li></ul>"}, "4": {"en": "Recap: The Big Picture\n                                                                                  Candidate\n                                                                                  Pairs:\n                                                                      Locality-\n                                       Min                                        Those pairs\n Document   Shingling                                                 Sensitive\n                                      Hashing                                     of signatures\n                                                                      Hashing\n                                                                                  that we need\n                                                                                  to test for\n                        The set                   Signatures:                     similarity\n                        of strings                Short integer\n                        of length 𝑘               vectors that\n                        that appear               represent the\n                        in the                    sets, and\n                        document                  reflect their\n                                                  similarity\n                                      Source: Stanford CS246 (2018)\n\n\n\n                                               Jaemin Yoo                                         4", "kr": "<b>복습: Big Picture</b><br>문서 → Shingling → MinHash → <b>LSH</b> → Candidate Pairs", "summary": "<p><b>🗺️ 파이프라인 위치</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">문서 → Shingling → MinHash → LSH → Candidate Pairs\n                                   ↑ 오늘 여기</pre>"}, "5": {"en": "Outline\n1. Locality-Sensitive Hashing (LSH)\n2. S-Curves\n3. LSH Families\n4. LSH with Other Distance Measures\n\n\n\n\n                            Jaemin Yoo   5", "kr": "<b>목차</b><ol><li>LSH</li><li>S-Curves</li><li>LSH Families</li><li>Other Distance Measures</li></ol>", "summary": "<p><b>🗺️ L7 4부 구성</b></p><ol><li><b>LSH</b> — Banding 기법 소개</li><li><b>S-Curves</b> — r, b 선택 이론</li><li><b>LSH Families</b> — 일반화 프레임워크</li><li><b>Other Distance Measures</b> — cosine용 Random Hyperplane</li></ol>"}, "6": {"en": "Locality-Sensitive Hashing\n• The number of document pairs is still large after minhashing.\n   • Minhashing does not reduce document pairs to compare.\n   • What if we have 1M documents with 1µs for each comparison?\n   • 6 days to compute all similarities.\n• Locality-sensitive hashing (LSH) reduces # of candidate pairs.\n   • Allows us to focus on pairs that are likely to be similar.\n\n\n\n\n                                      Jaemin Yoo                   6", "kr": "<b>LSH 필요성</b><br>• MinHash 후에도 문서 pair 수 여전히 많음<br>  • MinHash 자체는 비교할 pair 수를 줄이지 않음<br>  • 100만 문서 × 1µs/비교 → <b>6일 소요</b><br>• <b>LSH = candidate pair 수 축소</b><br>  • 유사할 가능성 있는 pair에만 집중", "summary": "<p><b>🚨 MinHash만으론 부족</b></p><p><b>💡 관찰</b><br>MinHash는 각 문서를 짧게 만들 뿐, <b>비교할 pair 수는 그대로</b>.</p><p><b>📏 규모 감각</b></p><ul><li>문서 100만 → pair 수 ≈ 5 × 10¹¹</li><li>한 pair 비교 1μs → <b>6일 소요</b></li></ul><p><b>🎯 LSH 역할</b><br>\"유사할 <b>가능성</b> 있는 pair만 candidate로 뽑자.\" → 실제 비교 수 대폭 감소.</p>"}, "7": {"en": "From Signatures to Buckets\n• General approach: Hash minhashed signatures several times.\n  • We know similar documents have more shared signatures.\n  • Use only a subset of the signatures for each hash function.\n• Any pair hashed to the same bucket becomes a candidate.\n  • There will be false positives and false negatives though.\n\n\n                                  Magnitude 6.8        Today’s weather\n             Magnitude 6.8        earthquake ...       forecast ...\n             earthquake ...\n\n\n\n\n             [110, 70, 93, 40]   [110, 70, 93, 211]   [50, 47, 111, 25]\n                                                                          7", "kr": "<b>Signature에서 Bucket으로</b><br>• 일반 접근: MinHash signature를 여러 번 해시<br>  • 유사 문서는 공유 signature가 많음<br>  • 각 hash 함수마다 signature의 일부만 사용<br>• 같은 bucket에 해시된 pair → candidate<br>• FP/FN 발생", "summary": "<p><b>🎯 Bucket 기반 아이디어</b></p><p><b>💡 핵심</b><br>\"MinHash signature를 <b>여러 번 쪼개서 해시</b>. 같은 bucket이면 유사 pair 후보.\"</p><p><b>📋 특징</b></p><ul><li>유사 문서는 signature 공유 多 → 적어도 한 번은 같은 bucket</li><li>각 hash는 signature의 <b>일부만</b> 사용 (부분 일치로도 catch)</li></ul><p><b>⚖️ 오차</b></p><ul><li>FP: 우연 일치 (해시 충돌)</li><li>FN: signature 부분만 일치 실패</li></ul>"}, "8": {"en": "Partition into Bands\n• Trick: Divide the signature matrix 𝑀 into 𝑏 bands of 𝑟 rows.\n   • For each band, hash each column to a hash table with 𝑘 buckets.\n      • Make 𝑘 as large as possible to reduce collisions.\n      • Use a different hash table for each band.\n   • Becomes a candidate pair if hashed to the same bucket for ≥ 1 band.\n   • Tune 𝑏 and 𝑟 to catch most similar pairs, but few non-similar pairs.\n\n\n\n\n                                          Jaemin Yoo                        8", "kr": "<b>Band 분할 (핵심 Trick)</b><br>• signature matrix M을 <b>b bands × r rows</b>로 분할<br>  • 각 band마다 column을 k bucket hash table에 해시<br>    • k 크게 (충돌 감소)<br>    • band마다 별도 hash table<br>  • <b>≥ 1 band</b>에서 같은 bucket에 해시 → candidate<br>  • b, r 튜닝 → 대부분 유사 pair 잡고 비유사 pair 적게", "summary": "<p><b>⭐⭐⭐ Banding — LSH의 심장</b></p><p><b>📐 Signature Matrix 분할</b></p><ul><li>M: n × d (n minhash × d 문서)</li><li>n = b × r로 분할 (b개 band, 각 r row)</li></ul><p><b>📋 각 band 처리</b></p><ol><li>band의 r 값을 하나의 vector로 묶음</li><li>이 vector를 bucket hash table에 해시 (bucket 수 k, 큼)</li><li>같은 bucket = 그 band에서 일치</li><li>각 band마다 <b>별도 hash table</b></li></ol><p><b>⭐ Candidate 조건</b><br>\"두 문서가 <b>최소 한 band에서</b> 같은 bucket → candidate.\"</p><p><b>🎯 튜닝</b><br>b, r 조절로 유사/비유사 pair 분리 조정.</p>"}, "9": {"en": "Partition into Bands\n• Trick: Divide the signature matrix 𝑀 into 𝑏 bands of 𝑟 rows.\n\n\n\n\n                            Source: Stanford CS246 (2022)\n                                     Jaemin Yoo                  9", "kr": "<b>Band 분할 다이어그램</b><br>Signature matrix (n rows × col documents) → b 개 band, 각 r rows", "summary": "<p><b>📊 Signature Matrix 시각 분할</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:11px\">Signature Matrix (n × d)\n┌─────────┐\n│ Band 1  │ r rows\n├─────────┤\n│ Band 2  │ r rows\n├─────────┤\n│   ...   │\n├─────────┤\n│ Band b  │ r rows\n└─────────┘\n  d cols (문서)</pre><p>각 band의 column 벡터가 해시 대상.</p>"}, "10": {"en": "Hash Functions to One Bucket\n\n\n\n\n                 Source: Stanford CS246 (2022)\n                          Jaemin Yoo             10", "kr": "<b>각 Band을 한 Bucket에 해시</b><br>(다이어그램) 각 band에서 column의 r개 값을 함께 해시 → bucket", "summary": "<p><b>🎯 Band 내 해시</b></p><p><b>📋 과정</b></p><ol><li>한 band에서 문서 c의 column = r개 값의 tuple</li><li>이 tuple을 hash function으로 bucket index로 매핑</li><li>같은 bucket = 두 문서의 그 band 전체 일치</li></ol><p><b>💡 왜 tuple 해시?</b><br>r개 값 \"모두\" 같으면 같은 bucket. 대부분 다르면 다른 bucket (충돌 적음).</p>"}, "11": {"en": "Example: Bands\n• Suppose a signature matrix of size 100 × 100,000.\n   • 100 minhashed signatures\n   • 100,000 documents to compare\n• Goal: Find all 80%-similar pairs.\n   • 5,000,000,000 pairs of signatures can take a while to compare.\n   • Let’s apply LSH with 𝑏 = 20 bands of size 𝑟 = 5.\n\n\n\n\n                                    Jaemin Yoo                        11", "kr": "<b>예제: Bands</b><br>• signature matrix 100 × 100,000<br>  • 100 minhash, 문서 100,000개<br>• 목표: 80% 유사 pair 찾기<br>  • 50억 pair 비교는 시간 많이 걸림<br>  • LSH: b = 20, r = 5 적용해보자", "summary": "<p><b>🎯 구체 예제 — 규모 감각</b></p><p><b>📋 설정</b></p><ul><li>Signature matrix: 100 × 100,000 (100 minhash, 10만 문서)</li><li>목표: 80% 이상 유사 pair 찾기</li><li>Total pair 수: C(10만, 2) ≈ <b>50억</b></li></ul><p><b>⚙️ LSH 설정</b><br>n = 100 = 20 × 5 → b = 20, r = 5</p><p>다음 두 슬라이드에서 FP, FN 계산.</p>"}, "12": {"en": "Example: False Positives\n• Suppose that 𝐶\" and 𝐶# are 40% similar (i.e., negative pair).\n• False positives: Less than 1/5th of all 40%-similar pairs.\n   • Probability identical in any one particular band: 0.4 % = 0.01.\n   • Probability identical in ≥ 1 of 20 bands: 1 – 1 − 0.01 \"& < 0.2.\n• We can remove more than 80% of all 40%-similar pairs!\n\n\n\n\n                                    Jaemin Yoo                          12", "kr": "<b>False Positive 계산</b><br>• C1, C2가 40% 유사 (negative pair)<br>• 특정 band에서 같을 확률: 0.4^5 = 0.01<br>• 20 band 중 ≥1 같을 확률: 1 − (1 − 0.01)^20 < 0.2<br>• → <b>40% 유사 pair의 80% 이상 제거 가능!</b>", "summary": "<p><b>🎯 FP 계산 — 낮은 유사도 pair는 잘 탈락</b></p><p><b>📐 설정</b><br>C1, C2의 Jaccard = 0.4 (우리가 원하지 않는 pair)</p><p><b>📐 단계별 계산</b></p><ol><li>한 band의 r=5 row가 모두 일치할 확률: 0.4⁵ = <b>0.0102</b></li><li>그 band이 <b>불일치</b>할 확률: 1 − 0.0102 = 0.9898</li><li>b=20 band 모두 불일치 확률: 0.9898²⁰ = 0.815</li><li>최소 1 band 일치 확률(= FP 포함 확률): 1 − 0.815 = <b>0.185</b></li></ol><p><b>✅ 해석</b><br>\"40% 유사 pair의 약 <b>81.5%를 제거</b>한다.\" FP 대폭 감소.</p>"}, "13": {"en": "Example: False Negatives\n• Suppose that 𝐶\" and 𝐶# are 80% similar (i.e., positive pair).\n• False negatives: About 1/3000th of all 80%-similar pairs.\n   • Probability identical in any one particular band: 0.8 % = 0.328.\n   • Probability not similar in all 20 bands: 1 − 0.328 \"& = 0.00035.\n• We can find almost all positive pairs even with LSH!\n\n\n\n\n                                    Jaemin Yoo                          13", "kr": "<b>False Negative 계산</b><br>• C1, C2가 80% 유사 (positive pair)<br>• 특정 band 같을 확률: 0.8^5 = 0.328<br>• 20 band 모두 다를 확률: (1 − 0.328)^20 = 0.00035<br>• → <b>80% 유사 pair의 거의 모두 포착!</b>", "summary": "<p><b>🎯 FN 계산 — 높은 유사도 pair는 안전</b></p><p><b>📐 설정</b><br>C1, C2의 Jaccard = 0.8 (우리가 잡고 싶은 pair)</p><p><b>📐 단계별 계산</b></p><ol><li>한 band 모두 일치 확률: 0.8⁵ = <b>0.3277</b></li><li>불일치 확률: 1 − 0.3277 = 0.6723</li><li>20 band 모두 불일치: 0.6723²⁰ = <b>0.00035</b></li></ol><p><b>✅ 해석</b><br>\"80% 유사 pair 중 <b>0.035%만 놓침</b>. 거의 완벽 포착.\"</p><p><b>🎯 종합</b><br>b=20, r=5로 40% 유사는 대부분 제거, 80% 유사는 거의 다 잡기. 훌륭한 필터!</p>"}, "14": {"en": "Outline\n1. Locality-Sensitive Hashing (LSH)\n2. S-Curves\n3. LSH Families\n4. LSH with Other Distance Measures\n\n\n\n\n                            Jaemin Yoo   14", "kr": "<b>목차 (2부)</b><br>1. ✓ 2. <b>S-Curves</b> ← 여기부터", "summary": "<p><b>🎯 2부 — S-Curve 이론</b></p><p>\"b, r를 어떻게 정할까?\" S-curve 분석으로 답.</p>"}, "15": {"en": "What We Want from LSH\n• Let 𝑠 be a similarity, and 𝑡 be a similarity threshold for the query.\n• What we want from LSH is:\n\n\n\n\n                                               Source: Stanford CS246 (2022)\n                                 Jaemin Yoo                                    15", "kr": "<b>LSH에 원하는 것</b><br>• s = 유사도, t = query의 유사도 threshold<br>• LSH가 해줬으면 하는 것: s ≥ t → candidate, s < t → 탈락", "summary": "<p><b>🎯 이상적 LSH = Step Function</b></p><p><b>📐 이상</b><br>유사도 s, threshold t일 때:</p><ul><li>s ≥ t → P(candidate) = 1</li><li>s < t → P(candidate) = 0</li></ul><p>즉 step function. 하지만 실제론 <b>smooth S-curve</b>.</p><p><b>💡 목표</b><br>b, r 조정으로 S-curve를 <b>최대한 step에 가깝게</b>.</p>"}, "16": {"en": "Errors when 𝑟 = 1 and 𝑏 = 1\n\n\n\n\n                 Source: Stanford CS246 (2022)\n                          Jaemin Yoo             16", "kr": "<b>오차: r = 1, b = 1 경우</b><br>(Stanford) 단일 band 단일 row면 p(s) = s — 선형. LSH 효과 없음.", "summary": "<p><b>🚨 Trivial 경우 — r=1, b=1</b></p><p><b>📐 계산</b><br>r=1, b=1 → P(candidate) = 1 − (1 − s)¹ = s</p><p>즉 원본 유사도와 <b>같음</b>. S-curve 아닌 직선.</p><p><b>💡 해석</b><br>\"r, b 제대로 안 쓰면 LSH 의미 없음.\" 여러 row + 여러 band 구조가 필수.</p>"}, "17": {"en": "S-Curve\n• LSH makes an S-curve for a document pair with similarity 𝑠.\n     • Pr signatures agree in all rows on one band = 𝑠 '\n     • Pr signatures do not agree in at least one row of one band = 1 − 𝑠 '\n     • Pr signatures do not agree in at least one row of each band = 1 − 𝑠 ' (\n     • Pr signatures agree in all rows of at least one band = 1 − 1 − 𝑠 ' (\n\n                 1                                             s    1-(1-sr)b\nProbability of                                                 .2     .006\nbecoming a\ncandidate                                                      .4     .186      b = 20, r = 5\n                                                               .6     .802\n                 0\n                                                               .8    .9996\n                     0   Jaccard similarity of documents   1\n                                                                                                17", "kr": "<b>S-Curve 유도 (★★)</b><br>유사도 s인 pair에 대해:<br>• 한 band의 모든 row 일치 확률: s^r<br>• 한 band의 최소 한 row 불일치 확률: 1 − s^r<br>• 모든 b band에서 불일치 확률: (1 − s^r)^b<br>• 최소 한 band에서 완전 일치 확률: <b>1 − (1 − s^r)^b</b><br><br>예 (b=20, r=5): s=0.4→0.186, s=0.6→0.802, s=0.8→0.9996", "summary": "<p><b>⭐⭐⭐ S-Curve 공식 유도 — 필수 암기!</b></p><p><b>📐 단계별 유도</b><br>유사도 s인 pair에 대해:</p><ol><li><b>한 band의 r row 모두 일치:</b> 각 row 독립 가정, 확률 s → s^r</li><li><b>그 band 불일치 (최소 1 row 다름):</b> 1 − s^r</li><li><b>모든 b band 불일치:</b> (1 − s^r)^b</li><li><b>최소 1 band 일치 (= candidate):</b> <b>1 − (1 − s^r)^b</b></li></ol><p><b>🍎 수치 예 (b=20, r=5)</b></p><table style=\"font-size:12px\"><tr><th>s</th><th>P(candidate)</th></tr><tr><td>0.2</td><td>0.006</td></tr><tr><td>0.4</td><td>0.186</td></tr><tr><td>0.6</td><td>0.802</td></tr><tr><td>0.8</td><td>0.9996</td></tr></table><p><b>📈 S-curve 모양</b><br>낮은 s는 낮게, 높은 s는 거의 1. 가파른 S-모양.</p><p><b>📝 시험</b><br>이 유도는 <b>단계별로 쓸 수 있어야</b>. 매년 기출 가능성.</p>"}, "18": {"en": "S-Curve: Choosing 𝑟 and 𝑏\n• The values of 𝑟 and 𝑏 determine the shape of the S-curve.\n   • Constraint: 𝑟 × 𝑏 equals to the number of signatures 𝑚.\n• Higher 𝑚 makes the curve closer to the step function.\n• The balance between 𝑟 and 𝑏 decide the center of curve.\n\n\n\n\n                                    Jaemin Yoo                 18", "kr": "<b>r, b 선택</b><br>• r, b 값이 S-curve 형태 결정<br>  • 제약: r × b = signature 수 m<br>• m 클수록 step function에 가까움 (정확도↑)<br>• r/b 비율이 curve 중심점 결정", "summary": "<p><b>⭐ r, b 선택의 2가지 자유도</b></p><p><b>📐 제약</b><br>r × b = n (signature 길이, 고정)</p><p><b>🎯 2가지 자유도</b></p><ol><li><b>m = n (총 크기):</b> 클수록 step에 가까움 (정확도↑)</li><li><b>r/b 비율:</b> curve 중심점 결정</li></ol><p><b>💡 튜닝 전략</b></p><ul><li>메모리 여유 → n 크게</li><li>Threshold 정해지면 r/b 조정</li></ul>"}, "19": {"en": "Changing Shape with 𝑚\n• Suppose that we consider 0.8 as\n  the similarity threshold.\n• We visualize three curves with:\n  • Red: 𝑟 = 10 and 𝑏 = 6\n  • Green: 𝑟 = 20 and 𝑏 = 60\n  • Purple: 𝑟 = 40 and 𝑏 = 5500\n• Higher 𝑚 makes higher accuracy.\n\n\n\n\n                                  Jaemin Yoo   19", "kr": "<b>m 변화에 따른 Curve 모양</b><br>threshold 0.8 가정, 3 curve 비교:<br>• Red: r=10, b=6<br>• Green: r=20, b=60<br>• Purple: r=40, b=5500<br>• <b>m 높을수록 정확도↑</b>", "summary": "<p><b>📈 m 크기와 Curve 경사</b></p><p><b>📊 3 시나리오 비교 (threshold=0.8)</b></p><ul><li>Red (m=60): 완만한 S</li><li>Green (m=1200): 더 가파름</li><li>Purple (m=220000): 거의 step</li></ul><p><b>🎯 결론</b><br>\"m 클수록 <b>step function에 가까움</b> = 분별력↑.\"</p><p><b>⚠️ trade-off</b><br>m 크면 메모리 소비도 비례 증가. 실무는 n ≈ 100-1000.</p>"}, "20": {"en": "Changing Shape with 𝑟 and 𝑏\n• With same 𝑚, the values of 𝑟 and 𝑏\n  determines the center of curve.\n• We visualize three curves with:\n   • Red: 𝑟 = 5 and 𝑏 = 20\n   • Green: 𝑟 = 10 and 𝑏 = 10\n   • Purple: 𝑟 = 20 and 𝑏 = 5\n• No answer; they have different false\n  positives and negatives.\n\n\n\n                                Jaemin Yoo   20", "kr": "<b>r/b 비율에 따른 Curve 중심</b><br>동일 m에서 r, b 비율만 변경:<br>• Red: r=5, b=20<br>• Green: r=10, b=10<br>• Purple: r=20, b=5<br>• 정답 없음 — FP/FN trade-off 다름", "summary": "<p><b>📈 r/b 비율과 Curve 중심 이동</b></p><p><b>📊 같은 m=100에서 비교</b></p><ul><li>Red (r=5, b=20): 중심 왼쪽 (낮은 threshold)</li><li>Green (r=10, b=10): 중앙</li><li>Purple (r=20, b=5): 중심 오른쪽 (높은 threshold)</li></ul><p><b>⭐ 규칙</b><br>\"<b>r 크면 중심 오른쪽 이동</b> (엄격한 threshold).\"</p><p><b>🎯 \"정답\" 없음</b><br>어떤 threshold를 원하는지에 따라 선택. FP/FN trade-off.</p>"}, "21": {"en": "Finding the Center of Curve\n• We can’t draw the curve for every combination of 𝑟 and 𝑏.\n• Let’s approximate the equation:\n   𝑦 = 1 − 1 − 𝑠' (\n           )(* !\n     ≈1 −𝑒       if 0 < 𝑠 < 1 and 𝑟 is sufficiently large.\n• The curve becomes steepest (i.e., “center”) if 𝑠 ≈ 1/𝑏 \"/% .\n   • Let’s use this center to approximate the shape of curve.\n\n\n\n\n                                      Jaemin Yoo                 21", "kr": "<b>Curve 중심 근사</b><br>• 모든 조합에 curve 그릴 수 없음<br>• 근사식: y = 1 − (1−s^r)^b ≈ 1 − e^{-bs^r} (s < 1, r 충분히 큼)<br>• <b>Curve가 가장 가파른 지점 (중심): s ≈ (1/b)^(1/r)</b>", "summary": "<p><b>⭐⭐⭐ Threshold 공식 — 매년 기출!</b></p><p><b>📐 근사</b><br>1 − (1 − s^r)^b ≈ 1 − e^(-b·s^r) (r 크면)</p><p><b>📐 중심점 유도</b><br>중심 = curve가 가장 가파른 점. d²y/ds² = 0 풀면:</p><p><b>⭐ 공식</b><br><code>s* ≈ (1/b)^(1/r)</code></p><p><b>🍎 예</b></p><ul><li>b=20, r=5: s* = (1/20)^(1/5) ≈ <b>0.546</b></li><li>b=10, r=10: s* = (1/10)^(1/10) ≈ <b>0.794</b></li></ul><p><b>💡 실무 팁</b><br>원하는 threshold t 있으면 (1/b)^(1/r) = t 맞춰 b, r 선택.</p><p><b>📝 시험 단골</b><br>\"b, r 주어졌을 때 threshold 계산하라\" 단골.</p>"}, "22": {"en": "Finding the Center of Curve\n• Note: The curve passes ( 1/𝑏 \"/% , 0.63) regardless of 𝑟 and 𝑏.\n\n                      1\n\n          Probability of\n          becoming a 0.63\n          candidate\n\n\n                      0\n                            0                 (1/b)1/r            1\n                                Jaccard similarity of documents\n\n\n                                     Jaemin Yoo                       22", "kr": "<b>Curve 중심의 의미</b><br>• 중심점 = ((1/b)^(1/r), 0.63) — r, b 무관<br>• 0.63 = 1 − 1/e", "summary": "<p><b>🎯 중심점의 y값 = 0.63 (상수)</b></p><p><b>📐 수학적 성질</b><br>S-curve의 가장 가파른 점에서 y = 1 − 1/e ≈ <b>0.632</b>. (r, b와 무관!)</p><p><b>💡 왜?</b><br>s = (1/b)^(1/r) 대입하면 s^r = 1/b. 식에 넣으면:<br>y = 1 − (1 − 1/b)^b ≈ 1 − 1/e (b 큼)</p><p><b>🎯 의미</b><br>\"Threshold에서 candidate 확률 ≈ 63%. threshold 초과면 더 높음, 미달이면 낮음.\"</p>"}, "23": {"en": "Combining the Techniques\n• Pick 𝑘 and construct a set of 𝑘-shingles from each document.\n• Pick length 𝑛 for minhash signatures and compute signatures.\n• Pick similarity threshold 𝑡 and then # of bands 𝑏 and # of rows 𝑟.\n   • If 1/𝑏 !/' > 𝑡, there will be fewer false positives.\n   • If 1/𝑏 !/' < 𝑡, there will be fewer false negatives.\n• Construct candidate pairs and compare their signatures using 𝑡.\n\n\n\n\n                                     Jaemin Yoo                        23", "kr": "<b>종합 LSH 파이프라인</b><br>1. k 선택 → 각 문서에서 k-shingle 구성<br>2. MinHash signature 길이 n 선택 → signature 계산<br>3. threshold t 선택 → b, r 선택:<br>  • (1/b)^(1/r) > t → FP↓<br>  • (1/b)^(1/r) < t → FN↓<br>4. Candidate pair 구성 → t로 signature 비교", "summary": "<p><b>⭐⭐⭐ 종합 LSH 파이프라인</b></p><p><b>📋 4단계</b></p><ol><li><b>k 선택 + Shingling:</b> 각 문서의 k-shingle 집합</li><li><b>n 선택 + MinHash:</b> signature 계산</li><li><b>t 선택 + Banding:</b> b, r 결정:<br>- (1/b)^(1/r) > t: FP 줄이기 우선 (놓침 있지만 정밀)<br>- (1/b)^(1/r) < t: FN 줄이기 우선 (더 많이 잡기)</li><li><b>Candidate 검증:</b> 실제 signature 비교로 정확한 Jaccard 추정</li></ol><p><b>💡 실무 선택</b><br>앱 성격에 따라 FP/FN 우선순위 다름. 표절 감지는 FN 최소화(놓치면 안 됨), 추천은 FP 최소화(이상한 추천 피함).</p>"}, "24": {"en": "Outline\n1. Locality-Sensitive Hashing (LSH)\n2. S-Curves\n3. LSH Families\n4. LSH with Other Distance Measures\n\n\n\n\n                            Jaemin Yoo   24", "kr": "<b>목차 (3부)</b><br>1. ✓ 2. ✓ 3. <b>LSH Families</b> ← 여기부터", "summary": "<p><b>🎯 3부 — LSH Families (일반화)</b></p><p>MinHash는 Jaccard용. 다른 거리엔? → 거리 공리 + LSH family 프레임워크.</p>"}, "25": {"en": "Distance Measures\n• Generalized LSH is based on the distance between points.\n   • Jaccard similarity is not a distance.\n   • Jaccard distance = 1 – Jaccard similarity is a distance.\n• A function 𝑑 is a distance measure if\n   • It takes two points in the space and returns a real number satisfying:\n      • 𝑑 𝑥, 𝑦 ≥ 0 (non-negative)\n      • 𝑑(𝑥, 𝑦) = 0 iff 𝑥 = 𝑦 (distances are positive except for 𝑥 = 𝑦)\n      • 𝑑 𝑥, 𝑦 = 𝑑(𝑦, 𝑥) (symmetric)\n      • 𝑑 𝑥, 𝑦 ≤ 𝑑(𝑥, 𝑧) + 𝑑(𝑧, 𝑦) (triangle inequality)\n\n\n\n\n                                           Jaemin Yoo                         25", "kr": "<b>Distance Measures (거리 공리)</b><br>• 일반화 LSH는 점 간 거리 기반<br>  • Jaccard similarity는 거리 아님<br>  • Jaccard distance = 1 − Jaccard similarity는 거리<br>• 거리 함수 d의 4개 공리:<br>  1. d(x,y) ≥ 0 (non-negative)<br>  2. d(x,y) = 0 iff x = y<br>  3. d(x,y) = d(y,x) (symmetric)<br>  4. d(x,y) ≤ d(x,z) + d(z,y) (triangle inequality)", "summary": "<p><b>⭐⭐⭐ 거리 공리 4개 — 필수 암기!</b></p><p><b>📐 거리 함수 d(x, y)가 되려면</b></p><ol><li><b>Non-negative:</b> d(x, y) ≥ 0</li><li><b>Identity:</b> d(x, y) = 0 ⟺ x = y</li><li><b>Symmetric:</b> d(x, y) = d(y, x)</li><li><b>Triangle inequality:</b> d(x, y) ≤ d(x, z) + d(z, y)</li></ol><p><b>🍎 Jaccard와 관계</b></p><ul><li>Jaccard similarity J ∈ [0, 1] — 거리 X (4번 위배 가능?)</li><li><b>Jaccard distance = 1 − J</b> — 거리 O (4개 공리 만족)</li></ul><p><b>📝 T/F 단골</b></p><ul><li>\"Jaccard similarity is a distance\" → <b>FALSE</b></li><li>\"Triangle inequality: d(x,y) ≤ d(x,z) × d(z,y)\" → <b>FALSE</b> (곱 아닌 합)</li></ul>"}, "26": {"en": "LSH Families\n• Let 𝑑\" < 𝑑# be two distances according to a distance function 𝑑.\n• A family 𝐹 of functions is said to be 𝒅𝟏 , 𝒅𝟐 , 𝒑𝟏 , 𝒑𝟐 -sensitive if\n   • For every 𝑓 ∈ 𝐹 and points 𝑥 and 𝑦:\n      If 𝑑(𝑥, 𝑦) ≤ 𝑑!, then the probability that 𝑓(𝑥) = 𝑓(𝑦) is at least 𝑝!.\n      If 𝑑 𝑥, 𝑦 ≥ 𝑑\", then the probability that 𝑓(𝑥) = 𝑓(𝑦) is at most 𝑝\".\n• The values 𝑑\" , 𝑑# , 𝑝\" , 𝑝# are related to the shape of the curve.\n\n\n\n\n                                      Jaemin Yoo                               26", "kr": "<b>LSH Families 정의</b><br>• 거리 함수 d, d1 < d2<br>• 함수 family F가 <b>(d1, d2, p1, p2)-sensitive</b>:<br>  • ∀ f ∈ F, 점 x, y:<br>    • d(x,y) ≤ d1 이면 P(f(x)=f(y)) ≥ p1<br>    • d(x,y) ≥ d2 이면 P(f(x)=f(y)) ≤ p2<br>• d1, d2, p1, p2는 curve 형태 결정", "summary": "<p><b>⭐⭐⭐ LSH Family — (d1, d2, p1, p2)-sensitive</b></p><p><b>📐 정의</b><br>함수 family F가 <b>(d1, d2, p1, p2)-sensitive</b> ⟺:</p><p>∀ f ∈ F, 모든 점 x, y에 대해:</p><ul><li>d(x, y) ≤ d1 → P(f(x) = f(y)) ≥ p1 (가까우면 같은 hash 확률 높음)</li><li>d(x, y) ≥ d2 → P(f(x) = f(y)) ≤ p2 (멀면 같을 확률 낮음)</li></ul><p><b>💡 직관</b><br>\"가까운 pair는 자주 같이, 먼 pair는 드물게 같이 hash된다.\"</p><p><b>🎯 4 파라미터</b><br>Curve 형태 특성화. d1, d2, p1, p2 값으로 family 성능 판정.</p>"}, "27": {"en": "Meanings of Sensitivity Values\n• If 𝐹 is 𝑑\" , 𝑑# , 𝑝\" , 𝑝# -sensitive, then\n        𝐹 is better with higher 𝑑\" , lower 𝑑# , higher 𝑝\" , and lower 𝑝# .\n\n\n                                                    Reflection of the S-curve\n                     p1\n                                                    across the 𝑦-axis.\n      Probability of\n      being declared p2\n      a candidate\n\n                               d1            d2\n                           Distance\n\n                                      Jaemin Yoo                             27", "kr": "<b>Sensitivity 값의 의미</b><br>• F가 (d1, d2, p1, p2)-sensitive면:<br>• <b>더 좋음: d1↑, d2↓, p1↑, p2↓</b><br>• S-curve를 y축으로 reflection한 형태 (거리로 표현)", "summary": "<p><b>⭐ 좋은 LSH family = ?</b></p><p><b>🎯 4 방향 모두 개선</b></p><ul><li><b>d1 ↑:</b> \"가까움\" 기준 더 넓어져 가까운 pair 더 많이 잡음</li><li><b>d2 ↓:</b> \"멀음\" 기준 더 좁아져 FP 경계 선명</li><li><b>p1 ↑:</b> 가까운 pair 포착 확률 높아짐 (FN↓)</li><li><b>p2 ↓:</b> 먼 pair 통과 확률 낮아짐 (FP↓)</li></ul><p><b>💡 Ideal</b><br>(d1, d2, 1, 0) — step function. 실제론 근사만 가능.</p>"}, "28": {"en": "LSH Families for Jaccard Similarity\n• Minhashing gives a (𝑑\" , 𝑑# , 1 − 𝑑\" , 1 − 𝑑# )-sensitive family.\n   • For any 𝑑! and 𝑑\" such that 0 ≤ 𝑑! < 𝑑\" ≤ 1.\n   • Here we do not consider the banding technique (i.e., 𝑏 = 𝑟 = 1).\n• Proof:\n   • Let 𝑑 be the Jaccard distance = 1 − sim 𝑥, 𝑦 .\n   • Then, 𝑑 𝑥, 𝑦 ≤ 𝑑!\n       ⇒ 1 − sim 𝑥, 𝑦 ≤ 𝑑!\n       ⇒ 1 − 𝑑! ≤ sim 𝑥, 𝑦\n       ⇒ 1 − 𝑑! ≤ Pr(minhash 𝑥 = minhash 𝑦 ).\n   • Similar argument applies to 𝑑\".\n\n                                    Jaemin Yoo                          28", "kr": "<b>Jaccard를 위한 LSH Family</b><br>• MinHash = (d1, d2, 1−d1, 1−d2)-sensitive family<br>  • ∀ 0 ≤ d1 < d2 ≤ 1<br>  • 여기선 banding 고려 X (b=r=1)<br>• 증명:<br>  • d = 1 − sim(x,y) (Jaccard distance)<br>  • d(x,y) ≤ d1 ⇒ 1 − sim ≤ d1 ⇒ sim ≥ 1 − d1<br>  • ⇒ P(minhash(x)=minhash(y)) ≥ 1 − d1", "summary": "<p><b>🎯 MinHash의 Sensitivity 분석</b></p><p><b>📐 주장</b><br>MinHash family는 <b>(d1, d2, 1 − d1, 1 − d2)-sensitive</b>. (banding 없이, raw)</p><p><b>📐 증명</b></p><ol><li>Jaccard distance: d(x, y) = 1 − J(x, y)</li><li>d(x, y) ≤ d1 ⟺ 1 − J ≤ d1 ⟺ J ≥ 1 − d1</li><li>L6 증명: P(h(x) = h(y)) = J(x, y)</li><li>∴ P(h(x) = h(y)) ≥ 1 − d1 (p1 = 1 − d1)</li><li>동일하게 d(x, y) ≥ d2 ⟹ P(h = h) ≤ 1 − d2 (p2 = 1 − d2)</li></ol><p><b>💡 의미</b><br>거리 기반 용어로 MinHash 정확한 spec 표현. 다른 LSH family와 비교 가능.</p>"}, "29": {"en": "Amplifying an LSH Family\n• The banding technique carries over to this general setting.\n• We create a new LSH family 𝐹’ from 𝐹 such that:\n   • Each member of 𝐹’ consists of 𝑛 members of 𝐹.\n   • By an AND construction like “rows in a band.”\n   • And an OR construction like “many bands.”\n• Goal: Improve 𝐹 by making 𝑑\" ↑, 𝑑# ↓, 𝑝\" ↑, and 𝑝# ↓.\n\n\n\n\n                                  Jaemin Yoo                    29", "kr": "<b>LSH Family Amplification</b><br>• Banding 기법을 일반 세팅으로 확장<br>• F에서 새 family F' 생성:<br>  • F'의 각 member = F의 n 멤버로 구성<br>  • AND (\"한 band의 rows\") + OR (\"여러 bands\")<br>• 목표: d1↑, d2↓, p1↑, p2↓ (F보다 나은 F')", "summary": "<p><b>⭐ Amplification — Banding의 일반화</b></p><p><b>💡 아이디어</b><br>\"Banding을 MinHash에 한정 말고, <b>모든 LSH family</b>에 적용 가능한 도구로.\"</p><p><b>📋 구성</b><br>F의 멤버 여러 개를 조합해 새 family F'을 만든다:</p><ul><li><b>AND:</b> \"한 band의 r row 모두 일치\" (엄격)</li><li><b>OR:</b> \"여러 band 중 최소 1 일치\" (관대)</li></ul><p><b>🎯 목표</b><br>F보다 d1↑, d2↓, p1↑, p2↓ 달성.</p>"}, "30": {"en": "AND Construction\n• If the following are true:\n   • 𝑓 , ∈ 𝐹′ is constructed from 𝑓!, 𝑓\", … , 𝑓' of 𝐹.\n   • 𝑓 , (𝑥) = 𝑓 , (𝑦) if and only if 𝑓- 𝑥 = 𝑓- 𝑦 for all 𝑖 = 1, 2, … , 𝑟.\n• Then, 𝐹’ is 𝑑\" , 𝑑# , 𝑝\"% , 𝑝#% -sensitive.\n                                                           0.8\n     F is a (0.2, 0.6, 0.8, 0.4)-sensitive family\n\n     If r = 4,        0.84 = 0.44 =                        0.4\n     F’ is (0.2, 0.6, 0.4096, 0.0256)-sensitive\n\n\n                                                                 0.2     0.6\n\n\n                                                    Jaemin Yoo                 30", "kr": "<b>AND Construction</b><br>• f' ∈ F' = F의 f1, f2, ..., fr로 구성<br>• f'(x) = f'(y) iff ∀i, f_i(x) = f_i(y) (모두 매치)<br>• F' = (d1, d2, p1^r, p2^r)-sensitive<br><br>예: F = (0.2, 0.6, 0.8, 0.4). r=4 → F' = (0.2, 0.6, 0.4096, 0.0256)", "summary": "<p><b>⭐ AND Construction</b></p><p><b>📐 정의</b><br>f' ∈ F'은 F의 r 멤버 f_1, ..., f_r로 구성:<br><code>f'(x) = f'(y) ⟺ ∀i, f_i(x) = f_i(y)</code> (모두 일치)</p><p><b>📐 Sensitivity 변환</b><br>F가 (d1, d2, p1, p2) → F'은 <b>(d1, d2, p1^r, p2^r)</b></p><p><b>💡 효과</b></p><ul><li>p1 ↓ (p1^r, bad): FN 증가</li><li>p2 ↓ (p2^r, good): FP 감소</li><li><b>핵심:</b> p2^r이 p1^r보다 훨씬 빨리 감소 (p2 < p1이므로)</li></ul><p><b>🍎 예</b><br>F = (0.2, 0.6, 0.8, 0.4), r=4:<br>F' = (0.2, 0.6, 0.8⁴=0.41, 0.4⁴=0.026)<br>p2 대폭 감소, p1도 감소 but 덜.</p>"}, "31": {"en": "OR Construction\n• If the following are true:\n   • 𝑓 , ∈ 𝐹′ is constructed from 𝑓!, 𝑓\", … , 𝑓( of 𝐹.\n   • 𝑓 , (𝑥) = 𝑓 , (𝑦) if and only if 𝑓- 𝑥 = 𝑓- 𝑦 for at least one 𝑖 = 1, 2, … , 𝑏.\n• Then, 𝐹 4 is (𝑑\" , 𝑑# , 1 − 1 − 𝑝\" 5 , 1 − 1 − 𝑝# 5 )-sensitive.\n\n\n    F is a (0.2, 0.6, 0.8, 0.4)-sensitive family\n                                                   0.8\n    If b = 4,\n    F’ is (0.2, 0.6, 0.9984, 0.8704)-sensitive\n              1-(1-0.8)4 = 1-(1-0.4)4 =            0.4\n\n\n                                                                                      31\n                                                         0.2       0.6", "kr": "<b>OR Construction</b><br>• f' ∈ F' = F의 f1, ..., fb로 구성<br>• f'(x) = f'(y) iff ∃i, f_i(x) = f_i(y) (최소 하나 매치)<br>• F' = (d1, d2, 1−(1−p1)^b, 1−(1−p2)^b)-sensitive<br><br>예: F = (0.2, 0.6, 0.8, 0.4). b=4 → F' = (0.2, 0.6, 0.9984, 0.8704)", "summary": "<p><b>⭐ OR Construction</b></p><p><b>📐 정의</b><br>f' ∈ F'은 F의 b 멤버 f_1, ..., f_b로 구성:<br><code>f'(x) = f'(y) ⟺ ∃i, f_i(x) = f_i(y)</code> (최소 1개 일치)</p><p><b>📐 Sensitivity 변환</b><br>F가 (d1, d2, p1, p2) → F'은 <b>(d1, d2, 1−(1−p1)^b, 1−(1−p2)^b)</b></p><p><b>💡 효과</b></p><ul><li>p1 ↑ (good): FN 감소</li><li>p2 ↑ (bad): FP 증가</li></ul><p><b>🍎 예</b><br>F = (0.2, 0.6, 0.8, 0.4), b=4:<br>F' = (0.2, 0.6, 1−0.2⁴=0.9984, 1−0.6⁴=0.8704)<br>p1 거의 1로 but p2도 상승.</p>"}, "32": {"en": "AND-OR Composition\n• Let’s combine an AND and an OR construction as in minhashing.\n   • In the right order: AND → OR, not the opposite!\n• Each of the two probabilities 𝑝 is transformed into 1 − 1 − 𝑝% 5 .\n   • The S-curve studied before!\n\n F is a (0.2, 0.6, 0.8, 0.4)-sensitive family\n                                                             0.8\n If r = b = 4,\n F’ is (0.2, 0.6, 0.8785, 0.0985)-sensitive\n                                                             0.4\n\n\n                                                                   0.2   0.6\n                                                Jaemin Yoo                     32", "kr": "<b>AND-OR Composition</b><br>• AND + OR 조합 = MinHash banding과 동일<br>  • <b>순서 중요: AND → OR</b> (반대 아님)<br>• 각 p → 1 − (1 − p^r)^b (= S-curve!)<br><br>예: F = (0.2, 0.6, 0.8, 0.4). r = b = 4:<br>F' = (0.2, 0.6, 0.8785, 0.0985)", "summary": "<p><b>⭐⭐⭐ AND → OR Composition = MinHash Banding</b></p><p><b>📐 공식</b><br>각 확률 p → <b>1 − (1 − p^r)^b</b> (S-curve!)</p><p><b>⚠️ 순서 중요</b><br>\"<b>AND 먼저, OR 나중</b>.\" 반대 (OR → AND)는 효과 다름.</p><p><b>💡 왜 AND→OR?</b></p><ul><li>AND로 각 band 엄격한 일치</li><li>OR로 여러 band 중 하나라도 살리기</li><li>→ S-curve 형태. p1 ↑, p2 ↓ 모두 달성</li></ul><p><b>🍎 예</b><br>F = (0.2, 0.6, 0.8, 0.4), r=b=4:<br>p1: 1 − (1 − 0.8⁴)⁴ = 0.8785 (원래 0.8에서 상승!)<br>p2: 1 − (1 − 0.4⁴)⁴ = 0.0985 (원래 0.4에서 대폭 하락!)<br>→ F' = (0.2, 0.6, 0.8785, 0.0985) ✨</p><p><b>🎯 결론</b><br>\"AND → OR = Banding.\" 이것이 Banding의 본질.</p>"}, "33": {"en": "Outline\n1. Locality-Sensitive Hashing (LSH)\n2. S-Curves\n3. LSH Families\n4. LSH with Other Distance Measures\n\n\n\n\n                           Jaemin Yoo   33", "kr": "<b>목차 (4부)</b><br>1. ✓ 2. ✓ 3. ✓ 4. <b>Other Distance Measures</b> ← 여기부터", "summary": "<p><b>🎯 4부 — 다른 거리의 LSH</b></p><p>Jaccard는 집합용. 실수 벡터엔? → <b>Angular/Cosine distance</b> + Random Hyperplane.</p>"}, "34": {"en": "LSH for Other Distance Measures\n• Let’s study the angular distance between real-valued vectors.\n• See textbook for other distance measures:\n  • Euclidean distance, Hamming distance, Edit distance, etc.\n\n\n\n\n                                 Source: Medium\n\n                                   Jaemin Yoo                     34", "kr": "<b>LSH for Other Distances</b><br>• 오늘: 실수 벡터의 <b>angular distance</b> 학습<br>• 교재 참조 (다른 거리):<br>  • Euclidean, Hamming, Edit distance 등", "summary": "<p><b>📚 각 거리별 LSH Family</b></p><table style=\"font-size:12px\"><tr><th>거리</th><th>Family</th></tr><tr><td>Jaccard</td><td>MinHash</td></tr><tr><td>Angular/Cosine</td><td>Random Hyperplane (오늘)</td></tr><tr><td>Euclidean</td><td>p-stable distribution (교재)</td></tr><tr><td>Hamming</td><td>Bit sampling (교재)</td></tr></table><p><b>💡 오늘은 Angular만</b><br>TF-IDF 같은 real-valued signature에 사용.</p>"}, "35": {"en": "Angular Distance\n• Think of a point as a vector from the origin to its location.\n• Two points’ vectors create an angle 𝜃.\n• Then, 𝜃/𝜋 is the angular distance between the vectors.\n• Normally computed from the cosine similarity cos 𝜃 .\n\n                        x\n\n\n\n                    θ       y\n                                               Cosine similarity\n\n\n                                  Jaemin Yoo                       35", "kr": "<b>Angular Distance</b><br>• 점을 원점으로부터의 벡터로 봄<br>• 두 벡터가 이루는 각 θ<br>• <b>θ/π</b> = angular distance<br>• 보통 cosine similarity cos(θ)로 계산", "summary": "<p><b>📐 Angular Distance 정의</b></p><p><b>📋 설정</b></p><ul><li>점을 원점 기준 <b>벡터</b>로 봄 (방향만 중요)</li><li>두 벡터의 사이각: θ ∈ [0, π]</li></ul><p><b>📐 공식</b><br><code>angular distance = θ / π ∈ [0, 1]</code></p><p><b>🎯 실무: Cosine Similarity</b><br>Angular distance 대신 cos(θ) 사용 일반적.<br>cos(θ) = x·y / (|x||y|)</p><p><b>🍎 해석</b></p><ul><li>θ = 0 (같은 방향): d = 0, cos = 1</li><li>θ = π/2 (수직): d = 0.5, cos = 0</li><li>θ = π (반대): d = 1, cos = -1</li></ul>"}, "36": {"en": "Random Hyperplanes\n• Random hyperplanes: Technique analogous to minhashing.\n• Two vectors 𝑥 and 𝑦 that have an angle 𝜃 define a plane.\n• All hyperplanes through the origin can be categorized into\n  • Red hyperplane where 𝑥 and 𝑦 are on the same side.\n  • Blue hyperplane where 𝑥 and 𝑦 are on different sides .\n\n                     intersections\n                                                  x\n\n\n\n                                        𝜃\n\n\n                                              y\n                                                               36", "kr": "<b>Random Hyperplanes 기법</b><br>• MinHash와 유사한 기법<br>• 벡터 x, y가 각 θ인 평면 정의<br>• 원점을 지나는 모든 hyperplane은 2 타입:<br>  • <b>Red:</b> x, y가 같은 쪽<br>  • <b>Blue:</b> x, y가 다른 쪽", "summary": "<p><b>🎯 Random Hyperplane — 개념</b></p><p><b>💡 아이디어</b><br>\"원점을 지나는 <b>random hyperplane</b>을 그어 x, y가 같은 쪽인지로 hash.\"</p><p><b>📋 2가지 케이스</b></p><ul><li><b>Red hyperplane:</b> x, y 같은 쪽</li><li><b>Blue hyperplane:</b> x, y 다른 쪽</li></ul><p><b>🎯 통계</b><br>x, y의 사이각 θ에서 random hyperplane이 red일 확률 = 1 − θ/π (증명 다음 슬라이드).</p>"}, "37": {"en": "Blue Hyperplane Case\n• Consider a vector 𝑣 that is normal to a blue-type hyperplane.\n• Then, 𝑣 ⋅ 𝑥 and 𝑣 ⋅ 𝑦 will have different signs.\n   • Since 𝑥 and 𝑦 are on different sides.\n• Even if 𝑣 extends in opposite direction, signs are still different.\n\n                                                        x\n                                   v\n\n\n                                              𝜃\n\n\n                                                    y\n\n                                       Jaemin Yoo                       37", "kr": "<b>Blue Hyperplane Case</b><br>• v = blue-type hyperplane의 법선<br>• v·x와 v·y 부호 다름<br>  • x, y가 서로 다른 쪽이므로<br>• v가 반대 방향이어도 부호 여전히 다름", "summary": "<p><b>🎯 Blue Case — 내적 부호 다름</b></p><p><b>📐 법선 벡터 v</b><br>hyperplane의 수직 방향. v·x의 부호로 \"어느 쪽\"인지 판정.</p><p><b>📐 Blue 상황</b></p><ul><li>x, y가 hyperplane의 다른 쪽</li><li>sign(v·x) ≠ sign(v·y)</li></ul><p><b>🎯 v 방향 뒤집어도</b><br>v → -v 해도 두 부호 모두 반대 → 여전히 다름. <b>Invariant</b>.</p>"}, "38": {"en": "Red Hyperplane Case\n• Suppose that 𝑣 is normal to a red-type hyperplane.\n• Then, 𝑣 ⋅ 𝑥 and 𝑣 ⋅ 𝑦 have the same sign.\n\n                                            x\n\n\n\n                             𝜃      v\n\n\n                                        y\n\n\n\n                                 Jaemin Yoo            38", "kr": "<b>Red Hyperplane Case</b><br>• v = red-type hyperplane의 법선<br>• v·x와 v·y <b>같은 부호</b> (같은 쪽)", "summary": "<p><b>🎯 Red Case — 내적 부호 같음</b></p><p><b>📐 Red 상황</b></p><ul><li>x, y가 hyperplane의 같은 쪽</li><li>sign(v·x) = sign(v·y)</li></ul><p><b>🎯 핵심 구현 아이디어</b><br>\"<b>v·x의 부호</b>를 hash로 쓰자.\" 같은 부호 ⟺ 같은 쪽 ⟺ Red.</p>"}, "39": {"en": "Blue and Red Probabilities\n• Suppose that 𝑣 is randomly chosen.\n• The probability that a hyperplane will be red-type: 1 − 𝜃/𝜋.\n\n                                                     x\n\n\n\n                                             𝜃\n\n\n                                                 y\n\n\n\n                                Jaemin Yoo                       39", "kr": "<b>Red/Blue 확률</b><br>• v를 랜덤 선택 시<br>• <b>hyperplane이 red-type일 확률 = 1 − θ/π</b><br>  • θ 작을수록 (x, y 가까울수록) red 확률↑", "summary": "<p><b>⭐⭐ 핵심 공식 — P(red) = 1 − θ/π</b></p><p><b>📐 증명 (직관)</b></p><ul><li>v를 전방향 uniform 랜덤 선택</li><li>x, y를 가르는 hyperplane은 θ 각도의 <b>호</b>에 해당</li><li>가르는 비율 = θ/π (전체 각 π 중)</li><li>∴ P(blue) = θ/π, <b>P(red) = 1 − θ/π</b></li></ul><p><b>🎯 해석</b></p><ul><li>θ 작음 (x, y 가까움) → P(red) 높음 → 같은 hash 가능성↑</li><li>θ 큼 (멀음) → P(red) 낮음 → 다른 hash</li></ul><p><b>💡 이 관계가 LSH의 핵심</b><br>거리 θ/π가 작을수록 hash 일치 확률↑ = LSH 성질!</p>"}, "40": {"en": "Random Hyperplanes\n• If the following are true:\n   • Hash function 𝑓 ∈ 𝐹 is built from a randomly-chosen vector 𝑣.\n   • Given vectors 𝑥 and 𝑦, 𝑓(𝑥) = 𝑓(𝑦) iff 𝑣 ⋅ 𝑥 and 𝑣 ⋅ 𝑦 have the same sign.\n      • Red-type hyperplane.\n• Then, 𝐹 is (𝑑\" , 𝑑# , 1 − 𝑑\" /𝜋, 1 − 𝑑# /𝜋)-sensitive.\n• We can amplify 𝐹 as we wish, just like the minhash-based family.\n\n\n\n\n                                     Jaemin Yoo                                   40", "kr": "<b>Random Hyperplanes LSH Family</b><br>• 함수 f ∈ F는 random 벡터 v로 구성<br>• f(x) = f(y) iff v·x, v·y 같은 부호 (red-type)<br>• <b>F = (d1, d2, 1 − d1/π, 1 − d2/π)-sensitive</b><br>• MinHash처럼 amplification 가능", "summary": "<p><b>⭐⭐ Random Hyperplane LSH Family (Cosine용)</b></p><p><b>📐 정의</b></p><ul><li>각 f ∈ F는 random unit 벡터 v에 해당</li><li>f(x) = sign(v·x)</li><li>f(x) = f(y) ⟺ v·x, v·y 같은 부호 (red)</li></ul><p><b>⭐ Sensitivity</b><br><code>F = (d1, d2, 1 − d1/π, 1 − d2/π)-sensitive</code></p><p>(Jaccard의 MinHash 공식 (1−d1, 1−d2)와 유사 구조)</p><p><b>💡 Amplification</b><br>MinHash처럼 AND → OR로 S-curve 만들 수 있음.</p><p><b>🎯 실무</b><br>TF-IDF, Word2Vec 등 real-valued 벡터 유사도에 널리 사용.</p>"}, "41": {"en": "Summary\n1. Locality-Sensitive Hashing (LSH)\n  • Banding technique\n2. S-Curves\n  • Choosing the values of 𝑟 and 𝑏\n3. LSH Families\n  • 𝑑!, 𝑑\", 𝑝!, 𝑝\" -sensitivity\n  • AND and OR constructions\n4. LSH with Other Distance Measures\n  • Random hyperplanes\n\n\n                                     Jaemin Yoo   41", "kr": "<b>요약</b><br>1. LSH — Banding 기법<br>2. S-Curves — r, b 선택<br>3. LSH Families — (d1, d2, p1, p2)-sensitive, AND/OR<br>4. Other Distances — Random Hyperplanes (cosine)", "summary": "<p><b>🎬 L7 마무리 — 시험 대비</b></p><p><b>✅ 공식 암기</b></p><ul><li>S-curve: P = 1 − (1 − s^r)^b</li><li>Threshold: s* ≈ (1/b)^(1/r)</li><li>중심 y값: 0.63 (= 1 − 1/e)</li><li>AND: p → p^r</li><li>OR: p → 1 − (1 − p)^b</li><li>Random Hyperplane: P(red) = 1 − θ/π</li></ul><p><b>✅ 개념</b></p><ul><li>거리 공리 4개 (non-neg, identity, symmetric, triangle)</li><li>Jaccard similarity 거리 X, Jaccard distance 거리 O</li><li>(d1, d2, p1, p2)-sensitive 정의</li><li>AND-OR = Banding 본질</li></ul><p><b>⭐ 기출 예상</b></p><ul><li>S-curve 단계별 유도</li><li>Threshold 계산: 주어진 b, r로</li><li>T/F: 거리 공리, MinHash vs Hyperplane</li><li>FP/FN 계산: 특정 유사도에서</li></ul>"}}, "8": {"1": {"en": "Clustering 1\nIntroduction to Data Mining\n Seoul National University\n       Spring 2026\n\n\n\n\n          Jaemin Yoo          1", "kr": "<b>Clustering 1</b><br>서울대 · 2026 봄 · Jaemin Yoo", "summary": "<p><b>🎬 L8 시작 — Clustering 1</b><br>유사 pair 찾기(L6-7)를 넘어 <b>전역 그룹핑</b>으로. Hierarchical(bottom-up tree) + k-means(point assignment).</p><p><b>⭐ 시험 포인트</b></p><ul><li>차원의 저주 (★★)</li><li>Centroid vs Clustroid (★★)</li><li>Hierarchical 3대 질문 (★★)</li><li>k-means Lloyd 알고리즘 (★★★)</li><li>k-means++ D² 확률 (★★★)</li><li>Elbow method (★★)</li></ul>"}, "2": {"en": "Announcements\n• Assignments:\n  • HW1 is posted (deadline: April 9).\n• Languages:\n  • Assignments allow only English.\n  • Exams allow both English and Korean.\n• Using eTL:\n  • You can ask any questions regarding lectures on the Lectures board.\n\n\n\n\n                                    Jaemin Yoo                            2", "kr": "<b>공지</b><br>• HW1 게시됨 (마감 4/9)<br>• 언어: 과제는 영어만, 시험은 영어/한국어 모두 OK<br>• eTL Lectures 게시판에 질문 가능", "summary": "<p><b>📢 운영 공지</b></p><ul><li>HW1 마감 4/9</li><li>시험은 영어/한국어 모두 OK</li><li>질문은 eTL Lectures 게시판</li></ul>"}, "3": {"en": "Recap: LSH\n• Locality Sensitive Hashing (LSH)\n   • S-curves\n• Theory of LSH:\n   • Locality-sensitive families\n   • AND and OR constructions\n                                                 1\n• Other distance measures:\n                                   Probability of\n   • Random hyperplanes            becoming a 0.63\n                                   candidate\n\n\n                                                 0\n                                                     0   (1/b)1/r       1\n                                    Jaemin Yoo                      3", "kr": "<b>복습: LSH</b><br>• LSH + S-curves<br>• LSH theory: locality-sensitive families, AND/OR<br>• Other distances: Random hyperplanes<br>• Curve 중심: (1/b)^(1/r), 0.63", "summary": "<p><b>🔙 L7 복습</b></p><ul><li>LSH: banding으로 candidate pair 선별</li><li>S-curve: 1 − (1−s^r)^b</li><li>Threshold ≈ (1/b)^(1/r), y = 0.63</li><li>일반화: (d1, d2, p1, p2)-sensitive family, AND/OR</li><li>Cosine용: Random hyperplane</li></ul><p><b>💡 L8 전환</b><br>L6-7은 <b>pair</b> 찾기. L8은 <b>cluster</b> 찾기 (그룹 단위).</p>"}, "4": {"en": "Outline\n1. Clustering\n2. Hierarchical Clustering\n3. K-means Clustering\n\n\n\n\n                             Jaemin Yoo   4", "kr": "<b>목차</b><ol><li>Clustering</li><li>Hierarchical Clustering</li><li>K-means Clustering</li></ol>", "summary": "<p><b>🗺️ L8 3부 구성</b></p><ol><li><b>Clustering</b> — 정의 + 차원의 저주 + 전략</li><li><b>Hierarchical</b> — bottom-up tree</li><li><b>K-means</b> — point assignment</li></ol>"}, "5": {"en": "Clustering\n• The process of grouping a collection of points into clusters.\n   • Members of the same cluster are close/similar to each other.\n   • Members of different clusters are dissimilar.\n• We focus on cases when\n   • Data is very large.\n   • Space is high-dimensional.\n   • Space is non-Euclidean.\n   • Similarity can be defined using any distance measure.\n\n\n\n\n                                    Jaemin Yoo                      5", "kr": "<b>Clustering 정의</b><br>• 점들을 cluster로 그룹핑<br>  • 같은 cluster 구성원은 서로 가까움/유사<br>  • 다른 cluster는 비유사<br>• 이 강의 포커스:<br>  • 매우 큰 데이터<br>  • 고차원 공간<br>  • Non-Euclidean 공간<br>  • 어떤 distance measure든 가능", "summary": "<p><b>🎯 Clustering 정의</b></p><p><b>📐 목표</b><br>\"점들을 <b>cluster</b>로 그룹핑:</p><ul><li>같은 cluster = 서로 가까움/유사</li><li>다른 cluster = 비유사\"</li></ul><p><b>🎯 이 강의의 포커스</b></p><ul><li>대용량 데이터 (메모리 초과)</li><li>고차원 (차원의 저주)</li><li>Non-Euclidean 공간 (centroid 불가)</li><li>어떤 distance measure든 OK</li></ul><p>단순 k-means를 넘어 L9의 streaming 알고리즘까지 다룸.</p>"}, "6": {"en": "Distance Measures\n• Distance measure gives a distance between two points.\n  • Recall the 4 requirements for a distance measure.\n• Popular distance measures in a Euclidean space include:\n  • Euclidean (L2) distance: ∑! 𝑥! − 𝑦! \".\n  • Manhattan (L1) distance: ∑! 𝑥! − 𝑦! .\n  • L0 distance: ∑! 1 if 𝑥! ≠ 𝑥# else 0 .\n  • L-Infinity distance: max 𝑥! − 𝑦! .\n                        !\n\n\n\n\n                                  Jaemin Yoo                6", "kr": "<b>Distance Measures</b><br>• 4개 공리 필요 (L7 복습)<br>• Euclidean 공간의 인기 distance:<br>  • <b>L2 (Euclidean):</b> √Σ(x_i − y_i)²<br>  • <b>L1 (Manhattan):</b> Σ|x_i − y_i|<br>  • <b>L0:</b> Σ 1[x_i ≠ y_i] (hamming-like)<br>  • <b>L∞:</b> max_i |x_i − y_i|", "summary": "<p><b>📐 L_p Norm 4가지</b></p><table style=\"font-size:12px\"><tr><th>p</th><th>이름</th><th>공식</th></tr><tr><td>L2</td><td>Euclidean</td><td>√Σ(x_i − y_i)²</td></tr><tr><td>L1</td><td>Manhattan</td><td>Σ|x_i − y_i|</td></tr><tr><td>L0</td><td>Hamming-like</td><td>Σ 1[x_i ≠ y_i]</td></tr><tr><td>L∞</td><td>Chebyshev</td><td>max_i |x_i − y_i|</td></tr></table><p><b>💡 직관</b></p><ul><li>L2: 직선거리</li><li>L1: 격자 이동 (맨해튼 블록)</li><li>L∞: 가장 큰 축 차이</li></ul><p><b>📝 시험</b><br>\"L2는 triangle inequality 만족\" 같은 공리 체크 기출.</p>"}, "7": {"en": "Example: Clusters and Outliers\n\n\n\n\n                 Source: Stanford CS246 (2022)\n\n                          Jaemin Yoo             7", "kr": "<b>Cluster와 Outlier 예시</b><br>(Stanford CS246) 2D 점 그림. Cluster 3개 + 소수 outlier 시각화.", "summary": "<p><b>📊 시각적 예시</b><br>Stanford 슬라이드: 2D 평면에 점들 흩어짐. 명확히 뭉친 3개 그룹 + 외떨어진 몇 점 (outlier).</p><p><b>💡 Outlier</b><br>어떤 cluster에도 잘 맞지 않는 점. 실무에선 <b>따로 처리</b> (노이즈 제거 or 이상 감지).</p>"}, "8": {"en": "Example: Documents\n• Represent a document by a vector (𝑥! , 𝑥\" , ⋯ , 𝑥# ).\n   • 𝑥! = 1 iff the 𝑖-th word appears in the document.\n• Idea: Documents with similar words are about the same topic.\n• Task: Find clusters of documents.\n   • Different from finding similar pairs, which returns document pairs.\n\n\n\n\n                                    Jaemin Yoo                             8", "kr": "<b>예: 문서 Clustering</b><br>• 문서를 벡터 (x_1, ..., x_k)로 표현<br>  • x_i = 1 iff i번째 단어가 문서에 등장<br>• 아이디어: 비슷한 단어를 가진 문서는 같은 주제<br>• 작업: 문서 cluster 찾기<br>  • similar pair 찾기와 다름 (pair가 아닌 group)", "summary": "<p><b>📄 예: 문서 Clustering</b></p><p><b>📐 설정</b></p><ul><li>문서 = bag-of-words 벡터 (x_1, ..., x_k)</li><li>x_i = 1 if i번째 단어 등장, 0 otherwise</li></ul><p><b>🎯 목표</b><br>\"비슷한 단어 vector = 같은 주제\" → 문서를 <b>주제별 그룹</b>으로.</p><p><b>⚠️ L6-7과 차이</b></p><ul><li>L6-7: \"어떤 문서 pair가 유사한가\" (pairwise)</li><li>L8: \"전체 문서를 몇 개 group으로\" (global)</li></ul>"}, "9": {"en": "Cosine, Jaccard, and Euclidean\n• We have a choice when we think of documents as sets of words:\n  • Sets as vectors: Measure similarity by the cosine distance.\n  • Sets as sets: Measure similarity by the Jaccard distance.\n  • Sets as points: Measure similarity by the Euclidean distance.\n\n\n\n\n                                   Jaemin Yoo                       9", "kr": "<b>Cosine, Jaccard, Euclidean</b><br>• 문서를 단어 집합으로 볼 때 선택지:<br>  • <b>벡터로:</b> Cosine distance<br>  • <b>집합으로:</b> Jaccard distance<br>  • <b>점으로:</b> Euclidean distance", "summary": "<p><b>🎯 같은 데이터, 다른 거리</b></p><table style=\"font-size:12px\"><tr><th>문서 view</th><th>Distance</th></tr><tr><td>실수 벡터</td><td>Cosine</td></tr><tr><td>단어 집합</td><td>Jaccard</td></tr><tr><td>0/1 벡터를 점으로</td><td>Euclidean</td></tr></table><p><b>💡 선택이 결과 좌우</b><br>같은 문서 데이터도 거리 선택에 따라 cluster 결과 달라짐. 도메인에 맞는 선택 필요.</p>"}, "10": {"en": "Clustering in Low-Dimensional Space\n• Clustering in two dimensions looks easy.\n                                              Jindo\n\n\n\n                  Sapsali\n\n\n\n\n                                                      Pungsan\n     Heigh\n     t\n\n\n                            Weight\n                                 Jaemin Yoo                     10", "kr": "<b>저차원 Clustering은 쉬움</b><br>• 2D에서 Clustering은 직관적 (진도개, 삽살이, 풍산개 예시)", "summary": "<p><b>🎯 저차원은 직관</b></p><p>2D 평면에 점 그리면 사람 눈으로도 cluster 보임. (진도개/삽살이/풍산개 비유 — 사진만 봐도 구분.)</p><p><b>🚨 but 고차원에선?</b><br>다음 슬라이드의 <b>차원의 저주</b> 주의!</p>"}, "11": {"en": "The Curse of Dimensionality\n• High-dimensional spaces have the curse of dimensionality.\n  • Almost all pairs of points are equally far away from one another.\n\n\n\n\n                                    Jaemin Yoo                          11", "kr": "<b>차원의 저주 (The Curse of Dimensionality)</b><br>• 고차원 공간은 차원의 저주 겪음<br>  • <b>거의 모든 pair가 동일하게 멀어짐</b>", "summary": "<p><b>⭐⭐ 차원의 저주 — 핵심 개념</b></p><p><b>💡 정의</b><br>\"고차원 공간에선 <b>거의 모든 pair의 거리가 비슷해짐</b>.\" → 거리로 cluster 구분 불가능.</p><p><b>🚨 시사점</b></p><ul><li>2D에선 cluster 간 거리 구별 명확</li><li>1000D에선 \"가까운 점\"과 \"먼 점\" 거의 차이 없음</li><li>→ k-means 같은 distance 기반 알고리즘 실패</li></ul><p><b>💡 해결</b><br>차원 축소 (L10-11: PCA, SVD) 먼저 적용 후 clustering.</p>"}, "12": {"en": "The Curse of Dimensionality\n• Consider two random points in the 𝑛-dimensional unit hypercube.\n• The variance of their distance goes to a constant when 𝑛 → ∞.\n  • But the possible range is 0, 𝑛 .\n• Suppose that 𝑛 = 2500.\n  • The distance can be anything in 0, 50 .\n  • However, most distances are in 20, 21 .\n\n\n\n\n    Source: https://math.stackexchange.com/questions/1976842/how-is-the-distance-of-two-random-points-in-a-unit-hypercube-distributed\n                                                               Jaemin Yoo                                                               12", "kr": "<b>차원의 저주 정량화</b><br>• n차원 unit hypercube의 두 random 점<br>  • 두 점 거리의 variance는 n→∞에서 상수로 수렴<br>  • 하지만 가능 범위는 [0, √n]<br>• n = 2500 가정:<br>  • 거리는 [0, 50] 범위 가능<br>  • 하지만 대부분 거리가 [20, 21]에 집중", "summary": "<p><b>📐 차원의 저주 수치화</b></p><p><b>🧮 계산</b><br>n차원 unit cube 내 random 2점:</p><ul><li>거리 variance는 n→∞에서 <b>상수</b>로 수렴</li><li>하지만 가능 거리 범위는 [0, √n]</li></ul><p><b>🍎 예: n = 2500</b></p><ul><li>이론적 거리 범위: [0, 50]</li><li>실제 대부분 거리: <b>[20, 21] 사이</b></li><li>→ 전체 50 중 1만 활용. 구별력 거의 없음!</li></ul><p><b>💡 결론</b><br>차원이 높으면 \"가깝다 vs 멀다\" 판별 사실상 불가능. 차원 축소 필수.</p>"}, "13": {"en": "Clustering Strategies\n• Hierarchical:\n  • Agglomerative (bottom up)\n     • Initially, each point is a cluster.                   A   B   C   D   E   F\n     • Repeatedly combine the “nearest” clusters into one.\n  • Divisive (top down)\n     • Start with one cluster and recursively split it.\n• Point assignment:\n  • Maintain a set of clusters.\n  • Points belong to the “nearest” clusters.\n\n\n\n                                           Jaemin Yoo                                13", "kr": "<b>Clustering 전략 분류</b><br>• <b>Hierarchical:</b><br>  • Agglomerative (bottom-up): 각 점이 cluster → 가장 가까운 둘 병합 반복<br>  • Divisive (top-down): 하나의 cluster → 재귀적 분할<br>• <b>Point Assignment:</b><br>  • cluster 집합 유지<br>  • 점은 \"가장 가까운\" cluster에 속함", "summary": "<p><b>⭐ Clustering 2대 전략</b></p><p><b>🌳 Hierarchical</b></p><ul><li><b>Agglomerative (bottom-up):</b> 각 점이 자기 cluster → 가장 가까운 둘 병합 반복 → 트리</li><li><b>Divisive (top-down):</b> 전체 1 cluster → 재귀적 분할</li></ul><p><b>📍 Point Assignment</b></p><ul><li>k개 cluster 유지</li><li>각 점은 \"가장 가까운\" cluster에 배정</li><li>예: k-means</li></ul><p><b>💡 선택 기준</b></p><ul><li>cluster 구조 탐색 → Hierarchical</li><li>k 정해진 그룹핑 → Point Assignment</li></ul>"}, "14": {"en": "Hierarchical vs. Point-Assignment\n• (Left) Point assignment is good when clusters have nice shapes.\n• (Right) Hierarchical methods can win when the shapes are weird.\n  • Note that both clusters have essentially the same centroid.\n\n\n\n\n                              Source: Stanford CS246 (2022)\n\n\n                                       Jaemin Yoo                   14", "kr": "<b>Hierarchical vs Point Assignment</b><br>• <b>왼쪽:</b> cluster 모양 예쁘면 Point Assignment 유리<br>• <b>오른쪽:</b> 이상한 모양이면 Hierarchical 유리<br>  • 주의: 두 cluster의 centroid 사실상 같은 경우", "summary": "<p><b>🎯 모양별 알고리즘 선택</b></p><p><b>📊 두 케이스</b></p><ul><li><b>구형 cluster:</b> Point Assignment(k-means) 유리. Centroid 기반이 잘 작동</li><li><b>비구형 cluster:</b> Hierarchical 유리. centroid가 애매한 경우 (예: 도넛 모양)</li></ul><p><b>⚠️ 함정 예시</b><br>두 반원 모양 cluster가 있으면, 두 cluster의 centroid가 <b>거의 같은 곳</b>에 올 수 있음 → k-means 실패. Hierarchical은 점 간 거리로 잘 분리.</p>"}, "15": {"en": "Clustering Strategies\n• In Euclidean:\n  • Points are vectors of real numbers, i.e. coordinates.\n  • It is possible to summarize a set of points as a centroid.\n  • Distance measure: L2 norm, L1 norm, etc.\n• In non-Euclidean:\n  • There is no notion of “location” or centroids.\n  • We should summarize a collection of points differently.\n  • Distance measures: Jaccard, Hamming, cosine, etc.\n\n\n\n\n                                    Jaemin Yoo                   15", "kr": "<b>Euclidean vs Non-Euclidean</b><br>• <b>Euclidean:</b><br>  • 점 = 실수 벡터 (좌표)<br>  • 점 집합을 centroid로 요약 가능<br>  • Distance: L2, L1 norm 등<br>• <b>Non-Euclidean:</b><br>  • \"위치\" 개념 없음, centroid 불가<br>  • 다른 방식으로 요약해야<br>  • Distance: Jaccard, Hamming, cosine 등", "summary": "<p><b>⭐ Euclidean vs Non-Euclidean</b></p><table style=\"font-size:12px\"><tr><th></th><th>Euclidean</th><th>Non-Euclidean</th></tr><tr><td>점 표현</td><td>실수 벡터 (좌표)</td><td>좌표 없음</td></tr><tr><td>Centroid 가능?</td><td>✅ 평균 계산</td><td>❌ 불가</td></tr><tr><td>요약</td><td>centroid</td><td>clustroid (실제 점)</td></tr><tr><td>Distance</td><td>L2, L1</td><td>Jaccard, Hamming, Cosine</td></tr></table><p><b>💡 핵심</b><br>\"Non-Euclidean에선 centroid 못 쓴다.\" → 다음 슬라이드 예시.</p>"}, "16": {"en": "Non-Euclidean Space\n• Finding the center of points is difficult in a non-Euclidean space.\n   • E.g., a simple average of three points will not lie on the sphere.\n\n\n\n\n                                    Source: LinkedIn\n\n                                      Jaemin Yoo                          16", "kr": "<b>Non-Euclidean 공간 예시</b><br>• 비유클리드에서 점들의 \"중심\" 찾기 어려움<br>  • 예: 구면(sphere) 위의 세 점의 평균은 구면에 있지 않음", "summary": "<p><b>🌐 Non-Euclidean 예시</b></p><p><b>🍎 구면(sphere) 위 점</b><br>지구 표면의 3개 도시를 점으로 볼 때, 3점의 <b>수학적 평균</b>은 지구 내부에 떨어짐 (표면 아님!).</p><p><b>💡 결론</b><br>\"평균\"이 같은 공간에 있으리란 보장 없음. centroid 개념 통하지 않음.</p><p><b>📝 T/F 함정</b><br>\"Non-Euclidean에서 centroid 계산 가능\" → <b>FALSE</b>. Clustroid 써야.</p>"}, "17": {"en": "Clustering Strategies\n• In-memory clustering: Easier if the data fit in memory.\n   • Example: K-means\n• Large-data clustering: Load one batch of data at a time.\n   • Cluster them in memory and keep summaries of clusters.\n   • Example: BFR and CURE\n\n\n\n\n                                  Jaemin Yoo                  17", "kr": "<b>Clustering 메모리 전략</b><br>• <b>In-memory:</b> 데이터 메모리에 들어가면 쉬움<br>  • 예: k-means<br>• <b>Large-data:</b> 한 batch씩 로드<br>  • 메모리에서 cluster하고 요약 유지<br>  • 예: BFR, CURE (L9에서 배움)", "summary": "<p><b>💾 메모리 전략 2가지</b></p><p><b>🟢 In-memory (L8)</b></p><ul><li>전체 데이터 메모리에 들어감</li><li>쉽고 정확</li><li>예: k-means, Hierarchical</li></ul><p><b>🟡 Large-data / Streaming (L9)</b></p><ul><li>전체 메모리 초과</li><li>batch 단위로 로드, 요약 유지</li><li>예: BFR, CURE, GRGPF</li></ul><p><b>💡 L8/L9 분담</b><br>L8은 \"이상적 상황\", L9은 \"실무 대용량\".</p>"}, "18": {"en": "Outline\n1. Clustering\n2. Hierarchical Clustering\n3. K-means Clustering\n\n\n\n\n                             Jaemin Yoo   18", "kr": "<b>목차 (2부)</b><br>1. ✓ 2. <b>Hierarchical Clustering</b> ← 여기부터 3. k-means", "summary": "<p><b>🎯 2부 — Hierarchical Clustering</b></p><p>Bottom-up 트리 구조. 3대 설계 질문에 답해야.</p>"}, "19": {"en": "Hierarchical Clustering\n• Key operation: Repeatedly merge two “nearest” clusters.\n• Three important questions:\n  1. How to represent a cluster?\n  2. How to determine the nearness of clusters?\n  3. When to stop merging clusters?\n\n\n\n\n                          A   B   C     D      E   F\n\n\n\n                                  Jaemin Yoo                19", "kr": "<b>Hierarchical Clustering 핵심</b><br>• 핵심 연산: 가장 가까운 두 cluster 반복 병합<br>• <b>3대 질문:</b><br>  1. Cluster를 어떻게 표현?<br>  2. Cluster 간 가까움을 어떻게 결정?<br>  3. 언제 병합을 멈출까?", "summary": "<p><b>⭐⭐ Hierarchical 3대 질문</b></p><p><b>🎯 핵심 연산</b><br>\"가장 가까운 두 cluster 반복 병합.\"</p><p><b>📋 3대 설계 질문</b></p><ol><li><b>Q1:</b> Cluster를 어떻게 표현? (centroid? clustroid? 전체 점?)</li><li><b>Q2:</b> Cluster 간 가까움? (centroid 간 거리? 최소/최대/평균 pairwise?)</li><li><b>Q3:</b> 언제 멈춤? (k 도달? diameter threshold?)</li></ol><p><b>💡 답</b><br>Euclidean/Non-Euclidean에 따라 다름. 이어지는 슬라이드.</p>"}, "20": {"en": "Hierarchical Clustering: Euclidean\n• In the Euclidean case, our answers are straightforward.\n• Q1: How to represent a cluster of many points?\n   • As we merge clusters, we represent the “location” of each cluster by\n      • Its centroid = average of its (data) points.\n• Q2: How to determine the nearness of clusters?\n   • Measure cluster distances by the distances between their centroids.\n   • Merge two clusters with the shortest distance.\n\n\n\n\n                                            Jaemin Yoo                      20", "kr": "<b>Hierarchical: Euclidean case</b><br>• Q1: Cluster 표현 = <b>centroid (평균)</b><br>• Q2: Cluster 가까움 = centroid 간 거리<br>• 병합: 거리 최소 두 cluster", "summary": "<p><b>🎯 Euclidean Case — 간단 명료</b></p><p><b>📐 답</b></p><ul><li><b>Q1:</b> Cluster 표현 = <b>centroid</b> (모든 점의 평균)</li><li><b>Q2:</b> Cluster 가까움 = <b>centroid 간 Euclidean distance</b></li><li>병합: 가장 가까운 centroid pair</li></ul><p><b>💡 Centroid 업데이트</b><br>cluster C1, C2 병합 시 centroid_new = (n1·c1 + n2·c2) / (n1 + n2) (가중

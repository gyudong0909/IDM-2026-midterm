 평균)</p>"}, "21": {"en": "Example: Hierarchical Clustering\n\n                                                       (5,3)\n\n\n                (1,2)\n\n\n\n                           (2,1)               (4,1)\n\n\n        (0,0)\n                                                               (5,0)\n\n\n\n\n                        Data:\n                         = data point                                  Dendogram\n                         = centroid\n\n                                        Jaemin Yoo                                 21", "kr": "<b>Hierarchical 예제 1</b><br>6점: (0,0), (1,2), (2,1), (4,1), (5,0), (5,3). 초기 각각 자기 cluster, dendogram 시작.", "summary": "<p><b>🎯 예제 실행 — 초기</b></p><p><b>📋 6점</b><br>(0,0), (1,2), (2,1), (4,1), (5,0), (5,3)</p><p><b>🟦 초기 상태</b></p><ul><li>각 점이 자기 자신 cluster (6개 cluster)</li><li>Dendogram: 6개 leaf</li></ul><p><b>🎯 다음: pairwise distance 계산 후 최소 pair 병합</b></p>"}, "22": {"en": "Example: Hierarchical Clustering\n\n                                                         (5,3)\n\n\n                (1,2)\n\n                        (1.5,1.5)\n\n                             (2,1)             (4,1)\n\n\n        (0,0)\n                                            (4.5, 0.5)\n                                                                 (5,0)\n\n\n\n\n                        Data:\n                         = data point                                    Dendogram\n                         = centroid\n\n                                        Jaemin Yoo                                   22", "kr": "<b>Hierarchical 예제 2</b><br>첫 병합: (1,2) + (2,1) → centroid (1.5, 1.5). (4,1) + (5,0) → centroid (4.5, 0.5).", "summary": "<p><b>🎯 예제 실행 — 첫 병합</b></p><p><b>🔄 최소 거리 pair 찾기</b></p><ul><li>(1,2)-(2,1) 거리: √2 ≈ 1.41</li><li>(4,1)-(5,0) 거리: √2 ≈ 1.41</li><li>→ 둘 다 최소. 순서 상관 없이 병합.</li></ul><p><b>📐 새 centroid</b></p><ul><li>(1,2) + (2,1) → <b>(1.5, 1.5)</b></li><li>(4,1) + (5,0) → <b>(4.5, 0.5)</b></li></ul><p><b>📊 Dendogram</b><br>2 쌍이 각각 내부 노드로 합쳐짐.</p>"}, "23": {"en": "Example: Hierarchical Clustering\n\n                                                         (5,3)\n\n\n                (1,2)\n\n                        (1.5,1.5)\n\n                             (2,1)             (4,1)\n\n\n        (0,0)\n                                            (4.5, 0.5)\n                                                                 (5,0)\n\n\n\n\n                        Data:\n                         = data point                                    Dendogram\n                         = centroid\n\n                                        Jaemin Yoo                                   23", "kr": "<b>Hierarchical 예제 3</b><br>두 번째 병합: (4.5, 0.5) + (5,3). 또는 (1.5, 1.5) + (0,0).", "summary": "<p><b>🎯 예제 실행 — 2차 병합</b></p><p><b>🔄 새로운 거리 계산</b></p><ul><li>(0,0)-(1.5, 1.5): √4.5 ≈ 2.12</li><li>(1.5, 1.5)-(4.5, 0.5): √10 ≈ 3.16</li><li>(4.5, 0.5)-(5, 3): √6.5 ≈ 2.55</li><li>(0,0)-(4.5, 0.5): ≈ 4.53</li></ul><p><b>📐 최소: (0,0) + (1.5, 1.5) → centroid (0.75, 0.75)</b></p><p>Dendogram 성장 중.</p>"}, "24": {"en": "Example: Hierarchical Clustering\n\n                                                         (5,3)\n\n\n                (1,2)\n\n                        (1.5,1.5)\n\n                             (2,1)             (4,1)\n\n\n        (0,0)\n                                            (4.5, 0.5)\n                                                                 (5,0)\n\n\n\n\n                        Data:\n                         = data point                                    Dendogram\n                         = centroid\n\n                                        Jaemin Yoo                                   24", "kr": "<b>Hierarchical 예제 4</b><br>최종 병합까지 진행. Dendogram 완성.</b>", "summary": "<p><b>🎯 예제 실행 — 최종</b></p><p>병합 계속 → 모두 하나로 합쳐져 dendogram 완성.</p><p><b>📊 Dendogram 활용</b></p><ul><li>원하는 cluster 수 k에서 \"가로로 자르면\" k개 cluster 얻음</li><li>높이 축 = 병합 시 거리</li></ul><p><b>💡 장점</b><br>한 번 계산하면 k를 바꿔가며 여러 cluster 구성 탐색 가능.</p>"}, "25": {"en": "Efficiency of Hierarchical Clustering\n• Basic algorithm:\n  • At each step, compute distances between pairs of clusters.\n  • Running time is 𝑂(𝑛$), since 𝑛\" + 𝑛 − 1 \" + 𝑛 − 2 \" + ⋯\n\n\n\n\n                                  Jaemin Yoo                     25", "kr": "<b>Hierarchical 효율성</b><br>• Basic: 각 step마다 pair distance 계산<br>• 시간 복잡도: O(n³) — n² + (n-1)² + (n-2)² + ...", "summary": "<p><b>🐌 나이브 구현의 한계</b></p><p><b>📐 시간 복잡도</b></p><ul><li>step k: cluster 수 n-k. pairwise 비교 O((n-k)²)</li><li>총합: Σ (n-k)² = <b>O(n³)</b></li></ul><p><b>🚨 대용량엔 무리</b><br>n = 10,000 → 10¹² 비교. 몇 시간~며칠 소요.</p><p><b>💡 개선</b><br>Priority queue로 O(n² log n)까지 감소 (다음 슬라이드).</p>"}, "26": {"en": "Efficiency of Hierarchical Clustering\n• More efficient implementation uses a priority queue.\n   • Store a collection of prioritized elements.\n   • The overall algorithm is 𝑂 𝑛\" log 𝑛 , which is better than 𝑂 𝑛$ .\n• Why is it better?\n   • We avoid re-computing the distances computed earlier.\n   • See textbook for details.\n\n\n\n\n                                     Jaemin Yoo                          26", "kr": "<b>효율적 구현 (Priority Queue)</b><br>• Priority queue로 이미 계산한 거리 저장<br>• <b>전체: O(n² log n)</b>, O(n³)보다 개선<br>• 재계산 회피로 개선 (교재 참조)", "summary": "<p><b>⚡ PQ로 O(n² log n) 개선</b></p><p><b>💡 아이디어</b></p><ul><li>모든 pair 거리를 priority queue에 저장</li><li>병합 때마다 관련 거리만 update (전체 재계산 X)</li><li>PQ는 O(log n) insert/extract</li></ul><p><b>📐 총합</b><br>O(n² log n) — 여전히 n²라 대용량엔 부족 but O(n³)보다 낫다.</p><p><b>🎯 결론</b><br>Hierarchical은 <b>중규모 데이터</b>(~1만)까지만 실용적. 대용량은 L9의 streaming 알고리즘.</p>"}, "27": {"en": "Hierarchical Clustering: Non-Euclidean\n• In a non-Euclidean case:\n  • The only “locations” we can talk about are the points themselves.\n• Three possible approaches regarding the questions:\n  • Q1: How to represent a cluster of many points?\n  • Q2: How to determine the nearness of clusters?\n  • Note: These approaches can also be used in the Euclidean case.\n\n\n\n\n                                   Jaemin Yoo                           27", "kr": "<b>Hierarchical: Non-Euclidean</b><br>• \"위치\"는 점 자체만 가능<br>• 3가지 접근으로 Q1, Q2 해결 (Euclidean에도 적용 가능)", "summary": "<p><b>🌐 Non-Euclidean Hierarchical</b></p><p><b>🚨 문제</b><br>Centroid 못 씀. \"위치\"는 <b>실제 점</b>으로만 표현 가능.</p><p><b>📋 3가지 해결 전략</b></p><ol><li>Clustroid 사용 (Approach 1)</li><li>Inter-cluster link distance (Approach 2)</li><li>Cohesion 기반 (Approach 3)</li></ol><p><b>💡 주의</b><br>이 3가지는 Euclidean에도 적용 가능. Non-Euclidean에 <b>필수</b>일 뿐.</p>"}, "28": {"en": "Non-Euclidean Approach 1\n• Q1: How to represent a cluster of many points?\n  • Pick a clustroid = (data) point “closest” to all other points.\n  • Possible meanings of “closest”:\n     • Smallest maximum / average distance to all other points.\n• Q2: How to determine the nearness of clusters?\n  • Treat clustroid as if it were centroid.\n\n\n\n\n                                        Jaemin Yoo                   28", "kr": "<b>Non-Euclidean Approach 1</b><br>• Q1: <b>Clustroid</b> 선택<br>  • 다른 모든 점에 \"가장 가까운\" 데이터 점<br>  • \"가장 가까움\" = min max / min mean distance<br>• Q2: clustroid를 centroid처럼 사용", "summary": "<p><b>⭐⭐ Approach 1 — Clustroid</b></p><p><b>📐 Clustroid 정의</b><br>\"cluster 내 <b>다른 모든 점에 가장 가까운</b> 데이터 점.\"</p><p><b>📐 \"가장 가까움\" 정의 방식</b></p><ul><li>min max: 가장 먼 거리가 작은 점 (minimax)</li><li>min mean: 평균 거리가 작은 점</li><li>min sum of squared: 제곱 거리 합 최소</li></ul><p><b>💡 센트로이드처럼 사용</b><br>Q2: clustroid 간 거리로 cluster 가까움 판정.</p>"}, "29": {"en": "Centroids vs. Clustroids\n• Centroid is the average of all (data) points in the cluster.\n   • This means the centroid is an “artificial” point.\n• Clustroid is an existing point that is “closest” to all other points.\n\n\n\n\n                                 Source: Stanford CS246 (2022)\n\n\n\n\n                                          Jaemin Yoo                      29", "kr": "<b>Centroid vs Clustroid</b><br>• <b>Centroid:</b> cluster 모든 점의 평균 = \"artificial\" 점<br>• <b>Clustroid:</b> \"다른 모든 점에 가장 가까운\" <b>실제</b> 점", "summary": "<p><b>⭐ Centroid vs Clustroid — 핵심 비교</b></p><table style=\"font-size:12px\"><tr><th></th><th>Centroid</th><th>Clustroid</th></tr><tr><td>정의</td><td>평균(벡터)</td><td>\"가장 중심\" 실제 점</td></tr><tr><td>실재성</td><td>Artificial</td><td>Real data point</td></tr><tr><td>Space</td><td>Euclidean only</td><td>Any (non-Eucl OK)</td></tr><tr><td>계산</td><td>산술 평균</td><td>minimax/minmean</td></tr></table><p><b>📝 T/F 단골</b></p><ul><li>\"Clustroid is a real data point\" → <b>TRUE</b></li><li>\"Centroid always exists\" → <b>FALSE</b> (non-Eucl)</li></ul>"}, "30": {"en": "Non-Euclidean Approach 2\n• Q1: How to represent a cluster of many points?\n  • As the collection of points in the cluster.\n• Q2: How to determine the nearness of clusters?\n  • Define inter-cluster distance:\n     • Minimum of the distances between any two points, one from each cluster.\n     • Average distance of all pairs of points, one from each cluster.\n\n\n\n\n                                       Jaemin Yoo                                30", "kr": "<b>Non-Euclidean Approach 2</b><br>• Q1: cluster = 점의 모음 (그대로)<br>• Q2: <b>Inter-cluster distance</b>로 정의:<br>  • 한쪽에서 하나씩 뽑은 pair의 최소 거리 (Single link)<br>  • 또는 평균 거리 (Average link)", "summary": "<p><b>🔗 Approach 2 — Inter-cluster Link Distance</b></p><p><b>📐 Link 정의</b></p><ul><li><b>Single link (min):</b> 두 cluster 사이 최소 pairwise 거리</li><li><b>Complete link (max):</b> 최대 pairwise 거리</li><li><b>Average link:</b> 평균 pairwise 거리</li></ul><p><b>🎯 특징</b></p><ul><li>Single link: \"chain\" 효과. 길쭉한 cluster 생성</li><li>Complete link: 구형 cluster 선호</li><li>Average: 균형</li></ul><p><b>💡 장점</b><br>Cluster 표현 단순(점 모음). 계산은 pairwise.</p>"}, "31": {"en": "Non-Euclidean Approach 3\n• Q1: How to represent a cluster of many points?\n  • As the collection of points in the cluster.\n• Q2: How to determine the nearness of clusters?\n  • Merge clusters whose union is most cohesive.\n  • Possible notions of cohesion (the smaller, the more cohesive):\n     • Diameter of the merged cluster = Maximum distance between points.\n     • Average distance between all points.\n     • Inverse density of the cluster = Diameter or average distance / # of points.\n\n\n\n\n                                         Jaemin Yoo                                   31", "kr": "<b>Non-Euclidean Approach 3</b><br>• Q1: cluster = 점의 모음<br>• Q2: cluster 병합 시 <b>cohesion 최대</b>인 것 선택<br>• Cohesion 개념 (작을수록 cohesive):<br>  • <b>Diameter:</b> 최대 pairwise distance<br>  • 모든 pair 평균 거리<br>  • <b>Inverse density:</b> diameter / # points</b>", "summary": "<p><b>🎯 Approach 3 — Cohesion 기반</b></p><p><b>💡 아이디어</b><br>\"병합 후 cluster가 <b>얼마나 뭉쳐있는지</b>\" 측정. cohesion 높은(= 작은 값) pair를 병합.</p><p><b>📐 Cohesion 측정 3가지</b></p><ol><li><b>Diameter:</b> cluster 내 최대 pairwise 거리</li><li><b>Average:</b> 모든 pair 평균 거리</li><li><b>Inverse density:</b> diameter / # points</li></ol><p><b>🎯 병합 선택</b><br>\"병합 후 cohesion 최고\"인 pair. 즉 diameter/density/avg 기준 최소 증가.</p>"}, "32": {"en": "When to Stop?\n• When do we stop merging clusters?\n  • If the diameter of the merged cluster exceeds threshold.\n  • If the density of the merged cluster is below threshold.\n  • If there is evidence that the merged cluster yields a bad cluster.\n     • E.g., the average diameter suddenly increases.\n\n\n\n                                                        ?\n\n\n\n\n                                        Jaemin Yoo                       32", "kr": "<b>언제 병합을 멈출까</b><br>• 병합 cluster의 diameter가 threshold 초과 시<br>• density가 threshold 미만 시<br>• 병합이 나쁜 cluster 생성 조짐 시<br>  • 예: 평균 diameter가 갑자기 증가", "summary": "<p><b>🛑 Stop Criteria (Q3 답)</b></p><p><b>📋 병합 중단 기준</b></p><ul><li><b>Diameter threshold:</b> 병합 후 diameter가 정해진 값 초과</li><li><b>Density threshold:</b> density가 정해진 값 미만</li><li><b>Sudden jump:</b> 평균 diameter가 갑자기 증가 (bad merge 신호)</li></ul><p><b>💡 실무 팁</b><br>Dendogram 그리고 \"높이가 갑자기 커지는 지점\"에서 cut. elbow 비슷한 직관.</p>"}, "33": {"en": "Pop Quiz\n• Perform a hierarchical clustering on the points below.\n   • The distance between two clusters is:\n      the maximum of the distances between any two points.\n• 1, 4, 9, 16, 25, 36\n\n\n\n\n                                  Jaemin Yoo                 33", "kr": "<b>수업 퀴즈 Hierarchical</b><br>• 점: 1, 4, 9, 16, 25, 36 (1D)<br>• cluster distance = max pairwise distance<br>• Hierarchical clustering 수행", "summary": "<p><b>🧠 수업 퀴즈 — Complete link</b></p><p><b>📋 설정</b><br>1D 점: 1, 4, 9, 16, 25, 36. Complete link (max pairwise).</p><p><b>✅ 풀이</b></p><ol><li>초기: {1}, {4}, {9}, {16}, {25}, {36}</li><li>최소 거리 쌍 병합. |1-4|=3, |4-9|=5, |9-16|=7, |16-25|=9, |25-36|=11. 최소 3: {1,4} 병합</li><li>남은 cluster와 {1,4}의 complete link 거리: max(|1-9|,|4-9|) = 8, etc. |4-9|=5 (다음 최소) → {9}와 {16} 병합 (|9-16|=7)? 계산 다시: 남은 distance min — {9}, {16}, {25}, {36}과 {1,4}...</li><li>complete link이므로 새 병합 후 거리 재계산 필요. 순서대로 가장 가까운 쌍 선택.</li></ol><p><b>💡 계산 꼼꼼히 하기.</b> 기출 계산 문제 스타일.</p>"}, "34": {"en": "Outline\n1. Clustering\n2. Hierarchical Clustering\n3. K-means Clustering\n\n\n\n\n                             Jaemin Yoo   34", "kr": "<b>목차 (3부)</b><br>1. ✓ 2. ✓ 3. <b>K-means Clustering</b> ← 여기부터", "summary": "<p><b>🎯 3부 — k-means (대표 Point Assignment)</b></p><p>k 정해놓고 cluster 찾기. 1950년대 알고리즘인데 지금도 엄청 많이 쓰임.</p>"}, "35": {"en": "𝑘-means Algorithm\n• Best known family of clustering algorithms for point assignment.\n• Given Euclidean space/distance and 𝑘 = number of clusters.\n   • Possible to deduce 𝑘 by trial and error.\n• Find cluster centers that minimize the sum of squared distances.\n   • From each point to its cluster center.\n\n\n\n\n                                     Jaemin Yoo                      35", "kr": "<b>k-means 개요</b><br>• Point assignment의 대표 family<br>• 주어진 것: Euclidean 공간 + distance + k (cluster 수)<br>  • k는 trial-error로 추정 가능<br>• 목표: <b>점-to-센터 거리 제곱 합 최소화</b>하는 cluster center 찾기", "summary": "<p><b>⭐⭐⭐ k-means 개요</b></p><p><b>📐 입력</b></p><ul><li>Euclidean 공간의 점들</li><li>Distance (보통 L2)</li><li>k (cluster 수)</li></ul><p><b>📐 목표함수 (SSE)</b><br><code>min Σ_i Σ_{p ∈ C_i} ||p − c_i||²</code></p><p>\"각 점에서 가장 가까운 centroid까지 거리 <b>제곱 합</b>\" 최소화.</p><p><b>💡 왜 제곱?</b></p><ul><li>미분 가능 (centroid 업데이트가 평균으로 깔끔)</li><li>큰 오차 강하게 penalize</li></ul><p><b>🎯 k 선택</b><br>trial-error. Elbow method로 (slide 42).</p>"}, "36": {"en": "𝑘-means Algorithm\n• Initialize clusters by picking 𝑘 centers.\n• Until convergence:\n   1. For each point, assign it to the cluster whose centroid is the closest.\n   2. After all points are assigned, update the centroids of the 𝑘 clusters.\n      • As the average of data points within each cluster.\n• Convergence means that points don’t move between clusters.\n\n\n\n\n                                          Jaemin Yoo                            36", "kr": "<b>k-means 알고리즘 (Lloyd's)</b><ol><li>초기 k 센터 선택</li><li>수렴까지:<br>  (1) 각 점을 가장 가까운 centroid에 배정<br>  (2) 배정 후 centroid를 평균으로 update</li></ol>• 수렴 = 점이 cluster 간 이동 안 함", "summary": "<p><b>⭐⭐⭐ Lloyd Algorithm (k-means)</b></p><p><b>📋 의사코드</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">1. 초기 k centroid 선택\n2. Repeat:\n   (a) Assignment: 각 점을 가장 가까운 centroid에 배정\n   (b) Update: 각 cluster의 centroid를 cluster 점들의 평균으로\n3. Until convergence (점이 cluster 간 이동 안 함)</pre><p><b>💡 수렴</b><br>Lloyd가 <b>반드시 수렴</b>함을 증명 가능. But <b>local min</b> 에만 갇힐 수 있음.</p><p><b>🎯 복잡도</b><br>iteration 당 O(n·k·d). 수렴까지 수십 회.</p><p><b>📝 시험</b><br>의사코드 빈칸 채우기 기출 가능.</p>"}, "37": {"en": "Shortcoming of 𝑘-means\n• Convergence of 𝑘-means heavily depends on the initial centroids.\n• It can perform arbitrarily badly in such a case:\n\n\n\n\n                          Source: Stanford CS246 (2022)\n\n\n\n\n                                   Jaemin Yoo                    37", "kr": "<b>k-means 단점</b><br>• 수렴이 <b>초기 centroid에 크게 의존</b><br>• 나쁜 초기화면 임의로 나쁜 결과", "summary": "<p><b>🚨 k-means의 단점 — 초기값 민감</b></p><p><b>💡 문제</b><br>Lloyd는 local minimum 보장만. 초기 centroid가 나쁘면:</p><ul><li>두 centroid가 같은 진짜 cluster에 찍힘 → 그 cluster 쪼개지고 다른 cluster 무시</li><li>임의로 나쁜 결과</li></ul><p><b>🎯 해결</b><br>좋은 초기화 → k-means++ (다음 슬라이드).</p><p><b>📝 T/F 단골</b><br>\"k-means finds global optimum\" → <b>FALSE</b></p>"}, "38": {"en": "𝑘-means++\n• Goal: Pick points that are likely to lie in different clusters.\n• Basic idea:\n   • Pick a small sample of points 𝑆, cluster them, and use their centroids.\n      • Any algorithm can be used for the clustering.\n   • Sample size 𝑆 is proportional to 𝑘 × log 𝑛, where 𝑛 is the data size.\n• How to pick sample points:\n   • Visit points in a random order.\n   • Add each point 𝑝 to the sample with a probability proportional to 𝐷 𝑝 \".\n      • 𝐷 𝑝 = Distance between 𝑝 and the nearest already picked point.\n\n\n\n                                         Jaemin Yoo                             38", "kr": "<b>k-means++</b><br>• 목표: 서로 다른 cluster에 있을 가능성 큰 점 선택<br>• 기본 아이디어:<br>  • 작은 sample S 뽑고, clustering 후 centroid 사용<br>    • 어떤 알고리즘이든 사용 가능<br>  • |S| ∝ k × log n<br>• 점 선택:<br>  • 랜덤 순서로 점 방문<br>  • 각 점 p를 <b>확률 ∝ D(p)²</b>로 sample에 추가<br>    • D(p) = 이미 선택된 점까지의 거리", "summary": "<p><b>⭐⭐⭐ k-means++ — D² 확률 (시험 단골)</b></p><p><b>💡 목표</b><br>\"서로 <b>다른 cluster</b>에 있을 가능성이 큰 초기 centroid들 선택.\"</p><p><b>📋 알고리즘</b></p><ol><li>첫 centroid: 데이터에서 random 1개 선택</li><li>이후 k-1 centroid 선택:<br>- 각 점 p의 D(p) = 이미 선택된 centroid까지의 최소 거리<br>- <b>확률 ∝ D(p)²</b>로 p를 새 centroid로 샘플링</li></ol><p><b>🎯 직관</b><br>\"이미 선택된 centroid에서 <b>먼 점</b>이 새 centroid로 뽑힐 확률 ↑.\" 제곱으로 멀리 있는 점 강하게 우대.</p><p><b>💡 왜 D²?</b><br>D 단독보다 더 공격적으로 \"진짜 먼 점\" 우선. 이론적으로 O(log k) approximation 보장.</p><p><b>📝 시험</b><br>\"k-means++의 각 점 선택 확률은?\" → <b>D(p)²</b> 비례.</p>"}, "39": {"en": "Example: Assigning Clusters\n\n\n\n\n                 Source: Stanford CS246 (2022)\n\n\n\n                          Jaemin Yoo             39", "kr": "<b>Cluster 배정 예제 1</b><br>(Stanford) 데이터 점과 초기 centroid 표시.", "summary": "<p><b>🎯 시각 예제 1 — 초기</b></p><p>Stanford 슬라이드: 2D 점들 + 무작위 초기 centroid (빨간 점).</p><p><b>🎯 다음 단계: 각 점을 가장 가까운 centroid에 배정.</b></p>"}, "40": {"en": "Example: Assigning Clusters\n\n\n\n\n                 Source: Stanford CS246 (2022)\n\n\n\n                          Jaemin Yoo             40", "kr": "<b>Cluster 배정 예제 2</b><br>각 점을 가장 가까운 centroid에 배정. cluster 형성.", "summary": "<p><b>🎯 예제 2 — Assignment 단계</b></p><p>각 점이 가장 가까운 centroid(색깔)에 배정됨. 점이 색깔별로 그룹화.</p><p><b>💡 관찰</b><br>초기 centroid 위치가 애매하면 cluster 경계도 이상함.</p>"}, "41": {"en": "Example: Assigning Clusters\n\n\n\n\n                 Source: Stanford CS246 (2022)\n\n\n\n                          Jaemin Yoo             41", "kr": "<b>Cluster 배정 예제 3</b><br>각 cluster의 centroid를 재계산. 반복.", "summary": "<p><b>🎯 예제 3 — Update 단계</b></p><p>각 색깔(cluster) 점들의 평균 → 새 centroid (이동함).</p><p><b>🔄 반복</b><br>새 centroid로 다시 assignment → update → ... 수렴까지.</p><p><b>📊 실무 수렴</b><br>보통 10-50 iteration에 수렴.</p>"}, "42": {"en": "Getting the 𝑘 Right\n• How to select 𝒌?\n  • Try different 𝑘.\n  • Look at the change in the average distance to centroid as 𝑘 increases.\n  • Average falls rapidly until right 𝑘, then changes little.\n\n\n\n\n                              Source: Stanford CS246 (2022)\n\n\n                                       Jaemin Yoo                            42", "kr": "<b>적정 k 선택 (Elbow Method)</b><br>• 여러 k 시도<br>• k 증가에 따른 centroid까지 평균 거리 관찰<br>• <b>\"올바른 k\"까지 급격히 감소 → 그 이후 거의 변화 없음</b><br>• 꺾이는 지점 (elbow)이 최적 k", "summary": "<p><b>⭐⭐ Elbow Method — k 선택</b></p><p><b>📋 절차</b></p><ol><li>여러 k 값 (2, 3, 4, ..., 10) 돌려 k-means 실행</li><li>각 k의 <b>평균 centroid 거리</b> (또는 WCSS) 기록</li><li>k vs metric 그래프</li><li>\"꺾이는 점\" (elbow)이 최적 k</li></ol><p><b>📈 모양</b></p><ul><li>k < 정답: 지표 빠르게 감소</li><li>k = 정답: 감소 급격히 둔화 (elbow)</li><li>k > 정답: 아주 조금씩만 감소</li></ul><p><b>💡 왜?</b><br>진짜 cluster 수만큼 찍으면 각 cluster 잘 잡힘. 더 찍어도 이미 잘 잡힌 cluster를 쪼개는 것뿐이라 개선 미미.</p>"}, "43": {"en": "Example: Picking 𝑘\n\n\n\n\n                 Source: Stanford CS246 (2022)\n                          Jaemin Yoo             43", "kr": "<b>k 선택 예제 1</b><br>k가 너무 작음 (예: k=2). cluster가 커서 평균 거리 큼.", "summary": "<p><b>🎯 Underfit (k 작음)</b></p><p>k=2일 때, 실제 3개 cluster인데 둘만 잡음 → 두 cluster 강제로 합쳐짐 → centroid까지 거리 매우 큼.</p>"}, "44": {"en": "Example: Picking 𝑘\n\n\n\n\n                 Source: Stanford CS246 (2022)\n                          Jaemin Yoo             44", "kr": "<b>k 선택 예제 2</b><br>k가 적절 (elbow). 평균 거리 급감 끝난 지점.", "summary": "<p><b>🎯 Sweet Spot (k=elbow)</b></p><p>k=3이 진짜 cluster 수. 평균 거리 급감 후 ▷ 완만해지는 바로 그 지점.</p>"}, "45": {"en": "Example: Picking 𝑘\n\n\n\n\n                 Source: Stanford CS246 (2022)\n                          Jaemin Yoo             45", "kr": "<b>k 선택 예제 3</b><br>k가 너무 큼. 평균 거리 조금씩만 감소 (diminishing returns).", "summary": "<p><b>🎯 Overfit (k 큼)</b></p><p>k=4, 5, ...로 늘리면 이미 잘 잡힌 cluster를 쪼개기만 함. 지표 <b>조금씩</b>만 감소 (diminishing returns).</p><p><b>💡 elbow 이후는 k 늘리는 의미 없음.</b></p>"}, "46": {"en": "Summary\n1. Clustering\n  • Curse of dimensionality\n  • Clustering strategies\n2. Hierarchical Clustering\n  • Euclidean vs. non-Euclidean\n  • Centroids vs. clustroids\n3. K-means Clustering\n  • 𝑘-means++\n  • Selection of 𝑘\n\n\n                                  Jaemin Yoo   46", "kr": "<b>요약</b><br>1. Clustering — 차원의 저주, 전략<br>2. Hierarchical — Euclidean vs Non-Euclidean, Centroid vs Clustroid<br>3. K-means — k-means++, k 선택", "summary": "<p><b>🎬 L8 마무리</b></p><p><b>✅ 개념</b></p><ul><li>차원의 저주: 고차원에서 거리 구별 불가</li><li>Hierarchical vs Point Assignment</li><li>Euclidean vs Non-Euclidean</li><li>Centroid vs Clustroid</li></ul><p><b>✅ Hierarchical</b></p><ul><li>3대 질문: 표현, 가까움, 멈춤</li><li>O(n³) naive, O(n² log n) with PQ</li><li>Non-Eucl용 3 approach: clustroid, inter-cluster link, cohesion</li></ul><p><b>✅ k-means</b></p><ul><li>Lloyd: assign → update 반복</li><li>초기화 민감 → k-means++ D² 확률</li><li>k 선택: Elbow method</li></ul><p><b>⭐ 기출 예상</b></p><ul><li>T/F: centroid/clustroid, non-Euclidean</li><li>k-means++ 확률 공식</li><li>Lloyd 의사코드 빈칸</li></ul>"}}, "9": {"1": {"en": "Clustering 2\nIntroduction to Data Mining\n Seoul National University\n       Spring 2026\n\n\n\n\n          Jaemin Yoo          1", "kr": "<b>Clustering 2</b><br>서울대 · 2026 봄 · Jaemin Yoo", "summary": "<p><b>🎬 L9 시작 — 대용량 Clustering</b><br>L8은 \"메모리에 들어가는\" 데이터용. L9는 <b>메모리 초과</b>시 streaming으로 처리하는 3대 알고리즘.</p><p><b>⭐ 시험 포인트</b></p><ul><li>CURE: 2-pass, rep + shrink (★★)</li><li>BFR: N/SUM/SUMSQ, DS/CS/RS (★★★)</li><li>Mahalanobis 공식 (★★★)</li><li>GRGPF: clustroid, rowsum (★★)</li></ul>"}, "2": {"en": "Announcements\n• Assignments:\n  • HW1 is posted (deadline: April 9).\n\n\n\n\n                                    Jaemin Yoo   2", "kr": "<b>공지</b><br>HW1 (마감 4/9)", "summary": "<p><b>📢 HW1 마감 4/9</b></p>"}, "3": {"en": "Recap\n• Clustering\n   • Curse of dimensionality\n• Hierarchical clustering\n   • Euclidean vs. non-Euclidean\n   • Centroids vs. clustroids\n• 𝑘-means clustering\n   • 𝑘-means++\n   • Selection of 𝑘\n\n\n\n                                   Jaemin Yoo   3", "kr": "<b>복습: Clustering L8</b><br>• Curse of dimensionality<br>• Hierarchical: Euclidean vs Non-Euclidean, Centroid vs Clustroid<br>• k-means: k-means++, k 선택", "summary": "<p><b>🔙 L8 복습</b></p><ul><li>차원의 저주</li><li>Hierarchical 3대 질문</li><li>k-means Lloyd + k-means++ D²</li><li>Elbow method</li></ul><p><b>💡 L9 전환:</b> 데이터가 메모리 초과하면 어떻게? → CURE, BFR, GRGPF.</p>"}, "4": {"en": "Outline\n1. CURE Algorithm\n2. BFR Algorithm\n3. BFR Algorithm: Process\n4. GRGPF Algorithm\n\n\n\n\n                            Jaemin Yoo   4", "kr": "<b>목차</b><ol><li>CURE Algorithm</li><li>BFR Algorithm</li><li>BFR: Process</li><li>GRGPF Algorithm</li></ol>", "summary": "<p><b>🗺️ L9 4부</b></p><ol><li><b>CURE</b> — 2-pass, representative + shrink (비구형 OK)</li><li><b>BFR</b> — k-means 확장 + sufficient statistics</li><li><b>BFR Process</b> — chunk 처리 상세</li><li><b>GRGPF</b> — 비유클리드용</li></ol>"}, "5": {"en": "Overview\n• Q: How to do clustering if the data is too large to fit in memory?\n• CURE: Simplest approach based on hierarchical clustering.\n• BFR: Variant of 𝑘-means for large data.\n   • More advanced but introduces more assumptions compared to CURE.\n• GRGPF: Clever approach for a non-Euclidean space.\n   • Summarizes a cluster without its centroid.\n\n\n\n\n                                    Jaemin Yoo                         5", "kr": "<b>Overview</b><br>• 데이터가 메모리에 안 들어가면?<br>• <b>CURE:</b> Hierarchical 기반, 가장 단순<br>• <b>BFR:</b> k-means의 대용량 변형 — 가정 많지만 고급<br>• <b>GRGPF:</b> 비유클리드 공간용. centroid 없이 cluster 요약", "summary": "<p><b>⭐ 3가지 알고리즘 비교</b></p><table style=\"font-size:11px\"><tr><th></th><th>CURE</th><th>BFR</th><th>GRGPF</th></tr><tr><td>기반</td><td>Hierarchical</td><td>k-means</td><td>Clustroid</td></tr><tr><td>공간</td><td>Euclidean</td><td>Euclidean</td><td>Non-Euclidean</td></tr><tr><td>가정</td><td>약함</td><td>axis-align Gaussian</td><td>clustroid 가능</td></tr><tr><td>Cluster 요약</td><td>rep points</td><td>N, SUM, SUMSQ</td><td>clustroid + near/far</td></tr></table>"}, "6": {"en": "CURE (Clustering Using REpresentatives)\n• CURE is a 2-pass algorithm for large disk-resident data.\n   • Pass 1: Find clusters from a sampled subset.\n   • Pass 2: Assign points to the clusters.\n• Use a collection of representative points to represent clusters.\n• Assume Euclidean space/distance, with 𝑘 (# of clusters) given.\n\n\n\n\n                                   Jaemin Yoo                        6", "kr": "<b>CURE (Clustering Using REpresentatives)</b><br>• 디스크 상의 대용량 데이터용 <b>2-pass 알고리즘</b><br>  • Pass 1: 샘플로 cluster 찾기<br>  • Pass 2: 모든 점을 cluster에 배정<br>• <b>Representative 점 집합</b>으로 cluster 표현<br>• 가정: Euclidean 공간, k 주어짐", "summary": "<p><b>⭐ CURE 개요</b></p><p><b>📋 2-pass 구조</b></p><ul><li><b>Pass 1:</b> random sample → hierarchical clustering → representative 점 선택</li><li><b>Pass 2:</b> 전체 데이터 스캔 → 각 점을 가장 가까운 cluster에 배정</li></ul><p><b>🎯 특징</b></p><ul><li>Cluster = <b>representative 점 집합</b>으로 표현 (centroid 아님)</li><li>비구형 cluster 처리 가능 (rep 여러 개라 모양 보존)</li></ul><p><b>📐 가정</b><br>Euclidean 공간, k 주어짐.</p>"}, "7": {"en": "CURE: Pass 1\n1. Pick a random sample of data.\n2. Cluster them in main memory using hierarchical clustering.\n   • Merge two clusters when they have close pairs of points.\n3. Pick representative points from each cluster.\n   • For each cluster, pick a sample of points, as dispersed as possible.\n   • Move them a fraction of distance, e.g. 20%, toward the centroid ... why?\n4. Merge clusters with the closest pair of representatives.\n\n\n\n                                    Jaemin Yoo                                  7", "kr": "<b>CURE Pass 1</b><br>1. 데이터에서 random sample 추출<br>2. 메모리에서 hierarchical clustering (close pair 있으면 병합)<br>3. 각 cluster에서 <b>representative 점 선택</b><br>  • cluster 내 \"가능한 최대로 퍼진\" 점 sample<br>  • <b>centroid 방향으로 거리의 일부 (예: 20%) 이동</b> ... 왜?<br>4. representative pair가 가까운 cluster끼리 병합", "summary": "<p><b>⭐⭐ CURE Pass 1 — 4단계</b></p><ol><li><b>Sampling:</b> 전체 데이터에서 메모리에 들어갈 크기로 random sample</li><li><b>Hierarchical Clustering:</b> sample에 hierarchical 적용, 가까운 pair 병합</li><li><b>Representative 선택:</b><br>- cluster 내 <b>가장 퍼진 점들</b> 선택 (farthest-point greedy)<br>- centroid 방향으로 <b>거리의 20% 축소 (shrink)</b></li><li><b>Inter-cluster merge:</b> representative가 가까운 cluster 병합</li></ol><p><b>💡 핵심 아이디어</b><br>\"rep 여러 개로 cluster 모양 보존 + shrink로 outlier 영향 완화.\"</p>"}, "8": {"en": "Example: Picking Dispersed Points\n\n\n\n\n                 Source: Stanford CS246 (2022)\n                          Jaemin Yoo             8", "kr": "<b>Dispersed 점 선택 예제 1</b><br>(Stanford) 첫 rep 선택 = centroid에서 가장 먼 점.", "summary": "<p><b>🎯 Rep 선택 예제 1</b></p><p>첫 rep = cluster의 centroid에서 <b>가장 먼 점</b> 선택. cluster boundary 포착.</p>"}, "9": {"en": "Example: Picking Dispersed Points\n\n\n\n\n                 Source: Stanford CS246 (2022)\n                          Jaemin Yoo             9", "kr": "<b>Dispersed 점 선택 예제 2</b><br>두 번째 rep = 첫 rep에서 가장 먼 점.", "summary": "<p><b>🎯 Rep 선택 예제 2</b></p><p>두 번째 rep = 지금까지 선택된 rep에서 <b>가장 먼 점</b>. Farthest-point greedy.</p>"}, "10": {"en": "Example: Picking Dispersed Points\n\n\n\n\n                 Source: Stanford CS246 (2022)\n                          Jaemin Yoo             10", "kr": "<b>Dispersed 점 선택 예제 3</b><br>k개 rep 선택 완료 — cluster 내부에 퍼진 점들.", "summary": "<p><b>🎯 Rep 선택 완성</b></p><p>k개 rep 모두 선택됨. cluster 내부에 <b>골고루 퍼진</b> 상태.</p><p><b>💡 효과</b><br>Centroid 하나로 표현 불가능한 <b>비구형 cluster 모양</b> 포착.</p>"}, "11": {"en": "CURE: Pass 2\n1. Rescan the whole dataset.\n2. Assign each point 𝑝 in the dataset to the “closest cluster.”\n   • Find the closest representative point to 𝑝.\n   • Assign 𝑝 to the representative’s cluster.\n\n\n\n\n                                     Jaemin Yoo                   11", "kr": "<b>CURE Pass 2</b><br>1. 전체 데이터 재스캔<br>2. 각 점 p를 \"가장 가까운 cluster\"에 배정<br>  • p에 가장 가까운 representative 찾기<br>  • 그 rep의 cluster에 p 배정", "summary": "<p><b>🔄 CURE Pass 2 — 점 배정</b></p><p><b>📋 단계</b></p><ol><li>전체 데이터 재스캔</li><li>각 점 p마다: 가장 가까운 <b>representative</b> 찾기</li><li>그 rep의 cluster에 p 배정</li></ol><p><b>💡 효율</b><br>Cluster 수 k, cluster당 rep n개 → 각 점당 O(k×n) 거리 계산. 메모리 상에 rep만 유지.</p>"}, "12": {"en": "Why to Move 20% Inward?\n• Some of the representatives will be on the boundary of clusters.\n• We move them 20% towards the centroids.\n• Large, dispersed clusters will shrink more than small, dense ones\n• As a result, the algorithm favors a small, dense cluster.\n\n\n\n\n                           Source: Stanford CS246 (2022)\n\n\n\n                                    Jaemin Yoo                    12", "kr": "<b>왜 20% 안으로 이동?</b><br>• 일부 rep은 cluster boundary에 있음<br>• centroid 방향 20% shrink:<br>  • <b>크고 분산된 cluster는 더 많이 shrink, 작고 dense한 cluster는 덜 shrink</b><br>• 결과: <b>작고 dense한 cluster에 유리</b>", "summary": "<p><b>⭐ Shrink의 효과 — 왜 20%?</b></p><p><b>💡 문제</b><br>Rep이 cluster boundary에 있으면 인접 cluster와 혼동 위험. 특히 <b>큰 cluster</b>가 작은 cluster를 \"먹어버릴\" 수 있음.</p><p><b>🔧 해결: 20% shrink</b><br>\"rep를 centroid 방향으로 20% 안으로 당긴다.\"</p><p><b>🎯 결과</b></p><ul><li>크고 분산된 cluster: 20% 이동 = 큰 거리 → <b>많이 안으로</b></li><li>작고 dense한 cluster: 20% 이동 = 작은 거리 → <b>덜 안으로</b></li></ul><p>즉 큰 cluster의 공격적 확장을 억제 → <b>작은 cluster 보호</b>. CURE의 똑똑한 설계.</p>"}, "13": {"en": "Outline\n1. CURE Algorithm\n2. BFR Algorithm\n3. BFR Algorithm: Process\n4. GRGPF Algorithm\n\n\n\n\n                            Jaemin Yoo   13", "kr": "<b>목차 (2부)</b><br>1. ✓ 2. <b>BFR Algorithm</b> ← 여기부터", "summary": "<p><b>🎯 2부 — BFR Algorithm</b></p><p>k-means를 대용량으로 확장. \"Gaussian 가정\"하에 강력한 sufficient statistics 기법.</p>"}, "14": {"en": "BFR (Bradley, Fayyad, and Reina) Algorithm\n• Variant of 𝑘-means for large disk-resident data.\n• Assume normally-distributed clusters in a Euclidean space.\n   • Clusters are axis-aligned ellipses.\n   • Standard deviations in different dimensions may vary.\n• Goal: Find cluster centroids efficiently (in Pass 1).\n   • Point assignment can be done in Pass 2 through whole data.\n\n\n\n\n                  OK               OK               Not OK\n                                    Jaemin Yoo                    14", "kr": "<b>BFR (Bradley-Fayyad-Reina)</b><br>• k-means의 대용량 변형<br>• <b>가정: cluster는 Euclidean 공간의 정규분포</b><br>  • axis-aligned 타원 (ellipse)<br>  • 차원별 σ 다를 수 있음<br>• 목표: Pass 1에서 centroid 효율 발견<br>  • Pass 2에서 점 배정", "summary": "<p><b>⭐⭐ BFR — k-means의 대용량 버전</b></p><p><b>📐 핵심 가정</b><br>\"각 cluster = Euclidean 공간의 <b>정규분포</b>.\"</p><ul><li><b>axis-aligned</b> 타원 (차원축에 평행)</li><li>차원별 σ 다를 수 있음</li></ul><p><b>💡 왜 가정이 중요?</b><br>이 가정 덕에 cluster를 <b>(N, SUM, SUMSQ)</b> 3가지 통계만으로 요약 가능 (covariance matrix 없이).</p><p><b>⚠️ 단점</b><br>가정이 현실에 안 맞으면 성능 급락. 진짜 정규분포가 아닌 데이터엔 부적합.</p>"}, "15": {"en": "Main Idea\n• Idea: Keep summary statistics of groups of points.\n   1. Read points from disk one main-memory-full at a time.\n   2. Summarize most points from previous memory loads.\n   3. Memory requirement changes from 𝑂 data to 𝑂 clusters .\n• Challenge: Not all points can be summarized effectively.\n   • Some points will not create a cluster at all.\n\n\n\n\n                                      Jaemin Yoo               15", "kr": "<b>BFR 핵심 아이디어</b><br>• 점 그룹의 <b>요약 통계</b>를 유지:<br>  1. 메모리 꽉 찰만큼 점 로드<br>  2. 이전 메모리 로드의 대부분 점 요약<br>  3. 메모리 요구: O(data) → <b>O(clusters)</b><br>• 도전: 모든 점이 효과적으로 요약되는 건 아님<br>  • 일부 점은 cluster 형성 안 함", "summary": "<p><b>💡 BFR 핵심 아이디어</b></p><p><b>🎯 전략</b></p><ol><li>메모리 한도 내 chunk 로드</li><li>대부분 점은 <b>요약 통계</b>로 치환 후 디스크 write</li><li>통계만 메모리에 유지 → <b>O(data) → O(clusters)</b></li></ol><p><b>🚨 도전</b><br>모든 점이 cluster 중심 근처에 있진 않음:</p><ul><li>cluster에서 먼 점들도 그룹이면 요약 (mini-cluster)</li><li>완전 고립된 점은 따로 (retained set)</li></ul><p>→ DS/CS/RS 3 분류 (다음 슬라이드).</p>"}, "16": {"en": "Three Classes of Points\n• Divide all data points into three sets during the algorithm.\n• Discard set (= clusters):\n   • Points close to a centroid to be summarized and discarded.\n• Compressed set (= miniclusters):\n   • Groups of points that are close together but not to any centroid.\n   • These points are summarized but not assigned to a cluster.\n• Retained set:\n   • Isolated points waiting to be assigned to a compressed set.\n\n\n\n                                     Jaemin Yoo                          16", "kr": "<b>3가지 점 집합</b><br>• <b>DS (Discard set = clusters):</b> centroid 근처, 요약·폐기<br>• <b>CS (Compressed set = miniclusters):</b> 서로 가깝지만 centroid와 먼 그룹, 요약 but cluster 미배정<br>• <b>RS (Retained set):</b> 고립된 점, CS 대기 중", "summary": "<p><b>⭐⭐⭐ BFR 3-Set 분류 — 필수 암기!</b></p><table style=\"font-size:11px\"><tr><th>Set</th><th>이름</th><th>내용</th><th>저장</th></tr><tr><td><b>DS</b></td><td>Discard</td><td>cluster centroid 근처</td><td>요약(N,SUM,SUMSQ) 후 점 폐기</td></tr><tr><td><b>CS</b></td><td>Compressed</td><td>서로 가깝지만 어느 cluster와도 멀음</td><td>mini-cluster 요약</td></tr><tr><td><b>RS</b></td><td>Retained</td><td>고립된 점</td><td>좌표 그대로 유지</td></tr></table><p><b>💡 이동 규칙</b></p><ul><li>DS 추가: 점이 cluster에 충분히 가까움</li><li>CS 생성: RS의 여러 점이 가까우면 묶음</li><li>RS 유지: 아무 그룹에도 속하지 않은 고립 점</li></ul><p><b>📝 시험 단골</b>: DS/CS/RS 분류 문제.</p>"}, "17": {"en": "Cluster Visualization\n                                        Points in the\n                                        retained set\n\n\n\n\n                          Compressed sets\n\n\n\n\n         A cluster. Its points are                 Its centroid\n         in the discard set\n\n                                      Jaemin Yoo                  17", "kr": "<b>Cluster 시각화</b><br>cluster (DS) + 주변 miniclusters (CS) + 고립 점 (RS)", "summary": "<p><b>📊 공간 배치 시각화</b></p><p>그림: 큰 cluster 중심에 DS (여러 점 묶임), 중심에서 떨어진 곳에 mini-cluster CS 여러 개, 완전 외톨이 점 몇 개가 RS.</p><p><b>💡 해석</b><br>DS는 \"확실한 그룹\", CS는 \"임시 묶음\", RS는 \"판단 보류\".</p>"}, "18": {"en": "Summarizing Sets of Points\n• Discard or compressed set is summarized by 2𝑑 + 1 values.\n  • The number 𝑁 of points.\n  • A vector SUM, where SUM! is the sum of the coordinates of all points.\n  • A vector SUMSQ, where SUMSQ! is the sum of squared coordinates.\n                                           %\n     • SUM! = ∑\"∈$ 𝑥\"! and SUMSQ ! = ∑\"∈$ 𝑥\"! .\n\n\n                                                               𝐶: Set of points\n                                                               𝑑: # of dimensions\n\n            A cluster. Its points are           Its centroid\n            stored in memory\n\n\n                                        Jaemin Yoo                                  18", "kr": "<b>Summary Statistics (2d+1 값)</b><br>• <b>N:</b> 점 개수<br>• <b>SUM:</b> SUM_i = Σ_p x_{p,i} (좌표 합)<br>• <b>SUMSQ:</b> SUMSQ_i = Σ_p x_{p,i}² (좌표 제곱 합)<br>• d = 차원 수", "summary": "<p><b>⭐⭐⭐ Sufficient Statistics (2d+1) — 필수 암기</b></p><p><b>📐 3가지 요약 통계</b></p><ul><li><b>N</b>: 점 개수 (scalar, 1)</li><li><b>SUM</b>: 각 차원별 좌표 합 (d 차원 벡터)<br>SUM_i = Σ_p x_{p,i}</li><li><b>SUMSQ</b>: 각 차원별 <b>제곱</b> 좌표 합 (d 차원 벡터)<br>SUMSQ_i = Σ_p x_{p,i}²</li></ul><p><b>📏 총 저장 크기</b><br>1 + d + d = <b>2d + 1</b> 값 (각 scalar/벡터를 요약)</p><p><b>🎯 Why sufficient?</b><br>centroid + variance 모두 이 3값으로 복원 가능 (다음 슬라이드).</p>"}, "19": {"en": "Summarizing Sets of Points\n• We can compute the centroid and the size of each cluster.\n   • Average in dimension 𝑖 (= centroid): SUM! /𝑁.\n   • Variance in dimension 𝑖 (= cluster size): SUMSQ! /𝑁 − SUM! /𝑁 \".\n      • Because Var 𝑋 = 𝐸 𝑋 % − 𝐸 𝑋 % .\n   • Standard deviation is the square root of variance.\n• This is based on the assumption of “axis-aligned” clusters.\n   • Without it, we need to store the 𝑑 × 𝑑 covariance matrix.\n\n\n\n\n                  OK                  OK             Not OK\n                                                                        19", "kr": "<b>통계에서 Centroid, Variance 계산</b><br>• <b>centroid_i = SUM_i / N</b><br>• <b>variance_i = SUMSQ_i / N − (SUM_i / N)²</b><br>  • Var(X) = E[X²] − E[X]²<br>• σ_i = √variance_i<br>• <b>\"axis-aligned\" 가정 덕:</b> 전체 covariance matrix 불필요", "summary": "<p><b>⭐⭐⭐ Centroid + Variance 복원 공식 — 필수</b></p><p><b>📐 Centroid</b><br><code>centroid_i = SUM_i / N</code></p><p><b>📐 Variance (차원별)</b><br><code>variance_i = SUMSQ_i / N − (SUM_i / N)²</code></p><p><b>💡 유도</b><br>Var(X) = E[X²] − E[X]² (표준 통계 공식)</p><ul><li>E[X²] = SUMSQ_i / N</li><li>E[X] = SUM_i / N</li></ul><p><b>📐 표준편차</b><br>σ_i = √variance_i</p><p><b>🎯 Axis-aligned 가정 덕분</b><br>차원 간 covariance는 0으로 간주 → covariance matrix 없이 σ_i만 유지하면 충분.</p><p><b>📝 시험 단골 계산</b>.</p>"}, "20": {"en": "Benefits of the Representation\n• Benefit 1: Easy to add a new point to a cluster.\n   • Increase 𝑁 by 1.\n   • Add the vector to SUM.\n   • Add the squares of components to SUMSQ.\n• Benefit 2: Easy to combine two clusters.\n   • Add corresponding values of 𝑁, SUM, and SUMSQ.\n\n\n\n\n                                 Jaemin Yoo           20", "kr": "<b>이 표현의 장점</b><br>• <b>장점 1:</b> 새 점 추가 쉬움<br>  • N += 1<br>  • SUM += 벡터<br>  • SUMSQ += 제곱 벡터<br>• <b>장점 2:</b> 두 cluster 병합 쉬움<br>  • N, SUM, SUMSQ 각각 원소별 합산", "summary": "<p><b>⚡ Additivity — streaming 친화</b></p><p><b>🎯 장점 1: 새 점 p 추가 (online)</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">N += 1\nSUM += p        # 벡터 덧셈\nSUMSQ += p²     # 원소별 제곱 후 덧셈</pre><p><b>🎯 장점 2: 두 cluster C1, C2 병합</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">N = N1 + N2\nSUM = SUM1 + SUM2\nSUMSQ = SUMSQ1 + SUMSQ2</pre><p><b>💡 효율</b><br>모든 연산 <b>O(d)</b>. Streaming 완벽 대응.</p>"}, "21": {"en": "Pop Quiz\n• Represent the cluster of points 5, 1 , 6, −2 , and 7, 0 .\n   • N=?\n   • SUM = ?\n   • SUMSQ = ?\n• Compute the variance of the first dimension.\n   • Variance = ?\n\n\n\n\n                                Jaemin Yoo                    21", "kr": "<b>수업 퀴즈 BFR</b><br>점 (5,1), (6,-2), (7,0)의 cluster 표현:<br>• N = ?<br>• SUM = ?<br>• SUMSQ = ?<br>• 1번째 차원 variance = ?", "summary": "<p><b>🧠 수업 퀴즈 — BFR 계산</b></p><p><b>📋 데이터</b><br>점: (5,1), (6,-2), (7,0)</p><p><b>✅ 계산</b></p><ul><li>N = <b>3</b></li><li>SUM = (5+6+7, 1-2+0) = <b>(18, -1)</b></li><li>SUMSQ = (25+36+49, 1+4+0) = <b>(110, 5)</b></li><li>Centroid = (18/3, -1/3) = (6, -0.333)</li><li>variance_1 = 110/3 − (18/3)² = 36.67 − 36 = <b>0.67</b></li><li>variance_2 = 5/3 − (1/3)² = 1.67 − 0.11 = 1.56</li></ul><p><b>📝 시험 이 유형 단골!</b></p>"}, "22": {"en": "Outline\n1. CURE Algorithm\n2. BFR Algorithm\n3. BFR Algorithm: Process\n4. GRGPF Algorithm\n\n\n\n\n                            Jaemin Yoo   22", "kr": "<b>목차 (3부)</b><br>1. ✓ 2. ✓ 3. <b>BFR: Process</b> ← 여기부터 4. GRGPF", "summary": "<p><b>🎯 3부 — BFR 실행 과정 상세</b></p>"}, "23": {"en": "Overview of the BFR Algorithm\n1. Initialize 𝑘 clusters/centroids (as in 𝑘-means)\n2. for each chunk in a data file\n3.   for each point in the chunk\n4.      Assign it to a cluster/minicluster if it is sufficiently close to it\n5.   Cluster the remaining points, creating new miniclusters\n6.   Try to merge existing clusters and miniclusters if they are close\n\n\n\n\n                                        Jaemin Yoo                             23", "kr": "<b>BFR Algorithm Overview</b><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:12px\">1. k cluster/centroid 초기화 (k-means처럼)\n2. for each chunk in data file:\n3.   for each point in chunk:\n4.     충분히 가까우면 cluster/minicluster에 배정\n5.   나머지 점을 cluster → 새 minicluster 생성\n6.   가까운 cluster와 minicluster 병합 시도</pre>", "summary": "<p><b>⭐ BFR 메인 루프</b></p><p><b>📋 전체 구조</b></p><pre style=\"background:#f5f5f5;color:#333;margin:4px 0;font-size:11px\">1. k centroid 초기화\n2. for each chunk in data:\n   for each point p:\n     if p가 cluster와 충분히 가까움: DS에 흡수\n     elif p가 miniclsuter와 가까움: CS에 흡수\n     else: 잔여\n   잔여를 RS와 합쳐 mini-clustering\n     size ≥ 2 그룹: 새 CS\n     singleton: RS\n   CS끼리 또는 CS-DS 병합 가능성 체크</pre><p><b>💡 메모리 상주</b><br>DS, CS 요약 통계 + RS 실제 점.</p>"}, "24": {"en": "Selection of the Initial Centroids\n• The 𝑘 initial centroids can be selected as in 𝑘-means:\n• Option 1: Take 𝑘 random points.\n• Option 2: Take a small sample, cluster it, and use the centroids.\n• Option 3: Take a sample, pick a random point, and 𝑘 − 1 more.\n   • Each as far from the previously selected points as possible.\n\n\n\n\n                                    Jaemin Yoo                        24", "kr": "<b>초기 centroid 선택</b><br>• k-means와 동일 옵션:<br>• <b>Option 1:</b> random k 점<br>• <b>Option 2:</b> 작은 sample을 clustering → centroid<br>• <b>Option 3:</b> sample에서 random 한 점 + farthest point 방식으로 k-1개 추가", "summary": "<p><b>🎯 초기화 방법 3가지</b></p><ol><li><b>Random k:</b> 가장 단순. 초기 민감</li><li><b>Sample + clustering:</b> 작은 sample에 in-memory k-means 돌려 centroid 얻기</li><li><b>Farthest-point:</b> sample에서 1개 random + 나머지는 가장 먼 점 선택 (k-means++ 유사)</li></ol><p><b>💡 실무</b><br>Option 2 또는 3이 선호. 초기값 좋을수록 빠른 수렴.</p>"}, "25": {"en": "Processing a Chunk of Points (1/5)\n• All points that are “sufficiently close” to any centroid:\n   • Added to that cluster or minicluster.\n\n                   Retained set\n\n\n\n\n                                                  Compressed sets\n                                                  (miniclusters)\n\n\n\n\n                                     Jaemin Yoo\n                                                          Cluster   25", "kr": "<b>Chunk 처리 1/5</b><br>\"충분히 가까운\" 점을 해당 cluster/minicluster에 추가", "summary": "<p><b>🎯 Chunk 처리 1단계 — 근거리 흡수</b></p><p><b>📋 과정</b></p><ul><li>chunk 내 각 점 p</li><li>p가 어떤 cluster에 <b>충분히 가까운지</b> 판정 (Mahalanobis < threshold)</li><li>가까우면 그 cluster의 (N, SUM, SUMSQ) 업데이트 → 점 자체는 디스크</li></ul>"}, "26": {"en": "Processing a Chunk of Points (2/5)\n• All points that are not sufficiently close to any centroid:\n   • Clustered with the points in the retained set using any algorithm.\n\n                   Retained set\n\n\n\n\n                                                  Compressed sets\n                                                  (miniclusters)\n\n\n\n\n                                     Jaemin Yoo\n                                                          Cluster         26", "kr": "<b>Chunk 처리 2/5</b><br>centroid와 충분히 가깝지 않은 점들:<br>• retained set 점들과 함께 clustering (아무 알고리즘)", "summary": "<p><b>🎯 Chunk 처리 2단계 — 잔여 처리</b></p><p><b>📋 잔여 점 + RS 합치기</b></p><ul><li>어느 cluster와도 가깝지 않은 점들</li><li>기존 RS의 점들과 합침</li><li>in-memory clustering (k-means 등) 실행</li></ul>"}, "27": {"en": "Processing a Chunk of Points (3/5)\n• New groups of ≥ 2 points become miniclusters.\n• Singleton groups remain in the retained set.\n                Retained set\n\n\n\n\n                                            Compressed sets\n                                            (miniclusters)\n\n\n\n\n                               Jaemin Yoo\n                                                    Cluster   27", "kr": "<b>Chunk 처리 3/5</b><br>• 2 이상의 점 그룹 → 새 minicluster (CS)<br>• singleton 그룹 → retained set (RS)에 유지", "summary": "<p><b>🎯 Chunk 처리 3단계 — CS/RS 분기</b></p><p><b>📋 판정</b></p><ul><li>clustering 결과가 <b>≥ 2 점 그룹</b>: 새 mini-cluster (CS), (N, SUM, SUMSQ) 저장</li><li><b>singleton (점 1개)</b>: RS에 유지, 나중 chunk의 점과 합쳐볼 기회 줌</li></ul>"}, "28": {"en": "Processing a Chunk of Points (4/5)\n• Combine the clusters and miniclusters if they are close enough.\n\n\n\n             Retained set\n\n\n\n\n                                            Compressed sets\n                                            (miniclusters)\n\n\n\n\n                               Jaemin Yoo\n                                                    Cluster         28", "kr": "<b>Chunk 처리 4/5</b><br>충분히 가까우면 cluster와 minicluster 병합", "summary": "<p><b>🎯 Chunk 처리 4단계 — 병합 검토</b></p><p><b>📋 병합 시나리오</b></p><ul><li><b>CS ↔ CS:</b> mini-cluster 둘이 가까우면 병합 (N, SUM, SUMSQ 합산)</li><li><b>CS ↔ DS:</b> mini-cluster가 주요 cluster와 가까우면 흡수 (보통 보수적)</li></ul><p><b>💡 병합 기준</b><br>병합 후 variance가 threshold 이하면 병합 (다음 슬라이드).</p>"}, "29": {"en": "Processing a Chunk of Points (5/5)\n• Points assigned to a cluster or a minicluster are written to disk.\n\n\n\n              Retained set\n\n\n\n\n                                              Compressed sets\n                                              (miniclusters)\n\n\n\n\n                                 Jaemin Yoo\n                                                      Cluster          29", "kr": "<b>Chunk 처리 5/5</b><br>cluster/minicluster에 배정된 점들은 디스크에 기록", "summary": "<p><b>🎯 Chunk 처리 5단계 — 점 디스크 저장</b></p><p><b>📋 작업</b></p><ul><li>DS 또는 CS에 흡수된 점 → 원본 좌표를 디스크에 기록</li><li>메모리엔 요약 통계만 남김</li><li>→ 메모리 해제, 다음 chunk 로드 준비</li></ul><p><b>💡 핵심</b><br>점 원본은 필요 시 재접근 가능하게 저장. 정확한 re-assignment용.</p>"}, "30": {"en": "After Processing All Chunks\n• Finally, what to do with compressed and retained sets?\n• Option 1: Treat them as outliers and never cluster them.\n• Option 2: Assign each of them to the nearest cluster.\n   • For both individual points and miniclusters.\n\n\n\n\n                                    Jaemin Yoo               30", "kr": "<b>모든 chunk 처리 후</b><br>• CS와 RS 처리 옵션:<br>• Option 1: outlier로 간주, cluster 배정 안 함<br>• Option 2: 가장 가까운 cluster에 배정 (점+minicluster 모두)", "summary": "<p><b>🏁 모든 chunk 처리 후 — 마무리</b></p><p><b>🤔 남은 CS, RS를 어떻게?</b></p><p><b>Option 1: Outlier 처리</b><br>CS, RS는 어느 cluster에도 속하지 않음 → 이상치로 간주, 버리거나 별도 표시.</p><p><b>Option 2: 강제 배정</b><br>각 CS mini-cluster와 RS 점을 <b>가장 가까운 cluster</b>에 배정. 모든 점이 cluster에 속하도록.</p><p><b>💡 선택</b><br>응용에 따라. 노이즈 감지면 Option 1, 완전 분할이면 Option 2.</p>"}, "31": {"en": "How Close is Close Enough?\n• Need a way to decide whether to put a new point into a cluster.\n• BFR compares the Mahalanobis distance with a threshold.\n   • Definition:\n\n   • Euclidean distance from the centroid 𝑐 normalized by standard dev. 𝜎! .\n   • Leverages the assumption that points are normally distributed.\n\n\n\n         Euclidean                         Mahalanobis\n         distance:                         distance:\n\n\n                                    Jaemin Yoo                                 31", "kr": "<b>\"충분히 가까움\"의 정의 — Mahalanobis Distance</b><br>• threshold와 비교<br>• <b>Mahalanobis:</b> centroid c에서의 Euclidean distance를 σ_i로 정규화<br>• <b>공식:</b> mahal(p, c) = √Σ_i ((p_i − c_i) / σ_i)²<br>• 정규분포 가정 활용", "summary": "<p><b>⭐⭐⭐ Mahalanobis Distance — 필수 공식</b></p><p><b>📐 공식</b><br><code>mahal(p, c) = √Σ_i ((p_i − c_i) / σ_i)²</code></p><p><b>💡 해석</b><br>\"Euclidean distance를 <b>차원별 σ로 정규화</b>.\"</p><p><b>🎯 왜?</b></p><ul><li>어떤 차원은 variance 크고 다른 건 작음</li><li>σ로 나누면 각 차원이 \"동일 scale\"</li><li>정규분포라면: P(mahal > 4) 매우 작음 (outlier)</li></ul><p><b>🍎 예</b><br>σ_1 = 2, σ_2 = 10, p - c = (4, 10)<br>Euclidean: √(16+100) = 10.77<br>Mahalanobis: √((4/2)² + (10/10)²) = √(4+1) = 2.24</p><p><b>📝 시험 단골 계산!</b></p>"}, "32": {"en": "Assigning a Point to a Cluster\n• For each point 𝑝, choose the cluster with the closest centroid.\n• Add 𝑝 to the cluster if the distance is less than a threshold.\n   • Suppose the threshold = 4.\n   • Then, Pr(value being 4 standard deviations from the mean) < 10#$.\n\n\n\n\n                              Source: Stanford CS246 (2022)\n\n                                       Jaemin Yoo                        32", "kr": "<b>점 Cluster 배정</b><br>• 각 점 p에 대해 centroid 가장 가까운 cluster 선택<br>• mahal distance < threshold면 cluster에 추가<br>  • threshold = 4 가정<br>  • P(값이 mean에서 4σ 이상) < 10⁻⁵ (엄격)", "summary": "<p><b>🎯 점 배정 기준</b></p><p><b>📋 단계</b></p><ol><li>p에 가장 가까운 cluster 찾기 (Mahalanobis 기준)</li><li>그 cluster까지 Mahalanobis < <b>threshold</b>면 배정</li><li>아니면 잔여 (CS/RS로)</li></ol><p><b>📐 Threshold 설정</b></p><ul><li>일반: <b>2√d</b> (차원 d에 비례)</li><li>또는 <b>4</b> (정규분포 가정)</li><li>P(한 차원 값이 mean에서 4σ 이상) < 10⁻⁵ (엄격)</li></ul><p><b>💡 정규분포 가정 활용</b><br>cluster가 Gaussian이면 mahal 분포가 chi-squared. 확률적 기준 명확.</p>"}, "33": {"en": "When to Merge Two Clusters?\n• Compute the variance of the combined subcluster.\n• Combine if the combined variance is below some threshold.\n• Many alternatives: E.g., considering density.\n\n\n\n\n                              Jaemin Yoo                      33", "kr": "<b>Cluster 병합 시점</b><br>• 결합된 subcluster의 variance 계산<br>• 결합 variance가 threshold 이하면 병합<br>• 대안: density 고려", "summary": "<p><b>🔗 CS 병합 판정</b></p><p><b>📋 기준</b></p><ol><li>CS C1, C2 병합 후 variance 계산 (요약 통계로 O(d))</li><li>병합 variance < threshold면 병합</li><li>크면 두 cluster 유지 (dense 안 됨)</li></ol><p><b>💡 대안</b><br>Density 기반 (variance/N)로 판단. 크기 달라도 density 비슷하면 병합 OK.</p>"}, "34": {"en": "Outline\n1. CURE Algorithm\n2. BFR Algorithm\n3. BFR Algorithm: Process\n4. GRGPF Algorithm\n\n\n\n\n                            Jaemin Yoo   34", "kr": "<b>목차 (4부)</b><br>1. ✓ 2. ✓ 3. ✓ 4. <b>GRGPF Algorithm</b> ← 여기부터", "summary": "<p><b>🎯 4부 — GRGPF (비유클리드)</b></p><p>CURE/BFR은 Euclidean 전용. GRGPF는 <b>Non-Euclidean</b>용 streaming 알고리즘.</p>"}, "35": {"en": "GRGPF Algorithm\n• Does not require a Euclidean space unlike CURE and BFR.\n• Represents clusters by well-chosen sample points in memory.\n• Organizes clusters hierarchically, as a tree (not covered today).\n   • New point is assigned to a cluster by passing it down the tree.\n\n\n                               samples\n                                                        Memory\n                cluster data             cluster data\n\n\n                                                         Disk\n\n\n                                           Jaemin Yoo                  35", "kr": "<b>GRGPF</b><br>• CURE/BFR과 달리 Euclidean 공간 불필요<br>• cluster를 메모리의 <b>well-chosen sample 점</b>으로 표현<br>• cluster를 <b>tree로 hierarchical 조직</b> (오늘은 미다룸)<br>  • 새 점 배정 = tree 내려가며 할당", "summary": "<p><b>🌐 GRGPF 개요</b></p><p><b>💡 특징</b></p><ul><li>Non-Euclidean 공간 OK (centroid 불가)</li><li>Cluster = 메모리의 <b>선별된 sample 점들</b>로 표현</li><li>Tree 구조 (B+ tree 유사)로 cluster 계층 조직</li><li>새 점 배정 = tree top-down 탐색</li></ul><p><b>💡 왜 Tree?</b><br>새 점마다 모든 cluster와 거리 계산 불필요. tree 깊이만큼 O(log k) 비교.</p>"}, "36": {"en": "Cluster Representation\n• How to represent (or summarize) a cluster in GRGPF:\n  • The number 𝑁 of points.\n  • The clustroid 𝑐.\n  • The rowsum of the clustroid.\n     • Sum of the squares of the distances from 𝑝 to each point in the cluster.\n  • 𝑘 points that are nearest to the clustroid, and their rowsums.\n  • 𝑘 points that are farthest from the clustroid, and their rowsums.\n\n                                                                   q\n             rowsum of point p in cluster C =                  2\n                                                                       3   r\n                                                               p\n\n\n                                                Jaemin Yoo                        36", "kr": "<b>GRGPF Cluster 표현</b><br>• <b>N:</b> 점 개수<br>• <b>Clustroid c</b> (centroid 아님)<br>• <b>Rowsum of clustroid:</b> p에서 cluster 모든 점까지 거리 제곱 합<br>• <b>k nearest 점 + rowsum</b> (clustroid 근처)<br>• <b>k farthest 점 + rowsum</b> (clustroid에서 먼 곳)", "summary": "<p><b>⭐⭐ GRGPF Cluster 요약</b></p><p><b>📋 저장 요소</b></p><ol><li><b>N:</b> 점 개수</li><li><b>Clustroid c:</b> cluster의 중심 점 (centroid 아닌 실제 점!)</li><li><b>Rowsum(c):</b> c에서 cluster 모든 점까지의 거리 제곱 합</li><li><b>k nearest 점 + 각각의 rowsum</b> (c 근처)</li><li><b>k farthest 점 + 각각의 rowsum</b> (c에서 먼 곳)</li></ol><p><b>💡 총 저장</b><br>scalar 1 + 점 1 + rowsum (2k+1) + 점 (2k) = <b>O(k)</b></p>"}, "37": {"en": "Justification of the Representation\n• Clustroid is the point in the cluster with the smallest rowsum.\n• Why the 𝑘 points nearest to the clustroid?\n   • If the clustroid changes, the new clustroid would be one of them.\n   • Point 𝑝 becomes the new clustroid if rowsum 𝑝 < rowsum 𝑐 .\n• Why the 𝑘 points farthest from the clustroid?\n   • Used to determine whether two clusters are close enough to merge.\n\n\n\n\n                                    Jaemin Yoo                           37", "kr": "<b>왜 이렇게 표현?</b><br>• <b>Clustroid</b> = cluster에서 rowsum 최소인 점<br>• <b>k nearest:</b> clustroid가 바뀌면 새 clustroid가 여기서 나옴<br>  • 점 p의 rowsum(p) < rowsum(c)이면 p가 새 clustroid<br>• <b>k farthest:</b> 두 cluster가 merge 가능한지 판단용", "summary": "<p><b>🎯 각 요소의 역할</b></p><p><b>📐 Clustroid</b><br>\"cluster에서 <b>rowsum 최소</b>인 점.\" 즉 모든 다른 점에 가장 가까운 점.</p><p><b>🔄 K nearest의 역할</b><br>\"Clustroid가 바뀔 때 <b>새 clustroid 후보</b>.\"<br>- 점 q의 rowsum(q) < rowsum(c) → q가 새 clustroid<br>- 보통 nearest 중에서 나옴</p><p><b>🔗 K farthest의 역할</b><br>\"두 cluster <b>병합 가능성 판단</b>.\"<br>- 두 cluster의 farthest 점 사이 거리로 cluster 반지름 추정<br>- 반지름들이 적절하면 merge</p>"}, "38": {"en": "Adding a Point to a Cluster\n• How can we add a point 𝑝 to a cluster?\n   • Add 1 to 𝑁.\n   • For each point 𝑞 ∈ clustroid ∪ 𝑘 nearest points ∪ 𝑘 farthest points,\n      update rowsum 𝑞 as rowsum 𝑞 + 𝑑\" 𝑝, 𝑞 .\n• What if 𝑝 needs to be included in the representation?\n   • We need to compute the rowsum of 𝑝, which needs a disk access.\n                                               One of the 𝑘 nearest or\n                                               furthest points\n                                      q\n           p                      c            Clustroid\n\n                                  r            Not one of the 𝑘 nearest\n                                               or furthest points\n                                                                            38", "kr": "<b>점 추가</b><br>• N += 1<br>• q ∈ (clustroid ∪ k nearest ∪ k farthest)의 rowsum 업데이트:<br>  • rowsum(q) += d²(p, q)<br>• p가 representation에 포함되어야 할 경우?<br>  • p의 rowsum 계산 → 디스크 접근 필요", "summary": "<p><b>🔧 GRGPF 점 추가</b></p><p><b>📋 연산</b></p><ol><li>N += 1</li><li>저장된 각 대표 점 q (clustroid ∪ k nearest ∪ k farthest)에 대해:<br>rowsum(q) += d²(p, q)</li><li>p 자체의 rowsum 추정 필요시 계산 (→ Pythagorean 근사)</li></ol><p><b>💡 복잡도</b><br>대부분 O(k) 업데이트. 새 representative 필요시 disk 접근.</p>"}, "39": {"en": "Estimating the Rowsum\n• Proposition: rowsum 𝑝 ≈ rowsum 𝑐 + 𝑁 × 𝑑 1 𝑝, 𝑐 .\n• With the curse of dimensionality, almost all angles are 90°.\n• Thus, 𝑑 1 𝑝, 𝑟 ≈ 𝑑 1 𝑝, 𝑐 + 𝑑 1 𝑐, 𝑟 by the Pythagorean theorem.\n\n                                               One of the k nearest or\n                                               furthest points\n                                  q\n          p                   c                Clustroid\n\n                              r                Not one of the k nearest\n                                               or furthest points\n\n\n\n                                  Jaemin Yoo                              39", "kr": "<b>Rowsum 추정 (Pythagorean 근사)</b><br>• <b>rowsum(p) ≈ rowsum(c) + N × d²(p, c)</b><br>• 차원의 저주로 거의 모든 각 ≈ 90°<br>• d²(p, r) ≈ d²(p, c) + d²(c, r) (Pythagorean)<br>• → rowsum 직접 계산 없이 추정", "summary": "<p><b>⭐ Pythagorean 근사 — 차원의 저주의 긍정적 활용</b></p><p><b>📐 근사 공식</b><br><code>rowsum(p) ≈ rowsum(c) + N × d²(p, c)</code></p><p><b>💡 유도</b></p><ol><li>각 점 r에 대해: d²(p, r) ≈ d²(p, c) + d²(c, r) (Pythagorean theorem 비슷)</li><li>고차원에선 p-c와 c-r 벡터가 거의 <b>직교</b> (차원의 저주의 효과)</li><li>모든 r에 대해 합: rowsum(p) = Σ d²(p, r) ≈ Σ [d²(p,c) + d²(c,r)] = N·d²(p,c) + rowsum(c)</li></ol><p><b>🎯 결과</b><br>Disk 접근 없이 <b>O(1) 추정</b>. 차원의 저주를 유용하게 쓰는 드문 사례.</p>"}, "40": {"en": "Possibly Updating the Clustroid\n• If rowsum 𝑞 < rowsum 𝑐 for any 𝑞, make it the new clustroid.\n• Eventually, the true clustroid may not be in the 𝑘 closest points.\n   • Cluster representation needs to be recomputed periodically from disk.\n\n\n\n\n                                     q          c\n                              p\n\n\n\n\n                                   Jaemin Yoo                                40", "kr": "<b>Clustroid 업데이트</b><br>• rowsum(q) < rowsum(c)인 q 있으면 → q가 새 clustroid<br>• 결국 true clustroid가 k nearest에 없을 수 있음<br>  • cluster 표현을 주기적으로 disk에서 재계산", "summary": "<p><b>🔄 Clustroid 동적 업데이트</b></p><p><b>📋 교체 규칙</b></p><ul><li>저장된 대표 점 q의 rowsum(q) < rowsum(c) 발견 → q가 새 clustroid</li><li>새 clustroid 기준으로 k nearest/farthest 재구성</li></ul><p><b>🚨 주의: Drift</b><br>시간이 지나면 <b>진짜 clustroid가 저장된 점 밖</b>에 있을 수도. 이 경우 주기적으로 disk에서 전체 재계산 필요.</p>"}, "41": {"en": "Other Details of GRGPF\n• See the textbook for other details:\n   • How to initialize the cluster tree.\n   • How to use the tree for each new point.\n   • How to split a cluster.\n   • How to merge clusters (with the 𝑘 furthest points).\n\n\n\n\n                                     Jaemin Yoo            41", "kr": "<b>GRGPF 기타 세부</b><br>• 교재 참조:<br>  • Cluster tree 초기화<br>  • 새 점에 tree 사용<br>  • Cluster 분할<br>  • Cluster 병합 (k farthest 사용)", "summary": "<p><b>📚 GRGPF 추가 세부</b></p><p><b>📋 교재에서</b></p><ul><li>Cluster tree 초기 구성 방법</li><li>새 점을 tree top-down으로 배정하는 절차</li><li>Cluster 커지면 분할 (B+ tree split과 유사)</li><li>Cluster 병합 (k farthest 점 사이 거리 활용)</li></ul><p><b>💡 시험 범위</b><br>Tree 세부는 안 나옴. Clustroid + rowsum + Pythagorean까지가 핵심.</p>"}, "42": {"en": "Summary\n1. CURE Algorithm\n2. BFR Algorithm\n  • Cluster representation\n  • Three classes of sets\n3. BFR Algorithm: Process\n4. GRGPF Algorithm\n  • Cluster representation\n  • Estimation of a rowsum\n\n\n\n                             Jaemin Yoo   42", "kr": "<b>요약</b><br>1. CURE — 2-pass, representative + shrink<br>2. BFR — N/SUM/SUMSQ, DS/CS/RS, Mahalanobis<br>3. BFR Process — chunk 처리<br>4. GRGPF — clustroid, rowsum, k nearest/farthest", "summary": "<p><b>🎬 L9 마무리</b></p><p><b>✅ CURE</b></p><ul><li>2-pass: sample → rep → 전체 배정</li><li>Farthest-point rep + 20% shrink</li><li>비구형 cluster 처리 가능</li></ul><p><b>✅ BFR (가장 중요)</b></p><ul><li>Gaussian 가정 + axis-aligned</li><li><b>N, SUM, SUMSQ</b> 요약 통계 (2d+1)</li><li>centroid = SUM/N, var = SUMSQ/N − (SUM/N)²</li><li>DS/CS/RS 3 분류</li><li><b>Mahalanobis</b> = √Σ((p_i-c_i)/σ_i)²</li><li>Threshold 2√d 또는 4</li></ul><p><b>✅ GRGPF</b></p><ul><li>Non-Euclidean용</li><li>Clustroid + rowsum + k nearest/farthest</li><li>Pythagorean 근사로 rowsum 추정</li></ul><p><b>⭐ 기출 예상</b></p><ul><li>BFR 계산: N/SUM/SUMSQ, centroid, variance</li><li>Mahalanobis 계산</li><li>T/F: DS/CS/RS 분류, non-Euclidean에선 centroid 불가</li></ul>"}}, "10": {"1": {"en": "Dimensionality Reduction 1\n       Introduction to Data Mining\n        Seoul National University\n              Spring 2026\n\n\n\n\n                 Jaemin Yoo          1", "kr": "<b>Dimensionality Reduction 1</b><br>서울대 · 2026 봄 · Jaemin Yoo", "summary": "<p><b>🎬 L10 시작 — 차원 축소 기초</b><br>고차원 데이터를 \"진짜 중요한 축\" 몇 개로 압축. 수학적 도구: Eigenvalue, PCA.</p><p><b>⭐ 시험 포인트</b></p><ul><li>Rank, 차원 축소 개념 (★★)</li><li>Eigenpair 정의, Mẻ = λe (★★★)</li><li>Symmetric matrix 3 성질 (★★)</li><li>Power iteration + 수렴 증명 (★★★)</li><li>PCA = M^T M의 eigendecomp (★★★)</li></ul>"}, "2": {"en": "Announcements\n• Assignments:\n  • HW1 (deadline: April 9)\n  • HW2 (deadline: April 30)\n• Midterm:\n  • When: April 23 at 9:30 – 10:45\n  • Where: 302-208 and 302-209 (students will be separated)\n  • How: Closed-book; no calculators allowed\n\n\n\n\n                                 Jaemin Yoo                   2", "kr": "<b>공지</b><br>• HW1 (4/9), HW2 (4/30)<br>• <b>Midterm: 4월 23일 9:30~10:45, 302-208/209, closed-book, 계산기 불가</b>", "summary": "<p><b>⭐ 시험 공식 정보</b></p><ul><li><b>2026년 4월 23일</b> (목)</li><li>9:30~10:45 (75분)</li><li>302-208/209호</li><li><b>Closed-book + 계산기 불가</b></li></ul><p><b>📝 대비</b><br>계산기 없으니 간단한 수치 계산 + 개념·증명 위주.</p>"}, "3": {"en": "Recap\n• BFR Algorithm\n  • Cluster representation\n  • Three classes of sets\n• CURE Algorithm\n  • Representative points\n• GRGPF Algorithm\n  • Rowsum\n  • Estimation of a rowsum                         q\n                             rowsum of p =     2\n                                                       3   r\n                                               p\n\n\n                                  Jaemin Yoo                   3", "kr": "<b>복습</b><br>• BFR: cluster 표현, 3 set<br>• CURE: representative<br>• GRGPF: rowsum, 추정", "summary": "<p><b>🔙 L9 복습</b></p><ul><li>BFR: N/SUM/SUMSQ, DS/CS/RS, Mahalanobis</li><li>CURE: representative + shrink</li><li>GRGPF: clustroid + rowsum</li></ul><p><b>💡 L10 전환</b><br>Clustering 끝. 이제 <b>차원 축소</b>로. PCA(L10), SVD/CUR(L11).</p>"}, "4": {"en": "Outline\n1. Dimensionality Reduction\n2. Eigenvalues and Eigenpairs\n3. Power Iteration\n4. Principal Component Analysis\n\n\n\n\n                             Jaemin Yoo   4", "kr": "<b>목차</b><ol><li>Dimensionality Reduction</li><li>Eigenvalues and Eigenpairs</li><li>Power Iteration</li><li>PCA</li></ol>", "summary": "<p><b>🗺️ L10 4부</b></p><ol><li><b>Dim Reduction</b> — 개념, rank, latent factor</li><li><b>Eigenvalues</b> — 정의, symmetric 성질</li><li><b>Power Iteration</b> — principal eigenvector 계산</li><li><b>PCA</b> — principal components</li></ol>"}, "5": {"en": "Data as a Large Matrix\n• Many sources of data can be viewed as an 𝑚 × 𝑛 matrix.\n  • 𝑚 is the number of data points (or samples/instances).\n  • 𝑛 is the number of features (or attributes).\n• Consider a health dataset as an example.\n  • Each person is <height, weight, BMI, blood pressure, age, etc.>\n  • Features are flexible; they can be newly created or discarded.\n\n\n\n\n                                                                      5", "kr": "<b>데이터 = 거대 행렬</b><br>• 많은 데이터 소스가 m × n 행렬로 표현 가능<br>  • m = 데이터 점 수 (sample/instance)<br>  • n = feature 수 (attribute)<br>• 예: 건강 데이터<br>  • 각 사람 = <키, 몸무게, BMI, 혈압, 나이, ...><br>  • feature는 유연 — 만들거나 버릴 수 있음", "summary": "<p><b>📊 데이터의 수학적 표현</b></p><p><b>📐 m × n 행렬</b></p><ul><li>m = 데이터 점 수 (row)</li><li>n = feature 수 (column)</li><li>M[i][j] = i번째 점의 j번째 feature 값</li></ul><p><b>🍎 예: 건강 데이터</b><br>각 row = 한 사람 (키, 몸무게, BMI, 혈압, 나이, ...)</p><p><b>💡 feature는 유연</b><br>새 feature 생성(BMI=몸무게/키²)이나 삭제 가능. 중복/파생 feature가 진짜 차원보다 많음.</p>"}, "6": {"en": "Data Manifold\n• The manifold of data is not necessarily an 𝑛-dimensional space.\n  • The size of manifold = The number of latent factors.\n  • E.g., representing a person with their weight, height, and BMI.\n• We find these latent factors through dimensionality reduction.\n\n\n\n\n                               Source: Stanford CS246 (2022)\n\n                                        Jaemin Yoo                    6", "kr": "<b>Data Manifold</b><br>• 데이터 manifold는 반드시 n차원일 필요 없음<br>  • manifold 크기 = latent factor 수<br>  • 예: 키, 몸무게, BMI로 사람 표현 (BMI는 파생)<br>• <b>Dimensionality reduction으로 latent factor 찾기</b>", "summary": "<p><b>⭐ Data Manifold — 진짜 차원</b></p><p><b>💡 핵심 개념</b><br>\"데이터가 n차원에 <b>펼쳐진 듯 보이지만</b>, 실제는 k(<n)차원 manifold 위에 있을 수 있다.\"</p><p><b>🍎 예</b><br>사람 데이터의 (키, 몸무게, BMI):</p><ul><li>BMI = 몸무게 / 키² (완전 파생)</li><li>→ 3 feature인데 진짜 차원 = 2</li></ul><p><b>🎯 Dim Reduction의 목표</b><br>\"<b>Latent factor</b>(숨은 진짜 차원) 찾기.\"</p>"}, "7": {"en": "Rank of a Matrix\n• The rank of a matrix 𝑀 = The number of latent factors.\n   • Rank is the # of linearly independent rows (or columns) of 𝑀.\n   • Independence: There is no nonzero linear sum of rows that is 𝟎.\n• Consider 3 points in a 3D space:\n     𝐴   1  2 1\n   • 𝐵 = −2 −3 1 (1 row per point)\n     𝐶   3  5 0\n• Rank is two, since\n   • 𝐴 − 𝐵 − 𝐶 = 𝟎 (in terms of rows)\n   • 5𝑐! − 3𝑐\" + 𝑐# = 𝟎 (in terms of columns)\n                                                      Source: Stanford CS246 (2022)\n\n                                   Jaemin Yoo                                         7", "kr": "<b>Rank of Matrix</b><br>• <b>Rank(M) = latent factor 수</b><br>  • linearly independent row (또는 column) 수<br>  • Independence: row들의 0 아닌 선형 합이 0되지 않음<br>• 예: 3D 점 A=(1,2,1), B=(-2,-3,1), C=(3,5,0)<br>  • Rank = 2:<br>    • A − B − C = 0 (row)<br>    • 5c1 − 3c2 + c3 = 0 (column)", "summary": "<p><b>⭐⭐ Rank = Latent Factor 수</b></p><p><b>📐 정의</b><br>\"Linearly independent row(또는 column) 수.\"</p><p><b>🍎 예</b><br>3D 점 3개: A=(1,2,1), B=(-2,-3,1), C=(3,5,0)<br>Rank = 2 (3이 아님)</p><p><b>🔍 왜?</b></p><ul><li>Row: A − B − C = 0 → 3개 중 1개 의존</li><li>Column: 5c1 − 3c2 + c3 = 0 → 3개 column 중 1개 의존</li></ul><p><b>🎯 해석</b><br>명목상 3D인데 실제 rank=2 → 2D로 표현 가능.</p>"}, "8": {"en": "Rank of a Matrix\n• Then, we can rewrite the coordinates efficiently.\n• Let’s consider 𝐴 = [1 2 1].\n• Old basis vectors: 1 0 0 , 0 1 0 , 0 0 1 .\n   • 𝐴 = 1𝑢! + 2𝑢\" + 1𝑢#.\n• New basis vectors: 1 2 1 , −2 − 3 1 .\n   • 𝐴 = 1𝑢! + 0𝑢\".\n   • 𝑀 has new coordinates: 𝐴: 1 0 , 𝐵: 0 1 , 𝐶: 1 − 1 .   Source: Stanford CS246 (2022)\n\n\n   • We reduced the number of dimensions!\n\n\n\n                                    Jaemin Yoo                                             8", "kr": "<b>Rank 활용: 차원 축소</b><br>• 좌표를 효율적 재작성<br>• A = [1, 2, 1]<br>  • 기존 basis: (1,0,0), (0,1,0), (0,0,1) → A = 1·u1 + 2·u2 + 1·u3<br>  • 새 basis: (1,2,1), (-2,-3,1) → A = 1·u1 + 0·u2<br>    • M 새 좌표: A:(1,0), B:(0,1), C:(1,-1)<br>• 차원 3 → 2로 축소!", "summary": "<p><b>⭐ Basis 변환으로 차원 축소</b></p><p><b>📐 Idea</b><br>\"Rank < 명목 차원이면, <b>더 작은 basis</b>로 같은 점 표현 가능.\"</p><p><b>🍎 예</b><br>A = [1, 2, 1] (3D 좌표)</p><p><b>Option 1: 기존 basis (표준 단위벡터)</b><br>(1,0,0), (0,1,0), (0,0,1) → A = 1·u1 + 2·u2 + 1·u3 (3 좌표)</p><p><b>Option 2: 새 basis</b><br>(1,2,1), (-2,-3,1) → A = 1·u1 + 0·u2 (2 좌표!)</p><p><b>🎯 결과</b><br>3D → 2D. 정보 손실 없음. 이게 <b>차원 축소의 본질</b>.</p>"}, "9": {"en": "Dimensionality Reduction\n• Goal: Discover the actual axes of data.\n   • Follow the red line (i.e., the manifold).\n   • Represent each point with 1 coordinate.\n• By doing this, we incur a bit of error.\n   • Since the points do not exactly lie on the line.\n   • There will be no error if the rank is one.\n                                                        Source: Stanford CS246 (2022)\n\n\n\n\n                                      Jaemin Yoo                                        9", "kr": "<b>Dimensionality Reduction 목표</b><br>• 데이터의 진짜 축 찾기<br>  • 빨간 선 따라가기 (manifold)<br>  • 각 점을 1 좌표로 표현<br>• 오차 있음 (점이 정확히 선 위에 있지 않음)<br>  • rank = 1이면 오차 0", "summary": "<p><b>🎯 Dim Reduction의 실무 목표</b></p><p><b>📋 완벽한 경우</b><br>Rank = 1이면 모든 점이 한 직선 위 → 1 좌표로 무손실 표현.</p><p><b>📋 현실</b><br>점들이 \"대체로\" 선 근처에 있지만 정확히는 아님:</p><ul><li>주축을 찾고 점을 그 축에 투영</li><li>약간의 오차 감수</li><li>rank 근사 = 대부분 variance 보존</li></ul><p><b>💡 PCA</b><br>이 \"주축\"을 수학적으로 찾는 방법.</p>"}, "10": {"en": "Outline\n1. Dimensionality Reduction\n2. Eigenvalues and Eigenpairs\n3. Power Iteration\n4. Principal Component Analysis\n\n\n\n\n                             Jaemin Yoo   10", "kr": "<b>목차 (2부)</b><br>1. ✓ 2. <b>Eigenvalues and Eigenpairs</b> ← 여기부터 3. Power Iteration 4. PCA", "summary": "<p><b>🎯 2부 — Eigenvalue 이론</b></p><p>PCA 이해엔 eigenvalue가 필수. 차근차근.</p>"}, "11": {"en": "Terms on Orthogonality\n• A vector 𝑣 is a unit vector if 𝑣 ≡ 𝑣 ! ≡ sqrt ∑\" 𝑣\"! = 1.\n• Two vectors 𝑣# and 𝑣! are orthogonal if 𝑣#$ 𝑣! = 0.\n• Two vectors 𝑣# and 𝑣! are orthonormal if orthogonal and unit.\n• A matrix 𝐴 is orthogonal if its rows/columns are orthonormal.\n  • Then, 𝐴𝐴$ = 𝐴$𝐴 = 𝐼 and 𝐴$ = 𝐴%!.\n\n\n\n\n                                Jaemin Yoo                        11", "kr": "<b>직교성 용어</b><br>• <b>Unit vector:</b> ||v|| = √Σ v_i² = 1<br>• <b>Orthogonal:</b> v1^T v2 = 0<br>• <b>Orthonormal:</b> orthogonal + unit<br>• <b>Orthogonal matrix A:</b> row/column이 orthonormal<br>  • 이때 AA^T = A^T A = I, A^T = A^(-1)", "summary": "<p><b>⭐ 직교성 용어 4가지 — 필수</b></p><p><b>📐 정의</b></p><ul><li><b>Unit vector:</b> ||v|| = 1 (길이 1)</li><li><b>Orthogonal:</b> v_1 · v_2 = 0 (수직)</li><li><b>Orthonormal:</b> orthogonal + unit (수직 + 길이 1)</li><li><b>Orthogonal matrix A:</b> row/column이 orthonormal</li></ul><p><b>⭐⭐ Orthogonal matrix의 핵심 성질</b><br><code>A A^T = A^T A = I</code><br><code>A^(-1) = A^T</code></p><p><b>🎯 왜 중요?</b><br>Inverse를 <b>transpose로</b>만 계산 가능 → 수치적으로 안정, 빠름.</p><p><b>📝 T/F 단골</b><br>\"Orthogonal matrix A의 inverse는 A^T\" → <b>TRUE</b></p>"}, "12": {"en": "Eigenvalues and Eigenvectors\n• Let 𝑀 be an 𝑛 × 𝑛 square matrix, 𝜆 be a scalar, and 𝑒 be a vector.\n• 𝜆 is an eigenvalue of 𝑀 and 𝑒 is the corresponding eigenvector if:\n                             𝑀𝑒 = 𝜆𝑒\n\n• A pair of 𝜆 and 𝑒 is called an eigenpair.\n• The eigenvector with the largest 𝜆 is the principal eigenvector.\n\n\n\n\n                               Jaemin Yoo                            12", "kr": "<b>Eigenvalue / Eigenvector</b><br>• n×n 정사각행렬 M, 스칼라 λ, 벡터 e<br>• <b>Mẻ = λe</b>이면 λ = eigenvalue, e = 해당 eigenvector<br>• (λ, e) = eigenpair<br>• 최대 λ에 대응하는 e = <b>principal eigenvector</b>", "summary": "<p><b>⭐⭐⭐ Eigenvalue/Eigenvector — 필수 정의</b></p><p><b>📐 정의</b><br>n×n 정사각행렬 M, 스칼라 λ, 0이 아닌 벡터 e:<br><code>M·e = λ·e</code></p><p>이때:</p><ul><li>λ = eigenvalue (고유값)</li><li>e = eigenvector (고유벡터)</li><li>(λ, e) = eigenpair</li></ul><p><b>💡 직관</b><br>\"M을 e에 곱해도 방향 안 바뀌고 <b>크기만 λ배</b> 변함.\"</p><p><b>🍎 예</b><br>M = [[2, 0], [0, 3]], e = (1, 0) → Me = (2, 0) = 2e. 그래서 λ=2, e=(1,0) eigenpair.</p><p><b>⭐ Principal eigenvector</b><br>\"가장 큰 λ에 대응하는 eigenvector.\" PCA/SVD의 주역.</p>"}, "13": {"en": "Ambiguity of Eigenvectors\n• If 𝑒 is an eigenvector, 𝑐𝑒 is also an eigenvector (𝑐: constant).\n   • Why? 𝑀𝑐𝑒 = 𝑐𝑀𝑒 = 𝑐𝜆𝑒 = 𝜆𝑐𝑒.\n   • Thus, 𝑒 and 𝑐𝑒 correspond to the same eigenvalue.\n• To avoid ambiguity, we require\n   • Every eigenvector 𝑒 to be a unit vector, i.e., 𝑒 = 1.\n   • The first nonzero component of an eigenvector to be positive.\n                M       e        λ         e\n                                                     Positive\n\n                               =7                    Unit vector\n\n\n\n                                     Jaemin Yoo                      13", "kr": "<b>Eigenvector의 모호성</b><br>• e가 eigenvector면 ce도 eigenvector (c: 상수)<br>  • Mce = cMe = cλe = λ(ce)<br>• 모호성 해결 위해:<br>  • e를 unit vector로 강제 (||e|| = 1)<br>  • e의 첫 nonzero component를 양수로 강제", "summary": "<p><b>🤔 Eigenvector의 모호성</b></p><p><b>💡 문제</b><br>e가 eigenvector ⟹ ce도 eigenvector (c는 임의 상수). <br>M(ce) = cMe = cλe = λ(ce)</p><p><b>🔧 Uniqueness 확보 규칙</b></p><ol><li><b>Unit vector:</b> ||e|| = 1 강제</li><li><b>첫 nonzero 부호:</b> 첫 nonzero component를 양수로</li></ol><p><b>🎯 결과</b><br>각 eigenvalue마다 <b>정확히 1개</b>의 e 결정.</p>"}, "14": {"en": "Eigendecomposition\n• Eigendecomposition of a square matrix 𝑀 is defined as\n\n                              𝑀 = 𝑄Λ𝑄%# .\n\n   • 𝑄 is the 𝑛 × 𝑛 matrix whose 𝑖-th column is the 𝑖-th eigenvector of 𝑀.\n   • Λ is the diagonal matrix whose diagonal elements are the eigenvalues.\n• Note: Eigendecomposition is not for all matrices.\n\n\n\n\n                                   Jaemin Yoo                                14", "kr": "<b>Eigendecomposition</b><br>• <b>M = Q Λ Q^(-1)</b><br>  • Q = n×n 행렬, i번째 column = M의 i번째 eigenvector<br>  • Λ = diagonal 행렬, 대각 원소 = eigenvalue<br>• 주의: 모든 행렬에 eigendecomp 있는 건 아님", "summary": "<p><b>⭐⭐ Eigendecomposition — 핵심 공식</b></p><p><b>📐 공식</b><br><code>M = Q Λ Q^(-1)</code></p><ul><li><b>Q:</b> n×n, i번째 column = M의 i번째 eigenvector</li><li><b>Λ:</b> 대각행렬, 대각 원소 = 해당 eigenvalue</li></ul><p><b>💡 직관</b><br>\"M을 eigenvector basis로 표현 = diagonal 행렬이 된다.\"</p><p><b>⚠️ 모든 M에 존재 X</b><br>Diagonalizable한 M에만 존재. (다음 슬라이드)</p>"}, "15": {"en": "Diagonalizable Matrix\n• A square matrix 𝐷 is diagonal if 𝑖 ≠ 𝑗 ⟹ 𝑑 𝑖, 𝑗 = 0.\n• A square matrix 𝑀 is diagonalizable if\n   • Informal: it is an almost diagonal matrix.\n   • Formal: there exists an invertible matrix 𝑃 and a diagonal matrix 𝐷 s.t.\n\n                                𝑃%# 𝑀𝑃 = 𝐷.\n\n\n\n\n                                     Jaemin Yoo                                 15", "kr": "<b>Diagonalizable Matrix</b><br>• Diagonal: i≠j ⟹ d(i,j) = 0<br>• Diagonalizable: \"거의 diagonal\"인 행렬<br>  • invertible P와 diagonal D 존재해 P^(-1) M P = D", "summary": "<p><b>📐 Diagonalizable 정의</b></p><p><b>💡 개념</b><br>\"basis 바꾸면 diagonal이 되는\" 행렬.</p><p><b>📐 정의</b><br>Invertible P와 diagonal D가 존재: <b>P^(-1) M P = D</b></p><p><b>⚠️ 예외</b><br>모든 행렬이 diagonalizable 아님. 반복 eigenvalue 있으면 안 될 수 있음 (Jordan form 필요).</p>"}, "16": {"en": "Independent Eigenvectors\n• Any diagonalizable matrix 𝑀 has eigendecomposition.\n• Why? 𝑀 always has 𝑛 linearly independent eigenvectors.\n  • 𝑃%!𝑀𝑃 = 𝐷 for some invertible 𝑃 and diagonal 𝐷.\n  • Then, 𝑀𝑃 = 𝑃𝐷 ⟹ 𝑀𝑣& = 𝑃 𝜆& 𝑒& = 𝜆& 𝑣& .\n     • 𝑣! is the 𝑖-th column of 𝑃.\n     • 𝜆! is the 𝑖-th diagonal entry of 𝐷.\n     • 𝑒! is the 𝑖-th column of the identity matrix 𝐼.\n  • Therefore, the columns of 𝑃 are eigenvectors of 𝑀.\n  • Since 𝑃 is invertible, they are linearly independent.\n\n\n\n                                           Jaemin Yoo       16", "kr": "<b>Diagonalizable = Independent Eigenvectors</b><br>• Diagonalizable M은 eigendecomp 가짐<br>• 왜? M은 항상 n개 linearly independent eigenvector 가짐<br>  • P^(-1) M P = D ⟹ MP = PD<br>  • ⟹ M v_i = P(λ_i e_i) = λ_i v_i<br>  • P의 column들이 M의 eigenvector<br>  • P가 invertible → linearly independent", "summary": "<p><b>🎯 Diagonalizable ⇔ n개 independent eigenvector</b></p><p><b>📐 증명 sketch</b></p><ol><li>P^(-1) M P = D ⟹ M P = P D</li><li>P의 i-th column을 v_i라 하면: M v_i = λ_i v_i (D diagonal이라 column 곱이 scale)</li><li>즉 v_i가 M의 eigenvector!</li><li>P invertible ⟹ column들 linearly independent</li></ol><p><b>🎯 결론</b><br>\"diagonalizable ⟺ n 선형독립 eigenvector 존재.\"</p>"}, "17": {"en": "Eigenvectors of a Symmetric Matrix\n• Let 𝑆 be an 𝑛 × 𝑛 real symmetric matrix, i.e., 𝑆 = 𝑆 $ .\n   • No complex matrices during our course.\n• Property 1: 𝑆 has 𝑛 orthonormal eigenvectors.\n   • Symmetry lets 𝑆 act independently along orthogonal directions.\n• Property 2: 𝑆 is diagonalizable.\n   • 𝑛 linearly independent eigenvectors ⟹ diagonalizable.\n• Property 3: 𝑄 in 𝑆 = 𝑄Λ𝑄%# is orthonormal.\n   • Due to P1 & P2.\n\n\n\n                                   Jaemin Yoo                         17", "kr": "<b>Symmetric Matrix의 Eigenvector (중요!)</b><br>• 실 symmetric S (S = S^T):<br>• <b>Property 1:</b> S는 n개 <b>orthonormal</b> eigenvector 가짐<br>• <b>Property 2:</b> S는 diagonalizable<br>• <b>Property 3:</b> S = QΛQ^T에서 Q도 orthonormal (Q^(-1) = Q^T)", "summary": "<p><b>⭐⭐⭐ Symmetric Matrix 3대 성질 — 필수 암기</b></p><p><b>📐 S = S^T (실 symmetric) 이면:</b></p><ol><li><b>Property 1:</b> n개의 <b>orthonormal</b> eigenvector (단순 independent이 아니라 orthonormal!)</li><li><b>Property 2:</b> 항상 diagonalizable</li><li><b>Property 3:</b> S = Q Λ Q^T (Q 역시 orthonormal, 즉 Q^(-1) = Q^T)</li></ol><p><b>💡 왜 중요?</b></p><ul><li>covariance matrix, M^T M은 항상 symmetric</li><li>→ <b>PCA, SVD의 수학적 기반</b></li><li>Q가 orthogonal이면 계산 편의 극대화</li></ul><p><b>📝 시험 T/F 단골</b></p><ul><li>\"Symmetric matrix always diagonalizable\" → <b>TRUE</b></li><li>\"Symmetric matrix의 eigenvector는 orthogonal\" → <b>TRUE</b></li></ul>"}, "18": {"en": "Outline\n1. Dimensionality Reduction\n2. Eigenvalues and Eigenpairs\n3. Power Iteration\n4. Principal Component Analysis\n\n\n\n\n                             Jaemin Yoo   18", "kr": "<b>목차 (3부)</b><br>1. ✓ 2. ✓ 3. <b>Power Iteration</b> ← 여기부터 4. PCA", "summary": "<p><b>🎯 3부 — Power Iteration</b></p><p>eigendecomposition 실제 계산. 대용량에 효율적.</p>"}, "19": {"en": "How to Perform Eigendecomposition\n• Q: How can we actually perform eigendecomposition?\n• Two popular approaches: QR algorithm and power iteration.\n   • QR algorithm is a standard way but slow for large matrices.\n   • Power iteration is fast but finds only the largest eigenvalues.\n• We’ll focus on power iteration as we assume a large matrix.\n\n\n\n\n                                      Jaemin Yoo                       19", "kr": "<b>Eigendecomposition 계산법</b><br>• Q: 실제로 어떻게 계산?<br>• 2가지 인기:<br>  • <b>QR algorithm:</b> 표준이지만 대용량에 느림<br>  • <b>Power iteration:</b> 빠르지만 가장 큰 eigenvalue만 찾음<br>• 대용량 가정 → <b>Power iteration 초점</b>", "summary": "<p><b>🔧 Eigendecomposition 계산 2가지</b></p><table style=\"font-size:12px\"><tr><th></th><th>QR algorithm</th><th>Power Iteration</th></tr><tr><td>결과</td><td>모든 eigenvalue</td><td>principal만 (or top-k)</td></tr><tr><td>속도</td><td>중규모 OK</td><td>빠름</td></tr><tr><td>대용량</td><td>부적합</td><td>적합</td></tr></table><p><b>💡 L10에선 Power Iteration만</b><br>대부분 응용은 top-k eigenvector만 필요. 효율.</p>"}, "20": {"en": "Power Iteration\n• Power iteration finds the principal eigenvector of 𝑀 efficiently.\n   • Again, 𝑀 is an 𝑛 × 𝑛 diagonalizable matrix.\n• How it works:\n   • Step 1: Start with any nonzero vector 𝑥' of length 𝑛.\n                                *+\n   • Step 2: Construct 𝑥()! = *+! for 𝑘 = 0, 1, ⋯.\n                                   !\n   • Step 3: Stop when consecutive 𝑥( ’s show little change.\n\n\n\n\n                                       Jaemin Yoo                     20", "kr": "<b>Power Iteration</b><br>• M의 principal eigenvector를 효율적으로 찾음<br>• M = n×n diagonalizable 행렬<br>• 알고리즘:<br>  1. 임의의 0 아닌 x_0 선택 (길이 n)<br>  2. x_{k+1} = Mx_k / ||Mx_k|| (normalize)<br>  3. 변화 적을 때 종료", "summary": "<p><b>⭐⭐⭐ Power Iteration — 알고리즘</b></p><p><b>📋 3단계</b></p><ol><li>임의 0 아닌 x_0 선택 (length n 벡터)</li><li>반복: x_{k+1} = M·x_k / ||M·x_k|| (matrix-vector 곱 + <b>normalize</b>)</li><li>변화 (||x_{k+1} − x_k||) 작아지면 종료</li></ol><p><b>💡 왜 normalize?</b></p><ul><li>λ > 1이면 x가 지수적으로 커져 overflow</li><li>λ < 1이면 0으로 수렴</li><li>normalize로 항상 unit vector 유지</li></ul><p><b>🎯 결과</b><br>x가 M의 <b>principal eigenvector</b>로 수렴. 왜? 다음 슬라이드.</p>"}, "21": {"en": "Power Iteration: Example\n\n\n\n\n                    Jaemin Yoo   21", "kr": "<b>Power Iteration 예제</b><br>(수치 예) M × x 반복 적용 → 수렴된 x.", "summary": "<p><b>🎯 수치 예제</b></p><p>M = [[1, 2], [2, 3]], x_0 = (1, 0)이라 치자:</p><ul><li>x_1 = M·x_0 / ||...|| = (1, 2)/√5 = (0.447, 0.894)</li><li>x_2 = M·x_1 / ||...|| 계산</li><li>... 몇 iteration 후 (0.525, 0.851) 근처로 수렴</li></ul><p>이 수렴된 값 ≈ M의 principal eigenvector.</p>"}, "22": {"en": "Finding an Eigenvector\n• The converged 𝑥 is approximately an eigenvector of 𝑀.\n  • Why? 𝑀𝑥 ≈ 𝑥.\n• The corresponding eigenvalue is 𝜆 = 𝑥 $ 𝑀𝑥.\n  • Why? 𝑥 $𝑀𝑥 = 𝑥 $𝜆𝑥 = 𝜆𝑥 $𝑥 = 𝜆 𝑥 \" = 𝜆 (𝑥 is a unit vector).\n• Example: If we take 𝑥 = 0.53, 0.85 , then\n\n                             1 2 0.53\n               𝜆 = 0.53 0.85          = 4.25\n                             2 3 0.85\n\n\n\n                                  Jaemin Yoo                       22", "kr": "<b>수렴된 x에서 Eigenvector + Eigenvalue</b><br>• 수렴 x ≈ M의 eigenvector (Mx ≈ x 이므로)<br>• <b>eigenvalue λ = x^T M x</b><br>  • 왜? x^T M x = x^T λ x = λ||x||² = λ (unit vector)<br>• 예: x = (0.53, 0.85), M = [[1,2],[2,3]] → λ = 4.25", "summary": "<p><b>⭐ 수렴 후 λ 추출</b></p><p><b>📐 공식</b><br><code>λ = x^T M x</code> (단 x는 unit vector)</p><p><b>📐 유도</b></p><ul><li>Mx = λx (eigenvector 관계)</li><li>x^T M x = x^T(λx) = λ (x^T x) = λ·||x||² = λ (unit이므로)</li></ul><p><b>🍎 예</b><br>x = (0.53, 0.85), M = [[1,2],[2,3]]<br>Mx = (1·0.53 + 2·0.85, 2·0.53 + 3·0.85) = (2.23, 3.61)<br>x^T Mx = 0.53·2.23 + 0.85·3.61 = 1.18 + 3.07 = <b>4.25</b></p>"}, "23": {"en": "Finding the Principal Eigenvector\n• The converged 𝑥 is approximately the principal eigenvector of 𝑀.\n  • Suppose that the eigenvalues are 𝜆! > 𝜆\" ≥ ⋯ ≥ 𝜆, .\n  • Let the corresponding eigenvectors be 𝑣!, 𝑣\", ⋯ , 𝑣, .\n  • The initial vector can be represented as 𝑥' = 𝑐!𝑣! + 𝑐\"𝑣\" + ⋯ + 𝑐, 𝑣, .\n  • Power iteration works as 𝑥( = 𝑐!𝜆!( 𝑣! + 𝑐\"𝜆(\" 𝑣\" + ⋯ + 𝑐, 𝜆(, 𝑣, .\n  • By factoring out 𝜆!( , we have\n                                      (                  (\n                                   𝜆\"                 𝜆,\n             𝑥( = 𝜆!( 𝑐!𝑣! + 𝑐\"         𝑣\" + ⋯ + 𝑐,        𝑣, .\n                                   𝜆!                 𝜆!\n  • As 𝑘 → ∞, all 𝜆& /𝜆! ( for 𝑖 > 1 goes to 0.\n\n\n\n                                    Jaemin Yoo                                23", "kr": "<b>Principal Eigenvector인 이유</b

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDM 2026 Midterm Study Guide</title>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
:root{--bg:#f8f9fa;--sidebar-w:220px;--card-radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:#1a1a2e;line-height:1.7;padding-left:var(--sidebar-w)}
/* Sidebar */
#sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:#1a1a2e;color:#ccc;overflow-y:auto;padding:18px 12px;z-index:100}
#sidebar h2{color:#fff;font-size:15px;margin-bottom:14px;border-bottom:1px solid #333;padding-bottom:8px}
#sidebar a{display:block;color:#aab;text-decoration:none;padding:6px 10px;border-radius:6px;font-size:13px;margin-bottom:2px;transition:.2s}
#sidebar a:hover,#sidebar a.active{background:#2d2d5e;color:#7ecfff}
/* Main */
main{max-width:960px;margin:0 auto;padding:30px 24px 80px}
h1{font-size:28px;margin-bottom:6px;color:#1a1a2e}
h2.section-title{font-size:22px;margin:40px 0 14px;padding:10px 16px;background:linear-gradient(135deg,#1a1a2e,#2d2d5e);color:#fff;border-radius:var(--card-radius)}
h3{font-size:17px;margin:18px 0 8px;color:#1a1a2e;border-left:4px solid #4361ee;padding-left:10px}
h4{font-size:15px;margin:12px 0 6px;color:#333}
/* Tags */
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;margin:4px 4px 4px 0;vertical-align:middle}
.tag-intuition{background:#fff3cd;color:#856404;border:1px solid #ffc107}
.tag-theory{background:#cce5ff;color:#004085;border:1px solid #4361ee}
.tag-example{background:#d4edda;color:#155724;border:1px solid #28a745}
.tag-exam{background:#f8d7da;color:#721c24;border:1px solid #dc3545}
/* Cards */
.card{background:#fff;border-radius:var(--card-radius);padding:18px 20px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.card.intuition{border-left:4px solid #ffc107}
.card.theory{border-left:4px solid #4361ee}
.card.example{border-left:4px solid #28a745}
.card.exam{border-left:4px solid #dc3545}
/* Code */
pre{background:#1e1e2e;color:#cdd6f4;padding:14px 18px;border-radius:8px;overflow-x:auto;font-size:13px;line-height:1.6;margin:10px 0}
code{font-family:'Cascadia Code','Fira Code',monospace}
.code-comment{color:#6c7086;font-style:italic}
/* Table */
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px}
th{background:#1a1a2e;color:#fff;padding:8px 12px;text-align:left}
td{padding:8px 12px;border-bottom:1px solid #e9ecef}
tr:nth-child(even){background:#f1f3f5}
/* Inline items */
.inline-items{margin:10px 0}
.inline-item{background:#fff;border:1px solid #dee2e6;border-radius:8px;padding:14px 16px;margin:8px 0}
.inline-item h5{font-size:14px;color:#4361ee;margin-bottom:6px}
.inline-item .meta{font-size:12px;color:#6c757d;margin-bottom:6px}
.inline-item .q{font-weight:600;margin-bottom:4px}
.inline-item .a{color:#155724;margin-top:4px}
.inline-item .sol{color:#333;margin-top:4px;font-size:13px}
/* Misc */
blockquote{border-left:3px solid #ffc107;background:#fff8e1;padding:10px 16px;margin:10px 0;font-style:italic;border-radius:0 8px 8px 0}
.formula-box{background:#eef;border:1px solid #99b;border-radius:8px;padding:12px 16px;margin:10px 0;text-align:center}
.warn{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px}
ul,ol{padding-left:22px;margin:6px 0}
li{margin:3px 0}
.compare-table th{font-size:13px}
.compare-table td{font-size:13px}
</style>
</head>
